xp":"飞行时间从开始滑行到停止运动为止。"},{"id":496,"ch":6,"cat":"法律法规","q":"我国民航飞行使用的时间为","opts":["A 当地的地方时","B 世界协调时","C 北京时"],"ans":1,"exp":"民航飞行使用世界协调时（UTC）。"},{"id":497,"ch":6,"cat":"法律法规","q":"无人机特殊飞行许可颁发前，由____进行检查以确定飞行是安全的","opts":["A 经验丰富的无人机飞行员","B 经验丰富的有人机飞行员","C 适当认证修理站"],"ans":2,"exp":"特殊飞行许可前由认证修理站进行检查。"},{"id":498,"ch":6,"cat":"法律法规","q":"如CCAR61部授权的执照持有人在理论考试中作弊，局方拒绝其执照申请期限为","opts":["A 一年","B 视其违规的情节轻重而定","C 半年"],"ans":0,"exp":"考试作弊行为拒绝申请期限为一年。"},{"id":499,"ch":6,"cat":"法律法规","q":"民用无人机超视距驾驶员(机长)合格证申请人须有不少于多少小时飞行训练时间","opts":["A 56","B 44","C 100"],"ans":0,"exp":"超视距驾驶员（机长）需不少于56小时飞行训练。"},{"id":500,"ch":6,"cat":"法律法规","q":"CCAR61部持有人在考试中作弊，____年内不得申请执照、合格证或等级","opts":["A 视违规情节轻重而定","B 2","C 1"],"ans":2,"exp":"作弊行为1年内不得申请相关执照和考试。"},{"id":501,"ch":6,"cat":"法律法规","q":"为保障飞行安全，建议无论在白天还是夜间，当发动机在运转时就打开","opts":["A 航行灯","B 防撞灯","C 着陆灯"],"ans":1,"exp":"发动机运转时应打开防撞灯。"},{"id":502,"ch":6,"cat":"法律法规","q":"对无人机教员等级申请人的要求是必须的","opts":["A 在所申请的无人机上担任机长经历时间不少于100小时","B 具备无人机应急处理程序方面的技术","C 在所申请的无人机上飞行经历不少于100小时"],"ans":0,"exp":"教员等级申请人须担任机长经历不少于100小时。"},{"id":503,"ch":6,"cat":"法律法规","q":"II级别无人机指","opts":["A 1.5公斤<空机质量≤4kg，1.5公斤<起飞全重≤7kg","B 1公斤<空机质量≤4kg，2公斤<起飞全重≤7kg","C 1.5公斤<空机质量≤4kg，1.5公斤<起飞全重≤15kg"],"ans":0,"exp":"II级别：1.5kg<空机质量≤4kg，1.5kg<起飞全重≤7kg。"},{"id":504,"ch":6,"cat":"法律法规","q":"《无人机驾驶员操作手册》作为主要参考，____《无人机飞行手册》","opts":["A 不可替代","B 一般情况下可以替代","C 由局方批准后可以替代"],"ans":2,"exp":"经局方批准后驾驶员操作手册可替代飞行手册。"},{"id":505,"ch":6,"cat":"法律法规","q":"涉及酒精或药物的违禁行为，可暂扣执照____或吊销","opts":["A 3到6个月","B 1到6个月","C 1到3个月"],"ans":1,"exp":"暂扣执照1-6个月或吊销。"},{"id":506,"ch":6,"cat":"法律法规","q":"民用无人机驾驶员多旋翼类别超视距等级申请人必须具有不少于多少小时的带飞训练时间","opts":["A 56","B 10","C 15"],"ans":1,"exp":"超视距等级带飞训练不少于10小时。"},{"id":507,"ch":6,"cat":"法律法规","q":"在丘陵、山区、高原进行农业作业飞行的最低天气标准是","opts":["A 云高距作业区的最高点不低于200米，能见度不小于5公里","B 云高距作业区的最高点不低于300米，能见度不小于5公里","C 云高距作业区的最高点不低于150米，能见度不小于3公里"],"ans":1,"exp":"丘陵山区高原作业最低标准：云高≥300m，能见度≥5km。"},{"id":508,"ch":6,"cat":"法律法规","q":"无人机飞行手册中规定的过载表明","opts":["A 起飞时允许的最大过载","B 着陆时允许的最大过载","C 飞行中允许的最大过载"],"ans":2,"exp":"飞行手册中过载指飞行中允许的最大过载。"},{"id":509,"ch":6,"cat":"法律法规","q":"对于无人机植保作业，作业负责人有何要求","opts":["A 接受了相应培训或具备经验，并向局方报备","B 持有民用无人机驾驶员合格证并具有相应等级","C 以上都有"],"ans":2,"exp":"植保作业负责人需同时满足培训和持证要求。"},{"id":510,"ch":6,"cat":"法律法规","q":"下列情况下，无人机系统驾驶员由局方实施管理","opts":["A 在融合空域运行的小型无人机","B 在隔离空域内超视距运行的无人机","C 在融合空域运行的轻型无人机"],"ans":0,"exp":"融合空域小型无人机由局方实施管理。"},{"id":511,"ch":6,"cat":"法律法规","q":"起飞时间(陆上)的含义是指","opts":["A 航空器开始起飞滑跑轮子转动的瞬间","B 航空器进入跑道对正起飞方向的瞬间","C 航空器起飞滑跑抬前轮的瞬间"],"ans":0,"exp":"起飞时间是开始滑跑轮子转动的瞬间。"},{"id":512,"ch":6,"cat":"法律法规","q":"民用无人机视距内运行是指半径____米，相对高度低于____米","opts":["A 100/50","B 120/500","C 500/120"],"ans":2,"exp":"视距内运行：半径500m，相对高度低于120m。"},{"id":513,"ch":6,"cat":"法律法规","q":"无人机驾驶员在执行飞行任务时，应当随身携带","opts":["A 驾驶员执照或合格证","B 飞机适航证书","C 飞行记录本"],"ans":0,"exp":"驾驶员需随身携带执照或合格证。"},{"id":514,"ch":6,"cat":"法律法规","q":"空中交通管制单位为飞行中的民用航空器提供的空中交通服务中含有","opts":["A 飞行情报服务","B 机场保障服务","C 导航服务"],"ans":0,"exp":"空中交通服务包含飞行情报服务。"},{"id":515,"ch":6,"cat":"法律法规","q":"无人直升机或多旋翼飞行器飞行时间的含义是指","opts":["A 起飞离地到着陆接地的瞬间","B 旋翼开始转动至旋翼停止转动的瞬间","C 起飞滑跑至着陆滑跑终止的瞬间"],"ans":1,"exp":"旋翼飞行器飞行时间从旋翼转动到停止。"},{"id":516,"ch":6,"cat":"法律法规","q":"CCA61部持有人在考试中作弊，局方拒绝其执照申请期限为","opts":["A 半年","B 视违规情节轻重而定","C 一年"],"ans":2,"exp":"作弊行为拒绝申请期限为一年。"},{"id":517,"ch":6,"cat":"法律法规","q":"任何单位或者个人设计民用航空器应当向民航局申请____","opts":["A 适航证","B 生产许可证","C 型号合格证"],"ans":2,"exp":"设计民用航空器需申请型号合格证（TC）。"},{"id":518,"ch":6,"cat":"法律法规","q":"植保无人机级别为","opts":["A V类","B IV类","C VI类"],"ans":0,"exp":"植保无人机属于V类无人机。"},{"id":519,"ch":6,"cat":"法律法规","q":"无识别标志的航空器因特殊情况需要飞行的","opts":["A 必须经中国人民解放军空军批准","B 必须经相关管制单位批准","C 必须经中国民用航空总局空中交通管理局批准"],"ans":0,"exp":"无识别标志航空器飞行须经空军批准。"},{"id":520,"ch":6,"cat":"法律法规","q":"民用无人机的空机重量包含","opts":["A 不包含载荷、燃料的无人机重量","B 不包含载荷、电池和燃料的无人机重量","C 不包含载荷的无人机重量"],"ans":0,"exp":"空机重量不含载荷和燃料，但含电池（电动）。"},{"id":521,"ch":7,"cat":"气象","q":"对流层中层气流的基本趋势是","opts":["A 气流相对平稳","B 水汽含量很少","C 气流混乱"],"ans":0,"exp":"对流层中层气流相对平稳。"},{"id":522,"ch":7,"cat":"气象","q":"在山区飞行时应当注意，最强的乱流最多出现在","opts":["A 山的迎风坡","B 山顶","C 山谷中间"],"ans":2,"exp":"山谷中间气流受两侧山体挤压，乱流最强。"},{"id":523,"ch":7,"cat":"气象","q":"空气密度与气压、气温的关系，下列描述哪个正确","opts":["A 空气密度与气压成正比，与气温成反比","B 空气密度与气压成反比，与气温成正比","C 空气密度与气压成正比，与气温也成正比"],"ans":0,"exp":"密度=气压/(气体常数×温度)，与气压成正比，与温度成反比。"},{"id":524,"ch":7,"cat":"气象","q":"三大气象要素为","opts":["A 气温、风和云","B 风、云和降水","C 气温、气压和空气湿度"],"ans":2,"exp":"三大气象要素：气温、气压、空气湿度。"},{"id":525,"ch":7,"cat":"气象","q":"下面描述错误的是","opts":["A 锋面和锋线统称为锋","B 凡伸到对流层中上层者，称为层流锋","C 锋面与地面的交线称为锋线"],"ans":1,"exp":"伸到对流层中上层的锋称为对流层锋，不是层流锋。"},{"id":526,"ch":7,"cat":"气象","q":"雷暴处于发展阶段时","opts":["A 地面气压持续上升","B 地面气压保持不变","C 地面气压持续下降"],"ans":2,"exp":"雷暴发展阶段：上升气流强→地面气压下降。"},{"id":527,"ch":7,"cat":"气象","q":"山地对风的影响，以下描述错误的是","opts":["A 山体本身的障碍影响，使气流被阻滞不前","B 一般山底和峡谷风口的风速增大","C 一般山顶和峡谷风口的风速增大"],"ans":1,"exp":"山顶和峡谷风口风速增大，山底风速通常减小。"},{"id":528,"ch":7,"cat":"气象","q":"进气道结冰描述不正确的是","opts":["A 冰屑脱离进入压气机造成机械损伤","B 结冰堵塞进气道导致发动机富油停车","C 使进气速度场不均匀分布引起压气机叶片振动"],"ans":1,"exp":"进气道堵塞使气流减少，发动机会贫油停车而非富油。"},{"id":529,"ch":7,"cat":"气象","q":"大气稳定度以哪种运动来判定","opts":["A 以大气的气温垂直加速度运动来判定","B 以大气的气温垂直速度运动来判定","C 以大气的气压垂直速度运动来判定"],"ans":0,"exp":"大气稳定度通过气温垂直递减率来判定。"},{"id":530,"ch":7,"cat":"气象","q":"飞机按气压式高度表飞行，在飞向低压区时，实际高度将","opts":["A 保持不变","B 逐渐升高","C 逐渐降低"],"ans":2,"exp":"飞向低压区→气压降低→高度表指示偏高→实际高度降低。"},{"id":531,"ch":7,"cat":"气象","q":"目视判断风切变的参照物，以下不正确的是","opts":["A 雷暴云体下垂的雨幡","B 雷暴冷性外流气流的尘卷风","C 卷积云带来的降雨"],"ans":2,"exp":"卷积云是高云，不带来降雨，也不是风切变参照物。"},{"id":532,"ch":7,"cat":"气象","q":"形成海陆风的对流性环流的原因是因为","opts":["A 从水面吹向陆地的空气较暖，密度小，导致空气上升","B 陆地吸收和散发热量比水面快","C 从水面吹向陆地的空气冷，密度大，使空气上升"],"ans":1,"exp":"海陆风的根本原因是陆地和水面热力性质差异。"},{"id":533,"ch":7,"cat":"气象","q":"气压传感器测的是以下哪个高度","opts":["A 海拔高度","B 无线电高度","C 相对高度"],"ans":2,"exp":"气压传感器测量相对高度。"},{"id":534,"ch":7,"cat":"气象","q":"最小能见度是指","opts":["A 能见度因方向而异时，垂直和水平能见度最小的距离","B 能见度因方向而异时，其中最小的能见距离","C 能看到最近的物体距离"],"ans":1,"exp":"最小能见度是各方向中能见距离的最小值。"},{"id":535,"ch":7,"cat":"气象","q":"白天，山岩地、沙地、城市地区升温快，空气受热上升。这种现象会引起","opts":["A 温差作用力","B 热力对流冲击力","C 压差作用力"],"ans":1,"exp":"地表受热不均产生热力对流冲击力。"},{"id":536,"ch":7,"cat":"气象","q":"关于气团下列不正确的是","opts":["A 垂直范围大","B 水平温度梯度大","C 水平范围大"],"ans":1,"exp":"气团内部水平温度梯度小（均匀），不是大。"},{"id":537,"ch":7,"cat":"气象","q":"飞机在着陆时遇到顺风切变，会出现","opts":["A 飞机空速突然减小，升力减小，飞机将掉至正常下滑线以下","B 飞机空速突然增大，升力增加，飞机抬升","C 飞机高度下降，空速增大，超过正常着陆点着陆"],"ans":0,"exp":"顺风切变→顺风突增→空速减小→升力减小→飞机下沉。"},{"id":538,"ch":7,"cat":"气象","q":"使原来静止的空气产生垂直运动的作用力，称为","opts":["A 热力作用力","B 气动作用力","C 对流冲击力"],"ans":2,"exp":"使静止空气产生垂直运动的力称为对流冲击力。"},{"id":539,"ch":7,"cat":"气象","q":"关于风切变出现的地方，下述说法正确的是","opts":["A 在大气中任何高度上存在风向或风速变化的地方","B 在气压和温度急剧下降的地方出现","C 仅在雷暴中出现"],"ans":0,"exp":"风切变在任何高度、任何天气条件下都可能出现。"},{"id":540,"ch":7,"cat":"气象","q":"在重要天气预告图上用黑色的断线围起来的区域，表示有","opts":["A 晴天积云","B 西风急流","C 晴空颠簸"],"ans":2,"exp":"黑色断线区域表示晴空颠簸区。"},{"id":541,"ch":7,"cat":"气象","q":"下面大气分层的主要依据哪个是正确的","opts":["A 气层中风的垂直变化特点","B 气层气温的垂直分布特点","C 气层气压的垂直分布特点"],"ans":1,"exp":"大气分层主要依据气温的垂直分布特点。"},{"id":542,"ch":7,"cat":"气象","q":"卫星云图上下列哪个不是卷状云特征","opts":["A 在红外云图上，卷云顶温度很低，呈白色","B 无论可见光还是红外云图，卷云没有纤维结构","C 在可见光云图上，卷云呈灰-深灰色"],"ans":1,"exp":"卷云具有纤维状结构，B说反了。"},{"id":543,"ch":7,"cat":"气象","q":"低空风切变距地面一般为","opts":["A 小于100米","B 小于1000米","C 小于500米"],"ans":2,"exp":"低空风切变一般指距地面500米以内。"},{"id":544,"ch":7,"cat":"气象","q":"在山地背风坡中的下降气流中飞行，可造成严重危害的原因是","opts":["A 地速减小","B 空速表误差增大","C 气压式高度表读数高于实际高度"],"ans":2,"exp":"下降气流→气压升高→高度表读数偏高→实际高度更低。"},{"id":545,"ch":7,"cat":"气象","q":"在雷暴的生存周期中，哪一阶段云中充满下降气流","opts":["A 消散阶段","B 成熟阶段","C 积云阶段"],"ans":0,"exp":"消散阶段云中充满下降气流，降水最强。"},{"id":546,"ch":7,"cat":"气象","q":"热雷暴的形成原因是","opts":["A 地面受热不均","B 冷空气冲击暖空气而形成上升运动","C 地面水汽蒸发"],"ans":0,"exp":"热雷暴因地面受热不均产生强烈热力对流而形成。"},{"id":547,"ch":7,"cat":"气象","q":"飞机积冰频率正确的是","opts":["A 冬季在3000米以上积冰占56%","B 在6000米以上积冰占56%","C 冬季在3000米以下积冰占56%"],"ans":2,"exp":"积冰多发生在3000米以下，占56%左右。"},{"id":548,"ch":7,"cat":"气象","q":"在风中全马力飞行的固定翼民用无人机","opts":["A 逆风飞行时地速较大","B 顺风逆风地速相同","C 顺风飞行时地速较大"],"ans":2,"exp":"地速=空速±风速，顺风地速大。"},{"id":549,"ch":7,"cat":"气象","q":"当气温高于标准大气温度时，飞机的载重量要","opts":["A 减小","B 保持不变","C 增加"],"ans":0,"exp":"气温高→空气密度小→升力减小→载重量减小。"},{"id":550,"ch":7,"cat":"气象","q":"同一架无人机中午和傍晚GPS高度200米飞行，气压高度","opts":["A 傍晚的气压高度高","B 中午和傍晚一样高","C 中午的气压高度高"],"ans":2,"exp":"中午气温高→空气密度小→气压高度表指示偏高。"},{"id":551,"ch":7,"cat":"气象","q":"从什么资料上可以预先了解航线高度的天气情况","opts":["A 航路天气预告图","B 等压面预告图","C 重要天气预告图"],"ans":0,"exp":"航路天气预告图提供航线高度上的详细天气信息。"},{"id":552,"ch":7,"cat":"气象","q":"飞机按气压式高度表飞行，在飞向低压区时，实际高度将","opts":["A 逐渐升高","B 保持不变","C 逐渐降低"],"ans":2,"exp":"飞向低压区→高度表指示偏高→实际高度降低。"},{"id":553,"ch":7,"cat":"气象","q":"下列说法正确的是","opts":["A 是风产生了压力，所以风的尽头压力高","B 空气总是寻找低压区域，气流会从高压向低压流动","C 空气总是寻找高压区域，气流会从低压向高压流动"],"ans":1,"exp":"气压梯度力使空气从高压流向低压。"},{"id":554,"ch":7,"cat":"气象","q":"在山区作低空飞行时，最容易碰到乱流造成危险的是","opts":["A 在山的迎风面逆风飞行","B 在山的背风面顺风飞行","C 在山的背风面逆风飞行"],"ans":1,"exp":"背风面顺风飞行时最容易遇到下降气流和乱流。"},{"id":555,"ch":7,"cat":"气象","q":"平流层对航空活动有利的方面是","opts":["A 气流平稳、能见度好、空气阻力小","B 气温低、飞机载重量增加","C 气流平稳、无恶劣天气、发动机推力增大"],"ans":0,"exp":"平流层气流平稳、能见度好、空气稀薄阻力小。"},{"id":556,"ch":7,"cat":"气象","q":"飞机在着陆时突然遇到逆风切变，会出现","opts":["A 飞机提前着陆","B 飞机空速突然减小，飞机将掉至下滑线以下","C 飞机空速突然增大，升力增加，飞机上仰并上升到下滑线之上"],"ans":2,"exp":"逆风切变→逆风突增→空速增大→升力增加→飞机上仰。"},{"id":557,"ch":7,"cat":"气象","q":"气象台发布的风向标有SE，为","opts":["A 西北风","B 西南风","C 东南风"],"ans":2,"exp":"SE=Southeast=东南风。"},{"id":558,"ch":7,"cat":"气象","q":"低空风切变距地面一般约","opts":["A 800米","B 300米","C 600米"],"ans":2,"exp":"低空风切变一般指距地面约600米以内。"},{"id":559,"ch":7,"cat":"气象","q":"地球自转偏向力对风向的影响，北半球","opts":["A 气流向西偏转","B 气流向东偏转","C 气流先向东再向西偏转"],"ans":1,"exp":"北半球地转偏向力使气流向右（东）偏转。"},{"id":560,"ch":7,"cat":"气象","q":"在山区飞行时最强乱流出现在","opts":["A 山谷中间","B 山的背风坡","C 山的迎风坡"],"ans":1,"exp":"背风坡气流分离产生强烈乱流。"},{"id":561,"ch":7,"cat":"气象","q":"相对湿度是指","opts":["A 空气中水汽压与饱和水汽压的百分比","B 空气中水分占空气总量的百分比","C 空气中水汽含量与饱和水汽含量的百分比"],"ans":0,"exp":"相对湿度=实际水汽压/饱和水汽压×100%。"},{"id":562,"ch":7,"cat":"气象","q":"能见度不好的天气，一般风力","opts":["A 较强","B 较弱","C 混乱"],"ans":1,"exp":"能见度不好时通常风力较弱，大气稳定。"},{"id":563,"ch":7,"cat":"气象","q":"卫星云图上下列哪个不是中云特征","opts":["A 红外云图上中云呈深灰色","B 可见光云图上中云呈灰白色到白色","C 中云与天气系统相连，表现为大范围带状"],"ans":0,"exp":"红外云图上中云呈灰色而非深灰色。"},{"id":564,"ch":7,"cat":"气象","q":"地面天气图上填写的气压是","opts":["A 本站气压","B 海平面气压","C 场面气压"],"ans":1,"exp":"地面天气图填写的是订正到海平面的气压。"},{"id":565,"ch":7,"cat":"气象","q":"雷暴成熟阶段阵风风速常在","opts":["A 30m/s","B 10m/s","C 20m/s"],"ans":2,"exp":"雷暴成熟阶段阵风风速常达20m/s左右。"},{"id":566,"ch":7,"cat":"气象","q":"一般雷暴单体的生命史可分为三个阶段","opts":["A 温升阶段、降雨阶段、消散阶段","B 积云阶段、成风阶段、雷雨阶段","C 积云阶段、成熟阶段、消散阶段"],"ans":2,"exp":"雷暴三阶段：积云阶段、成熟阶段、消散阶段。"},{"id":567,"ch":7,"cat":"气象","q":"雷暴对飞机产生很大危害，下列危害不确切的是","opts":["A 风切变和湍流","B 雷击和冰雹袭击","C 数据链中断"],"ans":2,"exp":"数据链中断不是雷暴对飞机的直接危害。"},{"id":568,"ch":7,"cat":"气象","q":"对流层中的平均气温垂直递减率为","opts":["A 0.5°C/100m","B 6.5°C/100m","C 0.65°C/100m"],"ans":2,"exp":"标准大气对流层平均递减率0.65°C/100m。"},{"id":569,"ch":7,"cat":"气象","q":"天气预报分类以下不正确的是","opts":["A 气象要素预报","B 天气形势预报","C 大风降温预报"],"ans":2,"exp":"天气预报分天气形势预报和气象要素预报。"},{"id":570,"ch":7,"cat":"气象","q":"关于飞机积冰，下列正确的是","opts":["A 积冰一般发生在-1~-15°C","B 强烈积冰主要发生在-4~-8°C","C 在-2~-10°C温度范围内遭遇积冰次数最多"],"ans":2,"exp":"-2~-10°C是积冰发生最频繁的温度范围。"},{"id":571,"ch":7,"cat":"气象","q":"在较高高度，伴随着降低的大气压力","opts":["A 起飞和着陆距离减小，爬升率减小","B 起飞和着陆距离增加，爬升率增加","C 起飞和着陆距离增加，爬升率减小"],"ans":2,"exp":"气压低→密度小→升力小→起飞着陆距离增加，爬升率减小。"},{"id":572,"ch":7,"cat":"气象","q":"气象上的风向是指","opts":["A 风的来向","B 气压梯度力的方向","C 风的去向"],"ans":0,"exp":"气象风向指风的来向。"},{"id":573,"ch":7,"cat":"气象","q":"18000英尺高度的大气重量仅仅是海平面时的","opts":["A 三分之一","B 一半","C 四分之一"],"ans":1,"exp":"18000英尺大气压力约为海平面的一半。"},{"id":574,"ch":7,"cat":"气象","q":"飞机在着陆时突然遇到逆风切变，会出现","opts":["A 空速突然减小，飞机将掉至下滑线以下","B 飞机提前着陆","C 空速突然增大，升力增加，飞机上仰"],"ans":2,"exp":"逆风切变→逆风突增→空速增大→飞机上仰。"},{"id":575,"ch":7,"cat":"气象","q":"机场上空危害最大的云是","opts":["A 卷状云","B 层状云","C 对流云"],"ans":2,"exp":"对流云（积雨云）带来颠簸、风切变、雷击，危害最大。"},{"id":576,"ch":7,"cat":"气象","q":"现有民用无人机多数在大气的哪一层内运行","opts":["A 平流层","B 热层","C 对流层"],"ans":2,"exp":"民用无人机多数在对流层内运行。"},{"id":577,"ch":7,"cat":"气象","q":"气温的垂直递减率单位为","opts":["A °C/1000m","B °C/500m","C °C/100m"],"ans":2,"exp":"气温垂直递减率常用°C/100m表示。"},{"id":578,"ch":7,"cat":"气象","q":"形成强烈的积雨云需要三个条件","opts":["A 深厚而明显的不稳定气层、充沛的水气、足够的冲击力","B 强大的风力、充沛的水气、足够的冲击力","C 深厚而明显的不稳定气层、剧烈的温差、足够的冲击力"],"ans":0,"exp":"积雨云三条件：不稳定气层、充沛水汽、足够冲击力。"},{"id":579,"ch":7,"cat":"气象","q":"下列哪种属于动力对流冲击力","opts":["A 山坡迎风面对空气的抬升","B 气温变化造成的空气抬升或下降","C 气流辐合辐散时造成的空气水平运动"],"ans":0,"exp":"山坡迎风面对空气的抬升属于动力对流冲击力。"},{"id":580,"ch":7,"cat":"气象","q":"风力标志箭头像F且两个横杠一样长，代表","opts":["A 2级风","B 3级风","C 4级风"],"ans":2,"exp":"F标志中两个长杠为4级（20节）。"},{"id":581,"ch":7,"cat":"气象","q":"气温垂直递减率等于零的气层称为","opts":["A 等温层","B 不稳定气层","C 逆温层"],"ans":0,"exp":"γ=0为等温层，γ<0为逆温层。"},{"id":582,"ch":7,"cat":"气象","q":"气团的分类方法正确的是","opts":["A 暖气团和湿气团","B 冷气团和干气团","C 北冰洋气团、极地气团、热带气团、赤道气团"],"ans":2,"exp":"气团按源地分类：北极、极地、热带、赤道气团等。"},{"id":583,"ch":7,"cat":"气象","q":"阻止空气直接从高压区流向低压区的力是","opts":["A 惯性离心力","B 地转偏向力","C 摩擦力"],"ans":1,"exp":"地转偏向力使气流偏转。"},{"id":584,"ch":7,"cat":"气象","q":"可见光云图的色调取决于","opts":["A 目标的温度","B 目标的高低","C 目标反射太阳辐射的大小"],"ans":2,"exp":"可见光云图色调取决于反照率。"},{"id":585,"ch":7,"cat":"气象","q":"能见度不好的天气，一般风力","opts":["A 较强","B 混乱","C 较弱"],"ans":2,"exp":"能见度差时大气稳定，风力通常较弱。"},{"id":586,"ch":7,"cat":"气象","q":"在处于雷暴区边缘的机场起飞或着陆时，要特别注意","opts":["A 冰雹和暴雨","B 积冰和雷击","C 低空风切变"],"ans":2,"exp":"雷暴区边缘最危险的是低空风切变。"},{"id":587,"ch":7,"cat":"气象","q":"大气中的水汽含量随着高度的增加而逐渐","opts":["A 增加","B 不变","C 减少"],"ans":2,"exp":"水汽含量随高度增加而减少。"},{"id":588,"ch":7,"cat":"气象","q":"在温暖的天气飞行在较低高度，以下描述正确的是","opts":["A 成片树林区域发生上升气流","B 大片水体区域发生上升气流","C 很可能在路面和荒地上空发生上升气流"],"ans":2,"exp":"路面和荒地升温快，容易产生上升气流。"},{"id":589,"ch":7,"cat":"气象","q":"当机翼和尾翼积冰时，下列不正确的描述是","opts":["A 翼型失真","B 导致摩擦阻力减少","C 压差阻力增大"],"ans":1,"exp":"积冰使表面粗糙，摩擦阻力增大而非减少。"},{"id":590,"ch":7,"cat":"气象","q":"在锋面经过机场时，要特别注意的是","opts":["A 可能出现风沙天气","B 可能出现高度极低的风切变","C 雨层云中的连续性小雨"],"ans":1,"exp":"锋面经过时最需注意低空风切变。"},{"id":591,"ch":7,"cat":"气象","q":"地表风向与高空风向不同的原因是","opts":["A 风和地面之间的磨擦作用","B 当地地形影响气压","C 地面有较强的地转偏向力"],"ans":0,"exp":"地面摩擦使风向偏转、风速减小。"},{"id":592,"ch":7,"cat":"气象","q":"低空风切变主要的形成原因是什么","opts":["A 雷暴、低空急流和锋面活动","B 气流经过特定环境时产生","C 具体原因还不是特别明了"],"ans":0,"exp":"低空风切变成因：雷暴下击暴流、低空急流、锋面活动。"},{"id":593,"ch":7,"cat":"气象","q":"机场上空高度较低的云危害最大的是","opts":["A 卷状云","B 层状云","C 积状云"],"ans":2,"exp":"积状云（积雨云）危害最大。"},{"id":594,"ch":7,"cat":"气象","q":"中午和傍晚两次GPS高度200米飞行，气压高度","opts":["A 中午的气压高度高","B 傍晚的气压高度高","C 一样高"],"ans":0,"exp":"中午气温高→密度小→气压高度表指示偏高。"},{"id":595,"ch":7,"cat":"气象","q":"手抛电动固定翼无人机，一般在几级风以上难以自驾飞行","opts":["A 2级","B 6级","C 4级"],"ans":2,"exp":"手抛固定翼一般在4级风以上难以自驾飞行。"},{"id":596,"ch":7,"cat":"气象","q":"气温对飞机最大平飞速度的影响为","opts":["A 气温低时阻力增加，最大平飞速度减小","B 气温低时发动机推力增大，最大平飞速度增加","C 气温高时阻力减小，最大平飞速度增加"],"ans":1,"exp":"气温低→密度大→发动机进气多推力大→最大平飞速度增加。"},{"id":597,"ch":7,"cat":"气象","q":"同一地区对流层上界高度","opts":["A 冬季与夏季相同","B 夏季大于冬季","C 冬季大于夏季"],"ans":1,"exp":"夏季温度高→对流强→对流层顶更高。"},{"id":598,"ch":7,"cat":"气象","q":"严重危害飞行安全的冰雹通常与何种云有联系","opts":["A 堡状高积云","B 普通雷暴","C 强烈雷暴云"],"ans":2,"exp":"冰雹来自强烈发展的雷暴云。"},{"id":599,"ch":7,"cat":"气象","q":"关于露点温度下述哪个正确","opts":["A 空气中水汽达到饱和时，气温与露点温度相同","B 水汽未达到饱和时，气温一定低于露点温度","C 100%相对湿度时，环境温度高于露点温度"],"ans":0,"exp":"饱和时气温=露点温度。"},{"id":600,"ch":7,"cat":"气象","q":"在下述何种情况下容易碰到风切变","opts":["A 风速大于65千米/小时时","B 逆温层附近或靠近雷暴时","C 有高气压时"],"ans":1,"exp":"逆温层附近和雷暴区是风切变高发区域。"},{"id":601,"ch":7,"cat":"气象","q":"飞机在比标准大气冷的空气中飞行时，气压高度表所示高度将","opts":["A 高","B 低","C 相同"],"ans":1,"exp":"冷空气密度大→气压随高度下降快→高度表指示偏低。"},{"id":602,"ch":7,"cat":"气象","q":"测量大气能见度的错误方法","opts":["A 使用大气透射仪","B 使用激光能见度自动测量仪","C 用望远镜目测"],"ans":2,"exp":"能见度需用仪器测量，不能用望远镜目测。"},{"id":603,"ch":7,"cat":"气象","q":"局地风向不断改变，风速一阵大一阵小的现象称为","opts":["A 风切变","B 风向不定","C 风的阵性"],"ans":2,"exp":"风向风速不断变化的现象称为阵性。"},{"id":604,"ch":7,"cat":"气象","q":"绝对温度的零度是","opts":["A -273°C","B -273K","C -273°F"],"ans":0,"exp":"绝对零度=-273.15°C≈-273°C=0K。"},{"id":605,"ch":7,"cat":"气象","q":"飞机外表面的冰霜雪等","opts":["A 会出现指令仰角变化和滚转","B 会使外表面变粗糙，增加阻力，减少升力","C 会引起飞机操纵效能增加"],"ans":1,"exp":"冰霜雪使表面粗糙→阻力增加→升力减小。"},{"id":606,"ch":7,"cat":"气象","q":"根据国际气象组织的规定，云满天时的云量为","opts":["A 12","B 8","C 10"],"ans":2,"exp":"国际气象组织规定云量用10分量，满天为10。"},{"id":607,"ch":7,"cat":"气象","q":"大气系统热量的主要来源，下列说法哪个正确","opts":["A 太阳辐射有24%被大气直接吸收","B 太阳辐射有34%被大气直接吸收","C 太阳辐射有44%被大气直接吸收"],"ans":0,"exp":"太阳辐射约24%被大气直接吸收。"},{"id":608,"ch":7,"cat":"气象","q":"暖锋是指","opts":["A 温度较高的一侧","B 暖空气推动锋面向冷气团一侧移动的锋","C 一侧气团温度明显高于另一侧的锋"],"ans":1,"exp":"暖锋是暖空气主动向冷气团移动形成的锋。"},{"id":609,"ch":7,"cat":"气象","q":"飞机积冰主要分为三大种","opts":["A 明冰、毛冰、白冰","B 冰、雾凇、霜","C 坚冰、松冰、霜冰"],"ans":1,"exp":"飞机积冰分为冰、雾凇、霜三大类。"},{"id":610,"ch":7,"cat":"气象","q":"根据地面天气图上分析的等压线，我们能观察出","opts":["A 槽线位置","B 气压梯度","C 降水区域"],"ans":1,"exp":"等压线疏密反映气压梯度大小。"},{"id":611,"ch":7,"cat":"气象","q":"风切变气流从高空急速下冲，当飞机进入该区域时","opts":["A 先遇强逆风，后遇猛烈上升气流，随后强顺风","B 先遇强顺风，后遇猛烈上升气流，随后强逆风","C 先遇强逆风，后遇猛烈下沉气流，随后强顺风"],"ans":2,"exp":"下冲气流：先遇逆风（外流）→下沉气流→顺风。"},{"id":612,"ch":7,"cat":"气象","q":"反映大气潮湿程度的量是","opts":["A 相对湿度","B 饱和水气压","C 露点温度"],"ans":0,"exp":"相对湿度直接反映空气潮湿程度。"},{"id":613,"ch":7,"cat":"气象","q":"当风向袋吹平时，风速已达","opts":["A 3~4米/秒","B 20~26米/秒","C 6~10米/秒"],"ans":2,"exp":"风向袋吹平→风速约6-10m/s。"},{"id":614,"ch":7,"cat":"气象","q":"气压一定时，气温露点的高低可以表示","opts":["A 空气中凝结核的含量","B 空气的饱和程度","C 空气中的水汽含量"],"ans":2,"exp":"露点温度反映空气中的水汽含量。"},{"id":615,"ch":7,"cat":"气象","q":"国际上对能见度定义正确的是","opts":["A 烟雾的能见度定义为不足1km","B 霾的能见度为3km~5km","C 薄雾的能见度为1km~3km"],"ans":0,"exp":"烟雾能见度<1km。"},{"id":616,"ch":7,"cat":"气象","q":"冷锋是指","opts":["A 冷气团主动向暖气团移动形成的锋","B 温度低的一侧","C 一侧气团温度明显低于另一侧的锋"],"ans":0,"exp":"冷锋是冷气团主动推动暖气团形成的锋。"},{"id":617,"ch":7,"cat":"气象","q":"航路天气预报通常在起飞前几小时提供","opts":["A 2小时","B 3小时","C 1小时"],"ans":2,"exp":"航路天气预报通常在起飞前1小时提供。"},{"id":618,"ch":7,"cat":"气象","q":"对流层的主要特征哪个正确","opts":["A 空气具有强烈的垂直混合","B 气温、湿度的水平分布均匀","C 气温随高度不变"],"ans":0,"exp":"对流层主要特征：空气强烈的垂直混合。"},{"id":619,"ch":7,"cat":"气象","q":"下面关于气团的叙述哪一个正确","opts":["A 我国地域广大，能形成各种气团","B 气团离开源地，其性质将会发生变化","C 气团只形成于极地和大洋地区"],"ans":1,"exp":"气团离开源地后受下垫面影响发生变性。"},{"id":620,"ch":7,"cat":"气象","q":"气团的变性一般说来","opts":["A 暖气团移到暖的地区不变性","B 冷气团移到暖的地区变性慢","C 冷气团移到暖的地区变性快，暖气团移到冷的地区变性慢"],"ans":2,"exp":"冷气团到暖区变性快，暖气团到冷区变性慢。"},{"id":621,"ch":7,"cat":"气象","q":"快速移动的冷锋之后","opts":["A 阵风减缓和温度升高","B 天空通常很快放晴","C 可能出现乌云密布和下雨"],"ans":1,"exp":"快速冷锋过后通常很快放晴。"},{"id":622,"ch":7,"cat":"气象","q":"根据国际民航组织的规定，云满天时的云量为","opts":["A 8","B 10","C 12"],"ans":0,"exp":"国际民航组织（ICAO）用8分量，满天为8。"},{"id":623,"ch":7,"cat":"气象","q":"和地面建筑物有关的湍流强度依赖于","opts":["A 障碍物的大小和风的基本方向","B 障碍物的大小和风的基本速度","C 障碍物的多少和风的基本速度"],"ans":1,"exp":"湍流强度取决于障碍物大小和风速。"},{"id":624,"ch":7,"cat":"气象","q":"势均力敌的冷暖气团交锋区很少移动，这种锋面称为","opts":["A 融合锋","B 静止锋","C 交错锋"],"ans":1,"exp":"势均力敌的锋面称为静止锋。"},{"id":625,"ch":7,"cat":"气象","q":"大气是一种混合物，它由____组成","opts":["A 空气、水汽及液体或固体杂质","B 空气和固体微粒","C 空气和水汽凝结物"],"ans":0,"exp":"大气由干洁空气、水汽和杂质组成。"},{"id":626,"ch":7,"cat":"气象","q":"大气的组成是由","opts":["A 78%氮气，21%氧气，1%其它气体","B 75%氮气，24%氧气，1%其它气体","C 78%氮气，20%氧气，2%其它气体"],"ans":0,"exp":"干洁空气：78%氮气+21%氧气+1%其他。"},{"id":627,"ch":7,"cat":"气象","q":"产生低空风切变的天气背景主要有三类","opts":["A 山地气流、昼夜交替天气","B 强对流天气、锋面天气、辐射逆温型低空急流","C 大风天气、强降雨天气、寒冷天气"],"ans":1,"exp":"低空风切变三类背景：强对流、锋面、辐射逆温型低空急流。"},{"id":628,"ch":7,"cat":"气象","q":"温度对飞机升限的影响，下列何种叙述正确","opts":["A 气温升高，所有飞机的升限都要减小","B 气温升高，大型飞机的升限要升高","C 气温变化对喷气式飞机升限没有影响"],"ans":0,"exp":"气温升高→密度减小→推力减小→升限降低。"},{"id":629,"ch":7,"cat":"气象","q":"对流层____的空气运动受地形扰动和地表摩擦作用最大","opts":["A 下层","B 中层","C 上层"],"ans":0,"exp":"对流层下层受地表摩擦和地形影响最大。"},{"id":630,"ch":7,"cat":"气象","q":"地面的地形和大的建筑物会","opts":["A 产生快速改变方向和速度的阵风","B 产生稳定方向和速度的阵风","C 汇聚风的流向"],"ans":0,"exp":"地形和建筑物会产生方向和速度快速变化的阵风。"},{"id":631,"ch":7,"cat":"气象","q":"雾是从地表开始____","opts":["A 50英尺内的云","B 80英尺内的云","C 100英尺内的云"],"ans":0,"exp":"雾是接触地面的云（50英尺内）。"},{"id":632,"ch":7,"cat":"气象","q":"积冰强度可分为","opts":["A 微弱、弱、中度和强","B 霜、雾凇和冰","C 轻度、中度和重度"],"ans":2,"exp":"积冰强度分为轻度、中度、重度三个等级。"},{"id":633,"ch":7,"cat":"气象","q":"风越过山脊时","opts":["A 风沿背风侧平稳向下流动","B 风沿迎风侧湍流逐渐增加","C 风沿迎风侧平稳地向上流动"],"ans":2,"exp":"风过山脊时沿迎风侧平稳上升，背风侧产生乱流。"},{"id":634,"ch":7,"cat":"气象","q":"接近地面的对流气流会影响操控能力，下列说法正确","opts":["A 水体或植被区之上进近会产生漂浮效应","B 水体或植被区之上进近会产生下沉效应","C 无植被地形下降气流会产生下沉效应"],"ans":1,"exp":"水体/植被区温度低→空气下沉→下沉效应。"},{"id":635,"ch":7,"cat":"气象","q":"下面关于雾说法不正确的是","opts":["A 大雾会影响起降手动操作","B 大雾会影响航拍任务设备效果","C 大雾会影响航线自主飞行"],"ans":2,"exp":"大雾主要影响目视操作和拍摄，对自主飞行影响较小。"},{"id":636,"ch":7,"cat":"气象","q":"飞机积冰的产生主要是由于云中存在","opts":["A 雪花和冰晶","B 过冷水滴","C 大小不等的水滴"],"ans":1,"exp":"过冷水滴撞击飞机表面结冰。"},{"id":637,"ch":7,"cat":"气象","q":"风切变的仪表判断法，以下不正确的是","opts":["A 发动机转速和地速快速变化","B 俯仰角指示快速变化","C 空速表指示的非理性变化"],"ans":0,"exp":"发动机转速一般不作风切变判断依据。"},{"id":638,"ch":7,"cat":"气象","q":"卫星云图主要可分为哪两类","opts":["A 红外云图和可见光卫星云图","B 红外云图和色调强化卫星云图","C 色调强化卫星云图和可见光卫星云图"],"ans":0,"exp":"卫星云图主要分为红外云图和可见光云图。"},{"id":639,"ch":7,"cat":"气象","q":"机场上吹东风时，飞机起飞着陆的最好方向应是","opts":["A 由东向西","B 由西向东","C 由北向南"],"ans":1,"exp":"东风时由西向东起飞着陆为逆风。"},{"id":640,"ch":7,"cat":"气象","q":"关于锋面下列哪种描述正确","opts":["A 锋面是温度、湿度等物理性质不同的两种气团的交界面","B 锋面就是风场与地面的交线","C 锋面就是不同方向的风交汇的界面"],"ans":0,"exp":"锋面是不同性质气团的交界面。"},{"id":641,"ch":7,"cat":"气象","q":"大气中一团空气受到外力作用后，稳定状态是","opts":["A 移动后逐渐减速，并有返回原来高度的趋势","B 移动后加速向上或向下运动","C 外力消失后以匀速持续运动"],"ans":0,"exp":"稳定状态：受扰后有返回原高度的趋势。"},{"id":642,"ch":7,"cat":"气象","q":"59华氏度是多少摄氏度","opts":["A 0摄氏度","B 27摄氏度","C 15摄氏度"],"ans":2,"exp":"°C=(59-32)×5/9=15°C。"},{"id":643,"ch":7,"cat":"气象","q":"一般我们说的4级风，风速为","opts":["A 8.0-10.7 m/s","B 10.8-13.8 m/s","C 5.5-7.9m/s"],"ans":2,"exp":"4级风（和风）风速5.5-7.9m/s。"},{"id":644,"ch":7,"cat":"气象","q":"卫星云图上下列哪个不是层云(雾)特征","opts":["A 可见光云图上表现为光滑均匀的云区","B 红外云图上色调较亮，与地面色调相差较大","C 边界整齐清楚，与山脉、河流走向相一致"],"ans":1,"exp":"红外云图上低云和地面温差小，色调相近。"},{"id":645,"ch":7,"cat":"气象","q":"以下选项哪个不是对流层的主要特征","opts":["A 气温随高度升高而升高","B 空气具有强烈的垂直混合","C 气温、湿度水平分布很不均匀"],"ans":0,"exp":"对流层气温随高度降低，不是升高。"},{"id":646,"ch":7,"cat":"气象","q":"下述何种天气现象是稳定大气的特征","opts":["A 能见度极好","B 能见度较差","C 有阵性降水"],"ans":0,"exp":"大气稳定时能见度通常较差。按原题答案A。"},{"id":647,"ch":7,"cat":"气象","q":"一般而言气团的水平范围为","opts":["A 几公里到几百公里","B 几十公里到几百公里","C 几十公里到几千公里"],"ans":2,"exp":"气团水平范围可达几十到几千公里。"},{"id":648,"ch":7,"cat":"气象","q":"在山区作低空飞行时最容易碰到乱流的是","opts":["A 在山的背风面顺风飞行","B 在山的背风面逆风飞行","C 在山的迎风面逆风飞行"],"ans":0,"exp":"背风面顺风飞行时最容易遇到下降气流和乱流。"},{"id":649,"ch":7,"cat":"气象","q":"在北纬30度到赤道之间产生哪个方向的信风","opts":["A 西南方向","B 东北方向","C 东南方向"],"ans":1,"exp":"北半球信风带：东北信风。"},{"id":650,"ch":7,"cat":"气象","q":"对流效果最明显的是","opts":["A 北半球","B 南半球","C 赤道地区"],"ans":2,"exp":"赤道地区太阳辐射最强，对流最旺盛。"},{"id":651,"ch":7,"cat":"气象","q":"在山谷飞行时应采取的措施是","opts":["A 靠近迎风坡飞行","B 飞出山口马上转弯","C 靠近背风坡飞行"],"ans":0,"exp":"靠近迎风坡飞行有上升气流支持，更安全。"},{"id":652,"ch":7,"cat":"气象","q":"雷暴对飞机产生很大危害，下列危害不确切的是","opts":["A 数据链中断","B 风切变和湍流","C 雷击和冰雹袭击"],"ans":0,"exp":"数据链中断不是雷暴对飞机的直接危害。"},{"id":653,"ch":7,"cat":"气象","q":"卫星云图上下列哪个不是积雨云特征","opts":["A 红外云图色调最白","B 积雨云的尺度相差不大","C 常是几个雷暴单体的集合"],"ans":1,"exp":"积雨云尺度差异很大。"},{"id":654,"ch":7,"cat":"气象","q":"雷暴处于发展阶段时","opts":["A 地面气压持续下降","B 地面气压保持不变","C 地面气压持续上升"],"ans":0,"exp":"发展阶段上升气流强→地面气压下降。"},{"id":655,"ch":7,"cat":"气象","q":"对流层的高度在地球中纬度地区约为","opts":["A 11公里","B 16公里","C 8公里"],"ans":0,"exp":"中纬度对流层高度约11公里。"},{"id":656,"ch":7,"cat":"气象","q":"空气中容纳水汽的数量随气温变化，气温越高则","opts":["A 可以容纳的水汽就越少","B 不能再容纳更多水汽时温度会变化","C 可以容纳的水汽就越多"],"ans":2,"exp":"气温越高→饱和水汽压越大→可容纳水汽越多。"},{"id":657,"ch":7,"cat":"气象","q":"哪种对地拍摄设备基本不会受到云层与雾霾的影响","opts":["A 可见光CCD","B 红外摄像机","C 合成孔径雷达"],"ans":2,"exp":"合成孔径雷达（SAR）可穿透云雨雾霾成像。"},{"id":658,"ch":7,"cat":"气象","q":"下面关于气团的叙述哪一个正确","opts":["A 我国地域广大能形成各种气团","B 气团离开源地其性质将会发生变化","C 气团只形成于极地和大洋地"],"ans":1,"exp":"气团离开源地受下垫面影响发生变性。"},{"id":659,"ch":7,"cat":"气象","q":"气象光学视程是指","opts":["A 色温2700K光束削弱至初始值5%所通过的路径长度","B 色温2500K光束削弱至初始值5%所通过的路径长度","C 色温3000K光束削弱至初始值10%所通过的路径长度"],"ans":0,"exp":"气象光学视程定义：2700K光束衰减至5%的路径长度。"},{"id":660,"ch":7,"cat":"气象","q":"下面关于山谷风的叙述正确的是","opts":["A 气流越山而过称为山风","B 山谷风是由于海陆差异而形成的热力环流","C 白天风由山谷吹向山坡"],"ans":2,"exp":"白天山坡升温快→谷风从山谷吹向山坡。"},{"id":661,"ch":7,"cat":"气象","q":"风越过山脊时","opts":["A 风沿迎风侧湍流逐渐增加","B 风沿迎风侧平稳地向上流动","C 风沿背风侧平稳地向下流动"],"ans":1,"exp":"风过山脊沿迎风侧平稳上升。"},{"id":662,"ch":7,"cat":"气象","q":"起飞场地从北京移至拉萨，对哪类无人机高度性能影响最严重","opts":["A 电动固定翼","B 电动多轴","C 油动固定翼"],"ans":2,"exp":"油动发动机在高原功率下降最明显。"},{"id":663,"ch":7,"cat":"气象","q":"风向270度，航向90度，这时无人机在","opts":["A 顺风飞行","B 逆风飞行","C 侧风飞行"],"ans":0,"exp":"风向270（西风）→航向90（向东）→顺风飞行。"},{"id":664,"ch":7,"cat":"气象","q":"气温高低如何影响飞机滑跑距离","opts":["A 气温低时空速快升力大滑跑距离短","B 气温高时空速快升力大滑跑距离短","C 气温高时密度小离地速度增大滑跑距离长"],"ans":2,"exp":"气温高→密度小→升力小→滑跑距离长。"},{"id":665,"ch":7,"cat":"气象","q":"平流层飞行按照飞行高度区分为","opts":["A 9000米(含)以上","B 12000米(不含)以上","C 12000米(含)以上"],"ans":1,"exp":"平流层飞行指12000米（不含）以上。"},{"id":666,"ch":7,"cat":"气象","q":"空气的组成为","opts":["A 78%氮，20%氢和2%其他气体","B 90%氧，6%氮和4%其他气体","C 78%氮，21%氧和1%其他气体"],"ans":2,"exp":"干洁空气：78%氮+21%氧+1%其他。"},{"id":667,"ch":7,"cat":"气象","q":"气温的变化会严重影响电动无人机的哪项性能","opts":["A 载荷性能","B 速度性能","C 续航性能"],"ans":2,"exp":"气温低→电池活性下降→续航时间缩短。"},{"id":668,"ch":7,"cat":"气象","q":"对飞行影响最大的积冰是","opts":["A 明冰和毛冰","B 毛冰和霜","C 雾凇和毛冰"],"ans":0,"exp":"明冰和毛冰最严重。"},{"id":669,"ch":7,"cat":"气象","q":"红外云图的色调取决于","opts":["A 目标的高低","B 目标的温度","C 目标反射太阳辐射的大小"],"ans":1,"exp":"红外云图色调取决于物体温度。"},{"id":670,"ch":7,"cat":"气象","q":"当实际大气密度大于标准大气密度时","opts":["A 空气作用于飞机上的力减小","B 空气作用于飞机上的力加大发动机推力减小","C 空气作用于飞机上的力加大发动机推力增大"],"ans":2,"exp":"密度大→气动力增大→发动机推力增大。"},{"id":671,"ch":7,"cat":"气象","q":"平流层气温特点","opts":["A 平流层中不含有水汽","B 平流层中气温随高度增高而升高","C 平流层中气温不随高度变化"],"ans":1,"exp":"平流层中臭氧吸收紫外线→气温随高度升高。"},{"id":672,"ch":7,"cat":"气象","q":"北半球地球自转偏向力","opts":["A 使气流向左偏转","B 使气流先向右再向左偏转","C 使气流向右偏转"],"ans":2,"exp":"北半球地转偏向力使气流向右偏。"},{"id":673,"ch":7,"cat":"气象","q":"飞机积冰主要分为三大种","opts":["A 坚冰、松冰、霜冰","B 明冰、毛冰、白冰","C 冰、雾凇、霜"],"ans":2,"exp":"飞机积冰分为冰、雾凇、霜三大类。"},{"id":674,"ch":7,"cat":"气象","q":"地面风具有明显日变化的主要原因是","opts":["A 摩擦力的变化","B 乱流强度的变化","C 气压的变化"],"ans":2,"exp":"地面风日变化主要由于气温变化引起气压场日变化。"},{"id":675,"ch":7,"cat":"气象","q":"多旋翼飞行器地面风速大于____级时对安全有影响","opts":["A 2级","B 6级","C 4级"],"ans":2,"exp":"多旋翼一般在4级风以上受明显影响。"},{"id":676,"ch":7,"cat":"气象","q":"在飞行中遇到飞机积冰时驾驶员应注意","opts":["A 调整马力严格保持高度和速度","B 柔和操纵保持姿态尽快脱离积冰区","C 及时有力地修正飞行姿态偏差"],"ans":1,"exp":"积冰时应柔和操纵，避免剧烈机动。"},{"id":677,"ch":7,"cat":"气象","q":"夜间低层出现逆温会使得","opts":["A 早晨天气晴朗","B 早晨有雾和烟幕","C 早晨有大风"],"ans":1,"exp":"逆温层抑制对流→水汽和污染物聚集→早晨易有雾。"},{"id":678,"ch":7,"cat":"气象","q":"无人机冬季与夏季地面检测哪一种高度会变化","opts":["A GPS高度","B 本场相对高度","C 气压高度"],"ans":2,"exp":"气压高度随季节气温变化而不同。"},{"id":679,"ch":7,"cat":"气象","q":"假设其他条件不变，空气湿度大","opts":["A 空气密度大起飞滑跑距离长","B 空气密度大起飞滑跑距离短","C 空气密度小起飞滑跑距离长"],"ans":2,"exp":"湿度大→水汽多→空气密度小→滑跑距离长。"},{"id":680,"ch":7,"cat":"气象","q":"暖锋和冷锋在特性上非常不同","opts":["A 冷锋以10~25英里每小时移动","B 暖锋以20~35英里每小时移动","C 暖锋产生差能见度和下雨，冷锋产生突发阵风紊流"],"ans":2,"exp":"暖锋：能见度差、连续性降水；冷锋：阵风、颠簸。"},{"id":681,"ch":7,"cat":"气象","q":"以下哪种不是卫星云图种类","opts":["A 可见光卫星云图","B 多光谱卫星云图","C 红外卫星云图"],"ans":1,"exp":"基本卫星云图：可见光和红外云图。"},{"id":682,"ch":7,"cat":"气象","q":"形成雷暴的基本条件是","opts":["A 浓积云，充足的水汽和锋区","B 充足的水汽和上升运动","C 充足的水汽、不稳定的大气和上升运动"],"ans":2,"exp":"雷暴三条件：充足水汽、不稳定大气、上升运动。"},{"id":683,"ch":7,"cat":"气象","q":"关于飞机积冰的叙述哪一个正确","opts":["A 中云温度低云层厚积冰最严重","B 低云温度高不含过冷水滴一般不出现积冰","C 高云由冰晶构成不容易形成积冰"],"ans":0,"exp":"中云温度低、水滴含量大，积冰最严重。"},{"id":684,"ch":7,"cat":"气象","q":"在标准大气中海平面上的气温和气压值是","opts":["A 15°C、1000hPa","B 0°C、760mmHg","C 15°C、1013.25hPa"],"ans":2,"exp":"标准大气海平面：15°C、1013.25hPa。"},{"id":685,"ch":7,"cat":"气象","q":"积冰的形状一般分为","opts":["A 凸状冰、凹状冰和混合冰","B 圆形冰、方形冰和混合冰","C 槽状冰、楔形冰和混合冰"],"ans":2,"exp":"积冰形状分为槽状冰、楔形冰和混合冰。"},{"id":686,"ch":7,"cat":"气象","q":"对流层的高度在地球中纬度地区约为","opts":["A 16公里","B 11公里","C 8公里"],"ans":1,"exp":"中纬度对流层高约11公里。"},{"id":687,"ch":8,"cat":"起降阶段操纵技术","q":"遥控无人机着陆时，关于收油门描述正确的是","opts":["A 收油门时机不要晚，早一些比较主动","B 收油门时机不要早，收早了动作粗","C 收油门时机不要早，晚一些比较主动"],"ans":0,"exp":"收油门宜早不宜晚，从容控制。"},{"id":688,"ch":8,"cat":"起降阶段操纵技术","q":"遥控无人机着陆时，关于大逆风着陆描述正确的是","opts":["A 平飘前段速度小下沉快，拉杆应快速","B 平飘前段速度大下沉慢，拉杆应快速","C 平飘前段速度大下沉慢，拉杆应柔和防止拉飘"],"ans":2,"exp":"大逆风着陆：地速小空速大，下沉慢，拉杆应柔和。"},{"id":689,"ch":8,"cat":"起降阶段操纵技术","q":"无人机飞行时放下起落架，会使飞机","opts":["A 全机阻力减小","B 全机阻力无明显变化","C 全机阻力增大"],"ans":2,"exp":"放下起落架增加迎风面积→阻力增大。"},{"id":690,"ch":8,"cat":"起降阶段操纵技术","q":"遥控无人机着陆拉平时，拉杆的快慢和下降速度的关系是","opts":["A 下降快拉杆应慢一些","B 还按正常时机拉杆","C 下降快拉杆应快一些"],"ans":2,"exp":"下降快→需快速拉杆增加迎角减缓下沉。"},{"id":691,"ch":8,"cat":"起降阶段操纵技术","q":"收油门过晚过细，速度减小慢，拉平时速度大飞机下沉慢","opts":["A 容易拉平高或进入平飘时仰角较小","B 对飞机无影响","C 容易拉平低或进入平飘时仰角较大"],"ans":0,"exp":"速度大→升力大→容易拉平高。"},{"id":692,"ch":8,"cat":"起降阶段操纵技术","q":"遥控无人机着陆时，产生着陆偏差的主要原因不包括","opts":["A 着陆条件不好","B 飞机型号不同","C 精神紧张注意力分配不当"],"ans":1,"exp":"飞机型号不同不是着陆偏差的主要原因。"},{"id":693,"ch":8,"cat":"起降阶段操纵技术","q":"操纵无人机起飞前动力装置不需要检查的是","opts":["A 发动机油路检查","B 发动机生产日期","C 发动机稳定性检查"],"ans":1,"exp":"发动机生产日期不是起飞前检查项目。"},{"id":694," // ====== UI ENHANCE: Toast System ======
function showToast(msg, type) {
  type = type || "info";
  var c = document.querySelector(".toast-container");
  if(!c) {
    c = document.createElement("div");
    c.className = "toast-container";
    document.body.appendChild(c);
  }
  var t = document.createElement("div");
  t.className = "toast toast-" + type;
  var icons = {success:"✓",error:"✗",info:"ℹ",warning:"⚠"};
  t.innerHTML = (icons[type] || "ℹ") + " " + msg;
  c.appendChild(t);
  setTimeout(function() {
    t.className += " toast-out";
    setTimeout(function() { if(t.parentNode) t.parentNode.removeChild(t); }, 300);
  }, 2500);
}

// ====== UI ENHANCE: Stats Count Up ======
function animateCount(el, target) {
  if(!el) return;
  var start = 0, duration = 600, step = Math.max(1, Math.floor(target / 30));
  function tick() {
    start += step;
    if(start >= target) { el.textContent = target; return; }
    el.textContent = start;
    requestAnimationFrame(tick);
  }
  tick();
}

// ====== UI ENHANCE: Ripple Effect ======
function addRipple(e) {
  var btn = e.currentTarget;
  var rect = btn.getBoundingClientRect();
  var x = ((e.clientX || e.touches?.[0]?.clientX || rect.left + rect.width/2) - rect.left) / rect.width * 100;
  var y = ((e.clientY || e.touches?.[0]?.clientY || rect.top + rect.height/2) - rect.top) / rect.height * 100;
  btn.style.setProperty("--x", x + "%");
  btn.style.setProperty("--y", y + "%");
}

// Add ripple to all buttons
function initRipple() {
  document.querySelectorAll(".btn").forEach(function(b) {
    b.classList.add("ripple-btn");
    b.addEventListener("mousedown", addRipple);
  });
}

render = function() {
  // Add ripple to any new buttons after render
  var mc = document.getElementById("mainContent");
  if(mc) mc.classList.remove("fade-in");
  _origRender();
  setTimeout(function() {
    initRipple();
    var mc2 = document.getElementById("mainContent");
    if(mc2) mc2.classList.add("fade-in");
    // Count up animation for stats
    document.querySelectorAll(".stat-num").forEach(function(el) {
      var t = parseInt(el.textContent);
      if(!isNaN(t) && t > 0 && t < 10000) animateCount(el, t);
    });
  }, 50);
};

function getUsers() {

function chQs(ch) {

function shuf(a) {
  var s = a.slice();
  for(var i = s.length-1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i+1)), t = s[i];
    s[i] = s[j]; s[j] = t;
  }
  return s;
}

function selectAnswer(ch, qid, optIdx) {

  var q = ALL_QUESTIONS.find(function(x) { return x.id === qid; });

    ud.wrong["q"+qid] = { qId:qid, ch:ch, selected:optIdx, time:Date.now() };
  } else if(q && optIdx === q.ans && ud.wrong["q"+qid]) {

  saveUserData(state.user.username, ud);

    var qs = chQs(ch);

      setTimeout(function() { nextQ(); }, 600);
    }
  }
}

function startExam() {

    if(!confirm("考试正在进行中，确定要重新开始吗？")) return;
    clearInterval(_examState.timer);
  }

  var count = Math.min(100, totalQs);
  var shuffled = shuf(ALL_QUESTIONS);
  _examState.questions = shuffled.slice(0, count);
  _examState.answers = {};
  _examState.timeLeft = 120 * 60;
  _examState.running = true;
  state.page = "exam";
  render();
  if(_examState.timer) clearInterval(_examState.timer);
  _examState.timer = setInterval(function() {
    _examState.timeLeft--;
    var timerEl = document.getElementById("examTimer");
    if(timerEl) {
      var m = Math.floor(_examState.timeLeft / 60);
      var s = _examState.timeLeft % 60;
      timerEl.textContent = String(m).padStart(2,"0") + ":" + String(s).padStart(2,"0");
      if(_examState.timeLeft <= 60) timerEl.style.color = "#ef4444";
    }
    if(_examState.timeLeft <= 0) {
      clearInterval(_examState.timer);
      _examState.running = false;
      submitExam();
    }
  }, 1000);
}

function renderExam() {
  if(!state.user) return;
  var qs = _examState.questions;
  if(!qs || qs.length === 0) { startExam(); return; }
  var current = _examState.currentIdx || 0;
  if(current >= qs.length) current = 0;
  var q = qs[current];
  var sel = _examState.answers["q"+q.id];
  var lb = ["A","B","C","D","E","F"];
  var ansCount = Object.keys(_examState.answers).length;
  var m = Math.floor(_examState.timeLeft / 60);
  var s = _examState.timeLeft % 60;
  var h = "<div class=\"exam-timer\">&#x23F1; 剩余时间：<span id=\"examTimer\">" +
    String(m).padStart(2,"0") + ":" + String(s).padStart(2,"0") + "</span></div>" +

    "<div class=\"card\"><div class=\"q-header\">" +
    "<span class=\"q-number\">模拟考试 第" + (current+1) + "/" + qs.length + "题</span>" +
    "<button class=\"btn btn-danger btn-sm\" onclick=\"confirmSubmitExam()\">交卷</button></div>" +
    "<div class=\"q-text\">" + esc(q.q) + "</div>" +

  for(var i = 0; i < q.opts.length; i++) {

      "<span class=\"opt-label\">" + lb[i] + "</span>" +

  }

  for(var i = 0; i < qs.length; i++) {
    var cls2 = "exam-nav-btn";
    if(_examState.answers["q"+qs[i].id] !== undefined) cls2 += " answered";
    if(i === current) cls2 += " current";
    h += "<div class=\"" + cls2 + "\" onclick=\"examJump(" + i + ")\">" + (i+1) + "</div>";
  }
  h += "</div>";
  h += "<div style=\"display:flex;gap:8px;justify-content:center;\">" +
    "<button class=\"btn btn-outline\" onclick=\"examPrev()\" " + (current <= 0 ? "disabled style=\"opacity:0.4\"" : "") + ">上一题</button>" +

function examAnswer(idx, opt) {
  var qs = _examState.questions;
  var q = qs[idx];
  _examState.answers["q"+q.id] = opt;
  renderExam();
  // 答后自动跳转到下一题（模拟考试）
  if(_examState.currentIdx < qs.length - 1) {
    setTimeout(function() { examNext(); }, 600);
  }
}

function examJump(i) {
  _examState.currentIdx = i;
  renderExam();
}

function examPrev() {
  if(_examState.currentIdx > 0) _examState.currentIdx--;
  renderExam();
}

function examNext() {
  if(_examState.currentIdx < _examState.questions.length - 1) _examState.currentIdx++;
  renderExam();
}

function confirmSubmitExam() {
  if(confirm("确定要交卷吗？还有 " + Math.floor(_examState.timeLeft/60) + " 分钟 " + (_examState.timeLeft%60) + " 秒")) {
    clearInterval(_examState.timer);
    _examState.running = false;
    submitExam();
  }
}

function submitExam() {
  var qs = _examState.questions;
  var correct = 0, wrong = 0;
  var details = [];
  var ud = getUserData(state.user.username);
  for(var i = 0; i < qs.length; i++) {
    var q = qs[i];
    var ans = _examState.answers["q"+q.id];
    var isCorrect = (ans === q.ans);
    if(isCorrect) correct++;
    else wrong++;
    details.push({ q:q, selected:ans, correct:isCorrect });
    if(ans !== undefined) {
      if(!ud.progress["ch"+q.ch]) ud.progress["ch"+q.ch] = {};
      ud.progress["ch"+q.ch]["q"+q.id] = ans;
    }
    if(ans !== undefined && !isCorrect) {
      ud.wrong["q"+q.id] = { qId:q.id, ch:q.ch, selected:ans, time:Date.now() };
    }
  }
  var score = Math.round(correct / qs.length * 100);
  var passed = score >= 80;
  if(!ud.exams) ud.exams = [];
  ud.exams.push({ time:Date.now(), score:score, correct:correct, wrong:wrong, total:qs.length, passed:passed });
  saveUserData(state.user.username, ud);
  state.page = "exam_r";
  _examState.details = details;
  _examState.correct = correct;
  _examState.wrong = wrong;
  render();
}

  var correct = _examState.correct;

  var total = correct + wrong;
  var score = total > 0 ? Math.round(correct/total*100) : 0;
  var passed = score >= 80;
  var h = "<div class=\"exam-result\">" +

var _wpState = { questions:[], idx:0, answers:{} };


function startWrongExam() {
  var ud = getUserData(state.user.username);
  var wrongs = [];
  for(var k in ud.wrong) {
    if(ud.wrong.hasOwnProperty(k)) {
      var w = ud.wrong[k];
      var q = ALL_QUESTIONS.find(function(x) { return x.id === w.qId; });
      if(q) wrongs.push(q);
    }
  }
  if(wrongs.length === 0) { alert("暂无错题，无法进行错题模拟考"); return; }
  var count = Math.min(wrongs.length, 50);
  var shuffled = shuf(wrongs);
  _examState.questions = shuffled.slice(0, count);
  _examState.answers = {};
  _examState.timeLeft = count * 60;
  _examState.running = true;
  state.page = "exam";
  render();
  if(_examState.timer) clearInterval(_examState.timer);
  _examState.timer = setInterval(function() {
    _examState.timeLeft--;
    var timerEl = document.getElementById("examTimer");
    if(timerEl) {
      var m = Math.floor(_examState.timeLeft / 60);
      var s = _examState.timeLeft % 60;
      timerEl.textContent = String(m).padStart(2,"0") + ":" + String(s).padStart(2,"0");
      if(_examState.timeLeft <= 60) timerEl.style.color = "#ef4444";
    }
    if(_examState.timeLeft <= 0) {
      clearInterval(_examState.timer);
      _examState.running = false;
      submitExam();
    }
  }, 1000);
}
function startWP() {
  var ud = getUserData(state.user.username);
  var wrongs = [];
  for(var k in ud.wrong) {
    if(ud.wrong.hasOwnProperty(k)) {
      var w = ud.wrong[k];
      var q = ALL_QUESTIONS.find(function(x) { return x.id === w.qId; });
      if(q) wrongs.push(q);
    }
  }
  if(wrongs.length === 0) { alert("暂无错题"); return; }
  _wpState.questions = wrongs;

function renderWP() {

    return;
  }
  var idx = _wpState.idx;
  if(idx >= qs.length) idx = qs.length - 1;
  var q = qs[idx];
  var ud = getUserData(state.user.username);
  var savedAns = _wpState.answers || {};
  var sel = savedAns["q"+q.id];
  var lb = ["A","B","C","D","E","F"];

    "<button onclick=\"showWB()\" class=\"btn btn-outline btn-sm\">&#x2190; 返回错题本</button>" +

    "<span style=\"flex:1;\"></span>" +
    "<button class=\"btn btn-sm btn-outline\" onclick=\"wpPrev()\" " + (idx <= 0 ? "disabled style=\"opacity:0.4\"" : "") + ">上一题</button>" +

    "<div class=\"q-text\">" + esc(q.q) + "</div>" +

      else if(i === sel) cls += " wrong";
    }
    h += "<div class=\"" + cls + "\" onclick=\"" + (sel === undefined ? "wpAnswer(" + q.ch + "," + q.id + "," + i + ")" : "") + "\">" +
      "<span class=\"opt-label\">" + lb[i] + "</span><span>" + esc(q.opts[i]) + "</span></div>";
  }
  h += "</div>";
  if(sel !== undefined) {
    h += "<div class=\"analysis-panel\">" +
      "<div class=\"analysis-title\">&#x1F4A1; AI 智能解析</div>" +
      "<div style=\"margin-bottom:6px;\">" +
      (sel === q.ans ? "<span class=\"analysis-correct\">&#x2713; 回答正确！</span>" : "<span class=\"analysis-wrong\">&#x2717; 回答错误</span>") +
      " 正确答案：<strong>" + lb[q.ans] + ". " + esc(q.opts[q.ans]) + "</strong></div>" +
      "<div style=\"color:#334155;\">" + esc(q.exp || "暂无解析") + '</div><div class="anim-trigger"><button class="anim-btn" onclick="showAnimModal(' + q.id + ')">\uD83D\uDCD0 \u67E5\u770B\u539F\u7406\u52A8\u753B</button></div></div>';
  }
  h += "</div>";
  document.getElementById("mainContent").innerHTML = h;

function wpAnswer(ch, qid, opt) {
  _wpState.answers["q"+qid] = opt;
  var ud = getUserData(state.user.username);
  if(!ud.progress["ch"+ch]) ud.progress["ch"+ch] = {};
  ud.progress["ch"+ch]["q"+qid] = opt;
  var q = ALL_QUESTIONS.find(function(x) { return x.id === qid; });
  if(q && opt === q.ans) {
    delete ud.wrong["q"+qid];
  }
  saveUserData(state.user.username, ud);
  renderWP();
  // 答对后自动跳转到下一题（错题训练）
  if(q && opt === q.ans) {
    if(_wpState.idx < _wpState.questions.length - 1) {
      setTimeout(function() { wpNext(); }, 600);
    }
  }
}

function wpPrev() {
  if(_wpState.idx > 0) _wpState.idx--;
  renderWP();
}

function wpNext() {
  if(_wpState.idx < _wpState.questions.length - 1) _wpState.idx++;
  renderWP();
}

function startAnim(type, ctx, canvas) {

  else if(type === "weather") runWeatherAnim();
  else if(type === "takeoff") runTakeoffAnim();
  else if(type === "regulation") runRegulationAnim();
  else if(type === "remote") runRemoteAnim();
}

// ====== 1. FLIGHT PRINCIPLE ======
function runFlightAnim() {
  var canvas = _animState.canvas, ctx = _animState.ctx;
  if(!canvas || !ctx) return;
  var W = canvas.width, H = canvas.height, cx = W/2, cy = H/2;
  function draw() {
    if(!_animState.running) return;
    _animState.rafId = requestAnimationFrame(draw);
    _animState.time += 0.02; var s = _animState.time;
    ctx.clearRect(0, 0, W, H);
    var bg = ctx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, "#0a1628"); bg.addColorStop(0.5, "#0d2137"); bg.addColorStop(1, "#1a3a5c");
    ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);
    ctx.save(); ctx.translate(cx, cy);
    ctx.strokeStyle = "rgba(59,130,246,0.25)"; ctx.lineWidth = 1.5;
    for(var i = -3; i <= 3; i++) {
      var yy = i * 25 + Math.sin(s + i * 0.5) * 8;
      ctx.beginPath(); ctx.moveTo(-W/2 + 20, yy);
      for(var x = -W/2 + 20; x < W/2 - 20; x += 4) ctx.lineTo(x, yy + Math.sin((x + W/2) * 0.02 + s * 2 + i) * 3);
      ctx.stroke();
    }
    ctx.beginPath(); ctx.moveTo(-80, 0); ctx.quadraticCurveTo(-40, -50, 20, -30); ctx.quadraticCurveTo(60, -15, 80, 5); ctx.quadraticCurveTo(60, 15, 20, 10); ctx.quadraticCurveTo(-40, 5, -80, 0); ctx.closePath();
    var wg = ctx.createLinearGradient(0, -50, 0, 20);
    wg.addColorStop(0, "rgba(59,130,246,0.6)"); wg.addColorStop(0.5, "rgba(59,130,246,0.3)"); wg.addColorStop(1, "rgba(59,130,246,0.5)");
    ctx.fillStyle = wg; ctx.fill(); ctx.strokeStyle = "#60a5fa"; ctx.lineWidth = 2; ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, 20); ctx.lineTo(0, -80 - Math.sin(s * 3) * 10);
    ctx.strokeStyle = "#f5a623"; ctx.lineWidth = 3; ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, -80 - Math.sin(s * 3) * 10); ctx.lineTo(-8, -70 - Math.sin(s * 3) * 10); ctx.lineTo(8, -70 - Math.sin(s * 3) * 10); ctx.closePath();
    ctx.fillStyle = "#f5a623"; ctx.fill();
    ctx.fillStyle = "#f5a623"; ctx.font = "bold 12px sans-serif"; ctx.textAlign = "center"; ctx.fillText("LIFT", 0, -90 - Math.sin(s * 3) * 10);
    ctx.beginPath(); ctx.moveTo(0, -10); ctx.lineTo(0, 60);
    ctx.strokeStyle = "#ef4444"; ctx.lineWidth = 3; ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, 60); ctx.lineTo(-8, 50); ctx.lineTo(8, 50); ctx.closePath();
    ctx.fillStyle = "#ef4444"; ctx.fill();
    ctx.fillStyle = "#ef4444"; ctx.font = "bold 12px sans-serif"; ctx.textAlign = "center"; ctx.fillText("GRAVITY", 0, 75);
    ctx.restore();
    ctx.fillStyle = "rgba(255,255,255,0.6)"; ctx.font = "13px sans-serif"; ctx.textAlign = "center";
    ctx.fillText("Airfoil Lift Principle - Wing generates lift in airflow", cx, H - 15);
  }
  _animState.rafId = requestAnimationFrame(draw);
}

// ====== 2. STRUCTURE (Quadcopter) ======
function runStructureAnim() {
  var canvas = _animState.canvas, ctx = _animState.ctx;

    ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);
    ctx.save(); ctx.translate(cx, cy); var rot = Math.sin(s * 0.5) * 0.05;
    ctx.strokeStyle = "rgba(148,163,184,0.6)"; ctx.lineWidth = 4;
    for(var i = 0; i < 4; i++) { var a = rot + i * Math.PI/2 + Math.PI/4; ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(Math.cos(a)*100, Math.sin(a)*100); ctx.stroke(); }
    ctx.beginPath(); ctx.arc(0, 0, 20, 0, Math.PI*2); ctx.fillStyle = "#3b82f6"; ctx.fill(); ctx.strokeStyle = "#60a5fa"; ctx.lineWidth = 2; ctx.stroke();
    ctx.fillStyle = "#fff"; ctx.font = "bold 10px sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle"; ctx.fillText("FC", 0, 0);

      ctx.beginPath(); ctx.arc(mx, my, 28, 0, Math.PI*1.5 + s*3 + i); ctx.strokeStyle = "rgba(245,166,35,0.5)"; ctx.lineWidth = 3; ctx.stroke();
      ctx.beginPath(); ctx.arc(mx, my, 28, Math.PI*0.3 + s*3 + i, Math.PI*0.7 + s*3 + i); ctx.strokeStyle = "rgba(245,166,35,0.3)"; ctx.lineWidth = 2; ctx.stroke();

// ====== 4. TAKEOFF ======
function runTakeoffAnim() {
  var canvas=_animState.canvas,ctx=_animState.ctx;

  var W=canvas.width,H=canvas.height,cx=W/2,cy=H/2;

    ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
    ctx.fillStyle="#1a3a1a";ctx.fillRect(0,H*0.8,W,H*0.2);
    var prog=(s*0.3)%1,droneX=cx,droneY=H*0.75-120;

    ctx.stroke();ctx.setLineDash([]);

    ctx.fillStyle="#3b82f6";ctx.fillRect(-8,-4,16,8);
    ctx.strokeStyle="#94a3b8";ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(-8,0);ctx.lineTo(-20,0);ctx.moveTo(8,0);ctx.lineTo(20,0);ctx.stroke();
    ctx.strokeStyle="rgba(245,166,35,0.5)";ctx.lineWidth=2;ctx.beginPath();ctx.arc(-20,0,10,0,Math.PI*1.5+s*5);ctx.stroke();

    for(var i=0;i<H;i+=40){ctx.beginPath();ctx.moveTo(0,i);ctx.lineTo(W,i);ctx.stroke();}
