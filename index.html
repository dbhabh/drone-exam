<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>浙江航方教育科技有限公司 - 无人机执照考试系统</title>
<style>﻿*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei','Helvetica Neue',sans-serif;background:#eef2f7;color:#1a2332;min-height:100vh;-webkit-font-smoothing:antialiased}
:root{--primary:#1e3a5f;--primary-light:#2d6da8;--primary-dark:#0d2137;--accent:#f5a623;--success:#22c55e;--danger:#ef4444;--info:#3b82f6;--bg:#eef2f7;--card:#fff;--text:#1a2332;--text-light:#5e6f88;--border:#e2e8f0;--shadow:0 2px 8px rgba(0,0,0,0.06);--radius:12px;--radius-sm:8px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 20px;border:none;border-radius:var(--radius-sm);font-size:.9rem;font-weight:600;cursor:pointer;transition:all .2s;text-decoration:none}
.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary-light)}
.btn-accent{background:var(--accent);color:#fff}.btn-accent:hover{background:#e09515}
.btn-success{background:var(--success);color:#fff}.btn-success:hover{background:#16a34a}
.btn-danger{background:var(--danger);color:#fff}.btn-danger:hover{background:#dc2626}
.btn-info{background:var(--info);color:#fff}
.btn-outline{background:transparent;border:2px solid var(--border);color:var(--text)}.btn-outline:hover{border-color:var(--primary-light);color:var(--primary-light)}
.btn-sm{padding:6px 14px;font-size:.82rem}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border);padding:24px;margin-bottom:16px}
.input{width:100%;padding:10px 14px;border:2px solid var(--border);border-radius:8px;font-size:.9rem;outline:none;transition:.2s;background:#fff;color:var(--text)}
.input:focus{border-color:var(--primary-light);box-shadow:0 0 0 3px rgba(45,109,168,0.1)}
.badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:.75rem;font-weight:600}
.badge-success{background:#dcfce7;color:#166534}.badge-warning{background:#fef3c7;color:#92400e}.badge-danger{background:#fee2e2;color:#991b1b}.badge-info{background:#dbeafe;color:#1e40af}
.text-muted{color:var(--text-light);font-size:.82rem}
.mt-8{margin-top:8px}.mt-16{margin-top:16px}.mb-16{margin-bottom:16px}
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0d2137,#1e3a5f 40%,#2d6da8 70%,#1e3a5f);position:relative;overflow:hidden}
.login-page::before{content:"";position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 20% 80%,rgba(45,109,168,0.3) 0%,transparent 70%),radial-gradient(ellipse 60% 50% at 80% 20%,rgba(245,166,35,0.08) 0%,transparent 70%)}
.login-container{width:100%;max-width:420px;padding:20px;position:relative;z-index:1}
.login-header{text-align:center;margin-bottom:28px}
.login-logo{font-size:56px;margin-bottom:8px}
.login-header h1{color:#fff;font-size:1.4rem;font-weight:700;letter-spacing:.05em;text-shadow:0 2px 8px rgba(0,0,0,0.2)}
.login-header p{color:rgba(255,255,255,0.5);font-size:.82rem;margin-top:4px}
.login-tabs{display:flex;background:rgba(255,255,255,0.08);backdrop-filter:blur(8px);border-radius:var(--radius);padding:4px;margin-bottom:16px;border:1px solid rgba(255,255,255,0.06)}
.login-tab{flex:1;padding:10px 12px;text-align:center;border-radius:10px;color:rgba(255,255,255,0.5);cursor:pointer;font-size:.85rem;font-weight:600;border:none;background:transparent;transition:all .25s}
.login-tab.active{background:rgba(255,255,255,0.95);color:var(--primary);box-shadow:0 4px 16px rgba(0,0,0,0.2)}
.login-box{background:rgba(255,255,255,0.95);backdrop-filter:blur(20px);border-radius:16px;padding:28px 24px;box-shadow:0 24px 60px rgba(0,0,0,0.16);border:1px solid rgba(255,255,255,0.2)}
.login-box h2{color:var(--primary);margin-bottom:18px;font-size:1rem;text-align:center;font-weight:700}
.login-box .input{margin:8px 0}.login-box .btn{margin-top:14px;width:100%;padding:12px}
.login-error{color:var(--danger);font-size:.8rem;margin-top:8px;text-align:center;display:none}
.login-hint{text-align:center;margin-top:12px;font-size:.7rem;color:rgba(255,255,255,0.3)}
.app-header{background:linear-gradient(135deg,#0d2137,#1e3a5f,#2d6da8);color:#fff;padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(0,0,0,0.15)}
.app-header .logo-area{display:flex;align-items:center;gap:10px;cursor:pointer}
.app-header .logo-area h1{font-size:1rem;font-weight:700}
.app-header .user-info{display:flex;align-items:center;gap:12px;font-size:.85rem}
.app-header .user-info .role-badge{background:rgba(255,255,255,0.15);padding:2px 12px;border-radius:12px;font-size:.72rem}
.app-layout{display:flex;min-height:calc(100vh - 60px)}
.app-sidebar{width:220px;background:#fff;border-right:1px solid var(--border);padding:16px 0;flex-shrink:0}
.app-sidebar .nav-item{display:flex;align-items:center;gap:10px;padding:12px 20px;cursor:pointer;color:var(--text-light);font-size:.88rem;font-weight:500;transition:all .15s;border-left:3px solid transparent}
.app-sidebar .nav-item:hover{color:var(--primary);background:#f0f4f8}
.app-sidebar .nav-item.active{color:var(--primary);background:#eef4fb;border-left-color:var(--primary);font-weight:600}
.app-main{flex:1;padding:24px;overflow-y:auto;max-width:1000px}
.chapter-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-top:16px}
.chapter-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:20px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.chapter-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.1);border-color:var(--primary-light)}
.chapter-card .ch-num{font-size:.7rem;color:var(--text-light);margin-bottom:4px}
.chapter-card .ch-name{font-size:1rem;font-weight:600;color:var(--text);margin-bottom:8px}
.chapter-card .ch-stats{display:flex;justify-content:space-between;font-size:.78rem;color:var(--text-light)}
.chapter-card .ch-bar{margin-top:10px;height:6px;background:var(--border);border-radius:4px;overflow:hidden}
.chapter-card .ch-bar-fill{height:100%;background:linear-gradient(90deg,var(--primary-light),var(--primary));border-radius:4px;transition:width .5s}
.chapter-card .ch-check{position:absolute;top:12px;right:12px;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;background:var(--border)}
.chapter-card .ch-check.done{background:var(--success)}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:16px;text-align:center}
.stat-card .stat-num{font-size:1.5rem;font-weight:700;color:var(--primary)}
.stat-card .stat-label{font-size:.78rem;color:var(--text-light);margin-top:4px}
.q-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.q-number{font-size:.82rem;color:var(--text-light)}
.q-text{font-size:1.05rem;line-height:1.7;margin-bottom:20px;padding:16px;background:#f8fafc;border-radius:var(--radius-sm);border:1px solid var(--border)}
.q-options{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.q-option{display:flex;align-items:flex-start;gap:10px;padding:12px 16px;border:2px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;transition:all .15s;font-size:.92rem;line-height:1.5}
.q-option:hover{border-color:var(--primary-light);background:#f8faff}
.q-option.selected{border-color:var(--primary);background:#eef4fb}
.q-option.correct{border-color:var(--success);background:#f0fdf4}
.q-option.wrong{border-color:var(--danger);background:#fef2f2}
.opt-label{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;background:var(--border);font-size:.78rem;font-weight:600;color:var(--text);flex-shrink:0}.q-option.correct .opt-label{background:var(--success);color:#fff}.q-option.wrong .opt-label{background:var(--danger);color:#fff}.q-option.selected .opt-label{background:var(--primary);color:#fff}
.analysis-panel{background:#f0f9ff;border:1px solid #bae6fd;border-radius:var(--radius-sm);padding:16px;margin-top:12px}
.analysis-title{font-weight:600;color:#0369a1;font-size:.9rem;margin-bottom:8px}
.analysis-correct{color:var(--success);font-weight:600}.analysis-wrong{color:var(--danger);font-weight:600}
.q-nav{display:flex;flex-wrap:wrap;gap:6px;margin-top:16px;padding-top:16px;border-top:1px solid var(--border)}
.q-nav-btn{width:36px;height:36px;border-radius:6px;border:1px solid var(--border);background:#fff;cursor:pointer;font-size:.75rem;font-weight:600;color:var(--text-light);transition:all .15s;display:flex;align-items:center;justify-content:center}
.q-nav-btn:hover{border-color:var(--primary-light);color:var(--primary)}
.q-nav-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.q-nav-btn.answered{background:#dbeafe;color:var(--primary);border-color:var(--primary-light)}
.q-nav-btn.wrong-ans{background:#fee2e2;color:var(--danger);border-color:var(--danger)}
.exam-timer{text-align:center;padding:12px;background:var(--card);border:2px solid var(--accent);border-radius:var(--radius);margin-bottom:16px;font-size:1.1rem;font-weight:700;color:var(--accent)}
.exam-progress{text-align:center;color:var(--text-light);font-size:.82rem;margin-bottom:16px}
.exam-nav{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;margin:12px 0;padding:12px;background:var(--card);border-radius:var(--radius-sm);border:1px solid var(--border)}
.exam-nav-btn{width:32px;height:32px;border-radius:4px;border:1px solid var(--border);background:#fff;cursor:pointer;font-size:.7rem;transition:all .15s;display:flex;align-items:center;justify-content:center}
.exam-nav-btn:hover{border-color:var(--primary-light)}
.exam-nav-btn.answered{background:var(--primary);color:#fff;border-color:var(--primary)}
.exam-nav-btn.current{border-color:var(--accent);box-shadow:0 0 0 2px rgba(245,166,35,0.3)}
.exam-result{text-align:center;padding:40px 24px}
.exam-result .score{font-size:3.5rem;font-weight:800;color:var(--primary);line-height:1}
.exam-result .score-label{font-size:.9rem;color:var(--text-light);margin-top:4px}
.exam-result .result-badge{display:inline-block;padding:6px 20px;border-radius:20px;font-size:1rem;font-weight:700;margin-top:12px}
.wrong-item{border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;margin-bottom:10px;background:var(--card)}
.wrong-item .wi-q{font-size:.9rem;margin-bottom:6px;line-height:1.5}
.wrong-item .wi-info{font-size:.8rem;color:var(--text-light)}
.coach-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-bottom:20px}
.student-row{display:flex;align-items:center;gap:16px;padding:12px 16px;border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:8px;cursor:pointer;transition:all .15s;background:var(--card)}
.student-row:hover{border-color:var(--primary-light);background:#f8faff}
.student-row .sr-name{font-weight:600;font-size:.9rem;min-width:100px}
.student-row .sr-stats{font-size:.8rem;color:var(--text-light);flex:1}
.student-mini-bar{width:100px;height:6px;background:var(--border);border-radius:4px;overflow:hidden;flex-shrink:0}
.student-mini-bar .bar-fill{height:100%;background:linear-gradient(90deg,var(--success),#16a34a);border-radius:4px;transition:width .5s}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(4px)}
.modal-content{background:var(--card);border-radius:var(--radius);padding:24px;max-width:500px;width:90%;box-shadow:0 24px 60px rgba(0,0,0,0.2);max-height:80vh;overflow-y:auto}
.modal-content h3{margin-bottom:12px;font-size:1.05rem}
.modal-close{float:right;background:none;border:none;font-size:1.3rem;cursor:pointer;color:var(--text-light);padding:0 4px}
.share-link{text-align:center;margin-bottom:12px;font-size:.78rem;color:var(--text-light);word-break:break-all;padding:8px;background:#f8fafc;border-radius:6px;border:1px solid var(--border)}
.empty-state{text-align:center;padding:40px 20px;color:var(--text-light)}
.empty-state .empty-icon{font-size:48px;margin-bottom:12px}
.wp-controls{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;align-items:center}
.wp-controls button{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:#fff;cursor:pointer;font-size:.8rem;transition:all .15s}
.wp-controls button:hover{border-color:var(--primary-light);color:var(--primary)}
.wp-controls button.active{background:var(--primary);color:#fff;border-color:var(--primary)}
@media(max-width:768px){.app-sidebar{width:180px}.app-sidebar .nav-item{padding:10px 14px;font-size:.82rem}.app-main{padding:16px}.chapter-grid{grid-template-columns:1fr}.stats-row{grid-template-columns:repeat(2,1fr)}}
@media(max-width:480px){.app-layout{flex-direction:column}.app-sidebar{width:100%;display:flex;overflow-x:auto;padding:8px 0;border-right:none;border-bottom:1px solid var(--border)}.app-sidebar .nav-item{white-space:nowrap;border-left:none;border-bottom:2px solid transparent;padding:8px 12px}.app-sidebar .nav-item.active{border-left:none;border-bottom-color:var(--primary)}.app-main{padding:12px}.stats-row{grid-template-columns:1fr 1fr}.chapter-grid{grid-template-columns:1fr}}

/* ====== UI ENHANCE ANIMATIONS ====== */
@keyframes fadeInUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
@keyframes pulseGlow { 0%,100% { opacity:0.6; } 50% { opacity:1; } }
@keyframes ripple { to { transform:scale(4); opacity:0; } }
@keyframes skeletonPulse { 0% { background-position:200% 0; } 100% { background-position:-200% 0; } }
@keyframes slideUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
@keyframes countUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
@keyframes breathPulse { 0%,100% { box-shadow:0 0 0 0 rgba(30,58,95,0.15); } 50% { box-shadow:0 0 0 6px rgba(30,58,95,0.05); } }
@keyframes checkmark { 0% { transform:scale(0) rotate(-45deg); } 100% { transform:scale(1) rotate(0); } }
@keyframes shimmer { 0% { background-position:-200% 0; } 100% { background-position:200% 0; } }
@keyframes toastIn { from { opacity:0; transform:translateX(100px); } to { opacity:1; transform:translateX(0); } }
@keyframes toastOut { from { opacity:1; transform:translateX(0); } to { opacity:0; transform:translateX(100px); } }
@keyframes scaleIn { from { opacity:0; transform:scale(0.95); } to { opacity:1; transform:scale(1); } }
@keyframes spin { to { transform:rotate(360deg); } }

/* Skeleton Screen */
.skeleton{background:linear-gradient(90deg,#e2e8f0 25%,#f1f5f9 50%,#e2e8f0 75%);background-size:200% 100%;animation:skeletonPulse 1.5s ease infinite;border-radius:6px}
.skeleton-card{height:120px;margin-bottom:16px}
.skeleton-line{height:16px;margin-bottom:10px;width:100%}
.skeleton-line.w60{width:60%}.skeleton-line.w40{width:40%}

/* Toast */
.toast-container{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 20px;border-radius:var(--radius-sm);color:#fff;font-size:.85rem;font-weight:500;animation:toastIn .3s ease forwards;box-shadow:0 8px 24px rgba(0,0,0,0.12);display:flex;align-items:center;gap:8px;max-width:360px}
.toast.toast-out{animation:toastOut .3s ease forwards}
.toast-success{background:#166534}
.toast-error{background:#991b1b}
.toast-info{background:#1e40af}
.toast-warning{background:#92400e}

/* Ripple */
.ripple-btn{position:relative;overflow:hidden}
.ripple-btn::after{content:"";position:absolute;width:100%;padding-top:100%;border-radius:50%;background:rgba(255,255,255,0.3);transform:scale(0);opacity:0;pointer-events:none;left:var(--x,50%);top:var(--y,50%);transform-origin:center}
.ripple-btn:active::after{animation:ripple .5s ease-out}

/* Enhanced hover effects */
.btn{transition:all .25s cubic-bezier(0.4,0,0.2,1)}
.chapter-card{transition:all .3s cubic-bezier(0.4,0,0.2,1)}
.chapter-card:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(0,0,0,0.1)}
.q-option{transition:all .2s cubic-bezier(0.4,0,0.2,1)}
.q-option:hover{transform:scale(1.01);border-color:var(--primary-light)}
.nav-item{transition:all .2s cubic-bezier(0.4,0,0.2,1)}
.card{animation:fadeInUp .35s ease both}
.card:nth-child(2){animation-delay:0.05s}.card:nth-child(3){animation-delay:0.1s}.card:nth-child(4){animation-delay:0.15s}

/* Login page enhanced */
.login-box{animation:scaleIn .4s cubic-bezier(0.4,0,0.2,1) both}
.login-page::before{animation:pulseGlow 4s ease-in-out infinite}
.login-logo{animation:fadeIn .6s ease both;display:inline-block}
.login-logo:hover{transform:scale(1.05) rotate(-5deg);transition:transform .3s}

/* Chapter grid */
.chapter-grid{animation:fadeIn .3s ease both}
.ch-bar-fill{transition:width .8s cubic-bezier(0.4,0,0.2,1)}

/* Stats */
.stat-num{animation:countUp .5s ease both}
.stat-card:nth-child(1) .stat-num{animation-delay:0s}
.stat-card:nth-child(2) .stat-num{animation-delay:0.08s}
.stat-card:nth-child(3) .stat-num{animation-delay:0.16s}
.stat-card:nth-child(4) .stat-num{animation-delay:0.24s}

/* Analysis panel */
.analysis-panel{animation:slideUp .3s cubic-bezier(0.4,0,0.2,1) both}

/* Question navigator */
.q-nav-btn.active{animation:breathPulse 2s ease-in-out infinite}

/* Exam timer */
.exam-timer .timer-num{display:inline-block;font-weight:700;min-width:2ch;text-align:center}

/* Wrong book stagger */
.wrong-item{animation:fadeInUp .3s ease both}
.wrong-item:nth-child(1){animation-delay:0s}.wrong-item:nth-child(2){animation-delay:0.05s}
.wrong-item:nth-child(3){animation-delay:0.1s}.wrong-item:nth-child(4){animation-delay:0.15s}
.wrong-item:nth-child(5){animation-delay:0.2s}

/* Scrollbar */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#94a3b8}

/* Main content transition */
.app-main{transition:opacity .2s ease}
.app-main.fade-in{animation:fadeInUp .3s ease both}

/* Student row hover */
.student-row{transition:all .2s cubic-bezier(0.4,0,0.2,1)}
.student-row:hover{transform:translateX(4px)}

/* Modal overlay */
.modal-overlay{animation:fadeIn .2s ease both}
.modal-content{animation:scaleIn .25s cubic-bezier(0.4,0,0.2,1) both}

/* Empty state */
.empty-state{animation:fadeInUp .4s ease both}

/* Share link */
.share-link{transition:all .2s}
.share-link:hover{background:#e2e8f0}

/* Chapter card checkmark */
.ch-check{transition:all .3s cubic-bezier(0.4,0,0.2,1)}
.ch-check.done{animation:checkmark .4s cubic-bezier(0.4,0,0.2,1)}

/* Loading spinner */
.spinner{width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .6s linear infinite;display:inline-block}

/* ====== AI ENHANCE ANIMATIONS ====== */
.anim-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:2px solid var(--primary-light);border-radius:var(--radius-sm);background:transparent;color:var(--primary);font-size:.82rem;font-weight:600;cursor:pointer;transition:all .2s;margin-top:10px}
.anim-btn:hover{background:var(--primary);color:#fff;border-color:var(--primary)}
.anim-btn:active{transform:scale(0.96)}
.anim-modal{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:none;align-items:center;justify-content:center;z-index:2000;backdrop-filter:blur(4px);animation:fadeIn .2s ease both}
.anim-modal.open{display:flex}
.anim-modal-box{background:#fff;border-radius:16px;width:90%;max-width:720px;max-height:90vh;overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,0.3);animation:scaleIn .3s cubic-bezier(0.4,0,0.2,1) both}
.anim-modal-header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--border);background:var(--primary);color:#fff}
.anim-modal-header h3{font-size:.95rem;font-weight:600}
.anim-modal-close{background:none;border:none;color:rgba(255,255,255,0.7);font-size:1.3rem;cursor:pointer;padding:0 4px;transition:color .2s}
.anim-modal-close:hover{color:#fff}
.anim-canvas-wrap{position:relative;width:100%;padding-top:56.25%;background:#0a0f1a}
.anim-canvas-wrap canvas{position:absolute;inset:0;width:100%;height:100%}
.anim-controls{display:flex;gap:8px;padding:12px 20px;border-top:1px solid var(--border);justify-content:center;background:#f8fafc}
.anim-controls button{padding:6px 16px;border-radius:6px;border:1px solid var(--border);background:#fff;cursor:pointer;font-size:.8rem;transition:all .15s}
.anim-controls button:hover{background:var(--primary);color:#fff;border-color:var(--primary)}
.anim-controls button:active{transform:scale(0.95)}
.anim-legend{position:absolute;bottom:12px;left:12px;background:rgba(0,0,0,0.7);color:#fff;padding:8px 12px;border-radius:6px;font-size:.7rem;line-height:1.6;pointer-events:none;z-index:2}
.anim-legend span{display:inline-flex;align-items:center;gap:4px;margin-right:8px}
.anim-legend .dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.analysis-panel .anim-trigger{text-align:right;margin-top:8px}
