<script>
﻿const ALL_QUESTIONS = [{"id":1,"ch":1,"cat":"无人机概述","q":"民用无人机驾驶员多旋翼类别视距内等级申请人必须具有不少于多少小时的单飞训练时间","opts":["A 6","B 10","C 5"],"ans":2,"exp":"视距内等级单飞训练时间不少于5小时。"},{"id":2,"ch":1,"cat":"无人机概述","q":"中程无人机活动半径为","opts":["A 50~200km","B >800km","C 200-800km"],"ans":2,"exp":"中程无人机活动半径200-800km。"},{"id":3,"ch":1,"cat":"无人机概述","q":"超近程无人机活动半径在____以内","opts":["A 15km","B 15~50km","C 50~200km"],"ans":0,"exp":"超近程无人机活动半径<15km。"},{"id":4,"ch":1,"cat":"无人机概述","q":"无人机相对有人机的优势，以下哪条不正确","opts":["A 无需生命支持系统","B 训练可多依赖于模拟器","C 可靠性指标高"],"ans":2,"exp":"无人机可靠性通常不如有人机。"},{"id":5,"ch":1,"cat":"无人机概述","q":"民用无人机驾驶员多旋翼类别超视距等级申请人必须具有不少于多少小时的单飞训练时间","opts":["A 6","B 15","C 5"],"ans":2,"exp":"超视距单飞训练不少于5小时。"},{"id":6,"ch":1,"cat":"无人机概述","q":"《民用无人驾驶航空器实名制登记管理规定》适用于____的无人机","opts":["A 空机重量超过250克","B 最大起飞重量不高于7公斤的视距内运行","C 最大起飞重量不低于250克"],"ans":2,"exp":"实名登记适用于最大起飞重量≥250g的无人机。"},{"id":7,"ch":1,"cat":"无人机概述","q":"多旋翼飞行器属于以下哪个概念范畴","opts":["A 轻于空气的航空器","B 直升机","C 旋翼机"],"ans":2,"exp":"多旋翼飞行器属于旋翼机范畴。"},{"id":8,"ch":1,"cat":"无人机概述","q":"轻型无人机是指","opts":["A 质量大于等于250克但小于4千克，最大平飞速度小于100千米/小时","B 质量大于250克但小于等于4千克，最大平飞速度小于100千米/小时","C 空机质量大于等于250克但小于等于4千克，最大平飞速度小于100千米/小时"],"ans":2,"exp":"轻型无人机空机质量≥250g且≤4kg，最大平飞速度<100km/h。"},{"id":9,"ch":1,"cat":"无人机概述","q":"无人机系统的机长是指","opts":["A 操控无人机的人","B 协助操控无人机的人","C 负责整个无人机系统运行和安全的驾驶员"],"ans":2,"exp":"机长负责整个系统运行和安全。"},{"id":10,"ch":1,"cat":"无人机概述","q":"关于轻小无人机运行规定适用范围，植保无人机起飞全重不超过？相对高度不超过？","opts":["A 150公斤 30米","B 5700公斤 20米","C 5700公斤 15米"],"ans":0,"exp":"植保无人机起飞全重≤150kg，相对高度≤30m。"},{"id":11,"ch":1,"cat":"无人机概述","q":"民用无人机驾驶员多旋翼类别视距内等级申请人必须具有不少于多少小时的带飞训练时间","opts":["A 44","B 15","C 10"],"ans":2,"exp":"视距内带飞训练不少于10小时。"},{"id":12,"ch":1,"cat":"无人机概述","q":"大型无人机是指","opts":["A 空机质量大于等于150千克","B 质量大于150千克","C 空机质量大于5700千克"],"ans":1,"exp":"大型无人机质量>150kg。"},{"id":13,"ch":1,"cat":"无人机概述","q":"超低空无人机任务高度一般在____之间","opts":["A 0~100m","B 100~1000m","C 0~50m"],"ans":0,"exp":"超低空任务高度0~100m。"},{"id":14,"ch":1,"cat":"无人机概述","q":"无人机系统飞行器平台主要使用的是____空气的动力驱动的航空器","opts":["A 轻于","B 重于","C 等于"],"ans":1,"exp":"无人机属于重于空气的航空器。"},{"id":15,"ch":1,"cat":"无人机概述","q":"小型无人机指","opts":["A 4kg<空机质量≤15kg，7kg<起飞全重≤25kg","B 4kg≤空机质量≤15kg，7kg≤起飞全重≤25kg","C 4kg<空机质量≤15kg，4kg<起飞全重≤25kg"],"ans":0,"exp":"小型无人机空机质量4-15kg，起飞全重7-25kg。"},{"id":16,"ch":1,"cat":"无人机概述","q":"微型无人机指","opts":["A 空机质量小于等于250克，最大平飞速度不大于40千米/小时，飞行真高不超过50米","B 质量小于250克，最大平飞速度不大于40千米/小时，飞行真高不超过50米","C 空机质量小于250克，最大平飞速度不大于40千米/小时，飞行真高不超过50米"],"ans":2,"exp":"微型无人机空机质量<250g。"},{"id":17,"ch":1,"cat":"无人机概述","q":"____航空器平台结构通常包括机翼、机身、尾翼和起落架等","opts":["A 单旋翼","B 多旋翼","C 固定翼"],"ans":2,"exp":"固定翼平台结构包括机翼、机身、尾翼和起落架。"},{"id":18,"ch":1,"cat":"无人机概述","q":"近程无人机活动半径在","opts":["A <15km","B 200~800km","C 15~50km"],"ans":2,"exp":"近程无人机活动半径15-50km。"},{"id":19,"ch":1,"cat":"无人机概述","q":"以下不属于航空器的是","opts":["A 直升机","B 飞艇","C 卫星"],"ans":2,"exp":"卫星属于航天器。"},{"id":20,"ch":2,"cat":"无人机系统组成","q":"无人机通过控制舵面和发动机节风门来实现无人机控制","opts":["A 伺服执行机构","B 操纵杆","C 脚蹬"],"ans":0,"exp":"伺服执行机构是控制舵面和节风门的关键部件。"},{"id":21,"ch":2,"cat":"无人机系统组成","q":"位置传感器用于感受无人机的位置，是飞行轨迹控制的必要前提。____是典型的位置传感器","opts":["A 角速率传感器","B 加速度传感器","C GPS卫星导航接收机"],"ans":2,"exp":"GPS卫星导航接收机是典型的位置传感器。"},{"id":22,"ch":2,"cat":"无人机系统组成","q":"以下属于无人机飞控子系统必须具备的功能是","opts":["A 无人机姿态稳定与控制","B 无人机任务设备管理与控制","C 信息收集与传递"],"ans":0,"exp":"姿态稳定与控制是飞控子系统核心功能。"},{"id":23,"ch":2,"cat":"无人机系统组成","q":"与无人机控制站的功能类似，但只能控制无人机的机载任务设备，不能进行无人机的飞行控制","opts":["A 指挥处理中心","B 无人机控制站","C 载荷控制站"],"ans":2,"exp":"载荷控制站只控制任务设备，不参与飞行控制。"},{"id":24,"ch":2,"cat":"无人机系统组成","q":"电动动力系统主要由动力电机、动力电源和____组成","opts":["A 调速系统","B 电池","C 无刷电机"],"ans":0,"exp":"电动动力系统由电机、电源和调速系统组成。"},{"id":25,"ch":2,"cat":"无人机系统组成","q":"目前民用无人机上多用到的舵机属于哪种伺服执行机构类型","opts":["A 电动伺服执行机构","B 电液伺服执行机构","C 气动伺服执行机构"],"ans":0,"exp":"民用无人机舵机多为电动伺服执行机构。"},{"id":26,"ch":2,"cat":"无人机系统组成","q":"对装备定距螺旋桨的活塞发动机，通常用来反映功率的仪表是","opts":["A 进气压力表","B 燃油流量表","C 转速表"],"ans":2,"exp":"定距螺旋桨发动机用转速表反映功率。"},{"id":27,"ch":2,"cat":"无人机系统组成","q":"经验表明无人机每飞行____小时或者更少就需要某种类型的预防性维护，至少每____小时进行较小的维护","opts":["A 30,60","B 20,50","C 25,40"],"ans":1,"exp":"每20小时预防性维护，至少每50小时较小维护。"},{"id":28,"ch":2,"cat":"无人机系统组成","q":"无人机在控制增稳飞行控制模式下，期间飞控子系统____控制","opts":["A 参与","B 不参与","C 不确定"],"ans":0,"exp":"控制增稳模式下飞控子系统参与控制。"},{"id":29,"ch":2,"cat":"无人机系统组成","q":"地面控制站飞行参数综合显示的内容包括","opts":["A 飞行与导航信息、数据链状态信息、设备状态信息、指令信息","B 导航信息显示、航迹绘制显示以及地理信息的显示","C 告警信息、地图航迹显示信息"],"ans":0,"exp":"综合显示包含飞行导航、数据链状态、设备状态和指令信息。"},{"id":30,"ch":2,"cat":"无人机系统组成","q":"飞艇照明系统中航行灯描述正确的是","opts":["A 左红右绿","B 红","C 绿"],"ans":0,"exp":"航行灯标准为左红右绿。"},{"id":31,"ch":2,"cat":"无人机系统组成","q":"无人机地面站系统不包括","opts":["A 载荷控制站","B 无人机控制站","C 机载电台"],"ans":2,"exp":"机载电台属于机载设备，不属于地面站。"},{"id":32,"ch":2,"cat":"无人机系统组成","q":"无人驾驶航空器系统必要的组成部分是","opts":["A 飞行器平台、通讯链路","B 飞行器平台、控制站","C 飞行器平台、控制站、通讯链路"],"ans":2,"exp":"无人机系统需包含平台、控制站和通讯链路。"},{"id":33,"ch":2,"cat":"无人机系统组成","q":"活塞发动机的爆震最易发生在","opts":["A 发动机处于高功率状态下工作时","B 发动机处于小转速和大进气压力状态工作","C 发动机处于大转速和小进气压力状态工作"],"ans":1,"exp":"爆震最易发生在小转速、大进气压力状态下。"},{"id":34,"ch":2,"cat":"无人机系统组成","q":"无人机地面站显示系统应能显示____信息","opts":["A 飞行器状态及链路、载荷状态","B 飞行空域信息","C 无人机飞行员状态"],"ans":0,"exp":"显示系统应显示飞行器状态、链路状态和载荷状态。"},{"id":35,"ch":2,"cat":"无人机系统组成","q":"飞控子系统可以不具备如下功能","opts":["A 任务分配与航迹规划","B 导航与制导控制","C 姿态稳定与控制"],"ans":0,"exp":"任务分配与航迹规划是地面站功能。"},{"id":36,"ch":2,"cat":"无人机系统组成","q":"无人机计算装载重量和重心的方法主要有：计算法、图表法和____","opts":["A 试凑法","B 查表法","C 约取法"],"ans":1,"exp":"三种方法：计算法、图表法和查表法。"},{"id":37,"ch":2,"cat":"无人机系统组成","q":"活塞式发动机中，CDI系统属于____的一部分","opts":["A 进气系统","B 排气系统","C 点火系统"],"ans":2,"exp":"CDI（电容放电式点火）属于点火系统。"},{"id":38,"ch":2,"cat":"无人机系统组成","q":"无人机电气系统一般包括哪3个部分","opts":["A 电源、电缆、接插件","B 电源、配电系统、用电设备","C 电缆、供电系统、用电设备"],"ans":1,"exp":"电气系统包括电源、配电系统和用电设备。"},{"id":39,"ch":2,"cat":"无人机系统组成","q":"无人机系统通讯链路主要包括指挥与控制(C&C)、____、感知和规避(S&A)三种","opts":["A 空中交通管制(ATC)","B 视频通信","C 通信中继"],"ans":0,"exp":"通讯链路包括C&C、ATC和S&A。"},{"id":40,"ch":2,"cat":"无人机系统组成","q":"任何单位或者个人未取得____，均不得生产民用航空器","opts":["A 适航证","B 型号合格证","C 生产许可证"],"ans":2,"exp":"生产民用航空器须取得生产许可证。"},{"id":41,"ch":2,"cat":"无人机系统组成","q":"地面站地图航迹显示系统可为无人机驾驶员提供飞行器____等信息","opts":["A 位置","B 飞行姿态","C 飞控状态"],"ans":0,"exp":"地图航迹显示主要提供位置信息。"},{"id":42,"ch":2,"cat":"无人机系统组成","q":"____功能通常包括指挥调度、任务规划、操作控制、显示记录等功能","opts":["A 数据链路分系统","B 无人机地面站系统","C 飞控与导航系统"],"ans":1,"exp":"无人机地面站系统具备指挥调度等综合功能。"},{"id":43,"ch":2,"cat":"无人机系统组成","q":"____功能是向无人机各用电系统或设备提供满足预定设计要求的电能","opts":["A 供电系统","B 配电系统","C 电源"],"ans":0,"exp":"供电系统负责提供符合要求的电能。"},{"id":44,"ch":2,"cat":"无人机系统组成","q":"无人机搭载任务设备重量主要受限制于____","opts":["A 最大起飞重量","B 空重","C 载重能力"],"ans":2,"exp":"任务设备重量受限于载重能力。"},{"id":45,"ch":2,"cat":"无人机系统组成","q":"____主要是制定无人机飞行任务、完成无人机载荷数据的处理和应用","opts":["A 指挥处理中心","B 无人机控制站","C 载荷控制站"],"ans":0,"exp":"指挥处理中心负责制定任务和处理载荷数据。"},{"id":46,"ch":2,"cat":"无人机系统组成","q":"活塞发动机混合气过富油燃烧将引起____的问题","opts":["A 发动机工作平稳，但燃油消耗量变大","B 电嘴积炭","C 发动机过热"],"ans":1,"exp":"过富油燃烧导致电嘴积炭。"},{"id":47,"ch":2,"cat":"无人机系统组成","q":"多旋翼飞行器的飞控指的是","opts":["A 机载任务系统","B 机载遥控接收机","C 机载导航飞控系统"],"ans":2,"exp":"飞控即机载导航飞控系统。"},{"id":48,"ch":2,"cat":"无人机系统组成","q":"____是无人机完成起飞、空中飞行、执行任务、返场回收等整个飞行过程的核心系统","opts":["A 飞控计算机","B 导航子系统","C 飞控子系统"],"ans":2,"exp":"飞控子系统是无人机飞行核心系统。"},{"id":49,"ch":2,"cat":"无人机系统组成","q":"____两者组合统称为供电系统","opts":["A 电源和电缆","B 电缆和配电","C 电源和配电"],"ans":2,"exp":"电源和配电系统组合统称为供电系统。"},{"id":50,"ch":2,"cat":"无人机系统组成","q":"汽化器式活塞发动机在何时容易出现汽化器回火现象","opts":["A 热发动起动时","B 油门收的过猛","C 寒冷天气第一次起动时"],"ans":2,"exp":"寒冷天气第一次起动时容易出现回火。"},{"id":51,"ch":2,"cat":"无人机系统组成","q":"目前主流的民用无人机所采用的动力系统通常为活塞式发动机和____两种","opts":["A 涡扇发动机","B 电动机","C 火箭发动机"],"ans":1,"exp":"主流动力为活塞发动机和电动机。"},{"id":52,"ch":2,"cat":"无人机系统组成","q":"当给大型无人机加油时，为预防静电带来的危害应注意","opts":["A 将飞机、加油车和加油枪用连线接地","B 检查电瓶和点火电门是否关断","C 油车是否接地"],"ans":0,"exp":"加油时需将飞机、加油车和加油枪接地。"},{"id":53,"ch":2,"cat":"无人机系统组成","q":"下列哪项是飞行控制的方式之一","opts":["A 指令控制","B 陀螺控制","C 载荷控制"],"ans":0,"exp":"指令控制是飞行控制的基本方式之一。"},{"id":54,"ch":2,"cat":"无人机系统组成","q":"无人机配平的主要考虑是____沿纵轴的前后位置","opts":["A 发动机","B 气动焦点","C 重心"],"ans":2,"exp":"配平主要考虑重心沿纵轴的前后位置。"},{"id":55,"ch":2,"cat":"无人机系统组成","q":"二冲程活塞汽油发动机应使用何种润滑油","opts":["A 4T机油","B 2T机油","C 汽车机油"],"ans":1,"exp":"二冲程发动机应使用2T机油。"},{"id":56,"ch":2,"cat":"无人机系统组成","q":"以下地面链路天线哪一种是定向天线","opts":["A 八木天线","B 鞭状天线","C 三叶草天线"],"ans":0,"exp":"八木天线是定向天线。"},{"id":57,"ch":2,"cat":"无人机系统组成","q":"可能需要处置的危急情况不包括","opts":["A 任务设备故障","B 舵面故障","C 动力装置故障"],"ans":0,"exp":"任务设备故障不属于危急情况。"},{"id":58,"ch":2,"cat":"无人机系统组成","q":"固定翼无人机在姿态遥控状态下，如出现动力失效则正确的处理方法是","opts":["A 保持略大于平飞速度的速度建立下滑航线飞回本场或迫降无人区","B 势能换动能，低头俯冲","C 仅剩的动能转换势能，保持上仰姿态与安全高度"],"ans":0,"exp":"动力失效时应保持下滑速度建立下滑航线。"},{"id":59,"ch":2,"cat":"无人机系统组成","q":"二冲程汽油发动机中，燃料箱加注的是","opts":["A 润滑油","B 汽油","C 汽油与润滑油的混合物"],"ans":2,"exp":"二冲程发动机燃料为汽油与润滑油的混合物。"},{"id":60,"ch":2,"cat":"无人机系统组成","q":"无人机电气系统中电源和____两者组合统称为供电系统","opts":["A 配电系统","B 供电线路","C 用电设备"],"ans":0,"exp":"电源和配电系统组合统称为供电系统。"},{"id":61,"ch":2,"cat":"无人机系统组成","q":"固定翼无人机配平主要考虑的是____沿纵轴的前后位置","opts":["A 气动焦点","B 发动机","C 重心"],"ans":2,"exp":"配平主要考虑重心沿纵轴的位置。"},{"id":62,"ch":2,"cat":"无人机系统组成","q":"无线电视距内通讯的无人机多数机载安装____，需要进行无线电超视距通讯的无人机一般采用自跟踪抛物面卫通天线","opts":["A 定向天线","B 蘑菇头天线","C 全向天线"],"ans":2,"exp":"视距内多用全向天线，超视距用定向卫通天线。"},{"id":63,"ch":2,"cat":"无人机系统组成","q":"以下不是导航飞控系统组成部分的是","opts":["A 电台","B 执行机构","C 传感器"],"ans":0,"exp":"电台属于通讯链路设备，不是导航飞控组成部分。"},{"id":64,"ch":2,"cat":"无人机系统组成","q":"不属于无人机飞控子系统所需信息的是","opts":["A 空速","B 经/纬度","C 姿态角"],"ans":1,"exp":"经纬度是导航信息，飞控直接需要空速和姿态角。"},{"id":65,"ch":2,"cat":"无人机系统组成","q":"____传感器是飞行控制系统的基本传感器之一，用以改善系统的阻尼特性","opts":["A 空速","B 迎角、侧滑角","C 角速率"],"ans":2,"exp":"角速率传感器用于改善系统阻尼特性。"},{"id":66,"ch":2,"cat":"无人机系统组成","q":"飞控子系统必须具备的功能为","opts":["A 无人机姿态稳定与控制，无人机飞行管理，应急控制","B 无人机飞行管理，与导航子系统协调完成航迹控制，信息收集与传递","C 无人机起飞与着陆控制，无人机飞行管理，信息收集与传递"],"ans":0,"exp":"飞控子系统须具备姿态稳定、飞行管理和应急控制。"},{"id":67,"ch":2,"cat":"无人机系统组成","q":"无人机的发动机采用重力供油系统但装有增压泵，主要是为了","opts":["A 保证爬升、下降及其它特殊情况下的正常供油","B 保证大速度巡航的用油","C 减少油箱的剩余燃油"],"ans":0,"exp":"增压泵确保各种飞行姿态下正常供油。"},{"id":68,"ch":2,"cat":"无人机系统组成","q":"指挥控制与____是无人机地面站的主要功能","opts":["A 任务规划","B 导航","C 飞行视角显示"],"ans":0,"exp":"指挥控制与任务规划是地面站主要功能。"},{"id":69,"ch":2,"cat":"无人机系统组成","q":"不应属于无人机飞控计算机任务范畴的是","opts":["A 数据中继","B 姿态稳定与控制","C 自主飞行控制"],"ans":0,"exp":"数据中继是通信设备功能。"},{"id":70,"ch":2,"cat":"无人机系统组成","q":"活塞发动机系统常采用的增压技术主要是用来","opts":["A 提高功率","B 减少废气量","C 增加转速"],"ans":0,"exp":"增压技术主要目的是提高功率。"},{"id":71,"ch":2,"cat":"无人机系统组成","q":"目前世界上无人机的频谱使用主要集中在UHF、L和____波段","opts":["A 任意","B C","C VHF"],"ans":1,"exp":"无人机频谱集中在UHF、L和C波段。"},{"id":72,"ch":2,"cat":"无人机系统组成","q":"无人机燃油箱通气目的之一是","opts":["A 通气增大供油流量","B 保证向发动机正常供油","C 通气减小供油流量"],"ans":1,"exp":"燃油箱通气是为了保证正常供油。"},{"id":73,"ch":2,"cat":"无人机系统组成","q":"航空器平台结构通常包括机翼、机身、尾翼和起落架等","opts":["A 多旋翼","B 单旋翼","C 固定翼"],"ans":2,"exp":"固定翼平台结构包括机翼、机身、尾翼和起落架。"},{"id":74,"ch":2,"cat":"无人机系统组成","q":"导航子系统功能是向无人机提供____信息","opts":["A 角速度","B 角加速度","C 高度、速度、位置"],"ans":2,"exp":"导航子系统提供高度、速度和位置信息。"},{"id":75,"ch":2,"cat":"无人机系统组成","q":"____主要是由飞行操纵、任务载荷控制、数据链路控制和通信指挥等组成","opts":["A 指挥处理中心","B 无人机控制站","C 载荷控制站"],"ans":1,"exp":"无人机控制站包含飞行操纵、载荷控制等功能。"},{"id":76,"ch":2,"cat":"无人机系统组成","q":"可能需要处置的紧急情况不包括","opts":["A 飞控系统故障","B 控制站显示系统故障","C 上行通讯链路故障"],"ans":0,"exp":"飞控系统故障属于更高等级的危机情况。"},{"id":77,"ch":2,"cat":"无人机系统组成","q":"从应用上说，涡桨发动机适用于____","opts":["A 中高空长航时无人机","B 高空长航时无人机/无人战斗机","C 中低空、低速短距/垂直起降无人机"],"ans":0,"exp":"涡桨发动机适用于中高空长航时无人机。"},{"id":78,"ch":2,"cat":"无人机系统组成","q":"____是由控制站上的操纵杆直接控制无人机的舵面，遥控无人机的飞行","opts":["A 舵面遥控","B 姿态遥控","C 指令控制"],"ans":0,"exp":"舵面遥控模式下操纵杆直接控制舵面。"},{"id":79,"ch":2,"cat":"无人机系统组成","q":"舵机在无人机飞行控制中属于____","opts":["A 传感器","B 执行机构","C 控制器"],"ans":1,"exp":"舵机是执行机构。"},{"id":80,"ch":3,"cat":"飞行原理1","q":"飞机飞行中，空气表现出来的可压缩程度","opts":["A 只取决于飞机飞行当地的音速","B 和飞机飞行的速度(空速)以及当地的音速有关","C 只取决于飞机的飞行速度(空速)"],"ans":1,"exp":"空气可压缩程度与飞行速度和当地音速都有关，由马赫数决定。"},{"id":81,"ch":3,"cat":"飞行原理1","q":"某活塞式化油器发动机减小油门时熄火则应","opts":["A 调整高速油针","B 飞行时不减油门","C 调整低速油针"],"ans":2,"exp":"减小油门熄火说明低速油针调整不当。"},{"id":82,"ch":3,"cat":"飞行原理1","q":"飞机下降时，其迎角","opts":["A 小于零","B 大于零","C 等于零"],"ans":1,"exp":"下降时需维持升力平衡重力分量，迎角大于零。"},{"id":83,"ch":3,"cat":"飞行原理1","q":"飞机平飞遇垂直向上突风作用时","opts":["A 阻力将增大","B 升力将增大","C 升力将减小"],"ans":1,"exp":"垂直向上突风增大了相对气流的迎角，因此升力增大。"},{"id":84,"ch":3,"cat":"飞行原理1","q":"机翼的安装角是","opts":["A 翼弦与机身纵轴之间所夹锐角","B 翼弦与水平面之间所夹的锐角","C 翼弦与相对气流速度的夹角"],"ans":0,"exp":"安装角是机翼翼弦与机身纵轴之间的夹角。"},{"id":85,"ch":3,"cat":"飞行原理1","q":"下列正确的选项是？","opts":["A 飞行器飞行时阻力是可以避免的","B 每次翼型或迎角的变化都不会改变飞机的阻力","C 了解飞机阻力是如何产生的并如何去减小它是很重要的"],"ans":2,"exp":"了解阻力产生原因和减小方法对飞行安全与效率至关重要。"},{"id":86,"ch":3,"cat":"飞行原理1","q":"具有后掠角的飞机有侧滑角时，会产生","opts":["A 俯仰力矩","B 不产生任何力矩","C 滚转力矩"],"ans":2,"exp":"后掠角飞机侧滑时，左右机翼有效后掠角不同，产生滚转力矩。"},{"id":87,"ch":3,"cat":"飞行原理1","q":"舵面遥控状态时，平飞中向后稍拉升降舵杆量，飞行器的迎角","opts":["A 增大","B 减小","C 先增大后减小"],"ans":0,"exp":"向后拉杆→升降舵上偏→机头上仰→迎角增大。"},{"id":88,"ch":3,"cat":"飞行原理1","q":"流体的伯努利定理","opts":["A 适用于粘性的理想流体","B 适用于不可压缩的理想流体","C 适用于不可压缩的粘性流体"],"ans":1,"exp":"伯努利定理适用于不可压缩的理想流体，低速气流可近似使用。"},{"id":89,"ch":3,"cat":"飞行原理1","q":"一定质量的气体具有下列特性","opts":["A 压力不变时，体积和温度成反比","B 体积不变时，压力和温度成正比","C 温度不变时，压力与体积成正比"],"ans":1,"exp":"体积不变时P/T=常数，压力与温度成正比。"},{"id":90,"ch":3,"cat":"飞行原理1","q":"下列关于动压的哪种说法是正确的","opts":["A 动压和速度成正比","B 总压与静压之差","C 总压与静压之和"],"ans":1,"exp":"动压=总压-静压，是总压与静压之差。"},{"id":91,"ch":3,"cat":"飞行原理1","q":"流体在管道中以稳定的速度流动时，如果管道由粗变细，则流体的流速","opts":["A 减小","B 保持不变","C 增大"],"ans":2,"exp":"根据连续性定理，截面积减小→流速增大。"},{"id":92,"ch":3,"cat":"飞行原理1","q":"气体的压力P、密度ρ、温度T三者之间的变化关系是(R为理想气体常数)","opts":["A T=PRρ","B P=Rρ/T","C P=RρT"],"ans":2,"exp":"理想气体状态方程：P=RρT。"},{"id":93,"ch":3,"cat":"飞行原理1","q":"舵面遥控状态时，平飞中向前稍推升降舵杆量，飞行器的迎角","opts":["A 增大","B 减小","C 先减小后增大"],"ans":2,"exp":"前推杆→升降舵下偏→机头下俯→迎角先减小，随后空气动力恢复可能增大。"},{"id":94,"ch":3,"cat":"飞行原理1","q":"无人机上的仪表压力计管路和所有承压软管，应能承受____规定最高工作压力的1.5倍的压力而无渗漏","opts":["A 不大于","B 等于","C 不小于"],"ans":2,"exp":"承压管路应能承受不小于1.5倍最高工作压力。"},{"id":95,"ch":3,"cat":"飞行原理1","q":"哪一类作业的气象无人机在控制成本的情况下，允许单次使用不回收","opts":["A 人工催化播撒降雨","B 旱涝灾害评估","C 强对流云直接探测"],"ans":2,"exp":"强对流云直接探测风险高、成本大，允许不回收。"},{"id":96,"ch":3,"cat":"飞行原理1","q":"当空气在管道中低速流动时，由伯努利定理可知","opts":["A 流速大的地方，静压大","B 流速大的地方，静压小","C 流速大的地方，总压大"],"ans":1,"exp":"伯努利定理：流速大处静压小。"},{"id":97,"ch":3,"cat":"飞行原理1","q":"如飞机出现失速，飞行员应","opts":["A 立即拉杆","B 立即蹬舵","C 立即推杆到底"],"ans":2,"exp":"失速时应立即推杆减小迎角，使气流重新附着。"},{"id":98,"ch":3,"cat":"飞行原理1","q":"飞机的迎角是","opts":["A 飞机翼弦与水平面的夹角","B 飞机纵轴与水平面的夹角","C 飞机翼弦与相对气流的夹角"],"ans":2,"exp":"迎角是翼弦与相对气流方向的夹角。"},{"id":99,"ch":3,"cat":"飞行原理1","q":"关于平凸翼型的剖面形状，下面说法正确的是","opts":["A 机翼上表面的弯度大于下表面的弯度","B 机翼上表面的弯度小于下表面的弯度","C 上下翼面的弯度相同"],"ans":0,"exp":"平凸翼型上表面弯度大于下表面。"},{"id":100,"ch":3,"cat":"飞行原理1","q":"关于动压和静压的方向，以下哪一个是正确的","opts":["A 动压和静压都作用在任意方向","B 动压作用在流体的流动方向，静压作用在任意方向","C 动压和静压的方向都是与运动的方向一致"],"ans":1,"exp":"动压有方向性，静压无方向性。"},{"id":101,"ch":3,"cat":"飞行原理1","q":"从原点作极曲线的切线，切点所对应的迎角值是","opts":["A 最小迎角","B 有利迎角","C 最大迎角"],"ans":1,"exp":"切点对应有利迎角（最大升阻比迎角）。"},{"id":102,"ch":3,"cat":"飞行原理1","q":"飞机失速的原因是","opts":["A 飞机速度太小","B 飞机速度太大","C 飞机迎角超过临界迎角"],"ans":2,"exp":"失速的根本原因是迎角超过临界迎角。"},{"id":103,"ch":3,"cat":"飞行原理1","q":"国际标准大气的定义是什么","opts":["A 对流层附近常温常压下空气的密度","B 海平面附近常温常压下空气的密度","C 地表层附近常温常压下空气的密度"],"ans":1,"exp":"国际标准大气以海平面为基准，温度15°C，气压1013.25hPa。"},{"id":104,"ch":3,"cat":"飞行原理1","q":"流体的粘性与温度之间的关系是","opts":["A 气体的粘性随温度的升高而增大","B 液体的粘性随温度的升高而增大","C 液体的粘性与温度无关"],"ans":0,"exp":"气体粘性随温度升高而增大，液体粘性随温度升高而减小。"},{"id":105,"ch":3,"cat":"飞行原理1","q":"对一般翼型来说，下列说法中哪个是正确的","opts":["A 当翼剖面有一个正迎角时，上翼面处的流速小于下翼面处的流速","B 当迎角为零时，升力不为零","C 当翼剖面有一个正迎角时，上翼面处的流线比下翼面处的流线疏"],"ans":1,"exp":"非对称翼型在零迎角时仍能产生升力。"},{"id":106,"ch":3,"cat":"飞行原理1","q":"对于下滑中的飞机来说，升力和重力关系","opts":["A L=Wg","B L=Wgcosa","C L=Wgsina"],"ans":1,"exp":"下滑时升力L=Wg·cosα，α为下滑角。"},{"id":107,"ch":3,"cat":"飞行原理1","q":"定体积的容器中，空气压力","opts":["A 与空气密度和空气温度乘积成反比","B 与空气密度和空气温度乘积成正比","C 与空气密度和空气绝对温度乘积成正比"],"ans":2,"exp":"根据理想气体方程P=ρRT，压力与密度和绝对温度乘积成正比。"},{"id":108,"ch":3,"cat":"飞行原理1","q":"国际标准大气的物理参数的相互关系是","opts":["A 体积不变时，压力和温度成正比","B 压力不变时，体积和温度成反比","C 温度不变时，压力与体积成正比"],"ans":0,"exp":"体积不变时P/T=常数，压力与温度成正比。"},{"id":109,"ch":3,"cat":"飞行原理1","q":"飞机上升时，其迎角","opts":["A 小于零","B 等于零","C 大于零"],"ans":2,"exp":"上升时需升力大于重力，迎角大于零。"},{"id":110,"ch":3,"cat":"飞行原理1","q":"舵面遥控状态时，平飞中向右稍压副翼杆量，无人机","opts":["A 右翼升力大于左翼升力","B 左翼升力等于右翼升力","C 左翼升力大于右翼升力"],"ans":2,"exp":"向右压杆→右副翼上偏→左翼升力大于右翼→向左滚转。"},{"id":111,"ch":3,"cat":"飞行原理1","q":"气流沿机翼表面附面层类型的变化是","opts":["A 可由层流变为紊流","B 一般不发生变化","C 可由紊流变为层流"],"ans":0,"exp":"附面层可从前缘层流向后转变为紊流。"},{"id":112,"ch":3,"cat":"飞行原理1","q":"流管中空气的动压","opts":["A 与空气速度和空气密度成正比","B 仅与空气密度成正比","C 与空气速度平方和空气密度成正比"],"ans":2,"exp":"动压q=½ρV²，与空气密度和速度平方成正比。"},{"id":113,"ch":3,"cat":"飞行原理1","q":"下列不是影响空气粘性的因素是","opts":["A 空气的流动位置","B 气流的流速","C 空气的粘性系数"],"ans":0,"exp":"空气粘性主要取决于温度和粘性系数，与流动位置无关。"},{"id":114,"ch":3,"cat":"飞行原理1","q":"载荷因子是","opts":["A 飞机升力与阻力的比值","B 飞机拉力与阻力的比值","C 飞机承受的载荷(除重力外)与重力的比值"],"ans":2,"exp":"载荷因子（过载）是飞机承受载荷与重力的比值。"},{"id":115,"ch":3,"cat":"飞行原理1","q":"空速适度减小时，为保持高度，应实施的操纵是","opts":["A 增大迎角，使升力的增加大于阻力的增加","B 增大迎角，以保持升力不变","C 减小迎角，以保持阻力不变"],"ans":1,"exp":"空速减小→动压减小→需增大迎角提高升力系数。"},{"id":116,"ch":3,"cat":"飞行原理1","q":"飞机着陆进入地面效应区时，将","opts":["A 出现短暂的机头上仰变化","B 经历诱导阻力减小的过程，需要减小动力","C 需要增大迎角以保持相同的升力系数"],"ans":1,"exp":"地面效应减小诱导阻力，需减小动力防止飘过头。"},{"id":117,"ch":3,"cat":"飞行原理1","q":"飞机机翼的焦点指的是","opts":["A 升力的着力点","B 附加升力的着力点","C 重力的着力点"],"ans":1,"exp":"焦点是迎角变化时附加升力的作用点。"},{"id":118,"ch":3,"cat":"飞行原理1","q":"在机翼表面附面层由层流状态转变为紊流状态的转捩点的位置","opts":["A 将随着飞行速度的提高而前移","B 在飞行M数小于一定值时保持不变","C 将随着飞行速度的提高而后移"],"ans":0,"exp":"飞行速度提高→雷诺数增大→转捩点前移。"},{"id":119,"ch":3,"cat":"飞行原理1","q":"飞机的压力中心是","opts":["A 压力最高的点","B 压力最低的点","C 升力的着力点"],"ans":2,"exp":"压力中心是气动力合力的作用点，即升力的着力点。"},{"id":120,"ch":3,"cat":"飞行原理1","q":"对低速气流，由伯努利方程可以得出","opts":["A 流管内气流速度增加，空气静压减小","B 流管截面积减小，空气静压增加","C 流管内气流速度增加，空气静压也增加"],"ans":0,"exp":"伯努利方程：流速增加→动压增大→静压减小。"},{"id":121,"ch":3,"cat":"飞行原理1","q":"在大气层内，大气密度","opts":["A 随高度增加而减小","B 随高度增加而增加","C 在同温层内随高度增加保持不变"],"ans":0,"exp":"大气密度随高度增加而减小。"},{"id":122,"ch":3,"cat":"飞行原理1","q":"测量机翼的翼弦是从","opts":["A 机身中心线到翼尖","B 左翼尖到右翼尖","C 机翼前缘到后缘"],"ans":2,"exp":"翼弦是机翼剖面前缘到后缘的连线长度。"},{"id":123,"ch":3,"cat":"飞行原理1","q":"影响翼型性能的最主要的参数是","opts":["A 翼型的厚度和弯度","B 弯度和前缘","C 前缘和后缘"],"ans":0,"exp":"翼型的厚度和弯度是影响升阻特性的最主要参数。"},{"id":124,"ch":3,"cat":"飞行原理1","q":"具有上反角的飞机有侧滑角时，会产生","opts":["A 不产生任何力矩","B 俯仰力矩","C 偏航力矩"],"ans":2,"exp":"上反角飞机侧滑时产生偏航力矩。"},{"id":125,"ch":3,"cat":"飞行原理1","q":"空气动力学概念中，空气的物理性质主要包括","opts":["A 空气的压缩性","B 空气的粘性","C 空气的粘性和压缩性"],"ans":2,"exp":"空气的物理性质主要包括粘性和压缩性。"},{"id":126,"ch":3,"cat":"飞行原理1","q":"气体的连续性定理是哪个定律在空气流动过程中的应用","opts":["A 能量守衡定律","B 牛顿第一定律","C 质量守衡定律"],"ans":2,"exp":"连续性定理是质量守恒定律在流体力学中的应用。"},{"id":127,"ch":3,"cat":"飞行原理1","q":"通过改变迎角，无人机驾驶员可以控制飞机的","opts":["A 升力、空速、阻力","B 升力、拉力、阻力","C 升力、空速、阻力、重量"],"ans":0,"exp":"改变迎角可同时影响升力、空速和阻力。"},{"id":128,"ch":3,"cat":"飞行原理1","q":"在机翼上，驻点处是","opts":["A 空气与前缘相遇的地方","B 空气与后缘相遇的地方","C 都不正确"],"ans":0,"exp":"驻点是气流速度为零的点，位于机翼前缘附近。"},{"id":129,"ch":3,"cat":"飞行原理1","q":"在温度不变情况下，空气的密度与压力的关系","opts":["A 与压力成反比","B 与压力无关","C 与压力成正比"],"ans":2,"exp":"温度不变时ρ=P/RT，密度与压力成正比。"},{"id":130,"ch":3,"cat":"飞行原理1","q":"飞机迎角减小，压力中心的位置会","opts":["A 前移","B 后移","C 保持不变"],"ans":1,"exp":"迎角减小→升力中心后移→压力中心后移。"},{"id":131,"ch":3,"cat":"飞行原理1","q":"常规布局固定翼无人机要实现向左滚转和上仰姿态，舵面的偏转方向应该是","opts":["A 副翼左下右上，升降舵向上偏","B 副翼左上右下，升降舵向下偏","C 副翼左上右下，升降舵向上偏"],"ans":2,"exp":"左滚转：左副翼上偏右副翼下偏→左上右下；上仰：升降舵上偏。"},{"id":132,"ch":3,"cat":"飞行原理1","q":"流体的连续性方程","opts":["A 适用于可压缩和不可压缩流体的稳定管流","B 只适用于不可压缩流体的稳定管流","C 只适用于理想流体"],"ans":0,"exp":"连续性方程适用于可压缩和不可压缩流体的稳定流动。"},{"id":133,"ch":3,"cat":"飞行原理1","q":"当无人机的迎角为临界迎角时","opts":["A 飞行速度最大","B 阻力最小","C 升力系数最大"],"ans":2,"exp":"临界迎角时升力系数达到最大值。"},{"id":134,"ch":3,"cat":"飞行原理1","q":"同一起飞重量的不同民用无人机系统航线飞行，一般____的受风的影响小","opts":["A 巡航速度适中","B 巡航速度小","C 巡航速度大"],"ans":2,"exp":"巡航速度大→抗风能力强→受风影响小。"},{"id":135,"ch":3,"cat":"飞行原理1","q":"飞机在地面效应区时，引起的气动力变化是","opts":["A 升力增大、阻力减小","B 升力减小、阻力增大","C 升力增大、阻力增大"],"ans":0,"exp":"地面效应：升力增大、诱导阻力减小。"},{"id":136,"ch":3,"cat":"飞行原理1","q":"对于非对称翼型的零升迎角是","opts":["A 一个小的负迎角","B 一个小的正迎角","C 失速迎角"],"ans":0,"exp":"非对称翼型在小的负迎角时升力为零。"},{"id":137,"ch":3,"cat":"飞行原理1","q":"翼型的最大厚度与弦长的比值称为","opts":["A 相对厚度","B 相对弯度","C 最大弯度"],"ans":0,"exp":"相对厚度=最大厚度/弦长。"},{"id":138,"ch":3,"cat":"飞行原理1","q":"影响空气粘性力的主要因素是","opts":["A 空气温度","B 空气清洁度","C 相对湿度"],"ans":0,"exp":"空气粘性主要受温度影响。"},{"id":139,"ch":3,"cat":"飞行原理1","q":"测量机翼的翼展是从","opts":["A 机身中心线到翼尖","B 机翼前缘到后缘","C 左翼尖到右翼尖"],"ans":2,"exp":"翼展是左右翼尖之间的距离。"},{"id":140,"ch":3,"cat":"飞行原理1","q":"飞机坡度增大，升力的水平分量","opts":["A 保持不变","B 增大","C 减小"],"ans":1,"exp":"坡度增大→升力水平分量增大。"},{"id":141,"ch":3,"cat":"飞行原理1","q":"机翼1/4弦线与垂直机身中心线的直线之间的夹角称为机翼的","opts":["A 后掠角","B 安装角","C 上反角"],"ans":0,"exp":"1/4弦线与机身垂直线的夹角为后掠角。"},{"id":142,"ch":3,"cat":"飞行原理1","q":"飞机水平转弯，坡度增大，失速速度____","opts":["A 增大","B 减小","C 保持不变，因为临界迎角不变"],"ans":0,"exp":"坡度增大→载荷因数增大→失速速度增大。"},{"id":143,"ch":3,"cat":"飞行原理1","q":"从地球表面到外层空间，大气层依次是","opts":["A 对流层，平流层，电离层，中间层和散逸层","B 对流层，中间层，平流层，电离层和散逸层","C 对流层，平流层，中间层，电离层和散逸层"],"ans":2,"exp":"大气层：对流层→平流层→中间层→电离层→散逸层。"},{"id":144,"ch":3,"cat":"飞行原理1","q":"根据机翼的设计特点，其产生的升力来自于","opts":["A 机翼上下表面的正压强","B 机翼下表面的正压和上表面的负压","C 机翼下表面的负压和上表面的正压"],"ans":1,"exp":"升力来自下表面正压和上表面负压。"},{"id":145,"ch":3,"cat":"飞行原理1","q":"流体在管道中稳定低速流动时，如果管道由粗变细，则流体的流速","opts":["A 保持不变","B 增大","C 减小"],"ans":1,"exp":"连续性定理：截面积减小→流速增大。"},{"id":146,"ch":3,"cat":"飞行原理1","q":"亚音速气流流过收缩管道，其气流参数如何变化","opts":["A 流速增加，压强增大","B 速度降低，压强下降","C 流速增加，压强下降"],"ans":2,"exp":"亚音速气流在收缩管道中流速增加、压强下降。"},{"id":147,"ch":3,"cat":"飞行原理1","q":"____是在无人机具有姿态稳定控制机构的基础上，通过操纵杆控制无人机的俯仰角、滚转角和偏航角，从而改变无人机的运动","opts":["A 舵面遥控","B 指令控制","C 姿态遥控"],"ans":2,"exp":"姿态遥控模式通过控制三个姿态角来改变飞行状态。"},{"id":148,"ch":3,"cat":"飞行原理1","q":"机翼的展弦比是","opts":["A 展长与翼尖弦长之比","B 展长与平均几何弦长之比","C 展长与机翼最大厚度之比"],"ans":1,"exp":"展弦比=翼展/平均弦长。"},{"id":149,"ch":3,"cat":"飞行原理1","q":"翼型的最大弯度与弦长的比值称为","opts":["A 相对弯度","B 最大厚度","C 相对厚度"],"ans":0,"exp":"相对弯度=最大弯度/弦长。"},{"id":150,"ch":3,"cat":"飞行原理1","q":"伯努利方程适用于","opts":["A 适用于各种速度的气流","B 低速气流","C 高速气流"],"ans":1,"exp":"伯努利方程适用于不可压缩流体，即低速气流。"},{"id":151,"ch":3,"cat":"飞行原理1","q":"在定高直线飞行中，下面关于飞机升力的说法，正确的是","opts":["A 空速小时必须减小迎角，以产生适当的升力来保持高度","B 空速大时必须增大迎角，以产生适当的升力来保持高度","C 空速大时必须减小迎角，以产生适当的升力来保持高度"],"ans":2,"exp":"定高飞行：空速大→动压大→需减小迎角。"},{"id":152,"ch":3,"cat":"飞行原理1","q":"转弯时，为保持高度和空速，应","opts":["A 增大迎角、减小拉力","B 减小迎角、增大拉力","C 增大迎角和油门"],"ans":2,"exp":"转弯时升力分量减小，需增大迎角和油门。"},{"id":153,"ch":3,"cat":"飞行原理1","q":"当空气在管道中流动时，由伯努利定理可知","opts":["A 凡是流速大的地方，压强就小","B 凡是流速小的地方，压强就小","C 凡是流速大的地方，压强就大"],"ans":0,"exp":"伯努利定理：流速大→动压大→静压小。"},{"id":154,"ch":3,"cat":"飞行原理1","q":"对流层的高度，在地球中纬度地区约为","opts":["A 11公里","B 16公里","C 8公里"],"ans":0,"exp":"中纬度地区对流层高度约11公里。"},{"id":155,"ch":3,"cat":"飞行原理1","q":"飞机飞行中，机翼升力等于零时的迎角称为","opts":["A 零迎角","B 零升迎角","C 失速迎角"],"ans":1,"exp":"升力为零时的迎角称为零升迎角。"},{"id":156,"ch":3,"cat":"飞行原理1","q":"飞机坡度增大，升力的垂直分量","opts":["A 增大","B 减小","C 保持不变"],"ans":1,"exp":"坡度增大→升力垂直分量减小。"},{"id":157,"ch":3,"cat":"飞行原理1","q":"对于空气密度如下说法正确的是","opts":["A 空气密度正比于压力和绝对温度","B 空气密度正比于压力，反比于绝对温度","C 空气密度反比于压力，正比于绝对温度"],"ans":1,"exp":"ρ=P/RT，密度正比于压力，反比于绝对温度。"},{"id":158,"ch":3,"cat":"飞行原理1","q":"在对流层内，空气的温度","opts":["A 随高度增加保持不变","B 随高度增加而升高","C 随高度增加而降低"],"ans":2,"exp":"对流层内温度随高度递减。"},{"id":159,"ch":3,"cat":"飞行原理1","q":"放全襟翼下降，无人机能以","opts":["A 较大的下降角，较小的速度下降","B 较大的下降角，较大的速度下降","C 较小的下降角，较大的速度下降"],"ans":0,"exp":"全襟翼增加升力和阻力，能以较陡角度、较低速度下降。"},{"id":160,"ch":3,"cat":"飞行原理1","q":"计算动压时需要哪些数据","opts":["A 空气密度和速度","B 空气密度和阻力","C 大气压力和速度"],"ans":0,"exp":"动压q=½ρV²，需要空气密度和速度。"},{"id":161,"ch":3,"cat":"飞行原理1","q":"Cl=1.3和Cl=1.0","opts":["A 产生升力相等","B 前者产生更大升力","C 后者产生更大升力"],"ans":1,"exp":"升力系数越大，升力越大。"},{"id":162,"ch":3,"cat":"飞行原理1","q":"空气的密度","opts":["A 与压力成反比","B 与压力成正比","C 与压力无关"],"ans":1,"exp":"温度不变时，密度与压力成正比。"},{"id":163,"ch":3,"cat":"飞行原理1","q":"飞机迎角增大，压力中心的位置会","opts":["A 前移","B 后移","C 保持不变"],"ans":0,"exp":"迎角增大→升力中心前移→压力中心前移。"},{"id":164,"ch":3,"cat":"飞行原理1","q":"在大气层内，大气压强","opts":["A 随高度增加而减小","B 随高度增加而增加","C 在同温层内随高度增加保持不变"],"ans":0,"exp":"大气压强随高度增加而减小。"},{"id":165,"ch":3,"cat":"飞行原理1","q":"相同迎角，飞行速度增大一倍，阻力增加约为原来的","opts":["A 四倍","B 二倍","C 一倍"],"ans":0,"exp":"阻力与速度平方成正比，速度增大一倍→阻力四倍。"},{"id":166,"ch":3,"cat":"飞行原理1","q":"伯努利方程的使用条件是","opts":["A 只要是理想的与外界无能量交换的流体","B 必须是理想的、不可压缩、且与外界无能量交换的流体","C 只要是理想的不可压缩流体"],"ans":1,"exp":"伯努利方程条件：理想流体、不可压缩、无能量交换。"},{"id":167,"ch":3,"cat":"飞行原理1","q":"超音速气流经过收缩管道后","opts":["A 速度增加，压强下降","B 速度降低，压强增大","C 速度增加，压强增大"],"ans":1,"exp":"超音速气流在收缩管道中速度降低、压强增大。"},{"id":168,"ch":3,"cat":"飞行原理1","q":"下列叙述与伯努利定理无关的是","opts":["A 流体流速大的地方压力小，流速小的地方压力大","B 气流沿流管稳定流动过程中，气流的动压和静压之和等于常数","C 气流低速流动时，流速与流管横截面积成正比"],"ans":2,"exp":"C是连续性定理内容，与伯努利定理无关。"},{"id":169,"ch":3,"cat":"飞行原理1","q":"为了飞行安全，飞机飞行时的升力系数和迎角一般为","opts":["A 最大升力系数和小于临界迎角的迎角限定值","B 小于最大升力系数和临界迎角的两个限定值","C 最大升力系数和临界迎角最大"],"ans":1,"exp":"飞行时使用小于最大升力系数和小于临界迎角的安全值。"},{"id":170,"ch":3,"cat":"飞行原理1","q":"飞机重心位置的表示方法是","opts":["A 用重心到机体基准面的距离和平均气动力弦长之比的百分数来表示","B 用重心到平均几何弦后缘的距离和平均几何弦长之比的百分数来表示","C 用重心到平均气动力弦前缘的距离和平均气动力弦长之比的百分数来表示"],"ans":2,"exp":"重心位置用距平均气动力弦前缘距离占弦长的百分比表示。"},{"id":171,"ch":3,"cat":"飞行原理1","q":"偏转副翼使飞机转弯时，两翼的阻力是","opts":["A 外侧机翼阻力大","B 内侧机翼阻力大","C 相等"],"ans":0,"exp":"外侧机翼升力大→诱导阻力大→阻力大。"},{"id":172,"ch":3,"cat":"飞行原理1","q":"亚音速气流经过收缩管道后","opts":["A 速度增加，压强下降","B 速度降低，压强下降","C 速度增加，压强增大"],"ans":0,"exp":"亚音速气流在收缩管道中速度增加、压强下降。"},{"id":173,"ch":3,"cat":"飞行原理1","q":"对于带襟翼无人机，放下襟翼，飞机的升力将____，阻力将____","opts":["A 增大、增大","B 增大、减小","C 减小、减小"],"ans":0,"exp":"放下襟翼增加翼型弯度和面积，升力和阻力均增大。"},{"id":174,"ch":3,"cat":"飞行原理1","q":"在大风中自驾飞行的固定翼民用无人机，航线左转90度","opts":["A 逆风左转90度，转出的弯大","B 逆风、顺风左转90度，转出的弯一样大","C 顺风左转90度，转出的弯大"],"ans":2,"exp":"顺风时地速大，转弯半径大。"},{"id":175,"ch":3,"cat":"飞行原理1","q":"层流翼型的特点是","opts":["A 前缘半径大，后部尖的水滴形","B 前缘尖的菱形","C 最大厚度靠后"],"ans":2,"exp":"层流翼型最大厚度位置靠后。"},{"id":176,"ch":3,"cat":"飞行原理1","q":"现代民航客机一般巡航的大气层是","opts":["A 平流层顶层","B 对流层顶层、平流层底层","C 对流层底层"],"ans":1,"exp":"民航客机巡航高度约10000米，处于对流层顶和平流层底。"},{"id":177,"ch":3,"cat":"飞行原理1","q":"飞机转弯时，为保持高度需要增大迎角，原因是","opts":["A 保持升力水平分量不变","B 用以使机头沿转弯方向转动","C 保持升力垂直分量不变"],"ans":2,"exp":"转弯时升力倾斜，需增大迎角保持垂直分量。"},{"id":178,"ch":3,"cat":"飞行原理1","q":"如果对称机翼相对来流仰头旋转了一个迎角，驻点","opts":["A 不会移动","B 稍稍向前缘的上表面移动","C 稍稍向前缘的下表面移动"],"ans":2,"exp":"对称翼型正迎角时驻点向前缘下表面移动。"},{"id":179,"ch":3,"cat":"飞行原理1","q":"飞机转弯的向心力是","opts":["A 飞机升力的水平分力","B 方向舵上产生的气动力","C 飞机的拉力"],"ans":0,"exp":"飞机转弯的向心力来自升力的水平分量。"},{"id":180,"ch":3,"cat":"飞行原理1","q":"对于带襟翼无人机，放下襟翼，飞机的失速速度将","opts":["A 减小","B 不变","C 增大"],"ans":0,"exp":"放下襟翼增加升力系数，失速速度减小。"},{"id":181,"ch":3,"cat":"飞行原理1","q":"气体的伯努利定理是哪个定律在空气流动过程中的应用","opts":["A 能量守衡定律","B 牛顿第一定律","C 质量守衡定律"],"ans":0,"exp":"伯努利定理是能量守恒定律在流体力学中的应用。"},{"id":182,"ch":3,"cat":"飞行原理1","q":"飞机转弯时，坡度有继续增大的倾向，原因是","opts":["A 转弯外侧阻力比内侧的小","B 转弯外侧升力比内侧的大","C 转弯外侧阻力比内侧的大"],"ans":1,"exp":"转弯外侧机翼速度大→升力大→坡度有增大趋势。"},{"id":183,"ch":3,"cat":"飞行原理1","q":"常规布局固定翼无人机要实现向右滚转和上仰姿态，舵面的偏转方向应该是","opts":["A 副翼右上左下，升降舵向上偏","B 副翼左上右下，升降舵向下偏","C 副翼右上左下，升降舵向下偏"],"ans":0,"exp":"右滚转：右副翼上偏左副翼下偏→右上左下；上仰：升降舵上偏。"},{"id":184,"ch":3,"cat":"飞行原理1","q":"飞机的压力中心是","opts":["A 压力最高的点","B 压力最低的点","C 升力的着力点"],"ans":2,"exp":"压力中心是气动力合力的作用点，即升力的着力点。"},{"id":185,"ch":4,"cat":"飞行原理2","q":"当飞机减小速度水平飞行时","opts":["A 减小迎角以减小阻力","B 增大迎角以提高升力","C 保持迎角不变以防止失速"],"ans":1,"exp":"速度减小→动压减小→需增大迎角维持升力。"},{"id":186,"ch":4,"cat":"飞行原理2","q":"不属于影响飞机机体腐蚀的大气因素是","opts":["A 空气的温差","B 空气的相对湿度","C 空气压力"],"ans":2,"exp":"空气压力对机体腐蚀影响极小。"},{"id":187,"ch":4,"cat":"飞行原理2","q":"失速迎角就是临界迎角，指的是","opts":["A 飞机升力系数最大时的迎角","B 飞机飞得最高时的迎角","C 飞机飞得最快时的迎角"],"ans":0,"exp":"临界迎角是升力系数最大时的迎角。"},{"id":188,"ch":4,"cat":"飞行原理2","q":"在平衡外载荷的作用下，飞机飞行的轨迹","opts":["A 是直线的或是水平曲线的","B 一定是直线的","C 一定是水平直线的"],"ans":0,"exp":"平衡外载荷下飞机可作直线或水平曲线飞行。"},{"id":189,"ch":4,"cat":"飞行原理2","q":"飞机起飞时后缘襟翼放下的角度小于着陆时放下的角度，是因为","opts":["A 后缘襟翼放下角度比较小时，机翼的升力系数增加的效果大于阻力系数增加的效果","B 后缘襟翼放下角度比较大时，机翼的阻力系数增加，升力系数不增加","C 后缘襟翼放下角度比较小时，机翼的升力系数增加，阻力系数不增加"],"ans":0,"exp":"起飞时小角度襟翼增升效果大于增阻效果。"},{"id":190,"ch":4,"cat":"飞行原理2","q":"发动机火花塞出问题则会","opts":["A 无法启动","B 突然熄火","C 以上都有可能"],"ans":2,"exp":"火花塞故障可能导致多种问题。"},{"id":191,"ch":4,"cat":"飞行原理2","q":"利用风可以得到飞机气动参数，其基本依据是","opts":["A 牛顿定理","B 相对性原理","C 连续性假设"],"ans":1,"exp":"相对性原理：飞机在静止空气中运动与在风洞中吹风等效。"},{"id":192,"ch":4,"cat":"飞行原理2","q":"飞行中操作扰流板伸出","opts":["A 增加飞机抬头力矩，辅助飞机爬升","B 增加机翼上翼面的面积以提高升力","C 阻挡气流的流动，增大阻力"],"ans":2,"exp":"扰流板伸出破坏气流，增大阻力，减小升力。"},{"id":193,"ch":4,"cat":"飞行原理2","q":"飞机着陆的过程是","opts":["A 下滑、拉平、平飘、接地和着陆滑跑五个阶段","B 减速下滑、拉平接地和减速滑跑三个阶段","C 下滑、拉平、接地、着陆滑跑和刹车五个阶段"],"ans":0,"exp":"着陆过程分五个阶段。"},{"id":194,"ch":4,"cat":"飞行原理2","q":"在相同飞行速度和迎角情况下，翼面不清洁或前缘结冰的机翼升力","opts":["A 等于基本翼型升力","B 小于基本翼型升力","C 大于基本翼型升力"],"ans":1,"exp":"翼面污染或结冰→升力减小，阻力增大。"},{"id":195,"ch":4,"cat":"飞行原理2","q":"属于增升装置的辅助操纵面是","opts":["A 前缘襟翼","B 副翼","C 扰流板"],"ans":0,"exp":"前缘襟翼是增升装置。"},{"id":196,"ch":4,"cat":"飞行原理2","q":"四冲程汽油发动机中，燃料箱加注的是","opts":["A 汽油与滑油的混合","B 滑油","C 汽油"],"ans":2,"exp":"四冲程发动机汽油和机油分别加注。"},{"id":197,"ch":4,"cat":"飞行原理2","q":"一个平滑流动或流线型流动里面的空气微团，接近一个低压区时","opts":["A 会减速","B 会加速","C 速度不变"],"ans":1,"exp":"空气微团接近低压区时加速。"},{"id":198,"ch":4,"cat":"飞行原理2","q":"机翼升力系数与哪些因素有关","opts":["A 仅与翼剖面形状有关","B 仅与攻角有关","C 与翼剖面形状和攻角有关"],"ans":2,"exp":"升力系数取决于翼型和迎角。"},{"id":199,"ch":4,"cat":"飞行原理2","q":"大多数多旋翼飞行器自主飞行过程利用____实现高度感知","opts":["A GPS","B 超声波高度计","C 气压高度计"],"ans":0,"exp":"多数多旋翼飞行器利用GPS实现高度感知。"},{"id":200,"ch":4,"cat":"飞行原理2","q":"对起飞降落安全性造成不利影响的是","opts":["A 跑道上的微冲气流","B 稳定的上升气流","C 稳定的逆风场"],"ans":0,"exp":"微冲气流造成低空风切变，威胁起降安全。"},{"id":201,"ch":4,"cat":"飞行原理2","q":"飞机的爬升角是指","opts":["A 飞机横轴与水平线之间的夹角","B 飞机立轴与水平线之间的夹角","C 飞机上升轨迹与水平线之间的夹角"],"ans":2,"exp":"爬升角是飞行轨迹与水平面的夹角。"},{"id":202,"ch":4,"cat":"飞行原理2","q":"机翼空气动力受力最大的是","opts":["A 机翼上表面负压","B 机翼下表面压力","C 机翼上表面压力"],"ans":0,"exp":"升力主要来自上表面负压产生的吸力。"},{"id":203,"ch":4,"cat":"飞行原理2","q":"飞机在飞行中出现的失速现象的原因是","opts":["A 翼梢出现较强的旋涡","B 由于机翼表面粗糙，使附面层由层流变为紊流","C 由于迎角达到临界迎角，造成机翼上表面附面层大部分分离"],"ans":2,"exp":"失速的根本原因是迎角超临界迎角，气流分离。"},{"id":204,"ch":4,"cat":"飞行原理2","q":"保持匀速上升时，升力与重力","opts":["A 相等","B 升力大于重力","C 升力小于重力"],"ans":0,"exp":"匀速上升时升力等于重力。"},{"id":205,"ch":4,"cat":"飞行原理2","q":"下列哪项对飞机阻力大小影响不大","opts":["A 飞机的安装角和上反角","B 飞机的翼型和平面形状","C 飞行速度、空气密度、机翼面积"],"ans":0,"exp":"安装角和上反角主要影响稳定性。"},{"id":206,"ch":4,"cat":"飞行原理2","q":"增大机翼弯度可以增大机翼升力的原理是","opts":["A 加快机翼后缘气流的流速","B 使附面层保持层流状态","C 加快机翼前缘上表面气流的流速"],"ans":2,"exp":"增大弯度→上表面气流加速→压力降低→升力增大。"},{"id":207,"ch":4,"cat":"飞行原理2","q":"合理布局飞机结构的位置，是为了减小","opts":["A 压差阻力","B 干扰阻力","C 摩擦阻力"],"ans":1,"exp":"合理布局减少干扰阻力。"},{"id":208,"ch":4,"cat":"飞行原理2","q":"前缘缝翼的功用有","opts":["A 增加飞机的稳定性","B 增大机翼的安装角","C 增大最大升力系数"],"ans":2,"exp":"前缘缝翼延缓气流分离，增大最大升力系数。"},{"id":209,"ch":4,"cat":"飞行原理2","q":"属于减升装置的辅助操纵面是","opts":["A 前缘缝翼","B 副翼","C 扰流板"],"ans":2,"exp":"扰流板是减升装置。"},{"id":210,"ch":4,"cat":"飞行原理2","q":"____发动机处于小油门状态，或怠速甚至关机","opts":["A 爬升状态","B 滑翔状态","C 俯冲状态"],"ans":1,"exp":"滑翔状态下发动机小油门或怠速。"},{"id":211,"ch":4,"cat":"飞行原理2","q":"使用机翼后缘襟翼提高升力系数的同时，临界迎角减小的主要原因是","opts":["A 放下后缘襟翼时，在上下翼面之间形成了缝隙","B 放下后缘襟翼时，增大了机翼的弯度","C 放下后缘襟翼时，增大了机翼的面积"],"ans":1,"exp":"增大弯度使气流更容易分离。"},{"id":212,"ch":4,"cat":"飞行原理2","q":"飞机焦点的位置","opts":["A 不随仰角变化而改变","B 随滚转角变化而改变","C 随仰角变化而改变"],"ans":0,"exp":"焦点是附加升力的作用点，不随迎角变化。"},{"id":213,"ch":4,"cat":"飞行原理2","q":"飞机的下滑角是","opts":["A 飞行轨迹与水平面的夹角","B 阻力与重力的夹角","C 升力与阻力的夹角"],"ans":0,"exp":"下滑角是飞行轨迹与水平面的夹角。"},{"id":214,"ch":4,"cat":"飞行原理2","q":"下列正确的是","opts":["A 飞机的升阻比越大，飞机的空气动力特性越好","B 飞机的升阻比越小，飞机的空气动力特性越好","C 飞机的升阻比越大，飞机的空气动力特性越差"],"ans":0,"exp":"升阻比越大，气动特性越好。"},{"id":215,"ch":4,"cat":"飞行原理2","q":"影响升力的因素","opts":["A 都是","B 飞行器的尺寸或面积、飞行速度、空气密度","C CL"],"ans":0,"exp":"升力受面积、速度、密度、升力系数等共同影响。"},{"id":216,"ch":4,"cat":"飞行原理2","q":"下列关于阻力的哪种说法是正确的","opts":["A 在飞机各部件之间加装整流包皮可以减小诱导阻力","B 干扰阻力是飞机各部件之间由于气流相互干扰而产生的一种额外阻力","C 干扰阻力是由于气流的下洗而引起的"],"ans":1,"exp":"干扰阻力是各部件间气流相互干扰产生的。"},{"id":217,"ch":4,"cat":"飞行原理2","q":"操纵无人机时，若迎角超过临界迎角升力系数会","opts":["A 迅速减小","B 缓慢增大","C 迅速增大"],"ans":0,"exp":"超过临界迎角→气流分离→升力系数迅速减小。"},{"id":218,"ch":4,"cat":"飞行原理2","q":"某活塞式化油器发动机增加油门时熄火则应","opts":["A 调整低速油针","B 飞行时不加油门","C 调整高速油针"],"ans":2,"exp":"增加油门熄火应调整高速油针。"},{"id":219,"ch":4,"cat":"飞行原理2","q":"飞机下滑距离","opts":["A 与下滑高度有关","B 与下滑角无关","C 与下滑高度无关"],"ans":0,"exp":"下滑距离=高度/下滑角正切。"},{"id":220,"ch":4,"cat":"飞行原理2","q":"飞行场当地气温的变化，主要会影响以下哪种无人机的传感器","opts":["A 磁罗盘","B 速率陀螺","C 气压高度计"],"ans":2,"exp":"气温变化影响空气密度，气压高度计受影响。"},{"id":221,"ch":4,"cat":"飞行原理2","q":"表面脏污的机翼与表面光洁的机翼相比","opts":["A 同迎角下升力系数相同，阻力系数加大","B 相同升力系数时其迎角减小","C 最大升力系数下降，阻力系数增大"],"ans":2,"exp":"表面脏污→最大升力系数下降，阻力增大。"},{"id":222,"ch":4,"cat":"飞行原理2","q":"根据机翼升力和阻力计算公式可以得出，通过增大机翼面积来增大升力的同时","opts":["A 阻力不变","B 阻力也随着增大","C 阻力减小"],"ans":1,"exp":"增大面积同时增大升力和阻力。"},{"id":223,"ch":4,"cat":"飞行原理2","q":"失速指的是","opts":["A 飞机速度太快","B 飞机以大于临界迎角飞行","C 飞机失去速度"],"ans":1,"exp":"失速指迎角超过临界迎角。"},{"id":224,"ch":4,"cat":"飞行原理2","q":"假设其他条件不变，空气湿度大","opts":["A 空气密度大，起飞滑跑距离短","B 空气密度大，起飞滑跑距离长","C 空气密度小，起飞滑跑距离长"],"ans":2,"exp":"湿度大→水蒸气多→空气密度小→滑跑距离长。"},{"id":225,"ch":4,"cat":"飞行原理2","q":"飞机进行的匀速俯冲拉起飞行，则","opts":["A 飞行速度方向的变化是由于存在着向心力","B 是在平衡外载荷作用下进行的飞行","C 速度不发生变化"],"ans":0,"exp":"俯冲拉起过程中速度方向改变，存在向心加速度。"},{"id":226,"ch":4,"cat":"飞行原理2","q":"飞机在飞行时，升力方向是","opts":["A 与翼弦垂直","B 与地面垂直","C 与相对气流速度垂直"],"ans":2,"exp":"升力方向垂直于相对气流方向。"},{"id":227,"ch":4,"cat":"飞行原理2","q":"飞机做等速直线水平飞行时，作用在飞机上的外载荷应满足","opts":["A 升力等于重力，推力等于阻力，抬头力矩等于低头力矩","B 升力等于重力，抬头力矩等于低头力矩","C 升力等于重力，推力等于阻力"],"ans":0,"exp":"等速平飞需力和力矩全部平衡。"},{"id":228,"ch":4,"cat":"飞行原理2","q":"用下滑有利速度下滑，飞机的","opts":["A 升阻比最大","B 下滑角最大","C 升力最大"],"ans":0,"exp":"下滑有利速度对应最大升阻比。"},{"id":229,"ch":4,"cat":"飞行原理2","q":"民用无人机运行多处于低空低速环境下，主要受到的阻力有:1摩擦阻力;2循环阻力;3干扰阻力;4激波阻力;5诱导阻力;6压差阻力","opts":["A 1、4、5","B 1、2、5、6","C 1、3、5、6"],"ans":2,"exp":"低空低速时激波阻力可忽略。"},{"id":230,"ch":4,"cat":"飞行原理2","q":"飞机爬升角的大小取决于","opts":["A 剩余推力","B 飞机重量","C 剩余推力和飞机重量"],"ans":2,"exp":"爬升角取决于剩余推力与飞机重量的比值。"},{"id":231,"ch":4,"cat":"飞行原理2","q":"下列关于诱导阻力的哪种说法是正确的","opts":["A 把暴露在气流中的所有部件和零件都做成流线型，可以减小诱导阻力","B 在飞机各部件之间加装整流包皮，可以减小诱导阻力","C 增大机翼的展弦比可以减小诱导阻力"],"ans":2,"exp":"增大展弦比可减小翼尖涡强度，减小诱导阻力。"},{"id":232,"ch":4,"cat":"飞行原理2","q":"增大翼型最大升力系数的两个因数是","opts":["A 厚度和机翼面积","B 厚度和弯度","C 弯度和翼展"],"ans":1,"exp":"翼型的厚度和弯度是增大最大升力系数的主要因素。"},{"id":233,"ch":4,"cat":"飞行原理2","q":"下列关于压差阻力哪种说法是正确的","opts":["A 物体的最大迎风面积越大，压差阻力越大","B 物体的最大迎风面积越大，压差阻力越小","C 物体形状越接近流线型，压差阻力越大"],"ans":0,"exp":"迎风面积越大→压差阻力越大。"},{"id":234,"ch":4,"cat":"飞行原理2","q":"飞机在平飞时，载重量越大其失速速度","opts":["A 与重量无关","B 角愈大","C 越大"],"ans":2,"exp":"重量增大→需更大升力→失速速度增大。"},{"id":235,"ch":4,"cat":"飞行原理2","q":"增大飞机机翼的展弦比，目的是减小飞机的","opts":["A 诱导阻力","B 压差阻力","C 摩擦阻力"],"ans":0,"exp":"增大展弦比→减小诱导阻力。"},{"id":236,"ch":4,"cat":"飞行原理2","q":"飞机升力的大小与空气密度的关系是","opts":["A 空气密度成正比","B 空气密度成反比","C 空气密度无关"],"ans":0,"exp":"升力与空气密度成正比。"},{"id":237,"ch":4,"cat":"飞行原理2","q":"当恒定角速度水平转弯时空速增加，转弯半径","opts":["A 减少","B 增加","C 不变"],"ans":1,"exp":"角速度恒定→空速增大→转弯半径增大。"},{"id":238,"ch":4,"cat":"飞行原理2","q":"一般来说，油动民用无人机与电动民用无人机在冬天飞行","opts":["A 油动航时比夏天短;电动航时比夏天长","B 油动航时比夏天长;电动航时也比夏天长","C 油动航时比夏天长;电动航时比夏天短"],"ans":2,"exp":"冬天气温低：油动散热好航时略长；电动电池效率低航时缩短。"},{"id":239,"ch":4,"cat":"飞行原理2","q":"有些飞机的翼尖部位安装了翼梢小翼，它的功用是","opts":["A 减小诱导阻力","B 减小摩擦阻力","C 减小压差阻力"],"ans":0,"exp":"翼梢小翼减弱翼尖涡，减小诱导阻力。"},{"id":240,"ch":4,"cat":"飞行原理2","q":"不属于影响机翼升力系数的因素是","opts":["A 空气密度","B 迎角","C 翼剖面形状"],"ans":0,"exp":"空气密度影响升力大小但不影响升力系数。"},{"id":241,"ch":4,"cat":"飞行原理2","q":"减小飞机外型的迎风面积，目的是为了减小飞机的","opts":["A 摩擦阻力","B 压差阻力","C 诱导阻力"],"ans":1,"exp":"减小迎风面积→减小压差阻力。"},{"id":242,"ch":4,"cat":"飞行原理2","q":"飞机升阻比值的大小主要随下列哪项因素变化","opts":["A 机翼面积","B 飞行速度","C 飞行迎角"],"ans":2,"exp":"升阻比主要随迎角变化。"},{"id":243,"ch":4,"cat":"飞行原理2","q":"通过一个收缩管道的流体，在管道的收缩区，速度的增加必然造成收缩区压力","opts":["A 增加","B 不变","C 减少"],"ans":2,"exp":"伯努利原理：流速增加→压力减小。"},{"id":244,"ch":4,"cat":"飞行原理2","q":"利用增大机翼弯度来提高机翼的升力系数，会导致","opts":["A 机翼上表面最低压力点后移，减小临界迎角","B 机翼上表面最低压力点前移，加大临界迎角","C 机翼上表面最低压力点前移，减小临界迎角"],"ans":2,"exp":"增大弯度→最低压力点前移→临界迎角减小。"},{"id":245,"ch":4,"cat":"飞行原理2","q":"气流沿机翼表面流动，影响由层流变为紊流的原因不包括","opts":["A 在翼表面流动长度","B 空气的流速","C 空气比重"],"ans":2,"exp":"层流变紊流取决于雷诺数，与空气比重无关。"},{"id":246,"ch":4,"cat":"飞行原理2","q":"飞机升力的大小与空速的关系是","opts":["A 与空速无关","B 与空速成正比","C 与空速的平方成正比"],"ans":2,"exp":"升力与空速的平方成正比。"},{"id":247,"ch":4,"cat":"飞行原理2","q":"下列关于扰流板的叙述哪项说法错误","opts":["A 可代替副翼实现飞机横向操纵","B 扰流板可作为减速板缩短飞机滑跑距离","C 可辅助副翼实现飞机横向操纵"],"ans":0,"exp":"扰流板辅助横向操纵但不能完全替代副翼。"},{"id":248,"ch":4,"cat":"飞行原理2","q":"下滑有利速度使","opts":["A 飞机下滑升力最大","B 飞机下滑阻力最小","C 飞机下滑角最大"],"ans":1,"exp":"下滑有利速度对应最小阻力速度。"},{"id":249,"ch":4,"cat":"飞行原理2","q":"在翼型后部产生涡流，会造成","opts":["A 压差阻力增加","B 升力增加","C 摩擦阻力增加"],"ans":0,"exp":"后部涡流增大前后压力差→压差阻力增大。"},{"id":250,"ch":4,"cat":"飞行原理2","q":"不属于云对安全飞行产生不利影响的原因是","opts":["A 温度低造成机翼表面结冰","B 增加阻力","C 影响正常的目测"],"ans":1,"exp":"云本身不直接增加阻力。"},{"id":251,"ch":4,"cat":"飞行原理2","q":"下列关于升阻比的哪种说法是不正确的","opts":["A 升阻比成线性增加","B 升力系数达到最大时，升阻比也达到最大","C 升力和阻力之比升阻比达到最大之前，随迎角增加"],"ans":1,"exp":"升力系数最大时阻力也很大，升阻比并非最大。"},{"id":252,"ch":4,"cat":"飞行原理2","q":"在飞机进行俯冲拉起过程中，飞机的升力","opts":["A 等于飞机的重量","B 大于飞机的重量并一直保持不变","C 为飞机的曲线运动提供向心力"],"ans":2,"exp":"俯冲拉起时升力大于重力，差值提供向心力。"},{"id":253,"ch":4,"cat":"飞行原理2","q":"当后缘襟翼放下时，下述哪项说法正确","opts":["A 既增大升力又增大阻力","B 只增大阻力","C 只增大升力"],"ans":0,"exp":"放下襟翼升力和阻力同时增大。"},{"id":254,"ch":4,"cat":"飞行原理2","q":"对于进行定常飞行的飞机来说","opts":["A 发动机推力一定等于阻力","B 作用在飞机上的外载荷必定是平衡力系","C 升力一定等于重力"],"ans":1,"exp":"定常飞行时外载荷力系平衡。"},{"id":255,"ch":4,"cat":"飞行原理2","q":"飞机以一定地速逆风起飞时","opts":["A 滑跑距离将不变","B 滑跑距离将增大","C 滑跑距离将减小"],"ans":2,"exp":"逆风起飞→空速达到起飞速度更快→滑跑距离缩短。"},{"id":256,"ch":4,"cat":"飞行原理2","q":"下列叙述与飞机的正常盘旋飞行无关的是","opts":["A 保持飞行高度不变","B 保持飞机作圆周飞行","C 保持飞机等速直线飞行"],"ans":2,"exp":"正常盘旋是圆周飞行，不是直线飞行。"},{"id":257,"ch":4,"cat":"飞行原理2","q":"在涡阻力等于其他阻力和的地方","opts":["A 阻力达到最小值","B 阻力达到极小值","C 阻力达到极大值"],"ans":0,"exp":"涡阻力与其他阻力之和相等时总阻力最小。"},{"id":258,"ch":4,"cat":"飞行原理2","q":"常规布局飞机失速时","opts":["A 机翼向上的力和尾翼向下的力都降低","B 机翼向上的力和尾翼向下的力都增加","C 机翼向上的力和尾翼向下的力恒都为零"],"ans":0,"exp":"失速时机翼升力大幅下降，尾翼负升力也降低。"},{"id":259,"ch":4,"cat":"飞行原理2","q":"飞机着陆时使用后缘襟翼的作用是","opts":["A 增加飞机的升力","B 增加飞机的稳定性","C 提高飞机的操纵灵敏性"],"ans":0,"exp":"着陆时放襟翼增加升力，降低着陆速度。"},{"id":260,"ch":4,"cat":"飞行原理2","q":"飞机前缘结冰对飞行的主要影响","opts":["A 相同迎角，升力系数下降","B 增大了临界攻角，使飞机易失速","C 增大了飞机重量，使起飞困难"],"ans":0,"exp":"前缘结冰破坏翼型→升力系数大幅下降。"},{"id":261,"ch":4,"cat":"飞行原理2","q":"使用扰流板操纵飞机向左盘旋时，下述哪项说法正确","opts":["A 左机翼飞行扰流板向上打开，右机翼飞行扰流板不动","B 左机翼飞行扰流板不动，右机翼飞行扰流板向上打开","C 左机翼飞行扰流板向上打开，右机翼飞行扰流板向上打开"],"ans":0,"exp":"向左盘旋→左侧扰流板上偏减升→左滚转。"},{"id":262,"ch":4,"cat":"飞行原理2","q":"下面说法错误的是","opts":["A 滑翔状态，一个较大的下滑角会导致一个很大的重力分量","B 在俯冲状态中，飞行轨迹可以达到完全垂直向下","C 在爬升状态中，要想爬升得更陡和更快就必须有强大的推力，机翼的作用是主要的"],"ans":2,"exp":"爬升更陡主要靠剩余推力。"},{"id":263,"ch":4,"cat":"飞行原理2","q":"常规布局飞机的主要舵面指的是","opts":["A 方向舵、襟翼、缝翼","B 升降舵、方向舵、副翼","C 升降舵、方向舵、襟翼"],"ans":1,"exp":"主要操纵舵面：升降舵、方向舵、副翼。"},{"id":264,"ch":4,"cat":"飞行原理2","q":"下列哪种状态下飞行器会超过临界迎角","opts":["A 都会","B 高速飞行","C 低速飞行"],"ans":0,"exp":"任何速度下都可能超过临界迎角。"},{"id":265,"ch":4,"cat":"飞行原理2","q":"对飞机飞行安全性影响最大的阵风是","opts":["A 上下垂直于飞行方向的阵风","B 左右垂直于飞行方向的阵风","C 沿着飞行方向的阵风"],"ans":0,"exp":"垂直阵风直接改变迎角，影响最大。"},{"id":266,"ch":4,"cat":"飞行原理2","q":"减少飞机摩擦阻力的措施是","opts":["A 保持飞机表面光洁度","B 增大后掠角","C 减小迎风面积"],"ans":0,"exp":"保持表面光洁度可减小摩擦阻力。"},{"id":267,"ch":4,"cat":"飞行原理2","q":"下述哪类民用无人机动力系统的运转不需要大气中的氧气","opts":["A 二冲程活塞式汽油机","B 涡轮喷气发动机","C 外转子无刷电动机"],"ans":2,"exp":"电动机不需要氧气。"},{"id":268,"ch":4,"cat":"飞行原理2","q":"当速度增加而诱导阻力减少时","opts":["A 蒙皮摩阻减少了","B 形阻减少了","C 蒙皮摩阻增加了"],"ans":2,"exp":"速度增加→诱导阻力减小→摩擦阻力增大。"},{"id":269,"ch":4,"cat":"飞行原理2","q":"飞机上产生的摩擦阻力与大气的哪种物理性质有关","opts":["A 可压缩性","B 温度","C 粘性"],"ans":2,"exp":"摩擦阻力源于空气粘性。"},{"id":270,"ch":4,"cat":"飞行原理2","q":"飞机上不同部件的连接处装有整流包皮，它的主要作用是","opts":["A 减小干扰阻力","B 减小摩擦阻力","C 减小诱导阻力"],"ans":0,"exp":"整流包皮使连接处气流平滑，减小干扰阻力。"},{"id":271,"ch":4,"cat":"飞行原理2","q":"飞机上产生的摩擦阻力与什么因素有关","opts":["A 仅与大气的温度有关","B 与大气的粘性、飞机表面状况以及周围气流接触的飞机表面面积有关","C 与大气可压缩性有关"],"ans":1,"exp":"摩擦阻力取决于空气粘性、表面粗糙度和接触面积。"},{"id":272,"ch":4,"cat":"飞行原理2","q":"使飞机获得最大下滑距离的速度是","opts":["A 下滑有利速度","B 失速速度","C 最大下滑速度"],"ans":0,"exp":"下滑有利速度对应最大升阻比，下滑距离最长。"},{"id":273,"ch":4,"cat":"飞行原理2","q":"当迎角达到临界迎角时","opts":["A 升力突然大大降低，而阻力迅速增加","B 升力和阻力同时大大增加","C 升力突然大大增加，而阻力迅速减小"],"ans":0,"exp":"临界迎角后气流分离→升力骤降→阻力急增。"},{"id":274,"ch":4,"cat":"飞行原理2","q":"飞机横向平衡中的滚转力矩主要包括","opts":["A 水平尾翼力矩","B 机翼升力力矩","C 机翼阻力力矩"],"ans":1,"exp":"滚转力矩主要来自左右机翼升力差。"},{"id":275,"ch":4,"cat":"飞行原理2","q":"飞机在对流层中匀速爬升时，随着飞行高度的增加，飞机飞行马赫数","opts":["A 逐渐增加","B 逐渐减小","C 保持不变"],"ans":0,"exp":"高度升高→音速减小→马赫数增大。"},{"id":276,"ch":4,"cat":"飞行原理2","q":"没有保护好飞机表面的光洁度，将增加飞机的哪种阻力","opts":["A 干扰阻力","B 摩擦阻力","C 压差阻力"],"ans":1,"exp":"表面不光洁→摩擦阻力增大。"},{"id":277,"ch":4,"cat":"飞行原理2","q":"公式L=Wg","opts":["A 适用于飞行器下滑过程","B 适用于飞行器爬升过程","C 都不适用"],"ans":2,"exp":"L=Wg是平飞条件，下滑和爬升时L≠Wg。"},{"id":278,"ch":4,"cat":"飞行原理2","q":"不稳定运动状态与稳定运动或者静止状态的情况不同之处就是多了","opts":["A 重力加速度","B 加速度","C 速度"],"ans":1,"exp":"不稳定状态存在加速度。"},{"id":279,"ch":4,"cat":"飞行原理2","q":"下列错误的选项是","opts":["A 黏性阻力是由于空气和飞行器表面接触产生的","B 形状阻力是由于空气和飞行器表面接触产生的","C 蒙皮摩擦阻力是由于空气和飞行器表面接触产生的"],"ans":1,"exp":"形状阻力（压差阻力）不是表面接触产生的。"},{"id":280,"ch":4,"cat":"飞行原理2","q":"部分活塞式发动机中，电子燃油喷射控制系统安装在____上","opts":["A 点火系统","B 排气系统","C 进气系统"],"ans":2,"exp":"电子燃油喷射系统安装在进气系统。"},{"id":281,"ch":4,"cat":"飞行原理2","q":"飞机平飞要有足够的升力来平衡飞机的重力，产生该升力所需的速度叫做","opts":["A 飞机平飞最大速度","B 飞机平飞有利速度","C 飞机平飞所需速度"],"ans":2,"exp":"平飞所需速度是产生足够升力的最小速度。"},{"id":282,"ch":4,"cat":"飞行原理2","q":"下列哪项不是飞机飞行时所受的外载荷","opts":["A 重力","B 惯性力","C 气动力"],"ans":1,"exp":"飞行时外载荷包括重力、气动力，惯性力不是外载荷。"},{"id":283,"ch":4,"cat":"飞行原理2","q":"前缘缝翼的主要作用是","opts":["A 减小阻力","B 增大机翼升力","C 放出前缘缝翼，可增大飞机的临界迎角"],"ans":2,"exp":"前缘缝翼在大迎角时打开，增大临界迎角。"},{"id":284,"ch":4,"cat":"飞行原理2","q":"减小干扰阻力的主要措施是","opts":["A 部件连接处采取整流措施","B 把暴露的部件做成流线型","C 把机翼表面做的很光滑"],"ans":0,"exp":"连接处整流是减小干扰阻力最有效的措施。"},{"id":285,"ch":4,"cat":"飞行原理2","q":"保持匀速飞行时，阻力与推力","opts":["A 相等","B 阻力大于推力","C 阻力小于推力"],"ans":0,"exp":"匀速飞行时推力等于阻力。"},{"id":286,"ch":4,"cat":"飞行原理2","q":"打开后缘襟翼既能增大机翼切面的弯曲度，又能增加机翼的面积，这种襟翼被叫做","opts":["A 简单式襟翼","B 后退式襟翼","C 分裂式襟翼"],"ans":1,"exp":"后退式襟翼放下时既增大弯度又增大面积。"},{"id":287,"ch":4,"cat":"飞行原理2","q":"外侧滑转弯是由于离心力比升力的水平分量还大，把飞机向转弯的外侧拉。下列说法错误的是","opts":["A 外侧滑转弯可以通过增加倾斜角修正","B 为维持一个给定的角速度，倾斜角必须随离心力变化","C 在高速飞机上对侧滑进行修正非常重要"],"ans":1,"exp":"给定角速度时倾斜角由空速决定。"},{"id":288,"ch":4,"cat":"飞行原理2","q":"下列哪些是正确的","opts":["A 牛顿第二运动定律表明作用力和反作用力是大小相等方向相反的","B 如果一个物体处于平衡状态，那么它就有保持这种平衡状态的趋势","C 牛顿第三运动定律表明，要获得给定加速度所施加的力的大小取决于无人机的质量"],"ans":1,"exp":"B正确，A混淆第二和第三定律，C混淆第二定律。"},{"id":289,"ch":4,"cat":"飞行原理2","q":"随着飞行速度的提高，下列关于阻力的哪种说法是正确的","opts":["A 诱导阻力减小，废阻力增大","B 诱导阻力增大，废阻力增大","C 诱导阻力减小，废阻力减小"],"ans":0,"exp":"速度增大→诱导阻力减小→废阻力增大。"},{"id":290,"ch":4,"cat":"飞行原理2","q":"失速的直接原因是","opts":["A 低速飞行","B 高速飞行","C 迎角过大"],"ans":2,"exp":"失速直接原因是迎角超过临界迎角。"},{"id":291,"ch":4,"cat":"飞行原理2","q":"关于飞机失速下列说法哪些是正确的","opts":["A 飞机失速是通过加大发动机动力就可以克服的飞行障碍","B 在大迎角或高速飞行状态下都可能出现飞机失速现象","C 亚音速飞行只会出现大迎角失速"],"ans":1,"exp":"高速飞行时也可能因激波导致失速。"},{"id":292,"ch":4,"cat":"飞行原理2","q":"关于升阻比下列哪个说法正确","opts":["A 最大升阻比时，一定是达到临界攻角","B 在最大升力系数时阻力一定最小","C 升阻比随迎角的改变而改变"],"ans":2,"exp":"升阻比随迎角变化，在有利迎角达最大值。"},{"id":293,"ch":4,"cat":"飞行原理2","q":"下列哪项与飞机诱导阻力大小无关","opts":["A 机翼的根尖比","B 机翼的翼型","C 机翼的平面形状"],"ans":1,"exp":"诱导阻力主要与平面形状有关，与翼型关系不大。"},{"id":294,"ch":5,"cat":"飞行原理3","q":"使飞机绕纵轴产生侧倾的力矩称为","opts":["A 滚转力矩","B 偏航力矩","C 俯仰力矩"],"ans":0,"exp":"绕纵轴的力矩为滚转力矩。"},{"id":295,"ch":5,"cat":"飞行原理3","q":"飞机的横向稳定性是指飞机绕下列哪个轴线的稳定性","opts":["A 偏航轴","B 横轴","C 纵轴"],"ans":2,"exp":"横向稳定性绕纵轴。"},{"id":296,"ch":5,"cat":"飞行原理3","q":"关于垂直起飞和着陆回收以下错误的是","opts":["A 垂直起降是旋翼无人机的主流发射回收方式","B 部分特种固定翼无人机也可采用垂直方式发射和回收","C 垂直起降的固定翼无人机均安装有专用的辅助动力系统"],"ans":2,"exp":"并非所有垂直起降固定翼都装专用辅助动力。"},{"id":297,"ch":5,"cat":"飞行原理3","q":"无人机飞行员操纵升降舵时，飞行器将绕","opts":["A 横轴运动","B 纵轴运动","C 立轴运动"],"ans":0,"exp":"升降舵控制俯仰，绕横轴运动。"},{"id":298,"ch":5,"cat":"飞行原理3","q":"飞机从已建立的平衡状态发生偏离，若____则飞机表现出负动安定性","opts":["A 飞机振荡的振幅减小使飞机回到原来的平衡状态","B 飞机振荡的振幅不增大也不减小","C 飞机振荡的振幅持续增大"],"ans":2,"exp":"负动安定性：振幅持续增大。"},{"id":299,"ch":5,"cat":"飞行原理3","q":"影响直升机起飞载重量的主要因素不包括","opts":["A 风速和风向","B 上升效应、场地面积和周围障碍物高度","C 机场标高和空气温度"],"ans":1,"exp":"场地面积和障碍物高度影响安全但不直接决定载重量。"},{"id":300,"ch":5,"cat":"飞行原理3","q":"常规布局的飞机，平尾升力对飞机重心的力矩常为使飞机机头____的力矩","opts":["A 下俯","B 上仰","C 偏转"],"ans":1,"exp":"常规布局平尾产生负升力，对重心产生上仰力矩。"},{"id":301,"ch":5,"cat":"飞行原理3","q":"飞机的横侧安定性过强，而方向安定性相对过弱，飞机容易出现","opts":["A 失去纵向安定性","B 飘摆(荷兰滚)","C 螺旋不稳定现象"],"ans":1,"exp":"横侧安定性过强+方向安定性过弱→飘摆。"},{"id":302,"ch":5,"cat":"飞行原理3","q":"飞机的纵向稳定性是指飞机绕下列哪个轴线的稳定性","opts":["A 纵轴","B 横轴","C 立轴"],"ans":1,"exp":"纵向稳定性绕横轴。"},{"id":303,"ch":5,"cat":"飞行原理3","q":"飞机的纵向和航向稳定性之间","opts":["A 纵向稳定性好，航向稳定性就差","B 必须匹配适当","C 互相独立"],"ans":2,"exp":"纵向和航向稳定性互相独立。"},{"id":304,"ch":5,"cat":"飞行原理3","q":"对飞机方向稳定性影响最大的是","opts":["A 垂直尾翼","B 水平尾翼","C 飞机的最大迎风面积"],"ans":0,"exp":"垂直尾翼是提供方向稳定性的主要部件。"},{"id":305,"ch":5,"cat":"飞行原理3","q":"关于粗猛着陆描述正确的是","opts":["A 不按规定的着陆高度、速度及接地角，导致受地面撞击力超过规定","B 粗猛着陆时前轮先接地","C 粗猛着陆就是使飞机接地的动作太快"],"ans":0,"exp":"粗猛着陆指着陆参数超限。"},{"id":306,"ch":5,"cat":"飞行原理3","q":"飞机的重心位置对飞机的","opts":["A 方向稳定性产生影响","B 横向稳定性产生影响","C 纵向稳定性产生影响"],"ans":2,"exp":"重心位置直接影响纵向稳定性。"},{"id":307,"ch":5,"cat":"飞行原理3","q":"具有纵向安定性的飞机，飞机重心","opts":["A 位于压力中心前","B 与压力中心重合","C 位于压力中心后"],"ans":0,"exp":"重心在压力中心之前→正纵向安定性。"},{"id":308,"ch":5,"cat":"飞行原理3","q":"从机尾向机头方向看去，顺时针旋转螺旋桨飞机的扭矩使飞机","opts":["A 向左滚转","B 向上抬头","C 向下低头"],"ans":0,"exp":"顺时针螺旋桨→反扭矩使机身逆时针→向左滚转。"},{"id":309,"ch":5,"cat":"飞行原理3","q":"飞机飞行的俯仰角为","opts":["A 飞行速度与水平面的夹角","B 飞机纵轴与水平面的夹角","C 飞机纵轴与飞行速度向量的夹角"],"ans":1,"exp":"俯仰角是飞机纵轴与水平面的夹角。"},{"id":310,"ch":5,"cat":"飞行原理3","q":"无人机积水道面上起飞，其起飞距离比正常情况下","opts":["A 长","B 短","C 相等"],"ans":0,"exp":"积水增加阻力→起飞滑跑距离增长。"},{"id":311,"ch":5,"cat":"飞行原理3","q":"无人机能获得平飞航程最长的速度是","opts":["A 飞机平飞远航速度","B 飞机平飞有利速度","C 飞机平飞最大速度"],"ans":0,"exp":"平飞远航速度对应最大航程。"},{"id":312,"ch":5,"cat":"飞行原理3","q":"飞机在y方向上的过载是指","opts":["A 飞机推力与飞机阻力的比值","B 飞机升力与飞机重力的比值","C 飞机升力与飞机阻力的比值"],"ans":1,"exp":"y方向过载=升力/重力。"},{"id":313,"ch":5,"cat":"飞行原理3","q":"如果在机场中只有一条跑道，其跑道使用方向应保证航空器能够","opts":["A 逆风起降","B 侧风起降","C 顺风起降"],"ans":0,"exp":"逆风起降缩短滑跑距离，提高安全性。"},{"id":314,"ch":5,"cat":"飞行原理3","q":"仅偏转副翼使飞机水平左转弯时，出现","opts":["A 无侧滑","B 右侧滑","C 左侧滑"],"ans":2,"exp":"仅偏副翼左转→左侧机翼下沉→左侧滑。"},{"id":315,"ch":5,"cat":"飞行原理3","q":"机翼的压力中心","opts":["A 迎角改变时升力增量作用线与翼弦的交点","B 翼弦与机翼空气动力作用线的交点","C 翼弦与最大厚度线的交点"],"ans":1,"exp":"压力中心是翼弦与空气动力合力作用线的交点。"},{"id":316,"ch":5,"cat":"飞行原理3","q":"对于具有静稳定性的飞机，向左侧滑时其机头会","opts":["A 向右转","B 向左转","C 保持不变"],"ans":1,"exp":"方向静稳定性：左侧滑→机头左转。"},{"id":317,"ch":5,"cat":"飞行原理3","q":"飞机的重心位置对飞机的哪个稳定性有影响","opts":["A 横向稳定性","B 只对纵向稳定性","C 纵向稳定性和航向稳定性"],"ans":2,"exp":"重心位置影响纵向和航向稳定性。"},{"id":318,"ch":5,"cat":"飞行原理3","q":"关于无人机回收方式，下列说法错误的是","opts":["A 用拦截网系统回收是目前小型无人机采用的回收方式之一","B 起落架轮式着陆，多数无人机的起落架局部较坚固，局部较脆弱","C 空中回收需有钩挂伞、吊索和可旋转的脱落机构"],"ans":1,"exp":"起落架设计应整体坚固，不能局部脆弱。"},{"id":319,"ch":5,"cat":"飞行原理3","q":"在高海拔、寒冷、空气稀薄地区，飞行负载不变，飞行状态会","opts":["A 功率损耗增大，飞行时间减少","B 飞行时间变长","C 最大起飞重量增加"],"ans":0,"exp":"空气稀薄→发动机功率下降→航时缩短。"},{"id":320,"ch":5,"cat":"飞行原理3","q":"下列哪种变化情况肯定会增加飞机纵向静稳定性","opts":["A 增加机翼面积","B 增加水平尾翼面积","C 增加垂直尾翼面积"],"ans":1,"exp":"增加水平尾翼面积→增强纵向稳定性。"},{"id":321,"ch":5,"cat":"飞行原理3","q":"在装载时，由于飞机重心偏右，可导致在巡航飞行时，飞机的阻力","opts":["A 减小","B 增大","C 不变"],"ans":1,"exp":"重心偏右→需副翼配平→额外阻力→总阻力增大。"},{"id":322,"ch":5,"cat":"飞行原理3","q":"增加垂直安定面面积产生的影响","opts":["A 增加横向稳定性","B 增加纵向静稳定性","C 增加升力"],"ans":0,"exp":"垂直安定面主要提供方向稳定性，也影响横向稳定性。"},{"id":323,"ch":5,"cat":"飞行原理3","q":"关于拦截网或天钩回收以下正确的是","opts":["A 拦截网系统通常由拦截网、能量吸收装置组成","B 用拦截网系统回收是目前中型无人机较普遍采用的回收方式之一","C 能量吸收装置吸收无人机撞网的能量，免得无人机触网后弹跳"],"ans":2,"exp":"能量吸收装置吸收撞击能量，防止无人机反弹。"},{"id":324,"ch":5,"cat":"飞行原理3","q":"焦点在重心之后，焦点位置向后移","opts":["A 减小纵向稳定性","B 提高纵向操纵性","C 增加纵向稳定性"],"ans":2,"exp":"焦点后移→稳定裕度增大→纵向稳定性增加。"},{"id":325,"ch":5,"cat":"飞行原理3","q":"飞机的方向阻尼力矩主要由","opts":["A 机身产生","B 垂直尾翼产生","C 水平尾翼产生"],"ans":1,"exp":"方向阻尼力矩主要来自垂直尾翼。"},{"id":326,"ch":5,"cat":"飞行原理3","q":"____频段可用于无人机系统下行遥测与信息传输链路","opts":["A 2408-2440MHz","B 840.5-845MHz","C 1430-1446MHz"],"ans":2,"exp":"1430-1446MHz是无人机下行遥测专用频段。"},{"id":327,"ch":5,"cat":"飞行原理3","q":"无人机驾驶员操纵副翼时，飞行器将绕","opts":["A 横轴运动","B 纵轴运动","C 立轴运动"],"ans":1,"exp":"副翼控制滚转，绕纵轴运动。"},{"id":328,"ch":5,"cat":"飞行原理3","q":"常规布局的飞机，机翼升力对飞机重心的力矩常为使飞机机头____","opts":["A 上仰","B 下俯","C 偏转"],"ans":1,"exp":"常规布局机翼升力产生下俯力矩。"},{"id":329,"ch":5,"cat":"飞行原理3","q":"飞机纵稳定性是指飞机受到上下对流扰动后","opts":["A 产生绕横轴转动，扰动消失后自动恢复原飞行姿态","B 产生绕横轴转动，扰动消失后俯仰角自动回到零","C 产生绕立轴转动，扰动消失后转角自动回到零"],"ans":0,"exp":"纵向稳定性：受扰动绕横轴转动，扰动消失后恢复原姿态。"},{"id":330,"ch":5,"cat":"飞行原理3","q":"无人机飞行员操纵方向舵时，飞行器将绕","opts":["A 横轴运动","B 纵轴运动","C 立轴运动"],"ans":2,"exp":"方向舵控制偏航，绕立轴运动。"},{"id":331,"ch":5,"cat":"飞行原理3","q":"偏转副翼使飞机右转弯时，为修正逆偏转的影响，应","opts":["A 向左压杆","B 向左偏转方向舵","C 向右偏转方向舵"],"ans":2,"exp":"右转弯时逆偏转使机头左偏，需向右偏方向舵。"},{"id":332,"ch":5,"cat":"飞行原理3","q":"无人机能获得平飞航时最长的速度是","opts":["A 飞机平飞所需速度","B 飞机平飞最大速度","C 飞机平飞有利速度"],"ans":2,"exp":"平飞有利速度对应最小功率需求，航时最长。"},{"id":333,"ch":5,"cat":"飞行原理3","q":"飞机发生螺旋后，最常规的制止方法是","opts":["A 立即推杆到底改出失速","B 立即向螺旋反方向打舵到底制止滚转","C 立即加大油门增速"],"ans":1,"exp":"螺旋改出：向反方向蹬舵制止旋转。"},{"id":334,"ch":5,"cat":"飞行原理3","q":"使飞机绕立轴作旋转运动的力矩称为","opts":["A 俯仰力矩","B 纵向力矩","C 偏航力矩"],"ans":2,"exp":"绕立轴的力矩为偏航力矩。"},{"id":335,"ch":5,"cat":"飞行原理3","q":"飞行侧滑角为","opts":["A 空速向量与飞机对称面的夹角","B 飞行速度与水平面的夹角","C 飞机纵轴与水平面的夹角"],"ans":0,"exp":"侧滑角是空速向量与飞机对称面的夹角。"},{"id":336,"ch":5,"cat":"飞行原理3","q":"飞机的理论升限____实用升限","opts":["A 小于","B 大于","C 等于"],"ans":1,"exp":"理论升限（绝对升限）大于实用升限。"},{"id":337,"ch":5,"cat":"飞行原理3","q":"无人机飞行员在操纵飞机平飞时，遇到强烈的垂直上升气流时，为了防止过载超规定应","opts":["A 适当减小飞行速度","B 加大油门迅速脱离","C 以最大上升率增大高度"],"ans":0,"exp":"减小速度可降低升力增大，防止过载超限。"},{"id":338,"ch":5,"cat":"飞行原理3","q":"固定翼常规无人机飞行主操纵面有","opts":["A 副翼、升降舵、方向舵、调整片","B 副翼、升降舵(或全动平尾)、方向舵","C 副翼"],"ans":1,"exp":"主操纵面：副翼、升降舵（或全动平尾）、方向舵。"},{"id":339,"ch":5,"cat":"飞行原理3","q":"计算无人机装载重量和重心的方法不包括","opts":["A 坐标法","B 查表法","C 计算法"],"ans":0,"exp":"装载重量和重心计算方法包括计算法、图表法、查表法。"},{"id":340,"ch":5,"cat":"飞行原理3","q":"重心靠后，飞机的纵向安定性","opts":["A 变强","B 保持不变","C 减弱"],"ans":2,"exp":"重心后移→稳定裕度减小→纵向安定性减弱。"},{"id":341,"ch":5,"cat":"飞行原理3","q":"飞机的航向稳定性是指飞机绕下列哪个轴线的稳定性","opts":["A 立轴","B 纵轴","C 横轴"],"ans":0,"exp":"航向稳定性绕立轴。"},{"id":342,"ch":5,"cat":"飞行原理3","q":"无人机的发动机采用重力供油系统但装有增压泵，主要是为了","opts":["A 减少油箱的剩余燃油","B 保证大速度巡航的用油","C 保证爬升、下降及其他特殊情况下的正常供油"],"ans":2,"exp":"增压泵确保各种飞行姿态下正常供油。"},{"id":343,"ch":5,"cat":"飞行原理3","q":"具有正静安定性的飞机，当受到扰动使平衡状态变化后，有","opts":["A 继续偏离原平衡状态的趋势","B 回到原平衡状态的趋势","C 保持偏离后的平衡状态"],"ans":1,"exp":"正静安定性：受扰动后自动恢复。"},{"id":344,"ch":5,"cat":"飞行原理3","q":"关于无人机发射方式下列说法正确的是","opts":["A 容器式发射装置兼备发射与贮存无人机功能，有单室式和多室式两种类型","B 无人机飞离发射装置后在辅助发动机作用下完成飞行任务","C 在地面发射时，使用较为广泛的是母机空中发射与零长发射"],"ans":0,"exp":"容器式发射装置兼备发射与贮存功能。"},{"id":345,"ch":5,"cat":"飞行原理3","q":"飞机的横向和航向稳定性之间","opts":["A 横向稳定性好，航向稳定性就差","B 必须匹配适当","C 互相独立"],"ans":1,"exp":"横向和航向稳定性需适当匹配。"},{"id":346,"ch":5,"cat":"飞行原理3","q":"下列哪种变化情况肯定会增加飞机方向静稳定性","opts":["A 增加垂直尾翼面积","B 增加水平尾翼面积","C 增加机翼面积"],"ans":0,"exp":"增加垂尾面积→增加方向静稳定性。"},{"id":347,"ch":5,"cat":"飞行原理3","q":"如果民用固定翼无人机在机翼上有一层霜","opts":["A 那么他的失速速度会减小","B 那么他的失速速度增加或减小不确定","C 那么他的失速速度会增加"],"ans":2,"exp":"机翼结霜→升力系数降低→失速速度增加。"},{"id":348,"ch":5,"cat":"飞行原理3","q":"飞机横向稳定性是指飞机受到扰动后","opts":["A 产生绕纵轴转动，扰动消失后转角自动回到零","B 产生绕纵轴转动，扰动消失后自动恢复原飞行姿态","C 产生绕横轴转动，扰动消失后转角自动回到零"],"ans":1,"exp":"横向稳定性：受扰滚转，扰动消失后自动恢复。"},{"id":349,"ch":5,"cat":"飞行原理3","q":"系留杆的系留头应满足","opts":["A 固定死","B 可以水平转动","C 可以水平转动并能上下转动"],"ans":2,"exp":"系留头需能水平和上下转动。"},{"id":350,"ch":5,"cat":"飞行原理3","q":"无人机驾驶员舵面遥控操纵飞机时","opts":["A 拉杆飞机转入下降","B 推油门飞机转入下降","C 推杆飞机转入下降"],"ans":2,"exp":"推杆→机头下俯→下降。"},{"id":351,"ch":5,"cat":"飞行原理3","q":"对飞机方向稳定性影响最大的是","opts":["A 水平尾翼","B 飞机的最大迎风面积","C 垂直尾翼"],"ans":2,"exp":"垂直尾翼是提供方向稳定性的主要部件。"},{"id":352,"ch":5,"cat":"飞行原理3","q":"飞机的重心位置影响飞机的","opts":["A 方向稳定性","B 横向稳定性","C 纵向稳定性"],"ans":2,"exp":"重心前后位置直接影响纵向稳定性。"},{"id":353,"ch":5,"cat":"飞行原理3","q":"飞机的横侧安定性有助于","opts":["A 使飞机保持航向","B 使机翼恢复到水平状态","C 使飞机保持迎角"],"ans":1,"exp":"横侧安定性使飞机自动恢复机翼水平。"},{"id":354,"ch":5,"cat":"飞行原理3","q":"____频段可用于无人机系统下行链路，该无线电台工作时不得对其他合法无线电业务造成影响","opts":["A 840.5-845MHz","B 2408-2440MHz","C 1430-1446MHz"],"ans":0,"exp":"840.5-845MHz可用于无人机下行链路但不得干扰其他业务。"},{"id":355,"ch":5,"cat":"飞行原理3","q":"飞机平飞航程的长短","opts":["A 决定于平飞的高度","B 决定于发动机小时耗油量的大小","C 决定于平飞可用燃油量多少"],"ans":2,"exp":"航程取决于可用燃油量和燃油消耗率。"},{"id":356,"ch":5,"cat":"飞行原理3","q":"对于在大风天伞降回收的民用无人机，以下说法错误的是","opts":["A 尽量在上风区开伞","B 尽量在接地后切断主伞连接","C 尽量在高高度开伞"],"ans":2,"exp":"大风天应在低高度开伞减少飘移。"},{"id":357,"ch":5,"cat":"飞行原理3","q":"影响飞机俯仰平衡的力矩主要是","opts":["A 机身力矩和机翼力矩","B 机翼力矩和垂尾力矩","C 机翼力矩和水平尾翼力矩"],"ans":2,"exp":"俯仰平衡主要由机翼力矩和水平尾翼力矩决定。"},{"id":358,"ch":5,"cat":"飞行原理3","q":"飞机的纵向安定性有利于","opts":["A 防止飞机绕纵轴滚转过快","B 防止飞机绕立轴偏转过快","C 防止飞机抬头过高或低头过低"],"ans":2,"exp":"纵向安定性防止俯仰姿态过大变化。"},{"id":359,"ch":5,"cat":"飞行原理3","q":"飞机绕横轴的稳定性称为","opts":["A 纵向稳定性","B 航向稳定性","C 横向稳定性"],"ans":0,"exp":"绕横轴的稳定性是纵向稳定性。"},{"id":360,"ch":5,"cat":"飞行原理3","q":"下列说法错误的是","opts":["A 重心的移动不会改变静稳定裕度","B 配重的任何变化都将需要新的升降舵配平","C 裕度越大，稳定性就越强"],"ans":0,"exp":"重心移动会改变静稳定裕度。"},{"id":361,"ch":5,"cat":"飞行原理3","q":"重心靠前，飞机的纵向安定性","opts":["A 减弱","B 变强","C 不受影响"],"ans":1,"exp":"重心前移→稳定裕度增大→纵向安定性增强。"},{"id":362,"ch":5,"cat":"飞行原理3","q":"下列叙述错误的是","opts":["A 飞机焦点位于飞机重心之前有利于飞机的纵向安定性","B 飞机的重心位置与飞机的装载情况有关","C 飞机焦点位于飞机重心之后有利于飞机的纵向安定性"],"ans":0,"exp":"焦点在重心之后才有利于纵向安定性，A说反了。"},{"id":363,"ch":5,"cat":"飞行原理3","q":"影响飞机方向稳定力矩的因素主要是","opts":["A 飞机迎角、机身和垂尾面积","B 飞机重心位置和飞行M数","C 飞机焦点位置和飞行高度"],"ans":0,"exp":"方向稳定力矩主要受机身、垂尾面积和迎角影响。"},{"id":364,"ch":5,"cat":"飞行原理3","q":"关于升阻比和载荷因数，以下说法错误的是","opts":["A 在最小阻力迎角下飞行，可以获得最大的升阻比","B 载荷因数与升阻比成正比","C 升力与重力的比值称为载荷因数"],"ans":1,"exp":"载荷因数与升阻比没有直接正比关系。"},{"id":365,"ch":5,"cat":"飞行原理3","q":"飞机绕纵轴的稳定性称为","opts":["A 纵向稳定性","B 航向稳定性","C 横向稳定性"],"ans":2,"exp":"绕纵轴的稳定性是横向稳定性。"},{"id":366,"ch":5,"cat":"飞行原理3","q":"研究飞机运动时选用的机体坐标，其","opts":["A 以飞机重心为原点，纵轴和横轴确定的平面为对称面","B 以全机焦点为原点，纵轴和立轴确定的平面为对称面","C 以飞机重心为原点，纵轴和立轴确定的平面为对称面"],"ans":2,"exp":"机体坐标系原点在重心，纵轴和立轴构成对称面。"},{"id":367,"ch":5,"cat":"飞行原理3","q":"无人机左侧风中起飞，侧风有使飞机机头向____偏转的趋势","opts":["A 右","B 视风速的大小不同可能向左也可能向右","C 左"],"ans":2,"exp":"左侧风→飞机有向左偏转的趋势。"},{"id":368,"ch":5,"cat":"飞行原理3","q":"爬升的注意事项，正确的是","opts":["A 要进入回避区","B 垂直上升中，保持直升机状态比较容易","C 飞行员不应以垂直上升作为主要的飞行方式"],"ans":2,"exp":"垂直上升风险高，不应作为主要飞行方式。"},{"id":369,"ch":5,"cat":"飞行原理3","q":"对于正常布局的飞机，下列叙述正确的是","opts":["A 飞机全机的焦点在机翼焦点的前面","B 飞机全机的焦点和机翼焦点始终重合","C 飞机全机的焦点在机翼焦点的后面"],"ans":2,"exp":"全机焦点在机翼焦点之后，受平尾影响。"},{"id":370,"ch":5,"cat":"飞行原理3","q":"哪种气流对无人机的长航时飞行有利","opts":["A 稳定的逆风","B 稳定的下降气流","C 稳定的上升气流"],"ans":2,"exp":"上升气流可提供额外升力，延长航时。"},{"id":371,"ch":5,"cat":"飞行原理3","q":"飞机平飞时保持等速飞行的平衡条件是","opts":["A 升力等于重力，推力等于重力","B 升力等于重力，推力等于阻力","C 升力等于阻力，推力等于重力"],"ans":1,"exp":"等速平飞条件：升力=重力，推力=阻力。"},{"id":372,"ch":5,"cat":"飞行原理3","q":"系留杆的作用是","opts":["A 观测风向","B 给飞行员休息","C 保证飞艇在地面上的安全"],"ans":2,"exp":"系留杆用于系留飞艇，保证地面停放安全。"},{"id":373,"ch":5,"cat":"飞行原理3","q":"机场吹东风时，飞机起飞着陆的最好方向应是","opts":["A 由北向南","B 由东向西","C 由西向东"],"ans":2,"exp":"东风→由西向东起飞着陆为逆风。"},{"id":374,"ch":5,"cat":"飞行原理3","q":"固定翼常规无人机飞行辅助操纵面有","opts":["A 缝翼、襟翼、调整片、全动平尾","B 副翼、升降舵、方向舵、调整片","C 缝翼、襟翼、调整片"],"ans":2,"exp":"辅助操纵面包括缝翼、襟翼、调整片。"},{"id":375,"ch":5,"cat":"飞行原理3","q":"无人机弹射发射方式主要用于","opts":["A XI、XII级别固定翼无人机","B III、IV、XI级别固定翼无人机","C I、II、III、IV、VI级别固定翼无人机"],"ans":2,"exp":"弹射发射适用于I-IV和VI级别中小型固定翼无人机。"},{"id":376,"ch":5,"cat":"飞行原理3","q":"飞机从已建立的平衡状态发生偏离，若____则飞机表现出正动安定性","opts":["A 飞机振荡的振幅不增大也不减小","B 飞机振荡的振幅减小使飞机回到原来的平衡状态","C 飞机振荡的振幅持续增大"],"ans":1,"exp":"正动安定性：振幅逐渐减小，回到平衡状态。"},{"id":377,"ch":5,"cat":"飞行原理3","q":"无人机伞降回收方式一般的应用范围为","opts":["A I、II、IV、V、VI、VII级别无人机","B III、IV、XI级别无人机","C II、IV、XI级别无人机"],"ans":1,"exp":"伞降回收适用于III、IV、XI级别无人机。"},{"id":378,"ch":5,"cat":"飞行原理3","q":"飞行手册中规定着陆不能刹车状态接地，主要是因为","opts":["A 可能使刹车装置失效","B 使机轮起转力矩增大而损坏","C 可能导致滑跑时拖胎"],"ans":1,"exp":"刹车接地使机轮突然加速，起转力矩过大可能损坏。"},{"id":379,"ch":5,"cat":"飞行原理3","q":"飞机纵向阻尼力矩的产生主要","opts":["A 由水平尾翼产生的","B 由垂直尾翼产生的","C 由后掠机翼产生的"],"ans":0,"exp":"纵向阻尼力矩主要来自水平尾翼。"},{"id":380,"ch":5,"cat":"飞行原理3","q":"飞机上的总空气动力的作用线与飞机纵轴的交点称为","opts":["A 全机重心","B 机体坐标的原点","C 全机的压力中心"],"ans":2,"exp":"总空气动力作用线与纵轴交点为全机压力中心。"},{"id":381,"ch":5,"cat":"飞行原理3","q":"偏转副翼使飞机左转弯时，为修正逆偏转的影响，应","opts":["A 向右压杆","B 向右偏转方向舵","C 向左偏转方向舵"],"ans":2,"exp":"左转弯时逆偏转使机头右偏，需向左偏方向舵。"},{"id":382,"ch":5,"cat":"飞行原理3","q":"飞机的横向阻尼力矩主要由","opts":["A 机翼产生","B 垂直尾翼产生","C 水平尾翼产生"],"ans":0,"exp":"横向阻尼力矩主要来自机翼。"},{"id":383,"ch":5,"cat":"飞行原理3","q":"关于升阻比和载荷因数，以下说法错误的是","opts":["A 在最小阻力迎角下飞行，可以获得最大的升阻比","B 升力与重力的比值称为载荷因数","C 载荷因数与升阻比成正比"],"ans":2,"exp":"载荷因数与升阻比无直接正比关系。"},{"id":384,"ch":5,"cat":"飞行原理3","q":"同架同样重量的飞机","opts":["A 在高原机场降落比在平原机场降落需要的跑道短","B 在高原机场降落和在平原机场降落需要的跑道一样长","C 在高原机场降落比在平原机场降落需要的跑道长"],"ans":2,"exp":"高原空气稀薄→升力小→接地速度大→着陆距离长。"},{"id":385,"ch":5,"cat":"飞行原理3","q":"飞机的方向安定性过强，而横侧安定性相对过弱，飞机容易出现","opts":["A 飘摆(荷兰滚)","B 螺旋不稳定","C 转弯困难"],"ans":1,"exp":"方向安定性过强+横侧安定性过弱→螺旋不稳定。"},{"id":386,"ch":5,"cat":"飞行原理3","q":"飞机在空中飞行时，如果飞机处于平衡状态，则","opts":["A 作用在飞机上的所有外力平衡，所有外力矩不平衡","B 作用在飞机上的所有外力平衡，所有外力矩也平衡","C 作用在飞机上的所有外力不平衡，所有外力矩平衡"],"ans":1,"exp":"平衡状态需力和力矩都平衡。"},{"id":387,"ch":5,"cat":"飞行原理3","q":"关于伞降回收以下正确的是","opts":["A 无人机悬挂在主伞下慢慢着陆，机下触地开关接通，使主伞收回无人机内","B 回收伞均由主伞、减速伞和阻力伞三级伞组成","C 当无人机完成任务后，地面站发遥控指令使无人机减速、降高及发动机停车"],"ans":2,"exp":"伞降回收由地面指令或自主执行，先减速降高再开伞。"},{"id":388,"ch":5,"cat":"飞行原理3","q":"焦点在重心之后，向后移焦点，飞机的操纵性","opts":["A 操纵性减弱","B 操纵性增强","C 操纵性与此无关"],"ans":0,"exp":"焦点后移→稳定裕度增大→操纵性减弱。"},{"id":389,"ch":5,"cat":"飞行原理3","q":"同一起飞重量的不同民用无人机系统航线飞行，一般____的受风影响小","opts":["A 巡航速度大","B 巡航速度中","C 巡航速度小"],"ans":0,"exp":"巡航速度大→抗风能力强→受风影响小。"},{"id":390,"ch":5,"cat":"飞行原理3","q":"飞机发生螺旋现象的原因是","opts":["A 飞行员压杆过多","B 飞机失速后机翼自转","C 飞行员方向舵操纵不当"],"ans":1,"exp":"螺旋是因失速后左右机翼升力不对称产生自转。"},{"id":391,"ch":5,"cat":"飞行原理3","q":"描述飞机在空间姿态的姿态角有","opts":["A 俯仰角，侧滑角，滚转角","B 滚转角，偏航角，俯仰角","C 迎角，偏航角，滚转角"],"ans":1,"exp":"三个姿态角：滚转角、偏航角、俯仰角。"},{"id":392,"ch":5,"cat":"飞行原理3","q":"飞机绕立轴的稳定性称为","opts":["A 纵向稳定性","B 横向稳定性","C 航向稳定性"],"ans":2,"exp":"绕立轴为航向稳定性。"},{"id":393,"ch":5,"cat":"飞行原理3","q":"飞行中发现飞机非指令的时而左滚，时而右滚，同时伴随机头时而左偏，时而右偏，此迹象表明","opts":["A 飞机进入了螺旋","B 飞机进入了失速","C 飞机进入了飘摆(荷兰滚)"],"ans":2,"exp":"非指令左右滚转+左右偏航=飘摆。"},{"id":394,"ch":5,"cat":"飞行原理3","q":"飞机航向稳定性是指飞机受到侧风扰动后","opts":["A 产生绕立轴转动，扰动消失后自动恢复原飞行姿态","B 产生绕横轴转动，扰动消失后转角自动回到零","C 产生绕立轴转动，扰动消失后转角自动回到零"],"ans":0,"exp":"航向稳定性：受扰偏航，扰动消失后恢复原姿态。"},{"id":395,"ch":5,"cat":"飞行原理3","q":"____频段可用于无人机系统的上行遥控链路","opts":["A 1430-1446MHz","B 840.5-845MHz","C 2408-2440MHz"],"ans":1,"exp":"840.5-845MHz可用于上行遥控链路。"},{"id":396,"ch":5,"cat":"飞行原理3","q":"使飞机绕横轴转动的力矩称为","opts":["A 倾斜力矩","B 俯仰力矩","C 滚转力矩"],"ans":1,"exp":"绕横轴的力矩为俯仰力矩。"},{"id":397,"ch":5,"cat":"飞行原理3","q":"具有负静安定性的飞机，当受到扰动使平衡状态变化后，有","opts":["A 保持偏离后的平衡状态的趋势","B 回到原平衡状态的趋势","C 继续偏离原平衡状态的趋势"],"ans":2,"exp":"负静安定性：受扰后继续偏离原状态。"},{"id":398,"ch":5,"cat":"飞行原理3","q":"飞机离地速度越小，则","opts":["A 滑跑距离越长，飞机的起飞性能越好","B 滑跑距离越短，飞机的起飞性能越差","C 滑跑距离越短，飞机的起飞性能越好"],"ans":2,"exp":"离地速度小→滑跑距离短→起飞性能好。"},{"id":399,"ch":6,"cat":"法律法规","q":"农业作业飞行的最低天气标准，平原地区是","opts":["A 云高不低于200米，能见度不小于5公里","B 云高不低于150米，能见度不小于5公里","C 云高不低于100米，能见度不小于3公里"],"ans":0,"exp":"平原地区农业作业最低天气标准：云高≥200m，能见度≥5km。"},{"id":400,"ch":6,"cat":"法律法规","q":"下列情况下，无人机系统驾驶员不实施管理","opts":["A 在融合空域运行的IV级别无人机","B 超视距运行的I类无人机","C 视距内运行的II类无人机"],"ans":2,"exp":"II类视距内运行由行业协会管理，局方不直接实施管理。"},{"id":401,"ch":6,"cat":"法律法规","q":"无人机适航证书不可____","opts":["A 随无人机系统携带","B 存放备查","C 随飞机一起转让"],"ans":1,"exp":"适航证书需随机携带，不可仅存放备查。"},{"id":402,"ch":6,"cat":"法律法规","q":"飞行教员不需要记录的内容为","opts":["A 被授予单飞权利的每个人的姓名、签字日期及航空器型号","B 教学的内容、课时、日期和航空器型号","C 推荐参加考试的每个人的姓名、考试种类、日期和结果"],"ans":1,"exp":"教学内容、课时等不是教员记录本必须记录的内容。"},{"id":403,"ch":6,"cat":"法律法规","q":"在什么条件下飞行教员方可在学生驾驶员飞行经历记录本上签字，批准其单飞","opts":["A 亲自提供了所要求的飞行训练，确认学员能够遵守限制，已做好安全单飞准备","B 亲自或委托具备资格的飞行教员提供了训练","C 亲自或委托具备资格的飞行教员提供了训练，同时需得到检查教员的认可"],"ans":0,"exp":"飞行教员必须亲自提供训练并确认学员安全才能签字。"},{"id":404,"ch":6,"cat":"法律法规","q":"II级别无人机指","opts":["A 1.5公斤<空机质量<4kg，1.5公斤<起飞全重≤7kg，超视距运行的","B 1.5公斤<空机质量<7kg，1.5公斤<起飞全重≤15kg","C 1.5公斤<空机质量<4kg，1.5公斤<起飞全重<7kg，视距内运行的"],"ans":2,"exp":"II级别：1.5kg<空机质量<4kg，1.5kg<起飞全重<7kg，视距内运行。"},{"id":405,"ch":6,"cat":"法律法规","q":"由授权教员签字批准单飞后的学员，单飞训练时间应体现为","opts":["A 副驾驶时间","B 机长时间","C 单飞时间"],"ans":2,"exp":"单飞训练时间应记录为单飞时间。"},{"id":406,"ch":6,"cat":"法律法规","q":"飞行人员未按规定履行职责情节严重的，吊扣执照____或责令停飞____","opts":["A 半年，一至三个月","B 一至三个月，半年","C 一至六个月，一至三个月"],"ans":2,"exp":"情节严重可吊扣执照1-6个月，责令停飞1-3个月。"},{"id":407,"ch":6,"cat":"法律法规","q":"无人机系统无线电资源的使用____局方无线电管理部门的许可证","opts":["A 一般情况下不需要","B 不需要","C 需要"],"ans":2,"exp":"无人机无线电资源使用需要取得相关许可证。"},{"id":408,"ch":6,"cat":"法律法规","q":"民用航空器因故确需偏离指定的航路或者改变飞行高度飞行时，应当首先","opts":["A 取得机组的一致同意","B 取得空中交通管制单位的许可","C 得到机长的允许"],"ans":1,"exp":"偏离航路或改变高度需首先取得空管单位许可。"},{"id":409,"ch":6,"cat":"法律法规","q":"违反条例规定，下列哪些情形下依法追究刑事责任:1未经批准擅自飞行;2未按批准计划飞行;3不及时报告飞行动态;4未经批准飞入限制区、危险区","opts":["A 1、2、4","B 1、3、4","C 1、2、3、4"],"ans":2,"exp":"以上四种情形均可能被追究刑事责任。"},{"id":410,"ch":6,"cat":"法律法规","q":"执行昼间专业任务的航空器，在山区进行作业飞行时，着陆时间最晚不得晚于日落前","opts":["A 15分钟","B 20分钟","C 10分钟"],"ans":0,"exp":"山区作业着陆最晚不得晚于日落前15分钟。"},{"id":411,"ch":6,"cat":"法律法规","q":"飞行教员合格证申请人必须年满","opts":["A 20周岁","B 21周岁","C 18周岁"],"ans":2,"exp":"飞行教员合格证申请人须年满18周岁。"},{"id":412,"ch":6,"cat":"法律法规","q":"视距外运行出现失控，机长应执行预案包括:1应急回收程序;2接入云系统上报;3联系空管部门","opts":["A 2、3","B 1、3","C 1、2、3"],"ans":2,"exp":"以上三项均是失控时应执行的预案。"},{"id":413,"ch":6,"cat":"法律法规","q":"下列说法正确的是","opts":["A 除非具有局方委任资格，否则飞行教员不得为自己进行任何签字","B 飞行教员不得为自己进行任何签字","C 在特别授权后，飞行教员可以为自己进行签字"],"ans":1,"exp":"飞行教员绝对不得为自己进行任何签字。"},{"id":414,"ch":6,"cat":"法律法规","q":"涉及酒精或药物的违禁行为，自发生之日起____内，局方将不接受执照申请","opts":["A 半年","B 一年","C 两年"],"ans":1,"exp":"涉酒精/药物违禁行为发生后一年内不接受执照申请。"},{"id":415,"ch":6,"cat":"法律法规","q":"参加理论考试或实践考试的申请人在参加考试前","opts":["A 应当具有授权教员签注的训练证明","B 以上二者缺一不可","C 应当具有授权教员推荐其参加考试的证明"],"ans":1,"exp":"既需训练证明也需推荐证明，二者缺一不可。"},{"id":416,"ch":6,"cat":"法律法规","q":"目前正在推进空域管理改革，预计划分三类空域，为____","opts":["A 管制空域、监视空域和报告空域","B 管制空域、非管制空域和特殊空域","C 管制空域、非管制空域和报告空域"],"ans":0,"exp":"三类空域：管制空域、监视空域和报告空域。"},{"id":417,"ch":6,"cat":"法律法规","q":"在融合空域运行的大型无人机机长，应至少持有","opts":["A 航线运输执照","B 商照和仪表等级","C 商照"],"ans":0,"exp":"融合空域大型无人机机长需航线运输执照。"},{"id":418,"ch":6,"cat":"法律法规","q":"在融合空域3000米以上运行的小型无人机驾驶员，应至少持有","opts":["A 私照","B 商照","C 航线运输执照"],"ans":1,"exp":"融合空域3000米以上小型无人机需商照。"},{"id":419,"ch":6,"cat":"法律法规","q":"在一个划定的管制空域内，由____负责该空域内的航空器的空中交通管制","opts":["A 军航或民航的一个空中交通管制单位","B 军航和民航的各一个空中交通管制单位","C 军航的一个空中交通管制单位"],"ans":0,"exp":"一个管制空域由一个管制单位负责。"},{"id":420,"ch":6,"cat":"法律法规","q":"在融合空域运行的XI级别无人机驾驶员，应至少持有","opts":["A 商照","B 私照","C 商照和仪表等级"],"ans":2,"exp":"融合空域XI级别需商照和仪表等级。"},{"id":421,"ch":6,"cat":"法律法规","q":"飞行的组织与实施包括","opts":["A 飞行直接准备、飞行实施和飞行讲评三个阶段","B 飞行预先准备、飞行准备和飞行实施三个阶段","C 飞行预先准备、飞行直接准备、飞行实施和飞行讲评四个阶段"],"ans":2,"exp":"飞行组织实施分四个阶段。"},{"id":422,"ch":6,"cat":"法律法规","q":"《民用无人驾驶航空器实名制登记管理规定》颁布于","opts":["A 2015年12月29日","B 2017年1月1日","C 2017年5月6日"],"ans":2,"exp":"实名登记规定于2017年5月6日颁布。"},{"id":423,"ch":6,"cat":"法律法规","q":"由授权教员为学员提供的带飞训练，应体现为","opts":["A 副驾驶时间","B 机长时间","C 带飞时间"],"ans":2,"exp":"带飞训练记录为带飞时间。"},{"id":424,"ch":6,"cat":"法律法规","q":"航空器与ATC进行第一次无线电联络时，应当首先呼叫","opts":["A 航空器的注册号","B 航空器的机型","C 所需联系的ATC的名称"],"ans":2,"exp":"首次联络应先呼叫ATC名称。"},{"id":425,"ch":6,"cat":"法律法规","q":"谁对民用无人驾驶航空器系统的维护负责","opts":["A 机长","B 运行人","C 签派"],"ans":1,"exp":"运行人（运营人）对无人机系统的维护负责。"},{"id":426,"ch":6,"cat":"法律法规","q":"下列情况下，无人机系统驾驶员由行业协会实施管理","opts":["A II级别无人机","B 在隔离空域内超视距运行的无人机","C 在融合空域运行的XI级别无人机"],"ans":1,"exp":"隔离空域超视距运行由行业协会管理。"},{"id":427,"ch":6,"cat":"法律法规","q":"对于民用无人机试验飞行，以下正确的是","opts":["A 试验飞行可经批准于人口稠密区上空进行","B 禁止无人机在未获得特殊批准下试验飞行","C 应在空中交通不繁忙的开阔水面或人口稀少区域上空实施"],"ans":2,"exp":"试验飞行应在开阔水面或人口稀少区域进行。"},{"id":428,"ch":6,"cat":"法律法规","q":"执行昼间专业任务的航空器，在山区作业飞行时，起飞时间最早不得早于日出前","opts":["A 10分钟","B 20分钟","C 15分钟"],"ans":1,"exp":"山区作业起飞最早不得早于日出前20分钟。"},{"id":429,"ch":6,"cat":"法律法规","q":"关于民用航空器国籍正确的是","opts":["A 自外国租赁的民用航空器不能申请我国国籍","B 民用航空器可以不进行国籍登记而投入运行","C 民用航空器只能具有一国国籍"],"ans":2,"exp":"民用航空器只能具有一国国籍。"},{"id":430,"ch":6,"cat":"法律法规","q":"如果一本《无人机飞行手册》没有注明具体的无人机序号和注册信息，则","opts":["A 手册可以部分作为该机飞行参考指导","B 手册可以作为该机飞行的参考指导","C 手册只能用于一般学习用途"],"ans":2,"exp":"未注明具体信息的飞行手册只能用于一般学习。"},{"id":431,"ch":6,"cat":"法律法规","q":"谁对民用无人机系统运行遵守飞行基本规则负责","opts":["A 机长","B 民航局及其地区管理局","C 航空单位负责人"],"ans":0,"exp":"机长对无人机运行遵守飞行规则负责。"},{"id":432,"ch":6,"cat":"法律法规","q":"对于I、II级别无人机系统驾驶员","opts":["A 人员资质由行业协会负责管理","B 人员资质由局方负责管理","C 无须证照管理，自行负责"],"ans":2,"exp":"I、II级别无人机驾驶员无须证照管理，自行负责。"},{"id":433,"ch":6,"cat":"法律法规","q":"无人机的注册所有者应将永久邮寄地址的变更、无人机的销售和____等通知局方注册处","opts":["A 无人机维修","B 试验试飞","C 无人机注册证书丢失"],"ans":2,"exp":"注册证书丢失需通知局方注册处。"},{"id":434,"ch":6,"cat":"法律法规","q":"学生驾驶员在单飞之前，有授权教员的签字，证明其在单飞日期之前____天内接受了训练","opts":["A 60","B 30","C 90"],"ans":2,"exp":"单飞前90天内需接受所飞型号航空器的训练。"},{"id":435,"ch":6,"cat":"法律法规","q":"空域通常划分为1机场飞行空域2航路、航线3空中禁区、空中限制区和空中危险区","opts":["A 1、3","B 1、2、3","C 1、2"],"ans":0,"exp":"空域划分包括机场飞行空域和禁区/限制区/危险区。"},{"id":436,"ch":6,"cat":"法律法规","q":"民用航空器的适航管理由____负责","opts":["A 国务院","B 中央军委","C 民航局"],"ans":2,"exp":""},{"id":437,"ch":6,"cat":"法律法规","q":"电子围栏的功能包括:1阻挡侵入;2阻挡离开;3报警功能","opts":["A 1、2、3","B 1、2","C 1、3"],"ans":2,"exp":"电子围栏功能：阻挡侵入和报警，不阻挡离开。"},{"id":438,"ch":6,"cat":"法律法规","q":"飞行任务书由____签发","opts":["A 驻机场航空单位的运行管理部门","B 驻机场航空单位的调度或签派部门","C 驻机场航空单位的负责人"],"ans":1,"exp":"飞行任务书由调度或签派部门签发。"},{"id":439,"ch":6,"cat":"法律法规","q":"无人机飞行前，无人机飞行员","opts":["A 按照积累的经验指导飞行","B 按照随机《无人机飞行手册》指导飞行","C 重点参考《无人机所有者/信息手册》"],"ans":1,"exp":"飞行前应按照随机飞行手册指导飞行。"},{"id":440,"ch":6,"cat":"法律法规","q":"依法取得中华人民共和国国籍的民用航空器，应当标明规定的国籍标志和","opts":["A 机型标志","B 登记标志","C 公司标志"],"ans":1,"exp":"应标明国籍标志和登记标志（注册号）。"},{"id":441,"ch":6,"cat":"法律法规","q":"经验表明无人机每飞行____小时需要预防性维护，至少____小时进行较小维护","opts":["A 25、40","B 30、6
