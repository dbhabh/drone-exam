"opts": ["A 100/50", "B 120/500", "C 500/120"], "ans": 2, "exp": "视距内运行：半径500m，相对高度低?20m"}, {"id": 513, "ch": 6, "cat": "法律法规", "q": "无人机驾驶员在执行飞行任务时，应当随身携", "opts": ["A 驾驶员执照或合格", "B 飞机适航证书", "C 飞行记录"], "ans": 0, "exp": "驾驶员需随身携带执照或合格证"}, {"id": 514, "ch": 6, "cat": "法律法规", "q": "空中交管制单位为飞行中的民用航空器提供的空中交服务中含有", "opts": ["A 飞行情报服务", "B 机场保障服务", "C 导航服务"], "ans": 0, "exp": "空中交服务包含飞行情报服务"}, {"id": 515, "ch": 6, "cat": "法律法规", "q": "无人直升机或多旋翼飞行器飞行时间的含义是", "opts": ["A 起飞离地到着陆接地的瞬间", "B 旋翼弢始转动至旋翼停止转动的瞬", "C 起飞滑跑至着陆滑跑终止的瞬间"], "ans": 1, "exp": "旋翼飞行器飞行时间从旋翼转动到停歃69"}, {"id": 516, "ch": 6, "cat": "法律法规", "q": "CCA61部授权的执照或合格证持有人在理论考试中作弊或发生其他禁止行为，局?授权?拒绝其任何执照合格证或等级申请期限为", "opts": ["A 半年", "B 视其违规的情节轻重定", "C 丢"], "ans": 2, "exp": "作弊行为拒绝申请期限为一年"}, {"id": 517, "ch": 6, "cat": "法律法规", "q": "任何单位或个人设计民用航空器应当向民航局申请____", "opts": ["A 适航", "B 生产许可", "C 型号合格"], "ans": 2, "exp": "设计民用航空器需申请型号合格证（TC）"}, {"id": 518, "ch": 6, "cat": "法律法规", "q": "植保无人机级别为", "opts": ["A V", "B IV", "C VI"], "ans": 0, "exp": "植保无人机属于V类无人机"}, {"id": 519, "ch": 6, "cat": "法律法规", "q": "无识别标志的航空器因特殊情况霢要飞行的", "opts": ["A 必须经中国人民解放军空军批准", "B 必须经相关管制单位批", "C 必须经中国民用航空局空中交管理局批准"], "ans": 0, "exp": "无识别标志航空器飞行须经空军批准"}, {"id": 520, "ch": 6, "cat": "法律法规", "q": "民用无人机的空机重量包含", "opts": ["A 不包含载荷燃料的无人机重", "B 不包含载荷电池和燃料的无人机重量", "C 不包含载荷的无人机重"], "ans": 0, "exp": "空机重量不含载荷和燃料，但含电池（电动）。按原题答案A"}, {"id": 521, "ch": 7, "cat": "气象", "q": "对流层中，按气流和天气现象分布的特点，可分为下中、上三个层次，代表对流层中层气流的基本趋势是", "opts": ["A 气流相对平稳", "B 水汽含量很少", "C 气流混乱"], "ans": 0, "exp": "对流层中层气流相对平稳，下层受地形影响大，上层受高空急流影响"}, {"id": 522, "ch": 7, "cat": "气象", "q": "在山区飞行时应当注意，最强的乱流朢多出现在", "opts": ["A 山的迎风", "B 山顶", "C 山谷中间"], "ans": 2, "exp": "山谷中间气流受两侧山体挤压和摩擦，乱流最强按原题答案C"}, {"id": 523, "ch": 7, "cat": "气象", "q": "气温、气压和空气湿度的变化都会对飞机性能和仪表指示成丢定的影响，这种影响主要过他们对空气密度的影响而实现，下列描述哪个正确", "opts": ["A 空气密度与气压成正比，与气温成反", "B 空气密度与气压成反比，与气温成正", "C 空气密度与气压成正比，与气温也成正比"], "ans": 0, "exp": "密度=气压/(气体常数×温度)，与气压成正比，与温度成反比"}, {"id": 524, "ch": 7, "cat": "气象", "q": "三大气象要素", "opts": ["A 气温、风和云", "B 风云和降", "C 气温、气压和空气湿度"], "ans": 2, "exp": "三大气象要素：气温气压空气湿度"}, {"id": 525, "ch": 7, "cat": "气象", "q": "锋是三度空间的天气系统下面描述错误的", "opts": ["A 锋面和锋线统称为", "B 凡伸到对流层中上层，称为层流", "C 锋面与地面的交线称为锋线"], "ans": 1, "exp": "伸到对流层中上层的锋称为对流层锋，不是层流锋"}, {"id": 526, "ch": 7, "cat": "气象", "q": "雷暴处于发展阶段", "opts": ["A 地面气压持续上升", "B 地面气压保持不变", "C 地面气压持续下降"], "ans": 2, "exp": "雷暴发展阶段：上升气流强→地面气压下降"}, {"id": 527, "ch": 7, "cat": "气象", "q": "山地对风的影响，以下描述错误的是", "opts": ["A 山体本身的障碍影响，使气流被阻滞不前", "B 丢般山底和峡谷风口的风速增", "C 丢般山顶和峡谷风口的风速增"], "ans": 1, "exp": "山顶和峡谷风口风速增大，山底风常减小。B说反了"}, {"id": 528, "ch": 7, "cat": "气象", "q": "进气道结冰将导致危险的后果，下列描述不正确的", "opts": ["A 冰屑脱离，进入压气机，成压气机的机械损伤", "B 结冰堵塞进气道，使得进入压气机的气流明显减少，导致发动机富油停车", "C 使进气度场不均匀分布和使气流发生屢部分离，引起压气机叶片的振动"], "ans": 1, "exp": "进气道堵塞使气流减少，发动机会贫油停车非富油"}, {"id": 529, "ch": 7, "cat": "气象", "q": "大气稳定度指整层空气的稳定程度，以哪种运动来判定", "opts": ["A 以大气的气温垂直加度运动来判", "B 以大气的气温垂直速度运动来判", "C 以大气的气压垂直速度运动来判"], "ans": 0, "exp": "大气稳定度过气温垂直递减率（温度垂直变化）来判定"}, {"id": 530, "ch": 7, "cat": "气象", "q": "飞机按气压式高度表指示的丢定高度飞行，在飞向低压区时，飞机的实际高度将", "opts": ["A 保持不变", "B 逐渐升高", "C 逐渐降低"], "ans": 2, "exp": "飞向低压区→气压降低→高度表指示偏高→实际高度降低"}, {"id": 531, "ch": 7, "cat": "气象", "q": "目视判断风切变的参照物，以下不正确的", "opts": ["A 雷暴云体下垂的雨", "B 雷暴冷外流气流的尘卷", "C 卷积云带来的降雨"], "ans": 2, "exp": "卷积云是高云，不带来降雨，也不是风切变参照物"}, {"id": 532, "ch": 7, "cat": "气象", "q": "形成海陆风的对流性环流的原因是因", "opts": ["A 从水面吹向陆地的空气较暖，密度小，导致空气上", "B 陆地吸收和散发热量比水面", "C 从水面吹向陆地的空气冷，密度大，使空气上"], "ans": 1, "exp": "海陆风的根本原因是陆地和水面热力性质差异"}, {"id": 533, "ch": 7, "cat": "气象", "q": "气压传感器测的是以下哪个高度", "opts": ["A 海拔高度", "B 无线电高", "C 相对高度"], "ans": 2, "exp": "气压传感器测量的是相对高度（相对于基准气压面的高度）"}, {"id": 534, "ch": 7, "cat": "气象", "q": "朢小能见度是指", "opts": ["A 能见度因方向而异时，垂直和水平能见度朢小的距离", "B 能见度因方向而异时，其中朢小的能见距离", "C 能看到最近的物体距离"], "ans": 1, "exp": "朢小能见度是各方向中能见距离的朢小"}, {"id": 535, "ch": 7, "cat": "气象", "q": "白天，山岩地、沙地城市地区比水面、草地升温快，空气受热上升这种现象会引起", "opts": ["A 温差作用", "B 热力对流冲击", "C 压差作用"], "ans": 1, "exp": "地表受热不均产生热力对流冲击力，引发上升运动"}, {"id": 536, "ch": 7, "cat": "气象", "q": "气团是指气象要素在水平分布上比较均匀的大范围空气囃69下列不正确的是", "opts": ["A 垂直范围", "B 水平温度梯度", "C 水平范围"], "ans": 1, "exp": "气团内部水平温度梯度小（均匀），不是大"}, {"id": 537, "ch": 7, "cat": "气象", "q": "飞机在着陆时遇到顺风切变，会出现下述何种现象", "opts": ["A 飞机空突然减小，升力减小，飞机将掉至正常下滑线以", "B 飞机空突然增大，升力增加，飞机抬", "C 飞机高度下降，空速增大，超过正常睢陆点睢"], "ans": 0, "exp": "顺风切变→顺风突增→空减小→升力减小→飞机下沉"}, {"id": 538, "ch": 7, "cat": "气象", "q": "使原来静止的空气产生垂直运动的作用力，称", "opts": ["A 热力作用", "B 气动作用", "C 对流冲击"], "ans": 2, "exp": "使静止空气产生垂直运动的力称为对流冲击力"}, {"id": 539, "ch": 7, "cat": "气象", "q": "关于风切变出现的地方，下述说法正确的", "opts": ["A 在大气中任何高度上存在风向或风变化的地方", "B 在气压和温度急剧下降的地方出", "C 仅在雷暴中出"], "ans": 0, "exp": "风切变在任何高度、任何天气条件下都可能出现"}, {"id": 540, "ch": 7, "cat": "气象", "q": "在重要天气预告图上用黑色的断线围起来的区域，表示", "opts": ["A 晴天积云", "B 西风急流", "C 晴空颠簸"], "ans": 2, "exp": "重要天气图上黑色断线区域表示晴空颠簸区"}, {"id": 541, "ch": 7, "cat": "气象", "q": "下面大气分层的主要依据哪个是正确", "opts": ["A 气层中风的垂直变化特", "B 气层气温的垂直分布特", "C 气层气压的垂直分布特"], "ans": 1, "exp": "大气分层主要依据气温的垂直分布特点"}, {"id": 542, "ch": 7, "cat": "气象", "q": "卫星云图上下列哪个不是卷状云特征", "opts": ["A 在红外云图上，卷云顶温度很低，呈白色", "B 无论可见光还是红外云图，卷云没有纤维结构", "C 在可见光云图上，卷云呈灰-深灰"], "ans": 1, "exp": "卷云具有纤维状结构，这是其典型特征B说反了"}, {"id": 543, "ch": 7, "cat": "气象", "q": "低空风切变距地面丢般为", "opts": ["A 小于100", "B 小于1000", "C 小于500"], "ans": 2, "exp": "低空风切变一般指距地?00米以内的风切变"}, {"id": 544, "ch": 7, "cat": "气象", "q": "在山地背风坡中的下降气流中飞行时，除造成飞机掉高度外，还可成严重危害的原因是", "opts": ["A 地减", "B 空表误差增大", "C 气压式高度表读数高于实际高度"], "ans": 2, "exp": "下降气流→气压升高→高度表读数偏高→实际高度更低"}, {"id": 545, "ch": 7, "cat": "气象", "q": "在雷暴的生存周期中，哪一阶段的特征使云中充满下降气流", "opts": ["A 消散阶段", "B 成熟阶段", "C 积云阶段"], "ans": 0, "exp": "消散阶段云中充满下降气流，降水最强"}, {"id": 546, "ch": 7, "cat": "气象", "q": "热雷暴的形成原因", "opts": ["A 地面受热不均", "B 冷空气冲击暖空气而形成上升运", "C 地面水汽蒸发"], "ans": 0, "exp": "热雷暴因地面受热不均产生强烈热力对流而形成"}, {"id": 547, "ch": 7, "cat": "气象", "q": "飞行高度不同，飞机积冰频率也不同，以下正确的", "opts": ["A 冬季?000米以上各高度上飞行时，积冰几乎占56%", "B ?000米以上高度上飞行时，积冰?6%", "C 冬季?000米以下各高度上飞行时，积冰几乎占56%"], "ans": 2, "exp": "积冰多发生在3000米以下，?6%左右"}, {"id": 548, "ch": 7, "cat": "气象", "q": "在风中全马力飞行的固定翼民用无人", "opts": ["A 逆风飞行时地速较", "B 顺风逆风地相", "C 顺风飞行时地速较"], "ans": 2, "exp": "地?空±风速，顺风地大，风地小"}, {"id": 549, "ch": 7, "cat": "气象", "q": "当气温高于标准大气温度时，飞机的载重量要", "opts": ["A 减小", "B 保持不变", "C 增加"], "ans": 0, "exp": "气温高→空气密度小→升力减小→载重量减小"}, {"id": 550, "ch": 7, "cat": "气象", "q": "同一架无人机于某日中午和傍晚进行两次GPS高度200米的飞行，地面基准气压相同的前提", "opts": ["A 傍晚的气压高度高", "B 中午和傍晚的气压高度丢样高", "C 中午的气压高度高"], "ans": 2, "exp": "中午气温高→空气密度小→气压高度表指示偏高"}, {"id": 551, "ch": 7, "cat": "气象", "q": "从什么资料上可以预先了解到航线高度的风云、气温及颠簸、积冰等情况", "opts": ["A 航路天气预告", "B 等压面预告图", "C 重要天气预告"], "ans": 0, "exp": "航路天气预告图提供航线高度上的详细天气信息"}, {"id": 552, "ch": 7, "cat": "气象", "q": "飞机按气压式高度表指示的丢定高度飞行，在飞向低压区时，飞机的实际高度将", "opts": ["A 逐渐升高", "B 保持不变", "C 逐渐降低"], "ans": 2, "exp": "飞向低压区→高度表指示偏高→实际高度降低"}, {"id": 553, "ch": 7, "cat": "气象", "q": "下列说法正确的是", "opts": ["A 是风产生了压力，扢以风的尽头压力高", "B 因为空气总是寻找低压区域，所以气流会从高压区域向低压的区域流", "C 因为空气总是寻找高压区域，所以气流会从低压区域向高压的区域流"], "ans": 1, "exp": "气压梯度力使空气从高压流向低压"}, {"id": 554, "ch": 7, "cat": "气象", "q": "当在山谷、山脊或山区作低空飞行时，在仢么时候最容易碰到乱流造成的危", "opts": ["A 在山的迎风面逆风飞行", "B 在山的背风面顺风飞行", "C 在山的背风面逆风飞行"], "ans": 1, "exp": "背风面顺风飞行时朢容易遇到下降气流和乱流"}, {"id": 555, "ch": 7, "cat": "气象", "q": "平流层对航空活动有利的方面是", "opts": ["A 气流平稳、能见度好空气阻力小", "B 气温低飞机载重量增加、飞机真空增", "C 气流平稳、无恶劣天气、发动机推力增大"], "ans": 0, "exp": "平流层气流平稳能见度好空气稀薄阻力小，但发动机推力减小"}, {"id": 556, "ch": 7, "cat": "气象", "q": "飞机在着陆时突然遇到逆风切变，会出现下述何种现象", "opts": ["A 飞机高度下降，空速减小，未到正常睢陆点即提前着", "B 飞机空突然减小，升力减小，飞机将掉至正常下滑线以", "C 飞机空突然增大，升力增加，飞机上仰并上升到下滑线之上"], "ans": 2, "exp": "逆风切变→风突增→空速增大→升力增加→飞机上升"}, {"id": 557, "ch": 7, "cat": "气象", "q": "气象台发布的风向标有SE，为", "opts": ["A 西北", "B 西南", "C 东南"], "ans": 2, "exp": "SE=Southeast=东南风风向指风的来向"}, {"id": 558, "ch": 7, "cat": "气象", "q": "低空风切变距地面丢般约", "opts": ["A 800", "B 300", "C 600"], "ans": 2, "exp": "低空风切变一般指距地面约600米以内的风切变"}, {"id": 559, "ch": 7, "cat": "气象", "q": "地球自转产生的地球自转偏向力对风向产生影响，下列哪个是正确的", "opts": ["A 北半球，地球自转偏向力使得气流向西偏", "B 北半球，地球自转偏向力使得气流向东偏", "C 北半球，地球自转偏向力使得气流先向东再向西偏"], "ans": 1, "exp": "北半球地转偏向力使气流向右（东）偏转"}, {"id": 560, "ch": 7, "cat": "气象", "q": "在山区飞行时应当注意，最强的乱流出现", "opts": ["A 山谷中间", "B 山的背风", "C 山的迎风"], "ans": 1, "exp": "背风坡气流分离产生强烈乱流按原题答案B"}, {"id": 561, "ch": 7, "cat": "气象", "q": "相对湿度，是", "opts": ["A 空气中水汽压与饱和水汽压的百分比", "B 空气中水分占空气总量的百分比", "C 空气中水汽含量与饱和水汽含量的百分比"], "ans": 0, "exp": "相对湿度=实际水汽?饱和水汽压?00%"}, {"id": 562, "ch": 7, "cat": "气象", "q": "能见度不好的天气，一般风", "opts": ["A 较强", "B 较弱", "C 混乱"], "ans": 1, "exp": "能见度不好（雾霾等）时常风力较弱，大气稳定"}, {"id": 563, "ch": 7, "cat": "气象", "q": "卫星云图上下列哪个不是中云特", "opts": ["A 在红外云图上，中云呈深灰色，介于高低云之间的色调", "B 在可见光云图上，中云呈灰白色到白色，色调的差异判定云的厚", "C 在卫星云图上，中云与天气系统相连，表现为大范围的带状、涡旋状、点"], "ans": 0, "exp": "红外云图上中云呈灰色而非深灰色A描述不准确"}, {"id": 564, "ch": 7, "cat": "气象", "q": "地面天气图上填写的气压是", "opts": ["A 本站气压", "B 海平面气", "C 场面气压"], "ans": 1, "exp": "地面天气图填写的是订正到海平面的气压"}, {"id": 565, "ch": 7, "cat": "气象", "q": "雷暴到达成熟阶段以后，阵风风速常", "opts": ["A 30m/s", "B 10m/s", "C 20m/s"], "ans": 2, "exp": "雷暴成熟阶段阵风风常?0m/s左右"}, {"id": 566, "ch": 7, "cat": "气象", "q": "丢般雷暴单体的生命史根据垂直气流状况可分为三个阶段", "opts": ["A 温升阶段、降雨阶段消散阶", "B 积云阶段、成风阶段雷雨阶", "C 积云阶段、成熟阶段消散阶"], "ans": 2, "exp": "雷暴三阶段：积云阶段（发展）、成熟阶段消散阶段"}, {"id": 567, "ch": 7, "cat": "气象", "q": "雷暴对飞机产生很大危害，下列危害不确切的", "opts": ["A 风切变和湍流", "B 雷击和冰雹袭", "C 数据链中"], "ans": 2, "exp": "数据链中断不是雷暴对飞机的直接危害"}, {"id": 568, "ch": 7, "cat": "气象", "q": "对流层中的平均气温垂直减率为", "opts": ["A 0.5°C/100m", "B 6.5°C/100m", "C 0.65°C/100m"], "ans": 2, "exp": "标准大气对流层平均减?.65°C/100m"}, {"id": 569, "ch": 7, "cat": "气象", "q": "天气预报可分为哪些，以下不正确的", "opts": ["A 气象要素预报", "B 天气形势预报", "C 大风降温预报"], "ans": 2, "exp": "天气预报分天气形势预报和气象要素预报，大风降温是具体内容不是分类"}, {"id": 570, "ch": 7, "cat": "气象", "q": "关于飞机积冰，下列正确的", "opts": ["A 飞机积冰丢般发生在-1~-15°C的温度范围内", "B 强烈的积冰主要发生在-4~-8°C的温度范围内", "C ?2~-10°C温度范围内遭遇积冰的次数朢"], "ans": 2, "exp": "-2~-10°C是积冰发生最频繁的温度范围"}, {"id": 571, "ch": 7, "cat": "气象", "q": "大气压力的降低对飞机性能有显著的影响。在较高的高度，伴随睢降低的大气压", "opts": ["A 起飞和着陆距离会减小，爬升率也会减小", "B 起飞和着陆距离会增加，爬升率也会增加", "C 起飞和着陆距离会增加，爬升率会减"], "ans": 2, "exp": "气压低→空气密度小→升力小→起飞睢陆距离增加，爬升率减小"}, {"id": 572, "ch": 7, "cat": "气象", "q": "气象上的风向是指", "opts": ["A 风的来向", "B 气压梯度力的方向", "C 风的去向"], "ans": 0, "exp": "气象风向指风的来向（如北风从北向南吹）"}, {"id": 573, "ch": 7, "cat": "气象", "q": "18000英尺高度的大气重量仅仅是海平面时", "opts": ["A 三分之一", "B 丢", "C 四分之一"], "ans": 1, "exp": "18000英尺（约5500米）大气压力约为海平面的丢半"}, {"id": 574, "ch": 7, "cat": "气象", "q": "飞机在着陆时突然遇到逆风切变，会出现下述何种现象", "opts": ["A 飞机空突然减小，升力减小，飞机将掉至正常下滑线以", "B 飞机高度下降，空速减小，未到正常睢陆点即提前着", "C 飞机空突然增大，升力增加，飞机上仰并上升到下滑线之上"], "ans": 2, "exp": "逆风切变→风突增→空速增大→升力增加→飞机上仰"}, {"id": 575, "ch": 7, "cat": "气象", "q": "机场上空高度较低的云会直接影响飞机的起降。其中，危害朢大的云是", "opts": ["A 卷状", "B 层状", "C 对流"], "ans": 2, "exp": "对流云（积雨云）带来颠簸、风切变、雷击等，危害最大"}, {"id": 576, "ch": 7, "cat": "气象", "q": "现有民用无人机多数在大气的哪丢层内运行", "opts": ["A 平流", "B 热层", "C 对流"], "ans": 2, "exp": "民用无人机多数在对流层内运行"}, {"id": 577, "ch": 7, "cat": "气象", "q": "在实际运用中，常使用气温的垂直减率单位为", "opts": ["A °C/1000m", "B °C/500m", "C °C/100m"], "ans": 2, "exp": "气温垂直递减率常用°C/100m表示"}, {"id": 578, "ch": 7, "cat": "气象", "q": "雷暴是由强烈的积雨云产生的，形成强烈的积雨云霢要三个条", "opts": ["A 深厚而明显的不稳定气层充沛的水气、足够的冲击", "B 强大的风力充沛的水气、足够的冲击", "C 深厚而明显的不稳定气层剧烈的温差、足够的冲击"], "ans": 0, "exp": "积雨云三条件：不稳定气层、充沛水汽足够的冲击力（抬升机制）"}, {"id": 579, "ch": 7, "cat": "气象", "q": "下列哪种属于动力对流冲击", "opts": ["A 山坡迎风面对空气的抬", "B 气温变化造成的空气抬升或下降", "C 气流辐合辐散时成的空气水平运"], "ans": 0, "exp": "山坡迎风面对空气的抬升属于动力对流冲击力。B属于热力对流"}, {"id": 580, "ch": 7, "cat": "气象", "q": "某个风力标志箭头长的像F，并且两个横杠一样长，代", "opts": ["A 2级风", "B 3级风", "C 4级风"], "ans": 2, "exp": "F标志中一个长杠为2级（10节），两个长杠为4级（20节）"}, {"id": 581, "ch": 7, "cat": "气象", "q": "气象上把气温垂直递减率等于零(即?0)的气层称", "opts": ["A 等温", "B 不稳定气", "C 逆温"], "ans": 0, "exp": "γ=0为等温层，?0为温层，γ>0为正常减"}, {"id": 582, "ch": 7, "cat": "气象", "q": "气团的分类方法正确的", "opts": ["A 暖气团和湿气", "B 冷气团和干气", "C 北冰洋气囃69极地气囃69热带气囃69赤道气"], "ans": 2, "exp": "气团按源地分类：北极、极地热带赤道气团等"}, {"id": 583, "ch": 7, "cat": "气象", "q": "空气在作水平运动时，是什么力阻止了空气直接从高压区流向低压区", "opts": ["A 惯离心力", "B 地转偏向", "C 摩擦"], "ans": 1, "exp": "地转偏向力（科里奥利力）使气流偏转，不会直接从高压流向低压"}, {"id": 584, "ch": 7, "cat": "气象", "q": "在卫星云图上，可见光云图的色调取决于", "opts": ["A 目标的温", "B 目标的高", "C 目标反射太阳辐射的大"], "ans": 2, "exp": "可见光云图色调取决于反照率（反射太阳辐射的多少）"}, {"id": 585, "ch": 7, "cat": "气象", "q": "能见度不好的天气，一般风", "opts": ["A 较强", "B 混乱", "C 较弱"], "ans": 2, "exp": "能见度差时大气稳定，风力通常较弱"}, {"id": 586, "ch": 7, "cat": "气象", "q": "在处于雷暴区边缘的机场起飞或睢陆时，要特别注意的危险天气是", "opts": ["A 冰雹和暴", "B 积冰和雷", "C 低空风切"], "ans": 2, "exp": "雷暴区边缘最危险的是低空风切变（下击暴流）"}, {"id": 587, "ch": 7, "cat": "气象", "q": "大气中的水汽含量随着高度的增加渐", "opts": ["A 增加", "B 不变", "C 减少"], "ans": 2, "exp": "水汽含量随高度增加减少，水汽主要集中在对流层低层"}, {"id": 588, "ch": 7, "cat": "气象", "q": "在温暖的天气飞行在较低高度，有时会遇上湍流空气，以下描述正确的是", "opts": ["A 在类似成片树林的广阔植被区域发生上升气流", "B 在大片水体区域发生上升气", "C 很可能在路面和荒地上空发生上升气"], "ans": 2, "exp": "路面和荒地升温快，容易产生上升气流水体和植被区升温慢，多下沉气流"}, {"id": 589, "ch": 7, "cat": "气象", "q": "当机翼和尾翼积冰时，下列不正确的描述", "opts": ["A 翼型失真(变型)", "B 导致摩擦阻力减少", "C 压差阻力都增"], "ans": 1, "exp": "积冰使表面粗糙，摩擦阻力增大而非减少"}, {"id": 590, "ch": 7, "cat": "气象", "q": "在锋面经过机场时，要特别注意的是", "opts": ["A 可能出现风沙天气", "B 可能出现高度极低的风切变", "C 雨层云中的连续小"], "ans": 1, "exp": "锋面经过时最霢注意低空风切变"}, {"id": 591, "ch": 7, "cat": "气象", "q": "在地表的风向稍微不同于地表之上几千英尺高度的风向的原因是", "opts": ["A 风和地面之间的磨擦作", "B 当地地形影响气压", "C 地面有较强的地转偏向"], "ans": 0, "exp": "地面摩擦使风向偏转风速减小，高度越高摩擦影响越小"}, {"id": 592, "ch": 7, "cat": "气象", "q": "低空风切变主要的形成原因是什", "opts": ["A 雷暴、低空流和锋面活", "B 气流经过特定环境时产", "C 具体原因还不是特别明"], "ans": 0, "exp": "低空风切变成因：雷暴下击暴流、低空流、锋面活动"}, {"id": 593, "ch": 7, "cat": "气象", "q": "机场上空高度较低的云会直接影响飞机的起降。其中，危害朢大的云是", "opts": ["A 卷状", "B 层状", "C 积状"], "ans": 2, "exp": "积状云（积雨云）危害朢大，伴随颠簸、风切变、雷击"}, {"id": 594, "ch": 7, "cat": "气象", "q": "同一架无人机于某日中午和傍晚进行两次GPS高度200米的飞行，地面基准气压相同的前提", "opts": ["A 中午的气压高度高", "B 傍晚的气压高度高", "C 丢样高"], "ans": 0, "exp": "中午气温高→密度小→气压高度表指示偏高"}, {"id": 595, "ch": 7, "cat": "气象", "q": "手抛电动固定翼民用无人机，一般在几级风以上就难以自驾飞行", "opts": ["A 2", "B 6", "C 4"], "ans": 2, "exp": "手抛固定翼无人机丢般在4级风以上难以自驾飞行"}, {"id": 596, "ch": 7, "cat": "气象", "q": "气温对飞机最大平飞度的影响为", "opts": ["A 气温低时，空气密度大，空气的阻力增加，最大平飞度减小", "B 气温低时，空气密度大，飞机发动机的推力增大，朢大平飞度增加", "C 气温高时，空气密度小，空气的阻力减小，最大平飞度增加"], "ans": 1, "exp": "气温低→密度大→发动机进气多推力大→朢大平飞度增加"}, {"id": 597, "ch": 7, "cat": "气象", "q": "同一地区对流层上界高", "opts": ["A 冬季与夏季相", "B 夏季大于冬季", "C 冬季大于夏季"], "ans": 1, "exp": "夏季温度高→对流强→对流层顶更高"}, {"id": 598, "ch": 7, "cat": "气象", "q": "严重危害飞行安全的冰雹，通常与下列何种云有联", "opts": ["A 堡状高积", "B 普雷", "C 强烈雷暴"], "ans": 2, "exp": "冰雹来自强烈发展的雷暴云（积雨云）"}, {"id": 599, "ch": 7, "cat": "气象", "q": "露点温度指空气在水汽含量和气压都不改变的条件下，冷却到饱和时的温度下述哪个正", "opts": ["A 当空气中水汽已达到饱和时，气温与露点温度相同", "B 当水汽未达到饱和时，气温丢定低于露点温", "C ?00%的相对湿度时，周围环境的温度高于露点温度"], "ans": 0, "exp": "饱和时气?露点温度；未饱和时气?露点温度"}, {"id": 600, "ch": 7, "cat": "气象", "q": "在下述何种情况下容易碰到风切", "opts": ["A 当风速大?5千米/小时", "B 逆温层附近或靠近雷暴", "C 有高气压"], "ans": 1, "exp": "逆温层附近和雷暴区是风切变高发区域"}, {"id": 601, "ch": 7, "cat": "气象", "q": "飞机在比标准大气冷的空气中飞行时，气压高度表扢示高度将比实际飞行高", "opts": ["A ", "B ", "C 相同"], "ans": 1, "exp": "冷空气密度大→气压随高度下降快→高度表指示偏低"}, {"id": 602, "ch": 7, "cat": "气象", "q": "测量大气能见度的错误方法", "opts": ["A 使用大气透射", "B 使用濢光能见度自动测量", "C 用望远镜目测"], "ans": 2, "exp": "能见度需用仪器测量，不能用望远镜目测"}, {"id": 603, "ch": 7, "cat": "气象", "q": "风吹来时，那种局地风向不断改变，风一阵大丢阵小的现象称", "opts": ["A 风切", "B 风向不定", "C 风的阵"], "ans": 2, "exp": "风向风不断变化的现象称为阵（阵风）"}, {"id": 604, "ch": 7, "cat": "气象", "q": "绝对温度的零度是", "opts": ["A -273°C", "B -273K", "C -273°F"], "ans": 0, "exp": "绝对零度=-273.15°C?273°C=0K"}, {"id": 605, "ch": 7, "cat": "气象", "q": "飞机外表面的冰霜雪等", "opts": ["A 会出现指令仰角变化和滚转", "B 会使外表面变的粗糙，增加阻力，减少升", "C 会引起飞机操纵效能增"], "ans": 1, "exp": "冰霜雪使表面粗糙→阻力增加→升力减小"}, {"id": 606, "ch": 7, "cat": "气象", "q": "根据国际气象组织的规定，云满天时的云量为", "opts": ["A 12", "B 8", "C 10"], "ans": 2, "exp": "国际气象组织规定云量?0分量，满天为10"}, {"id": 607, "ch": 7, "cat": "气象", "q": "大气系统热量的主要来源是吸收太阳辐射，下列说法哪个正", "opts": ["A 当太阳辐射过大气层时，有24%被大气直接吸", "B 当太阳辐射过大气层时，有34%被大气直接吸", "C 当太阳辐射过大气层时，有44%被大气直接吸"], "ans": 0, "exp": "太阳辐射?4%被大气直接吸收，?3%到达地面"}, {"id": 608, "ch": 7, "cat": "气象", "q": "暖锋是指", "opts": ["A 温度较高与温度较低的两个气团交汇时，温度高的丢", "B 锋面在移动过程中，暖空气推动锋面向冷气团丢侧移动的", "C 丢侧气团温度明显高于另丢侧气团温度的"], "ans": 1, "exp": "暖锋是暖空气主动向冷气团移动形成的锋"}, {"id": 609, "ch": 7, "cat": "气象", "q": "飞机积冰主要分为三大", "opts": ["A 明冰、毛冰白", "B 冰雾凇霜", "C 坚冰、松冰霜"], "ans": 1, "exp": "飞机积冰分为冰雾凇霜三大类"}, {"id": 610, "ch": 7, "cat": "气象", "q": "根据地面天气图上分析的等压线，我们能观察", "opts": ["A 槽线位置", "B 气压梯度", "C 降水区域"], "ans": 1, "exp": "等压线疏密反映气压梯度大小槽线需结合等高线分析"}, {"id": 611, "ch": 7, "cat": "气象", "q": "风切变气流常从高空下冲，当飞机进入该区域", "opts": ["A 先遇强风，后遇猛烈的上升气流，随后又是强顺风", "B 先遇强顺风，后遇猛烈的上升气流，随后又是强风", "C 先遇强风，后遇猛烈的下沉气流，随后又是强顺风"], "ans": 2, "exp": "下冲气流：先遇风（外流）→下沉气流→顺风"}, {"id": 612, "ch": 7, "cat": "气象", "q": "下述物理量中，反映大气潮湿程度的量是", "opts": ["A 相对湿度", "B 饱和水气", "C 露点温度"], "ans": 0, "exp": "相对湿度直接反映空气潮湿程度。露点温度反映绝对水汽含量"}, {"id": 613, "ch": 7, "cat": "气象", "q": "机场上常用风向袋来估计风速，当风向袋吹平时，风已", "opts": ["A 3~4?", "B 20~26?", "C 6~10?"], "ans": 2, "exp": "风向袋吹平→风约6-10m/s?-5级风）"}, {"id": 614, "ch": 7, "cat": "气象", "q": "气压丢定时，气温露点的高低可以表示", "opts": ["A 空气中凝结核的含", "B 空气的饱和程", "C 空气中的水汽含量"], "ans": 2, "exp": "露点温度直接反映空气中的水汽含量"}, {"id": 615, "ch": 7, "cat": "气象", "q": "国际上对以下哪些能见度定义是正确", "opts": ["A 烟雾的能见度定义为不?km", "B 霾的能见度为3km~5km", "C 薄雾的能见度?km~3km"], "ans": 0, "exp": "烟雾（Smoke）能见度<1km。霾（Haze?-3km，薄雾（Mist?-5km。按原题答案A"}, {"id": 616, "ch": 7, "cat": "气象", "q": "冷锋是指", "opts": ["A 冷气团主动向暖气团移动形成的锋称为冷", "B 温度较高与温度较低的两个气团交汇时，温度低的丢", "C 丢侧气团温度明显低于另丢侧气团温度的"], "ans": 0, "exp": "冷锋是冷气团主动推动暖气团形成的锋"}, {"id": 617, "ch": 7, "cat": "气象", "q": "航路天气预报通常在起飞前几小时，由飞航站气象台向机组提供", "opts": ["A 2小时", "B 3小时", "C 1小时"], "ans": 2, "exp": "航路天气预报通常在起飞前1小时提供"}, {"id": 618, "ch": 7, "cat": "气象", "q": "对流层的主要特征，哪个正", "opts": ["A 空气具有强烈的垂直混", "B 气温、湿度的水平分布均匀", "C 气温随高度不"], "ans": 0, "exp": "对流层主要特征：空气强烈的垂直混合（对流）"}, {"id": 619, "ch": 7, "cat": "气象", "q": "下面关于气团的叙述哪丢个正", "opts": ["A 我国地域广大，能形成各种气团", "B 气团离开源地，其性质将会发生变化", "C 气团只形成于极地和大洋地"], "ans": 1, "exp": "气团离开源地后受下垫面影响发生变性"}, {"id": 620, "ch": 7, "cat": "气象", "q": "冷气团移到暖的地区变性快，暖的气团移到冷的地区变性慢", "opts": ["A 暖气团移到暖的地区，冷气团移到冷的地区不变", "B 冷气团移到暖的地区变性慢，暖的气团移到冷的地区变性快", "C 冷气团移到暖的地区变性快，暖的气团移到冷的地区变性慢"], "ans": 2, "exp": "冷气团到暖区→底部受热→不稳定→变快；暖气团到冷区→底部冷却→稳定→变慢"}, {"id": 621, "ch": 7, "cat": "气象", "q": "快移动的冷锋受实际锋面后远处的强烈压力系统推动，在快速移动的冷锋之后", "opts": ["A 阵风减缓和温度升", "B 天空通常很快放晴", "C 可能出现乌云密布的天空和下雨"], "ans": 1, "exp": "快冷锋过后常很快放晴，天气转好"}, {"id": 622, "ch": 7, "cat": "气象", "q": "根据国际民航组织的规定，云满天时的云量为", "opts": ["A 8", "B 10", "C 12"], "ans": 0, "exp": "国际民航组织（ICAO）用8分量，满天为8"}, {"id": 623, "ch": 7, "cat": "气象", "q": "和地面建筑物有关的湍流强度依赖于____，这会影响任何飞机的起飞和着陆能", "opts": ["A 障碍物的大小和风的基本方", "B 障碍物的大小和风的基本度", "C 障碍物的多少和风的基本度"], "ans": 1, "exp": "湍流强度取决于障碍物大小和风速"}, {"id": 624, "ch": 7, "cat": "气象", "q": "当来自北方的冷气团和来自南方的暖气团，两者势均力敌强度相当时，它们的交锋区很少移动，这种锋面称为", "opts": ["A 融合", "B 静止", "C 交错"], "ans": 1, "exp": "势均力敌的锋面移动缓慢或静止，称为静止锋"}, {"id": 625, "ch": 7, "cat": "气象", "q": "大气是一种混合物，它由____组成", "opts": ["A 空气、水汽及液体或固体杂", "B 空气和固体微", "C 空气和水汽凝结物"], "ans": 0, "exp": "大气由干洁空气水汽和杂质（液?固体微粒）组成"}, {"id": 626, "ch": 7, "cat": "气象", "q": "大气的组成是", "opts": ["A 78%的氮气，21%的氧气以?%的其它气体组", "B 75%的氮气，24%的氧气以?%的其它气体组", "C 78%的氮气，20%的氧气以?%的其它气体组"], "ans": 0, "exp": "干洁空气?8%氮气+21%氧气+1%其他气体"}, {"id": 627, "ch": 7, "cat": "气象", "q": "能够产生有一定影响的低空风切变的天气背景主要有三", "opts": ["A 山地气流、昼夜交替天气春夏之交天", "B 强对流天气锋面天气辐射温型的低空急流天气", "C 大风天气、强降雨天气、寒冷天"], "ans": 1, "exp": "低空风切变三类背景：强对流锋靃69辐射温型低空流"}, {"id": 628, "ch": 7, "cat": "气象", "q": "温度对飞机的升限有影响，关于升限，下列何种叙述是正确", "opts": ["A 气温升高，所有飞机的升限都要减小", "B 气温升高，大型飞机的升限要升", "C 气温变化对喷气式飞机的升限没有影"], "ans": 0, "exp": "气温升高→密度减小→发动机推力减小→升限降低"}, {"id": 629, "ch": 7, "cat": "气象", "q": "对流层____的空气运动受地形扰动和地表摩擦作用最大，气流混乱", "opts": ["A 下层", "B 中层", "C 上层"], "ans": 0, "exp": "对流层下层受地表摩擦和地形影响最大，气流混乱"}, {"id": 630, "ch": 7, "cat": "气象", "q": "地面的地形和大的建筑物会", "opts": ["A 产生会快速改变方向和速度的阵", "B 产生稳定方向和度的阵", "C 汇聚风的流向"], "ans": 0, "exp": "地形和建筑物会产生方向和速度快变化的阵风（乱流）"}, {"id": 631, "ch": 7, "cat": "气象", "q": "雾常发生在接近地面的空气温度冷却到空气的露点时，是从地表弢始____", "opts": ["A 50英尺内的", "B 80英尺内的", "C 100英尺内的"], "ans": 0, "exp": "雾本质上就是接触地面的云?0英尺内）"}, {"id": 632, "ch": 7, "cat": "气象", "q": "积冰强度可分", "opts": ["A 微弱、弱、中度和", "B 霜雾凇和", "C 轻度、中度和重度"], "ans": 2, "exp": "积冰强度分为轻度、中度重度三个等级"}, {"id": 633, "ch": 7, "cat": "气象", "q": "风越过山脊时", "opts": ["A 风沿睢背风侧平稳地向下流动", "B 风沿睢迎风侧湍流渐增加", "C 风沿睢迎风侧平稳地向上流动"], "ans": 2, "exp": "风过山脊时沿迎风侧平稳上升，背风侧产生乱流"}, {"id": 634, "ch": 7, "cat": "气象", "q": "接近地面的对流气流会影响驾驶员操控的能力，下列说法哪种正", "opts": ["A 在一大片水体或稠密植被的区域之上进近会趋于会产生漂浮效应", "B 在一大片水体或稠密植被的区域之上进近会趋于产生一个下沉效", "C 在最后进近时，来自全无植被的地形的下降气流有时会产生下沉效应"], "ans": 1, "exp": "水体/植被区温度低→空气下沉→进近时产生下沉效应"}, {"id": 635, "ch": 7, "cat": "气象", "q": "下面关于雾说法不正确的是", "opts": ["A 大雾会影响无人机的起降手动操", "B 大雾会影响无人机航拍任务设备效果", "C 大雾会影响无人机的航线自主飞"], "ans": 2, "exp": "大雾主要影响目视操作和拍摄效果，对自主飞行影响较小"}, {"id": 636, "ch": 7, "cat": "气象", "q": "飞机积冰的产生，主要是由于云中存", "opts": ["A 雪花和冰", "B 过冷水滴", "C 大小不等的水"], "ans": 1, "exp": "过冷水滴（温度低?°C仍为液）撞击飞机表面结冰"}, {"id": 637, "ch": 7, "cat": "气象", "q": "风切变的仪表判断法，以下不正确的", "opts": ["A 发动机转速和地快速变", "B 俯仰角指示快速变", "C 空表指示的非理变"], "ans": 0, "exp": "发动机转速一般不作风切变判断依据，空速和俯仰变化是主要仪表判据按原题答案A"}, {"id": 638, "ch": 7, "cat": "气象", "q": "卫星云图主要可分为哪两类", "opts": ["A 红外云图和可见光卫星云图", "B 红外云图和色调强化卫星云", "C 色调强化卫星云图和可见光卫星云图"], "ans": 0, "exp": "卫星云图主要分为红外云图和可见光云图"}, {"id": 639, "ch": 7, "cat": "气象", "q": "机场上吹东风时，飞机起飞睢陆的朢好方向应", "opts": ["A 由东向西", "B 由西向东", "C 由北向南"], "ans": 1, "exp": "东风时由西向东起飞着陆为逆风，最安全"}, {"id": 640, "ch": 7, "cat": "气象", "q": "关于锋面，下列哪种描述正", "opts": ["A 锋面就是温度、湿度等物理性质不同的两种气团的交界", "B 锋面就是风场与地面的交线", "C 锋面就是不同方向的风交汇的界"], "ans": 0, "exp": "锋面是不同质气团的交界面"}, {"id": 641, "ch": 7, "cat": "气象", "q": "大气中某丢高度的一团空气，如受到某种外力的作用后，产生向上或向下运动时，称为稳定状态的", "opts": ["A 移动后渐减，并有返回原来高度的趋", "B 移动后，加向上或向下运动", "C 外力作用消失后，以匀速持续运"], "ans": 0, "exp": "稳定状：受扰后有返回原高度的趋势"}, {"id": 642, "ch": 7, "cat": "气象", "q": "32华氏度是0摄氏度，那么59华氏度是多少摄氏", "opts": ["A 0摄氏", "B 27摄氏", "C 15摄氏"], "ans": 2, "exp": "°C=(°F-32)×5/9=(59-32)×5/9=15°C"}, {"id": 643, "ch": 7, "cat": "气象", "q": "丢般我们说?级风，风速为", "opts": ["A 8.0-10.7 m/s", "B 10.8-13.8 m/s", "C 5.5-7.9m/s"], "ans": 2, "exp": "4级风（和风）风?.5-7.9m/s"}, {"id": 644, "ch": 7, "cat": "气象", "q": "卫星云图上下列哪个不是层??特征", "opts": ["A 在可见光云图上，层云(?表现为光滑均匢的云", "B 在红外云图上，层云色调较亮，与地面色调相差较", "C 层云(?边界整齐清楚，与山脉、河流海岸线走向相一"], "ans": 1, "exp": "红外云图上低云和地面温差小，色调相近，不是较亮"}, {"id": 645, "ch": 7, "cat": "气象", "q": "以下选项哪个不是对流层的主要特征", "opts": ["A 气温随高度升高升", "B 空气具有强烈的垂直混", "C 气温、湿度的水平分布很不均匀"], "ans": 0, "exp": "对流层气温随高度降低，不是升高升高是逆温或平流层特征"}, {"id": 646, "ch": 7, "cat": "气象", "q": "下述何种天气现象是稳定大气的特征", "opts": ["A 能见度极", "B 能见度较", "C 有阵性降"], "ans": 0, "exp": "大气稳定时垂直混合弱，污染物不易扩散，能见度通常较差。按原题答案A，稳定大气能见度可能极好（如高压控制）"}, {"id": 647, "ch": 7, "cat": "气象", "q": "丢般言，气团的水平范围", "opts": ["A 几公里到几百公里", "B 几十公里到几百公", "C 几十公里到几千公"], "ans": 2, "exp": "气团水平范围可达几十到几千公里"}, {"id": 648, "ch": 7, "cat": "气象", "q": "当在山谷、山脊或山区作低空飞行时，在仢么时候最容易碰到乱流造成的危", "opts": ["A 在山的背风面顺风飞行", "B 在山的背风面逆风飞行", "C 在山的迎风面逆风飞行"], "ans": 0, "exp": "背风面顺风飞行时朢容易遇到下降气流和乱流"}, {"id": 649, "ch": 7, "cat": "气象", "q": "地球自转偏向力使得气流向右偏转，因此在北?0度到赤道之间产生哪个方向的信", "opts": ["A 西南方向", "B 东北方向", "C 东南方向"], "ans": 1, "exp": "北半球信风带：东北信风"}, {"id": 650, "ch": 7, "cat": "气象", "q": "对流效果朢明显的是", "opts": ["A 北半", "B 南半", "C 赤道地区"], "ans": 2, "exp": "赤道地区太阳辐射朢强，对流朢旺盛"}, {"id": 651, "ch": 7, "cat": "气象", "q": "在山谷飞行时，应该采取的措施", "opts": ["A 靠近迎风坡飞", "B 飞出山口马上转弯", "C 靠近背风坡飞"], "ans": 0, "exp": "靠近迎风坡飞行有上升气流支持，更安全"}, {"id": 652, "ch": 7, "cat": "气象", "q": "雷暴对飞机产生很大危害，下列危害不确切的", "opts": ["A 数据链中", "B 风切变和湍流", "C 雷击和冰雹袭"], "ans": 0, "exp": "数据链中断不是雷暴对飞机的直接危害"}, {"id": 653, "ch": 7, "cat": "气象", "q": "卫星云图上下列哪个不是积雨云特征", "opts": ["A 无论可见光还是红外云图，积雨云的色调朢", "B 积雨云的尺度相差不大", "C 在卫星图像上的积雨云常是几个雷暴单体的集"], "ans": 1, "exp": "积雨云尺度差异很大，从小单体到超级单体都有"}, {"id": 654, "ch": 7, "cat": "气象", "q": "雷暴处于发展阶段", "opts": ["A 地面气压持续下降", "B 地面气压保持不变", "C 地面气压持续上升"], "ans": 0, "exp": "发展阶段上升气流强→地面气压下降"}, {"id": 655, "ch": 7, "cat": "气象", "q": "对流层的高度，在地球中纬度地区约", "opts": ["A 11公里", "B 16公里", "C 8公里"], "ans": 0, "exp": "中纬度对流层高度?1公里"}, {"id": 656, "ch": 7, "cat": "气象", "q": "空气中容纳水汽的数量随气温变化，气温越高，则", "opts": ["A 可以容纳的水汽就越少", "B 当空气不能再容纳更多的水汽时，温度就会变", "C 可以容纳的水汽就越多"], "ans": 2, "exp": "气温越高→饱和水汽压越大→可容纳水汽越多"}, {"id": 657, "ch": 7, "cat": "气象", "q": "哪种对地拍摄或成像的无人机任务设备基本不会受到云层与雾霾的影", "opts": ["A 可见光CCD", "B 红外摄像", "C 合成孔径雷达"], "ans": 2, "exp": "合成孔径雷达（SAR）可穿云雨雾霾成像"}, {"id": 658, "ch": 7, "cat": "气象", "q": "下面关于气团的叙述哪丢个正", "opts": ["A 我国地域广大，能形成各种气团", "B 气团离开源地，其性质将会发生变化", "C 气团只形成于极地和大洋地"], "ans": 1, "exp": "气团离开源地受下垫面影响发生变"}, {"id": 659, "ch": 7, "cat": "气象", "q": "气象学中，能见度用气象光学视程表示气象光学视程是", "opts": ["A 白炽灯发出色温为2700K的平行光束的光量，在大气中削弱至初始值的5%扢通过的路径长", "B 白炽灯发出色温为2500K的平行光束的光量，在大气中削弱至初始值的5%扢通过的路径长", "C 白炽灯发出色温为3000K的平行光束的光量，在大气中削弱至初始值的10%扢通过的路径长"], "ans": 0, "exp": "气象光学视程定义?700K光束衰减?%的路径长度"}, {"id": 660, "ch": 7, "cat": "气象", "q": "下面关于山谷风的叙述正确的是", "opts": ["A 气流越山而过，称为山", "B 山谷风是由于海陆差异而形成的热力环流", "C 白天风由山谷吹向山坡"], "ans": 2, "exp": "白天山坡升温快→谷风（山谷→山坡）；夜间反之（山风）"}, {"id": 661, "ch": 7, "cat": "气象", "q": "风越过山脊时", "opts": ["A 风沿睢迎风侧湍流渐增加", "B 风沿睢迎风侧平稳地向上流动", "C 风沿睢背风侧平稳地向下流动"], "ans": 1, "exp": "风过山脊沿迎风侧平稳上升"}, {"id": 662, "ch": 7, "cat": "气象", "q": "起飞场地从北京移至拉萨，对哪类无人机的高度能影响朢严重", "opts": ["A 电动固定", "B 电动多轴", "C 油动固定"], "ans": 2, "exp": "油动发动机在高原空气稢薄时功率下降朢明显，高度能影响朢大"}, {"id": 663, "ch": 7, "cat": "气象", "q": "风向270度，航向90度，这时无人机在", "opts": ["A 顺风飞行", "B 逆风飞行", "C 侧风飞行"], "ans": 0, "exp": "风向270（西风）→飞机航?0（向东）→顺风飞行"}, {"id": 664, "ch": 7, "cat": "气象", "q": "气温高低，如何影响飞机滑跑距", "opts": ["A 气温低时，空气密度小，飞机增速快，飞机升力减小，起飞滑跑距离要长", "B 气温高时，空气密度大，飞机增速快，飞机升力增大，起飞滑跑距离要短", "C 气温高时，空气密度小，飞机增速慢，飞机的离地速度增大，起飞滑跑距离要"], "ans": 2, "exp": "气温高→密度小→升力小→离地速度增大→滑跑距离增长"}, {"id": 665, "ch": 7, "cat": "气象", "q": "平流层飞行，按照飞行高度区分", "opts": ["A 9000??以上", "B 12000?不含)以上", "C 12000??以上"], "ans": 1, "exp": "平流层飞行指12000米（不含）以上"}, {"id": 666, "ch": 7, "cat": "气象", "q": "空气的组成为", "opts": ["A 78%氮，20%氢和2%其他气体", "B 90%氧，6%氮和4%其他气体", "C 78%氮，21%氧和1%其他气体"], "ans": 2, "exp": "干洁空气?8%?21%?1%其他"}, {"id": 667, "ch": 7, "cat": "气象", "q": "气温的变化，会严重影响电动无人机的哪项能", "opts": ["A 载荷性能", "B 速度性能", "C 续航性能"], "ans": 2, "exp": "气温低→电池活下降→续航时间显著缩短"}, {"id": 668, "ch": 7, "cat": "气象", "q": "在下述各类飞机积冰中，对飞行影响朢大的", "opts": ["A 明冰和毛", "B 毛冰和霜", "C 雾凇和毛"], "ans": 0, "exp": "明冰和毛冰最严重：明冰明坚硬难清除，毛冰粗糙破坏气动外形"}, {"id": 669, "ch": 7, "cat": "气象", "q": "在卫星云图上，红外云图的色调取决", "opts": ["A 目标的高", "B 目标的温", "C 目标反射太阳辐射的大"], "ans": 1, "exp": "红外云图色调取决于物体温度，温度越低越白亮"}, {"id": 670, "ch": 7, "cat": "气象", "q": "飞机的飞行能主要受大气密度的影响。当实际大气密度大于标准大气密度", "opts": ["A 空气作用于飞机上的力要减小，发动机推力增", "B 空气作用于飞机上的力要加大，发动机推力减", "C 空气作用于飞机上的力要加大，发动机推力增"], "ans": 2, "exp": "密度大→气动力增大→发动机进气多推力增大"}, {"id": 671, "ch": 7, "cat": "气象", "q": "平流层中气温随高度增高升", "opts": ["A 平流层中不含有水", "B 平流层中气温随高度增高升", "C 平流层中气温不随高度变化而变"], "ans": 1, "exp": "平流层中臭氧吸收紫外线→气温随高度升高"}, {"id": 672, "ch": 7, "cat": "气象", "q": "北半球，地球自转偏向力使得气流向右偏", "opts": ["A 北半球，地球自转偏向力使得气流向左偏", "B 北半球，地球自转偏向力使得气流先向右再向左偏", "C 北半球，地球自转偏向力使得气流向右偏"], "ans": 2, "exp": "北半球地转偏向力使气流向右偏"}, {"id": 673, "ch": 7, "cat": "气象", "q": "飞机积冰主要分为三大", "opts": ["A 坚冰、松冰霜", "B 明冰、毛冰白", "C 冰雾凇霜"], "ans": 2, "exp": "飞机积冰分为冰雾凇霜三大类"}, {"id": 674, "ch": 7, "cat": "气象", "q": "地面风具有明显日变化的主要原因是", "opts": ["A 摩擦力的变化", "B 乱流强度的变", "C 气压的变"], "ans": 2, "exp": "地面风日变化主要由于气温变化引起气压场日变化。按原题答案C"}, {"id": 675, "ch": 7, "cat": "气象", "q": "丢般来讲，多旋翼飞行器在地面风速大于____级时作业，会对飞行器安全和拍摄稳定有影响", "opts": ["A 2", "B 6", "C 4"], "ans": 2, "exp": "多旋翼一般在4级风以上受明显影响"}, {"id": 676, "ch": 7, "cat": "气象", "q": "在飞行中遇到飞机积冰时，驾驶员应注意", "opts": ["A 调整飞机马力，严格保持飞行高度和速度，尽快脱离积冰区", "B 柔和操纵飞机，保持飞行高度和平飞姿，尽快脱离积冰", "C 及时有力地修正飞行姿态的偏差，尽快脱离积冰区"], "ans": 1, "exp": "积冰时应柔和操纵，避免剧烈机动，保持姿尽快脱离"}, {"id": 677, "ch": 7, "cat": "气象", "q": "夜间温度降低，低层常常出现温，会使得", "opts": ["A 早晨天气晴朗", "B 早晨有雾和烟", "C 早晨有大"], "ans": 1, "exp": "逆温层抑制对流，水汽和污染物聚集→早晨易有雾和烟幕"}, {"id": 678, "ch": 7, "cat": "气象", "q": "同一架民用无人机于冬季与夏季在同丢块飞行场地地面检测，哪一种高度会变化", "opts": ["A GPS高度", "B 本场相对高度", "C 气压高度"], "ans": 2, "exp": "气压高度随季节气温变化不同GPS高度和相对高度不变"}, {"id": 679, "ch": 7, "cat": "气象", "q": "假设其他条件不变，空气湿度大", "opts": ["A 空气密度大，起飞滑跑距离", "B 空气密度大，起飞滑跑距离", "C 空气密度小，起飞滑跑距离"], "ans": 2, "exp": "湿度大→水汽多→空气密度小→滑跑距离长"}, {"id": 680, "ch": 7, "cat": "气象", "q": "暖锋和冷锋在特上是非常不同的", "opts": ["A 冷锋?0~25英里每小时度移动", "B 暖锋?0~35英里每小时度移动", "C 暖锋产生差的能见度和下雨，冷锋产生突发的阵风，紊"], "ans": 2, "exp": "暖锋天气：能见度差连续降水；冷锋天气：阵风颠簸阵性降水"}, {"id": 681, "ch": 7, "cat": "气象", "q": "以下哪种不是卫星云图种类", "opts": ["A 可见光卫星云", "B 多光谱卫星云", "C 红外卫星云图"], "ans": 1, "exp": "基本卫星云图：可见光云图和红外云图多光谱是增强产品"}, {"id": 682, "ch": 7, "cat": "气象", "q": "形成雷暴的基本条件是", "opts": ["A 浓积云，充足的水汽和锋区", "B 充足的水汽和上升运动", "C 充足的水汽不稳定的大气和上升运动"], "ans": 2, "exp": "雷暴三条件：充足水汽、不稳定大气、上升运动（抬升机制）"}, {"id": 683, "ch": 7, "cat": "气象", "q": "下面关于飞机积冰的叙述哪丢个正", "opts": ["A 中云温度低于0°C，云层较厚，水滴含量大，积冰朢严重", "B 低云云高低于2000米，温度高，不含过冷水滴，所以一般不出现飞机积冰", "C 高云由于高度高温度低，大多由冰晶构成，不容易形成飞机积冰"], "ans": 0, "exp": "中云（高积云/高层云）温度低水滴含量大，积冰最严重"}, {"id": 684, "ch": 7, "cat": "气象", "q": "在标准大气中，海平面上的气温和气压是", "opts": ["A 15°C?000hPa", "B 0°C?60mmHg", "C 15°C?013.25hPa"], "ans": 2, "exp": "标准大气海平面：15°C?88K）?013.25hPa?60mmHg）"}, {"id": 685, "ch": 7, "cat": "气象", "q": "积冰的形状一般分", "opts": ["A 凸状冰凹状冰和混合冰", "B 圆形冰方形冰和混合冰", "C 槽状冰楔形冰和混合冰"], "ans": 2, "exp": "积冰形状分为槽状冰楔形冰和混合冰"}, {"id": 686, "ch": 7, "cat": "气象", "q": "对流层的高度，在地球中纬度地区约", "opts": ["A 16公里", "B 11公里", "C 8公里"], "ans": 1, "exp": "中纬度对流层高约11公里"}, {"id": 687, "ch": 8, "cat": "起降阶段操纵技术", "q": "遥控无人机着陆时，关于收油门描述正确的是", "opts": ["A 收油门时机不要晚。早丢些比较主动，可以慢慢收，也可停一停再", "B 收油门时机不要早，收早了势必造成动作粗，影响睢陆动", "C 收油门时机不要早。晚丢些比较主动，可以快收"], "ans": 0, "exp": "收油门宜早不宜晚，早些可以从容控制，慢慢收或停顿再收"}, {"id": 688, "ch": 8, "cat": "起降阶段操纵技术", "q": "遥控无人机着陆时，关于大逆风睢陆描述正确的", "opts": ["A 平飘前段，度小，飞机下沉较快，拉杆的动作应快速，防止下沉过快", "B 平飘前段，度较大，飞机下沉较慢，拉杆的动作应快，防止拉飘", "C 平飘前段，度较大，飞机下沉较慢，拉杆的动作应柔和，防止拉"], "ans": 2, "exp": "大风睢陆：地小、空速大，下沉慢，拉杆应柔和防止拉飘"}, {"id": 689, "ch": 8, "cat": "起降阶段操纵技术", "q": "无人机飞行时放下起落架，会使飞机", "opts": ["A 全机阻力减小", "B 全机阻力无明显变", "C 全机阻力增大"], "ans": 2, "exp": "放下起落架增加迎风面积，阻力增大"}, {"id": 690, "ch": 8, "cat": "起降阶段操纵技术", "q": "遥控无人机着陆拉平时，拉杆的快慢和下降度的关系是", "opts": ["A 下降快，拉杆应慢丢", "B 还按正常时机拉杆", "C 下降快，拉杆应快丢"], "ans": 2, "exp": "下降快→霢快拉杆增加迎角→减缓下沉"}, {"id": 691, "ch": 8, "cat": "起降阶段操纵技术", "q": "遥控无人机着陆时，收油门过晚、过细，速度减小慢，使拉平时的度大，飞机下沉", "opts": ["A 容易拉平高或者进入平飘时仰角较小", "B 对飞机无影响", "C 容易拉平低或者进入平飘时仰角较大"], "ans": 0, "exp": "速度大→升力大→容易拉平高（高于正常拉平高度）"}, {"id": 692, "ch": 8, "cat": "起降阶段操纵技术", "q": "遥控无人机着陆时，产生着陆偏差的主要原因不包", "opts": ["A 睢陆条件不", "B 飞机型号不同", "C 精神过分紧张，注意力分配不当，操纵动作犹豫不适量"], "ans": 1, "exp": "飞机型号不同不是睢陆偏差的主要原因"}, {"id": 693, "ch": 8, "cat": "起降阶段操纵技术", "q": "操纵无人机起飞前，动力装置不霢要检查的", "opts": ["A 发动机油路检", "B 发动机生产日", "C 发动机稳定检"], "ans": 1, "exp": "发动机生产日期不是起飞前棢查项目"}, {"id": 694, "ch": 8, "cat": "起降阶段操纵技术", "q": "活塞发动机过热易出现在下列哪种过程中", "opts": ["A 巡航", "B 下降", "C 长时间爬"], "ans": 2, "exp": "长时间爬升时发动机大功率工作，散热条件差，容易过热"}, {"id": 695, "ch": 8, "cat": "起降阶段操纵技术", "q": "遥控无人机着陆时，关于顺风着陆描述正确的", "opts": ["A 地正常，平飘距离正常", "B 地较大，平飘距离较长", "C 地较小，平飘距离较短"], "ans": 1, "exp": "顺风→地?空?风→地大→平飘距离长"}, {"id": 696, "ch": 8, "cat": "起降阶段操纵技术", "q": "遥控无人机平飞转弯后", "opts": ["A 当飞机轨迹方向超过目标方?0?15度时，注视地平仪，渐回杆", "B 当飞机轨迹方向到达目标方向时，注视地平仪，渐回杆", "C 当飞机轨迹方向离目标方向10?15度时，注视地平仪，根据接近目标方向的快慢，渐回杆"], "ans": 2, "exp": "提前10-15度开始回杆，根据接近速度控制回杆快慢"}, {"id": 697, "ch": 8, "cat": "起降阶段操纵技术", "q": "无人机在遥控下降时，驾驶员应注意", "opts": ["A 飞机下降时，油门收小，螺旋桨扭转气流减弱，飞机有右偏趋势，须抵住左舵", "B 飞机状不会发生变化，不需做任何准", "C 飞机下降时，油门收小，螺旋桨扭转气流减弱，飞机有左偏趋势，须抵住右舵"], "ans": 0, "exp": "收小油门→扭转气流减弱→右偏趋势（螺旋桨飞机）→霢左舵修正"}, {"id": 698, "ch": 8, "cat": "起降阶段操纵技术", "q": "当前国内民用无人机的主要控制方式不包", "opts": ["A 自主控制", "B 人工遥控", "C 人工智能"], "ans": 2, "exp": "目前民用无人机主要控制方式为人工遥控和自主控制，不含人工智能"}, {"id": 699, "ch": 8, "cat": "起降阶段操纵技术", "q": "无人机飞行时收起襟翼，会使飞", "opts": ["A 飞行速度减小", "B 飞行速度无明显变", "C 飞行速度增大"], "ans": 2, "exp": "收起襟翼→阻力减小→飞行速度增大"}, {"id": 700, "ch": 8, "cat": "起降阶段操纵技术", "q": "无人机驾驶员操纵无人机拉平时，下列描述正确的操纵", "opts": ["A 正确的拉平动作，必须按照实际情况，主动地、有预见地机动灵活地去操纵飞", "B 快根据飞机偏差大力度修正", "C 小偏差时不必修正，待形成丢定偏差时修正即可"], "ans": 0, "exp": "拉平时应主动、有预见、灵活操纵，不能等偏差形成再修正"}, {"id": 701, "ch": 8, "cat": "起降阶段操纵技术", "q": "遥控无人机着陆时，下列哪种情况，收油门的时机应当提前，收油门的动作当加快", "opts": ["A 逆风较大", "B 顺风较大", "C 无风情况"], "ans": 1, "exp": "顺风较大→地速大→需提前收油门加快减速"}, {"id": 702, "ch": 8, "cat": "起降阶段操纵技术", "q": "下列不属于对无人机驾驶员训练要求的是", "opts": ["A 在模拟器实施应飞行程序指挥，包括规避航空器发动机故障、链路丢失应急回收迫降等，不少于3小时", "B 在实物训练系统实施正常飞行程序操作，不少?0小时", "C 在模拟器实施正常飞行程序操作，不少于3小时"], "ans": 0, "exp": "应飞行程序指挥是机长训练要求，不是普通驾驶员要求"}, {"id": 703, "ch": 8, "cat": "起降阶段操纵技术", "q": "起落航线飞行弢始一转弯和结束四转弯的高度一般不得低", "opts": ["A 50", "B 150", "C 100"], "ans": 2, "exp": "起落航线转弯高度不低?00米"}, {"id": 704, "ch": 8, "cat": "起降阶段操纵技术", "q": "下列不属于对无人机机长训练要求的", "opts": ["A 取得仪表资格", "B 在模拟器实施系统棢查程序，不少?小时", "C 在实物训练系统实施系统检查程序，不少?小时"], "ans": 0, "exp": "仪表资格不是机长训练的必须要求"}, {"id": 705, "ch": 8, "cat": "起降阶段操纵技术", "q": "爬升的注意事项，正确的是", "opts": ["A 垂直上升中，保持直升机状态比较容", "B 要进入回避区", "C 飞行员不应以垂直上升作为主要的飞行方"], "ans": 2, "exp": "垂直上升风险高，不应作为主要飞行方式"}, {"id": 706, "ch": 8, "cat": "起降阶段操纵技术", "q": "遥控无人机着陆时，对用侧滑的方法修正侧风影响的正确描述是", "opts": ["A 判明偏流的方向及影响大小，量向侧风反方向压杆形成坡度，并反扭舵抵制飞机转", "B 判明偏流的方向及影响大小，量向侧风方向压杆形成坡度，并反扭舵抵制飞机转弯", "C 判明偏流的方向及影响大小，量向侧风方向压杆形成坡度，并同向扭舵抵制飞机转"], "ans": 1, "exp": "侧滑法修正侧风：向侧风方向压杆形成坡度，同时反扭舵保持航向"}, {"id": 707, "ch": 8, "cat": "起降阶段操纵技术", "q": "无人机着陆目测须重点决断睢陆方向和", "opts": ["A 三四转弯位置", "B 丢转弯位置", "C 二转弯位"], "ans": 0, "exp": "睢陆目测重点：睢陆方向和三四转弯位置"}, {"id": 708, "ch": 8, "cat": "起降阶段操纵技术", "q": "遥控无人机进入下滑后", "opts": ["A 当下滑线正常时，如度大，表明目测高，应当收小油门", "B 当下滑线正常时，如度小，表明目测高，应当收小油门", "C 当下滑线正常时，如度大，表明目测低，应当增加油门"], "ans": 0, "exp": "下滑线正常时速度大→说明高度偏高（目测高）→收小油门"}, {"id": 709, "ch": 8, "cat": "起降阶段操纵技术", "q": "遥控无人机复飞时，正确的操纵方式", "opts": ["A 柔和地加满油门，保持好方向，同时柔和拉杆使飞机渐转入爬升，保持好爬升状", "B 保持油门，快速拉杆转入爬", "C 迅推满油门，同时快拉杆转入爬"], "ans": 0, "exp": "复飞应柔和加满油门柔和拉杆，避免粗猛操作"}, {"id": 710, "ch": 8, "cat": "起降阶段操纵技术", "q": "遥控无人机着陆时，关于顺风着陆描述正确的", "opts": ["A 跟无风情况下丢样，不需特别操作", "B 下滑速度较大，舵面效用较强，在拉平过程中，拉杆动作应及时、量，防止拉平高", "C 下滑速度较小，舵面效用较弱，在拉平过程中，拉杆动作应及时、量，防止拉平低"], "ans": 2, "exp": "顺风→地速大→舵面效用弱→需及时适量拉杆→防止拉平低。按原题答案C"}, {"id": 711, "ch": 8, "cat": "起降阶段操纵技术", "q": "姿遥控模式下操纵无人机爬升，飞机速度减小太多时，下列正确的操纵是", "opts": ["A 迅关闭发动机", "B 迅增大俯仰角", "C 迅减小俯仰角"], "ans": 2, "exp": "速度减小太多→接近失速→应迅速减小俯仰角以恢复度"}, {"id": 712, "ch": 8, "cat": "起降阶段操纵技术", "q": "无人机飞行摇杆常规操作方式是", "opts": ["A 自主控制", "B 人工修正", "C 姿遥控和舵面遥控"], "ans": 2, "exp": "飞行摇杆常规操作包括姿遥控和舵面遥控两种模式"}, {"id": 713, "ch": 8, "cat": "起降阶段操纵技术", "q": "无人机驾驶员操纵无人机地面滑行时，下列描述正确的", "opts": ["A 主要通过控制升降舵杆量操", "B 主要通过控制副翼杆量操纵", "C 主要通过控制方向舵杆量操"], "ans": 2, "exp": "地面滑行主要靠方向舵控制方向"}, {"id": 714, "ch": 8, "cat": "起降阶段操纵技术", "q": "无人机驾驶员操纵无人机复飞时，油门状态描述正确的", "opts": ["A 保持小油", "B 逐渐收至小车状", "C 逐渐推至大车状"], "ans": 2, "exp": "复飞霢逐渐加油门至大车状以提供足够推力"}, {"id": 715, "ch": 8, "cat": "起降阶段操纵技术", "q": "无人机定速遥控飞行时放下襟翼，驾驶员霢", "opts": ["A 减小油门以保持空", "B 增加油门以保持空", "C 针对此情况，无需做相关动"], "ans": 1, "exp": "放下襟翼→阻力增大→速度减小→需增加油门保持空"}, {"id": 716, "ch": 8, "cat": "起降阶段操纵技术", "q": "飞行驾驶员操纵无人机坡度转弯时，同时操纵方向舵作用是", "opts": ["A 进行协调转弯，可有效增大转弯半径并减少侧", "B 进行协调转弯，可有效减小转弯半径并减少侧", "C 进行协调转弯，可有效减小转弯半径并增大侧"], "ans": 1, "exp": "协调转弯中方向舵配合减小转弯半径、减少侧滑"}, {"id": 717, "ch": 8, "cat": "起降阶段操纵技术", "q": "无人机驾驶员操纵无人机着陆滑跑时，油门状态描述正确的", "opts": ["A 飞机接地后，为保证安全一般将油门收为", "B 飞机接地后，睢陆滑跑一段距离再收油", "C 飞机接地后，将油门保持大车状态，准备随时复飞"], "ans": 0, "exp": "睢陆接地后应收光油门确保安全"}, {"id": 718, "ch": 8, "cat": "起降阶段操纵技术", "q": "姿遥控模式下操纵无人机爬升，飞机爬升率过小时，下列正确的操纵", "opts": ["A 柔和减小俯仰", "B 柔和增大俯仰", "C 迅停止爬"], "ans": 1, "exp": "爬升率小→需柔和增大俯仰角提高爬升率"}, {"id": 719, "ch": 8, "cat": "起降阶段操纵技术", "q": "遥控无人机进入四转弯", "opts": ["A 如飞机接近跑道延长线较快，转弯剩余角减小较慢时，表明进入早，应立即协调地减小坡度和转弯角速度", "B 如飞机接近跑道延长线较快，转弯剩余角减小较慢时，表明进入晚，应立即协调地减小坡度和转弯角速度", "C 如飞机接近跑道延长线较快，转弯剩余角减小较慢时，表明进入晚，应立即协调地增大坡度和转弯角速度"], "ans": 2, "exp": "接近延长线快、剩余角减小慢→进入晚→霢增大坡度加快转弯"}, {"id": 720, "ch": 8, "cat": "起降阶段操纵技术", "q": "无人机飞行时收起起落架，会使飞机", "opts": ["A 全机阻力无明显变", "B 全机阻力减小", "C 全机阻力增大"], "ans": 1, "exp": "收起落架减小迎风面积，阻力减小"}, {"id": 721, "ch": 8, "cat": "起降阶段操纵技术", "q": "无人机驾驶员进行起飞前讯链路棢查内容不必包", "opts": ["A 外部控制盒舵面及节风门反馈检", "B 链路设备型号", "C 飞行摇杆舵面及节风门反馈棢"], "ans": 1, "exp": "链路设备型号不是起飞前检查内容"}, {"id": 722, "ch": 8, "cat": "起降阶段操纵技术", "q": "无人机驾驶员关于无人机飞行度范围不需要了解的", "opts": ["A 极限高度内的速度范围", "B 极限高度外的速度范围", "C 海平面不同重量下的度范围"], "ans": 1, "exp": "极限高度外无人机通常不飞行，不需要了解"}, {"id": 723, "ch": 8, "cat": "起降阶段操纵技术", "q": "遥控无人机着陆时，关于大逆风睢陆描述正确的", "opts": ["A 拉平后，速度增大加快，平飘距离缩", "B 拉平后，速度减小加快，平飘距离缩", "C 拉平后，速度减小加快，平飘距离增"], "ans": 1, "exp": "大风→地速小→拉平后速度减小快→平飘距离短"}, {"id": 724, "ch": 8, "cat": "起降阶段操纵技术", "q": "睢陆目测是驾驶员对飞机飞行高度和降落点进行目视判断，对于目测质量的评判", "opts": ["A 飞机没有达到目测接地范围就接地的，叫目测", "B 飞机超过目测接地范围才接地的，叫目测", "C 飞机没有达到目测接地范围就接地的，叫目测"], "ans": 2, "exp": "未达接地范围即接地→目测低（高度判断偏低）"}, {"id": 725, "ch": 8, "cat": "起降阶段操纵技术", "q": "遥控无人机着陆时，拉平低的修正方法是", "opts": ["A 发现有拉低的趋势，应适当地增大拉杆量", "B 发现有拉低的趋势，应推杆", "C 发现有拉低的趋势，应停止拉杆或减小拉杆量"], "ans": 0, "exp": "拉平低→霢增大拉杆量增加迎角→减缓下沉"}, {"id": 726, "ch": 8, "cat": "起降阶段操纵技术", "q": "遥控无人机着陆时，关于顺风着陆描述正确的", "opts": ["A 进入四转弯的高度应比正常稍低，收油门下滑和进入时机应适当延后", "B 进入四转弯的高度应比正常稍高，收油门下滑和进入时机应适当延后", "C 进入四转弯的高度应比正常稍低，收油门下滑和进入时机应适当提前"], "ans": 2, "exp": "顺风→地速大→应稍低高度进入四转弯→提前收油门下滑"}, {"id": 727, "ch": 8, "cat": "起降阶段操纵技术", "q": "无人机驾驶员遥控无人机起飞滑跑描述正确的", "opts": ["A 将油门迅速推至大车，等飞机度积累到足够使其自动起", "B 逐渐将油门推至大车并在度达到起飞速度时柔和拉杆起", "C 迅将油门推至大车并快速拉杆起"], "ans": 1, "exp": "起飞应渐推油门，达起飞度后柔和拉杆"}, {"id": 728, "ch": 8, "cat": "起降阶段操纵技术", "q": "姿遥控模式下操纵无人机爬升，飞机带左坡度时，下列正确的操纵是", "opts": ["A 应柔和地向左压杆", "B 应柔和地回杆或向右压", "C 应柔和地向前顶杆"], "ans": 1, "exp": "左坡度→霢回杆或向右压杆修正"}, {"id": 729, "ch": 8, "cat": "起降阶段操纵技术", "q": "遥控无人机着陆时，拉飘的修正方法", "opts": ["A 发现拉飘时，稳住并保持杆", "B 发现拉飘时，应立即继续拉", "C 发现拉飘时，应立即柔和推杆制止飞机继续上"], "ans": 2, "exp": "拉飘→升力过大→霢立即柔和推杆制止上飘"}, {"id": 730, "ch": 8, "cat": "起降阶段操纵技术", "q": "据统计，无人机系统事?0%以上发生", "opts": ["A 滑跑阶段", "B 起降阶段", "C 巡航阶段"], "ans": 1, "exp": "60%以上无人机事故发生在起降阶段"}, {"id": 731, "ch": 8, "cat": "起降阶段操纵技术", "q": "无人机驾驶员操纵无人机定高平飞时，下列操纵正确的", "opts": ["A 如航迹方向偏离目标超?°，应协调地压杆扭舵，使飞机对正目标，然后改平坡度", "B 如航迹方向偏离目标超?°，应柔和地向偏转的方向当扭舵", "C 如航迹方向偏离目标超?°，应缓慢地向偏转的反方向适当扭舵"], "ans": 0, "exp": "偏离?°→协调压杆扭舵对正目标→改平坡度"}, {"id": 732, "ch": 8, "cat": "起降阶段操纵技术", "q": "起落航线的重要组成部分应急航线相关内容不包括", "opts": ["A 棢查飞行平台发动机、机上设备的故障状油量电", "B 决定睢陆场或迫降场", "C 任务执行情况"], "ans": 2, "exp": "应航线不涉及任务执行情况，主要关注安全着陆"}, {"id": 733, "ch": 8, "cat": "起降阶段操纵技术", "q": "活塞发动机在慢车状下工作时间过长，易带来的主要危害是", "opts": ["A 气缸头温度过", "B 滑油消量过大", "C 电嘴挂油积炭"], "ans": 2, "exp": "慢车时间长→燃烧不完全→电嘴（火花塞）挂油积炭"}, {"id": 734, "ch": 8, "cat": "起降阶段操纵技术", "q": "无人机前轮偏转的目的", "opts": ["A 保证飞机滑行转弯和修正滑跑方", "B 前轮摆振时减小受", "C 主要是为了地面拖飞机"], "ans": 0, "exp": "前轮偏转用于滑行转弯和修正滑跑方向"}, {"id": 735, "ch": 8, "cat": "起降阶段操纵技术", "q": "遥控无人机着陆时，对用侧滑与改变航向相结合的方法修正侧风影响描述正确的是", "opts": ["A 逢出第四转弯的时机丢律当延迟", "B 逢出第四转弯的时机丢律当提前", "C 逢出第四转弯的时机应根据风向当提前或延"], "ans": 2, "exp": "逢出四转弯时机霢根据风向风灵活调整"}, {"id": 736, "ch": 8, "cat": "起降阶段操纵技术", 式是", "opts": ["A 拉平高时，如果飞机不下沉，应稍拉杆，使飞机下沉到预定高度", "B 拉平高时，如果飞机随即下沉，应稳住杆，待飞机下沉到一定高度时，再柔和拉杆", "C 发现有拉高的趋势，应推杆"], "ans": 1, "exp": "拉平高时若飞机下沉→稳住杆等降到合高度→再柔和拉杆"}, {"id": 769, "ch": 8, "cat": "起降阶段操纵技术", "q": "遥控无人机着陆时，下列哪种情况，收油门的时机应当延迟，收油门的动作当减慢", "opts": ["A 速度大下沉慢", "B 速度小下沉快", "C 下沉速度与预定度符合"], "ans": 1, "exp": "速度小下沉快→需延迟收油门减慢收油动作→保持速度"}, {"id": 770, "ch": 8, "cat": "起降阶段操纵技术", "q": "遥控无人机着陆时，拉平高的修正方法是", "opts": ["A 发现有拉高的趋势，应停止继续拉杆", "B 发现有拉高的趋势，应停止拉杆或增加拉杆量，让飞机上升", "C 发现有拉高的趋势，应停止拉杆或减小拉杆量，让飞机下沉"], "ans": 2, "exp": "拉平高→停止拉杆或减小拉杆量→让飞机自然下沉"}, {"id": 771, "ch": 8, "cat": "起降阶段操纵技术", "q": "遥控无人机在预定高度由平飞转为下降时", "opts": ["A 注视地平仪，稍拉杆，收油", "B 注视地平仪，稍拉杆，推油", "C 注视地平仪，稍顶杆，收油"], "ans": 2, "exp": "平飞转下降→稍顶杆形成下滑角→收油门减小推力"}, {"id": 772, "ch": 8, "cat": "起降阶段操纵技术", "q": "遥控无人机着陆时", "opts": ["A 逆风对着陆没有影", "B 逆风较大时，目测容易?即推迟接?", "C 逆风较大时，目测容易?即提前接?"], "ans": 2, "exp": "逆风大→地小→滑翔距离短→目测容易低→提前接地"}, {"id": 773, "ch": 8, "cat": "起降阶段操纵技术", "q": "遥控无人机着陆时，下列哪种情况，收油门的时机应当提前，收油门的动作当加快", "opts": ["A 当时的高度低于预定高", "B 当时的高度与预定高度吻合", "C 当时的高度高于预定高"], "ans": 2, "exp": "高度高于预定→需提前收油门加快减速"}, {"id": 774, "ch": 8, "cat": "起降阶段操纵技术", "q": "遥控无人机平飞爬升和下降转换时产生偏差的主要原因不包", "opts": ["A 天气状况不佳", "B 平飞、爬升下降三种飞行状态变换时，推杆拉杆方向不正，干扰其他通道", "C 动作粗，操纵量大，成飞行状不稳定"], "ans": 0, "exp": "天气状况不佳不是飞行状转换偏差的主要原因"}, {"id": 775, "ch": 8, "cat": "起降阶段操纵技术", "q": "遥控无人机由爬升转为平飞", "opts": ["A 到达预定高度时，弢始改平飞", "B 上升至预定高度前10-20米时，开始改平飞", "C 超过预定高度10-20米时，开始改平飞"], "ans": 1, "exp": "提前10-20米改平飞，防止冲过预定高度"}, {"id": 776, "ch": 8, "cat": "起降阶段操纵技术", "q": "姿遥控模式下操纵无人机爬升，飞机航向向右偏离时，下列正确的操纵是", "opts": ["A 应柔和地向右扭舵", "B 应柔和地向左扭舵", "C 应柔和地向前顶杆"], "ans": 1, "exp": "航向向右偏→霢向左扭舵修正"}, {"id": 777, "ch": 8, "cat": "起降阶段操纵技术", "q": "遥控无人机着陆的过程不包", "opts": ["A 平飘接地和着陆滑", "B 下降和定", "C 下滑和拉"], "ans": 1, "exp": "睢陆过程包括下滑拉平平飘接地滑跑下降和定高不是睢陆特有阶段"}, {"id": 778, "ch": 8, "cat": "起降阶段操纵技术", "q": "遥控无人机着陆时，接地后跳跃的修正方法是", "opts": ["A 飞机跳离地面时，应稳住杆，迅速判明离地的高度和飞机状", "B 飞机跳离地面时，应迅速拉杆，避免再次坠落弹起", "C 飞机跳离地面时，应迅速推杆，压住飞机状"], "ans": 0, "exp": "跳跃时稳住杆判断状，避免粗猛修正导致再次弹跳"}, {"id": 779, {"id": 801, "ch": 8, "cat": "起降阶段操纵技术", "q": "遥控无人机着陆时，下列哪种情况需要复", "opts": ["A 飞机油料不足", "B 跑道上有飞机或其它障碍物影响睢陆安全时", "C 飞机稍稍偏离期望下滑"], "ans": 1, "exp": "跑道有障碍物影响安全→必须复飞"}, {"id": 802, "ch": 8, "cat": "起降阶段操纵技术", "q": "姿遥控模式下操纵无人机爬升，飞机航向向左偏离时，下列正确的操纵是", "opts": ["A 应柔和地向右扭舵", "B 应柔和地向左扭舵", "C 应柔和地向前顶杆"], "ans": 0, "exp": "航向向左偏→霢向右扭舵修正"}, {"id": 803, "ch": 8, "cat": "起降阶段操纵技术", "q": "遥控无人机在预定高度由下降转平飞", "opts": ["A 注视地平仪，柔和地加油门，同时拉", "B 注视地平仪，快加油门，同时拉", "C 注视地平仪，柔和地加油门，同时顶"], "ans": 0, "exp": "下降转平飞→加油?拉杆→减小下滑角→转入平飞"}, {"id": 804, "ch": 8, "cat": "起降阶段操纵技术", "q": "遥控无人机着陆时，关于顺风着陆描述正确的", "opts": ["A 睢陆滑跑中，按正常时机刹车即可", "B 睢陆滑跑中，应延后刹车，以免滑跑距离过", "C 睢陆滑跑中，应及时刹车，以免滑跑距离过"], "ans": 2, "exp": "顺风→地速大→滑跑距离长→需及时刹车"}, {"id": 805, "ch": 8, "cat": "起降阶段操纵技术", "q": "遥控无人机着陆时，关于顺风着陆描述正确的", "opts": ["A 四转弯后，地速减小，下滑角增大，下滑点应适当前移，下滑度比正常大丢", "B 四转弯后，地速增大，下滑角减小，下滑点应适当后移，下滑度比正常小丢", "C 四转弯后，地速增大，下滑角减小，下滑点应适当前移，下滑度比正常大丢"], "ans": 1, "exp": "顺风→地速增大→下滑角减小→下滑点后移→下滑速度比正常小"}, {"id": 806, "ch": 8, "cat": "起降阶段操纵技术", "q": "遥控无人机复飞后，襟翼收起时描述正确的操纵动作是", "opts": ["A 对飞机几乎没有影", "B 升力系数增大，飞机要上升，应适当地推", "C 升力系数下降，飞机要下沉，应适当地拉"], "ans": 2, "exp": "收襟翼→升力系数下降→飞机下沉→霢适当拉杆补偿"}, {"id": 807, "ch": 8, "cat": "起降阶段操纵技术", "q": "无人机驾驶员进行起飞前飞行器棢查内容不必包", "opts": ["A 起飞(发射)、降?回收)装置棢", "B 飞行器涂", "C 舵面结构及连接检"], "ans": 1, "exp": "飞行器涂装不是起飞前必检项目"}, {"id": 808, "ch": 8, "cat": "起降阶段操纵技术", "q": "无人机驾驶员操纵无人机平飞转爬升时，下列操纵易产生偏差的", "opts": ["A 及时棢查地平仪位置关系，及时修正偏", "B 动作柔和，且有提前量", "C 平飞、爬升飞行状态变换时，推杆拉杆方向不正，干扰其他通道"], "ans": 2, "exp": "推拉杆方向不正干扰其他道→容易产生偏差"}, {"id": 809, "ch": 8, "cat": "起降阶段操纵技术", "q": "无人机左侧风中起飞，侧风有使飞机机头向____偏转的趋", "opts": ["A ", "B ", "C 视风速的大小不同可能向左也可能向"], "ans": 0, "exp": "左侧风→机头左偏（风标效应）"}, {"id": 810, "ch": 8, "cat": "起降阶段操纵技术", "q": "无人机驾驶员操纵无人机定高平飞航迹偏离时，下列描述正确的", "opts": ["A 如果轨迹方向偏离目标5°以内，应快大幅度地向偏转的反方向适当扭舵", "B 如果轨迹方向偏离目标5°以内，应柔和地向偏转的方向当扭舵", "C 如果轨迹方向偏离目标5°以内，应柔和地向偏转的反方向适当扭舵"], "ans": 2, "exp": "小幅偏离→柔和向反方向修正"}, {"id": 811, "ch": 8, "cat": "起降阶段操纵技术", "q": "遥控无人机着陆时，关于大逆风睢陆描述正确的", "opts": ["A 睢陆后，立即刹", "B 睢陆后，地速减小慢，刹车不要太", "C 睢陆后，地速减小快，刹车不要太"], "ans": 2, "exp": "大风→地速小→接地后减快→刹车不宜太早"}, {"id": 812, "ch": 8, "cat": "起降阶段操纵技术", "q": "下列不属于对无人机机长训练要求的", "opts": ["A 在模拟器实施正常飞行程序指挥，不少于3小时", "B 在实物训练系统实施正常飞行程序指挥，不少?0小时", "C 有参与研制飞行模拟器经历"], "ans": 2, "exp": "参与研制飞行模拟器不是机长训练要求"}, {"id": 813, "ch": 8, "cat": "起降阶段操纵技术", "q": "遥控无人机着陆时", "opts": ["A 机场气温较高时，跑道下降气流明显，会导致下滑距离增长", "B 机场气温较高时，跑道下降气流明显，会导致下滑距离减小", "C 机场气温较高时，跑道上升气流明显，会导致下滑距离增长"], "ans": 2, "exp": "气温高→跑道上方上升气流→升力增大→下滑距离增长"}, {"id": 814, "ch": 8, "cat": "起降阶段操纵技术", "q": "无人机在遥控下降中，速度过大时，驾驶员应", "opts": ["A 适当减小带杆量，增大下滑", "B 适当增加带杆量，减小下滑", "C 顺其自然，让其自动恢复状"], "ans": 1, "exp": "下降速度过大→增加带杆量→减小下滑角→减速"}, {"id": 815, "ch": 8, "cat": "起降阶段操纵技术", "q": "无人机驾驶员操纵无人机刹车时机描述正确的", "opts": ["A 飞机接地后，马上刹车", "B 飞机接地后，待度降到安全范围内刹", "C 飞机接地后，待飞机滑停后再刹"], "ans": 1, "exp": "接地后不宜立即刹车，应等速度降低到安全范围再刹车"}, {"id": 816, "ch": 8, "cat": "起降阶段操纵技术", "q": "姿遥控模式下操纵无人机爬升，俯仰角偏低时，下列正确的操纵", "opts": ["A 应柔和地向右扭舵", "B 应柔和地向前顶杆", "C 应柔和地向后带杆"], "ans": 2, "exp": "俯仰角偏低→霢向后带杆增大俯仰角"}, {"id": 817, "ch": 8, "cat": "起降阶段操纵技术", "q": "遥控无人机着陆时，面对拉平低正确的操作方式是", "opts": ["A 如结束拉平过低且速度较大时，应停止继续拉", "B 如结束拉平过低且速度较大时，应当地多拉一点杆，避免三点接", "C 如结束拉平过低且速度较大时，应当地少拉一点杆，避免三点接"], "ans": 1, "exp": "拉平过低+速度大→霢多拉杆增加迎角→避免三点接地（前轮先触地）"}, {"id": 818, "ch": 8, "cat": "起降阶段操纵技术", "q": "起落航线(五边航线)组成内容不包", "opts": ["A 睢陆目测着", "B 任务飞行", "C 起飞、建立航"], "ans": 1, "exp": "起落航线不包括任务飞行，任务飞行在航线外执行"}, {"id": 819, "ch": 8, "cat": "起降阶段操纵技术", "q": "遥控无人机着陆时，关于大逆风睢陆描述正确的", "opts": ["A 第三转弯后，适当提前下滑时机，进入第四转弯的高度应比正常风时略高", "B 第三转弯后，适当延迟下滑时机，进入第四转弯的高度应比正常风时略高", "C 第三转弯后，适当提前下滑时机，进入第四转弯的高度应比正常风时略低"], "ans": 1, "exp": "大风→地速小→应延迟下滑→四转弯高度略高"}, {"id": 820, "ch": 8, "cat": "起降阶段操纵技术", "q": "以下哪一种情景容易引起飞行员产生飞机比实际位置偏高的错觉", "opts": ["A 向上带斜坡的地形", "B 向下带斜坡的地形", "C 常规跑道"], "ans": 0, "exp": "向上斜坡→飞行员误判高度偏高→容易引起偏高错觉"}, {"id": 821, "ch": 8, "cat": "起降阶段操纵技术", "q": "下列不属于转弯时易产生的偏差描述和原因的", "opts": ["A 发动机推力不足，导致形成高度偏差", "B 转弯中，未保持好机头与天地线的关系位置，以致速度增大或减", "C 进入和出转弯时，动作不协调，产生侧"], "ans": 0, "exp": "发动机推力不足不是转弯偏差的常见原因"}, {"id": 822, "ch": 8, "cat": "起降阶段操纵技术", "q": "遥控无人机着陆时，如果拉平前飞机的俯角较大下降快，应", "opts": ["A 拉杆稍早", "B 拉杆稍晚", "C 还按正常时机拉杆"], "ans": 0, "exp": "俯角大下降快→需提前拉杆→稍早拉杆"}, {"id": 823, "ch": 8, "cat": "起降阶段操纵技术", "q": "遥控无人机着陆时，关于顺风着陆描述正确的", "opts": ["A 正常时机三转弯即可，四转弯点距着陆点距离远近不影响安全着", "B 进入三转弯的时机应当提前，转弯的角度应当增大，使第四转弯点距睢陆点的距离当近一", "C 进入三转弯的时机应当延迟，转弯的角度应当减小，使第四转弯点距睢陆点的距离当远一"], "ans": 2, "exp": "顺风→地速大→三转弯延迟→四转弯距着陆点远→留足调整空间"}, {"id": 824, "ch": 8, "cat": "起降阶段操纵技术", "q": "无人机着陆目测与有人机相比不同之处为", "opts": ["A 有人机驾驶员通过地面人员通告仪表参，无人机起降驾驶员可自行观察仪表参考", "B 有人机是从飞机观察着陆场，无人机是从睢陆场观察飞机", "C 有人机为第三视角，无人机为第丢视角"], "ans": 1, "exp": "无人机着陆目测从睢陆场观察飞机，有人机从飞机观察着陆场"}, {"id": 825, "ch": 8, "cat": "起降阶段操纵技术", "q": "遥控无人机平飞转弯过程中", "opts": ["A 注视地平仪，向转弯方向压杆，同时反方向扭", "B 注视地平仪，协调地向转弯方向压杆扭舵，形成一定坡度后，稳杆保", "C 注视地平仪，协调地向转弯反方向压杆扭舵，形成丢定坡度后，稳杆保"], "ans": 1, "exp": "转弯：协调向转弯方向压杆扭舵→形成坡度→稳杆保持"}, {"id": 826, "ch": 8, "cat": "起降阶段操纵技术", "q": "飞行驾驶员操纵无人机转弯时，下列描述正确的操纵方式是", "opts": ["A 机头过低时，应向转弯丢侧的斜前方当推杆并稍扭舵", "B 机头过低时，应向转弯丢侧的斜后方当拉杆并稍回舵", "C 机头过低时，应向转弯丢侧的斜前方当拉杆并稍扭舵"], "ans": 1, "exp": "转弯中机头过低→霢向转弯斜后方拉杆（抬头）+回舵"}, {"id": 827, "ch": 8, "cat": "起降阶段操纵技术", "q": "遥控无人机着陆拉平时，对拉平操作描述不恰当的", "opts": ["A 主动地有预见地机动灵活地去操纵飞", "B 严格按高度执行动", "C 正确的拉平动作，必须按照实际情况"], "ans": 1, "exp": "拉平不能只严格按高度值，霢根据实际情况灵活调整"}, {"id": 828, "ch": 8, "cat": "起降阶段操纵技术", "q": "无人机定高平飞时，驾驶员面对地面站界", "opts": ["A 短暂休息，偶尔关注一下飞机状", "B 根据目标点方向，密切判断飞行方向", "C 切至自主控制模式，尽可放松休"], "ans": 1, "exp": "定高平飞时需根据目标方向密切判断飞行方向"}, {"id": 829, "ch": 8, "cat": "起降阶段操纵技术", "q": "无人机驾驶员关于无人机飞行度限制不需要了解的", "opts": ["A 静止时飞机零漂度", "B 不同高度、重量下的失速度", "C 俯冲朢大度"], "ans": 0, "exp": "静止零漂速度不是飞行速度限制霢要了解的内容"}, {"id": 830, "ch": 8, "cat": "起降阶段操纵技术", "q": "遥控无人机由下降转为平飞", "opts": ["A 超过预定高度20-30米时，开始改平飞", "B 下降至预定高度前20-30米时，开始改平飞", "C 到达预定高度时，弢始改平飞"], "ans": 1, "exp": "提前20-30米改平飞，防止冲过预定高度"}, {"id": 831, "ch": 8, "cat": "起降阶段操纵技术", "q": "姿遥控模式下操纵无人机爬升，俯仰角偏高时，下列正确的操纵", "opts": ["A 应柔和地向右扭舵", "B 应柔和地向后带杆", "C 应柔和地向前顶杆"], "ans": 2, "exp": "俯仰角偏高→霢向前顶杆减小俯仰角"}, {"id": 832, "ch": 8, "cat": "起降阶段操纵技术", "q": "遥控无人机着陆时，关于大逆风睢陆描述正确的", "opts": ["A 第三转弯时机应当提前，以便第四转弯点距降落点比正常略远一", "B 第三转弯时机应当提前，以便第四转弯点距降落点比正常略近一", "C 第三转弯时机应当延后，以便第四转弯点距降落点比正常略近一"], "ans": 1, "exp": "大风→地速小→三转弯提前→四转弯点距降落点略近"}, {"id": 833, "ch": 8, "cat": "起降阶段操纵技术", "q": "无人机积水道面上起飞，其起飞距离比正常情况下", "opts": ["A ", "B 相等", "C "], "ans": 2, "exp": "积水→阻力增大→起飞滑跑距离增长"}, {"id": 834, "ch": 8, "cat": "起降阶段操纵技术", "q": "无人机驾驶员进行起飞前动力装置检查内容不必包", "opts": ["A 发动机启动后怠转速震动稳定检", "B 发动机油量检", "C 发动机生产厂家检"], "ans": 2, "exp": "发动机生产厂家不是起飞前棢查内容"}, {"id": 835, "ch": 8, "cat": "起降阶段操纵技术", "q": "无人机定高平飞时，驾驶员面对地面站界", "opts": ["A 不断观察发动机指示，了解发动机工作情", "B 短暂休息，偶尔关注一下飞机状", "C 切至自主控制模式，尽可放松休"], "ans": 0, "exp": "定高平飞时仍霢持续观察发动机工作情况"}, {"id": 836, "ch": 9, "cat": "多旋翼知识（上）", "q": "某螺旋桨是正桨，是指", "opts": ["A 从多轴飞行器上方观察，该螺旋桨时针旋", "B 从多轴飞行器上方观察，该螺旋桨顺时针旋转", "C 从多轴飞行器下方观察，该螺旋桨时针旋"], "ans": 0, "exp": "正桨（CCW）：从上方俯视时针旋转"}, {"id": 837, "ch": 9, "cat": "多旋翼知识（上）", "q": "丢般来讲，多轴飞行器在地面风大于____级作业时，会对飞行器安全和拍摄有影响", "opts": ["A 2", "B 4", "C 6"], "ans": 1, "exp": "多轴飞行器在4级风以上受明显影响"}, {"id": 838, "ch": 9, "cat": "多旋翼知识（上）", "q": "X模式4轴飞行器从悬停转换到前进，那两个轴需要加", "opts": ["A 右侧两轴", "B 左侧两轴", "C 后方两轴"], "ans": 2, "exp": "前进：后方两轴加速→机身前→前进"}, {"id": 839, "ch": 9, "cat": "多旋翼知识（上）", "q": "以下不是多轴飞行器优点的", "opts": ["A 气动效率", "B 结构箢", "C 成本低廉"], "ans": 0, "exp": "多轴飞行器气动效率不如固定翼，不是其优点"}, {"id": 840, "ch": 9, "cat": "多旋翼知识（上）", "q": "某多轴动力电池标?S2P字样，代", "opts": ["A 电池?S2P公司生产", "B 电池组先?个单体串联，再将串联后的3组并", "C 电池组先?个单体串联，再将串联后的2组并"], "ans": 2, "exp": "3S2P?片串联（11.1V），2组并联（增大容量）"}, {"id": 841, "ch": 9, "cat": "多旋翼知识（上）", "q": "多轴飞行器螺旋桨从结构上说，更接近于", "opts": ["A 风力发电机叶", "B 直升机旋", "C 固定翼飞机螺旋桨"], "ans": 2, "exp": "多轴螺旋桨结构与固定翼螺旋桨类似"}, {"id": 842, "ch": 9, "cat": "多旋翼知识（上）", "q": "部分多轴飞行器螺旋桨加有外框，其主要作用", "opts": ["A 防止磕碰提高安全", "B 增加外形的美", "C 提高螺旋桨效"], "ans": 0, "exp": "桨保护框主要作用是防止磕碰，提高安全性"}, {"id": 843, "ch": 9, "cat": "多旋翼知识（上）", "q": "某多轴电机标?000KV字样，意义是", "opts": ["A 对应每V电压，电机提?000转转", "B 电机朢大压1000KV", "C 对应每V电压，电机提?000000转转"], "ans": 0, "exp": "KV值：每伏特电压对应的空载转（RPM/V），1000KV?V电压1000?分"}, {"id": 844, "ch": 9, "cat": "多 ，3508更细高按原题，C表述反了"}, {"id": 938, "ch": 9, "cat": "多旋翼知识（上）", "q": "目前抢术条件下，燃油发动机不合作为多轴飞行器动力的原因，表述不正确的是", "opts": ["A 尺寸，重量较", "B 调时响应较慢，且出于安全性原因需要稳定转速工", "C 生物燃料能量密度低于锂电"], "ans": 2, "exp": "燃油能量密度远高于锂电池，C表述错误"}, {"id": 939, "ch": 9, "cat": "多旋翼知识（上）", "q": "下列哪个选项中的直升机的分类方式是相同的", "opts": ["A 微型直升机，轻型无人直升机，四轴飞行", "B 3代直升机，变模无人旋翼机，复合无人旋翼机", "C 单旋翼带尾桨式无人直升机，共轴式双旋翼无人直升机，多轴无人飞行器"], "ans": 2, "exp": "C选项按结构形式分类（单旋翼共轴多轴），分类方式一致"}, {"id": 940, "ch": 9, "cat": "多旋翼知识（上）", "q": "某多轴螺旋桨?81毫米，螺?27毫米，那么他的型号可表述", "opts": ["A 3812", "B 38x12", "C 15x5"], "ans": 2, "exp": "381mm?5英寸?27mm?英寸?5×5"}, {"id": 941, "ch": 9, "cat": "多旋翼知识（上）", "q": "多轴??", "opts": ["A 舵机", "B 旋翼", "C 飞行器运动坐标轴"], "ans": 1, "exp": "多轴??指旋翼轴（电机轴），即旋翼数量"}, {"id": 942, "ch": 9, "cat": "多旋翼知识（上）", "q": "悬停状的四轴飞行器如何实现向后移", "opts": ["A 横轴前侧的螺旋桨减，横轴后侧的螺旋桨加", "B 纵轴右侧的螺旋桨减，纵轴左侧的螺旋桨加", "C 横轴前侧的螺旋桨加，横轴后侧的螺旋桨减"], "ans": 2, "exp": "向后移动：前侧加速（升力增大）→机身向后倾→后"}, {"id": 943, "ch": 9, "cat": "多旋翼知识（上）", "q": "多轴飞行器动力系统主要使", "opts": ["A 有刷电机", "B 四冲程发动机", "C 无刷电机"], "ans": 2, "exp": "多轴飞行器主要使用无刷电机"}, {"id": 944, "ch": 9, "cat": "多旋翼知识（上）", "q": "关于多轴飞行器机桨与电机匹配描述正确的是", "opts": ["A 大螺旋桨要用低KV电机", "B 小螺旋桨要用低KV电机", "C 大螺旋桨要用高KV电机"], "ans": 0, "exp": "大桨霢低KV（大扭矩），小桨可用高KV（高转）"}, {"id": 945, "ch": 9, "cat": "多旋翼知识（上）", "q": "多轴飞行器的飞控硬件尽量安装", "opts": ["A 飞行器前", "B 飞行器中", "C 飞行器底"], "ans": 1, "exp": "飞控应安装在飞行器中心位置，保证传感器准确感知姿态"}, {"id": 946, "ch": 9, "cat": "多旋翼知识（上）", "q": "关于多轴飞行器机桨与电机匹配描述错误的是", "opts": ["A 大螺旋桨要用低KV电机", "B 小螺旋桨要用高KV电机", "C 大螺旋桨要用高KV电机"], "ans": 2, "exp": "大桨配低KV，小桨配高KV。C说反了"}, {"id": 947, "ch": 9, "cat": "多旋翼知识（上）", "q": "下列哪种形式的旋翼飞行器不是直升", "opts": ["A 共轴双旋翼式", "B 自转旋翼", "C 多轴飞行"], "ans": 1, "exp": "自转旋翼机旋翼无动力驱动，不是直升机"}, {"id": 948, "ch": 9, "cat": "多旋翼知识（上）", "q": "电调是多旋翼无人机最重要的部件之丢，不属于飞行器电调功能的", "opts": ["A 变压供电", "B 电机调", "C 实时电机反转"], "ans": 2, "exp": "多轴飞行中电调不霢要实时反转电机，改变旋翼转向通过交换接线实现"}, {"id": 949, "ch": 9, "cat": "多旋翼知识（上）", "q": "八轴飞行器安装有", "opts": ["A 8个顺时针旋转螺旋", "B 4个顺时针旋转螺旋桨，4个时针旋转螺旋桨", "C 2个顺时针旋转螺旋桨，6个时针旋转螺旋 机的旋翼或固定翼无人机的螺旋桨，保持角度丢定，更换直径较小的旋翼或螺旋桨，会导", "opts": ["A 桨尖速度变大", "B 桨尖速度不变", "C 桨尖速度变小"], "ans": 2, "exp": "角度不变→半径减小→线度（桨尖度）减小"}, {"id": 962, "ch": 10, "cat": "多旋翼知识（下）", "q": "多轴飞行器在运输过程中的注意事项", "opts": ["A 装箱运输，也可行李箱运输", "B 可随意拆装运", "C 做好减震措施，固定云台并安装云台固定支架，装箱运"], "ans": 2, "exp": "运输时应做好减震、固定云台装箱运输"}, {"id": 963, "ch": 10, "cat": "多旋翼知识（下）", "q": "使用多轴飞行器在低温及潮湿环境中作业时的注意事项，不包括", "opts": ["A 飞行器与摄像器材防止冰冻", "B 起飞前动力电池的保温", "C 曝光偏差"], "ans": 2, "exp": "曝光偏差是拍摄技术问题，不是环境注意事项"}, {"id": 964, "ch": 10, "cat": "多旋翼知识（下）", "q": "某多轴电机标?208字样，意思是", "opts": ["A 该电机定子直径为22毫米", "B 该电机最大承?2V电压，最小承?V电压", "C 该电机转子高度为22毫米"], "ans": 0, "exp": "2208：定子直?2mm，定子高?mm"}, {"id": 965, "ch": 10, "cat": "多旋翼知识（下）", "q": "使用多轴飞行器作", "opts": ["A 应在人员密集区，如公园广场等", "B 在规定空域使用，且起飞前提醒周边人群远离", "C 不受环境影响"], "ans": 1, "exp": "应在规定空域飞行，起飞前提醒人群远离"}, {"id": 966, "ch": 10, "cat": "多旋翼知识（下）", "q": "多轴飞行器控制电机转速的直接设备", "opts": ["A 电调", "B 电源", "C 飞控"], "ans": 0, "exp": "电调（ESC）直接控制电机转速，接收飞控指令"}, {"id": 967, "ch": 10, "cat": "多旋翼知识（下）", "q": "对于多轴飞行器，飞行速度影响航拍设备曝光，以下正确的", "opts": ["A 速度越快，需提高曝光度，保证正常曝光", "B 速度快慢，不影响拍摄曝光", "C 速度越快，需降低曝光度，保证正常曝光"], "ans": 0, "exp": "速度越快→画面变化越快→霢提高曝光度（或增大ISO/光圈）按原题答案A"}, {"id": 968, "ch": 10, "cat": "多旋翼知识（下）", "q": "某多轴动力电池容量为10Ah，表", "opts": ["A 理论上，?0mA电流放电，可放电1小时", "B 理论上，?0A电流放电，可放电10小时", "C 理论上，?0000mA电流放电，可放电1小时"], "ans": 2, "exp": "10Ah=10000mAh，以10000mA?0A）放电可持续1小时"}, {"id": 969, "ch": 10, "cat": "多旋翼知识（下）", "q": "悬停状的六轴飞行器如何实现向前移", "opts": ["A 横轴前侧的螺旋桨加，横轴后侧的螺旋桨减", "B 横轴前侧的螺旋桨减，横轴后侧的螺旋桨加", "C 纵轴右侧的螺旋桨减，纵轴左侧的螺旋桨加"], "ans": 1, "exp": "向前移动：前侧减速（拉力减小），后侧加（拉力增大）→机身前→前进"}, {"id": 970, "ch": 10, "cat": "多旋翼知识（下）", "q": "某多旋翼飞行器螺旋桨标有\"cw\"字样，表明该螺旋", "opts": ["A 俯视多旋翼飞行器顺时针旋", "B 该螺旋桨?CW\"", "C 俯视多旋翼飞行器逆时针旋"], "ans": 0, "exp": "CW=Clockwise=顺时针旋转（俯视）"}, {"id": 971, "ch": 10, "cat": "多旋翼知识（下）", "q": "使用多轴飞行器，航拍过程中，为了保证画面明暗稳定，相机尽量设定为", "opts": ["A 快门固定", "B 光圈固定", "C ISO固定"], "ans": 2, "exp": "ISO固定可保持画面明暗稳定，避免曝光变化"}, {"id": 972, "ch": 10, "cat": "多旋翼知识（下）", "q": "对于多轴飞行器动力电源充电，以下 208：定子直?2mm，高?mm"}, {"id": 985, "ch": 10, "cat": "多旋翼知识（下）", "q": "在多轴飞行器航空摄影中，日出日落拍摄时，摄像机白平衡调整应调整为____以拍出正常白平衡画面", "opts": ["A 低色温", "B 高色温", "C 闪光灯模"], "ans": 0, "exp": "日出日落色温偏低（约3000K），霢设置低色温白平衡匹配"}, {"id": 986, "ch": 10, "cat": "多旋翼知识（下）", "q": "下列属于现今多旋翼飞行器典型应用的是", "opts": ["A 高空长航时侦", "B 侦打丢体化", "C 航拍电影取景"], "ans": 2, "exp": "多旋翼飞行器典型应用是航拍电影取景"}, {"id": 987, "ch": 10, "cat": "多旋翼知识（下）", "q": "多轴飞行器在没有发生机械结构改变的前提下，如发生漂移，不能直线飞行时，不霢关注的是", "opts": ["A 调整重心位置", "B 指南针校", "C GPS定位"], "ans": 0, "exp": "无机械结构改变时漂移应检查指南针和GPS，不霢调整重心"}, {"id": 988, "ch": 10, "cat": "多旋翼知识（下）", "q": "6轴飞行器某个电机发生故障时，对应做出类似停止工作的电机应是____电机", "opts": ["A 俯视逆时针方向下丢", "B 对角", "C 俯视顺时针方向下丢"], "ans": 1, "exp": "六轴某电机故障→停止对角电机→保持力矩平衡"}, {"id": 989, "ch": 10, "cat": "多旋翼知识（下）", "q": "丢般来讲，多轴飞行器在地面风大于____级时作业，会对飞行器安全和拍摄稳定有影响", "opts": ["A 4", "B 6", "C 2"], "ans": 0, "exp": "4级风?.5-7.9m/s）以上多轴飞行受影响明显"}, {"id": 990, "ch": 10, "cat": "多旋翼知识（下）", "q": "X模式6轴飞行器从悬停转换到向左平移，哪两个轴需要减", "opts": ["A 右侧两轴", "B 左侧两轴", "C 后方两轴"], "ans": 1, "exp": "向左平移：左侧减速，右侧加"}, {"id": 991, "ch": 10, "cat": "多旋翼知识（下）", "q": "描述丢个多轴无人机地面遥控发射机是\"美国?，是", "opts": ["A 左手左右动作控制油门或高", "B 右手上下动作控制油门或高", "C 左手上下动作控制油门或高"], "ans": 2, "exp": "美国手（Mode 2）：左手油门/高度，右手前后左右姿态"}, {"id": 992, "ch": 10, "cat": "多旋翼知识（下）", "q": "桨叶\"上反效应\"引起锥体向方位侧", "opts": ["A 0°", "B 180°", "C 90°"], "ans": 2, "exp": "上反效应使前行桨叶升力大于后行桨叶→锥体?0°方位侧"}, {"id": 993, "ch": 10, "cat": "多旋翼知识（下）", "q": "多轴飞行器的螺旋", "opts": ["A 桨根处迎角等于桨尖处迎角", "B 桨根处迎角大于桨尖处迎角", "C 桨根处迎角小于桨尖处迎角"], "ans": 1, "exp": "桨根安装角（迎角）大于桨尖，以保持各截面升力均匀"}, {"id": 994, "ch": 10, "cat": "多旋翼知识（下）", "q": "在高海拔、寒冷空气稀薄地区，飞行负载不变，飞行状态会", "opts": ["A 功率损增大，飞行时间减少", "B 飞行时间变长", "C 朢大起飞重量增"], "ans": 0, "exp": "空气稢薄→升力减小→需更大功率→航时缩短"}, {"id": 995, "ch": 10, "cat": "多旋翼知识（下）", "q": "以下哪种动力电池放电电流朢", "opts": ["A 30000mAh?C", "B 20000mAh?C", "C 2Ah?0C"], "ans": 0, "exp": "A=150A，B=100A，C=60A。A朢大"}, {"id": 996, "ch": 10, "cat": "多旋翼知识（下）", "q": "以多轴航拍飞行器为例，是否轴数越多载重能力越", "opts": ["A 不是", "B ", "C 不一"], "ans": 2, "exp": "载 , "exp": "前飞时需机身前→俯仰角必然变化"}, {"id": 1009, "ch": 10, "cat": "多旋翼知识（下）", "q": "关于多轴飞行器的优势描述不正确的", "opts": ["A 气动效率", "B 结构箢单便", "C 成本低廉"], "ans": 0, "exp": "多轴飞行器气动效率不如固定翼，不是其优势"}, {"id": 1010, "ch": 10, "cat": "多旋翼知识（下）", "q": "多轴飞行器的螺旋", "opts": ["A 桨根处升力系数等于桨尖处升力系数", "B 桨根处升力系数小于桨尖处升力系数", "C 桨根处升力系数大于桨尖处升力系数"], "ans": 2, "exp": "桨根安装角大，升力系数较大；桨尖安装角小，升力系数较小"}, {"id": 1011, "ch": 10, "cat": "多旋翼知识（下）", "q": "当多轴飞行器飞远超出视线范围无法辨别机头方向时，应对方式错误的是", "opts": ["A 云台复位通过图像确定机头方向", "B 加大油门", "C 丢键返"], "ans": 1, "exp": "方向不明时加大油门只会更危险"}, {"id": 1012, "ch": 10, "cat": "多旋翼知识（下）", "q": "根据无人机行业习惯，通常定义右旋前进的螺旋桨", "opts": ["A 反桨", "B 拉桨", "C 正桨"], "ans": 0, "exp": "右旋前进的螺旋桨称为反桨（CCW）"}, {"id": 1013, "ch": 10, "cat": "多旋翼知识（下）", "q": "多轴飞行器航拍中，果冻效应或水波纹效应产生的原因", "opts": ["A 摄像机无云台增稳", "B 高频振动传到摄像", "C 低频振动传到摄像"], "ans": 1, "exp": "果冻效应（Jello）由高频振动传到相机引起"}, {"id": 1014, "ch": 10, "cat": "多旋翼知识（下）", "q": "X模式4轴飞行器从悬停转换到前进，哪两个轴需要加", "opts": ["A 右侧两轴", "B 左侧两轴", "C 后方两轴"], "ans": 2, "exp": "前进：后方两轴加速→机身前→前进"}, {"id": 1015, "ch": 10, "cat": "多旋翼知识（下）", "q": "丢块聚合物锂电池上标有25C字样，C代表", "opts": ["A 充电倍率", "B 容量倍率", "C 放电倍率"], "ans": 2, "exp": "C代表放电倍率?5C即最大放电电流为容量?5倍"}, {"id": 1016, "ch": 10, "cat": "多旋翼知识（下）", "q": "同样重量不同类型的动力电池，价格朢低廉的是", "opts": ["A 聚合物锂电池", "B 镍氢电池", "C 镍镉电池"], "ans": 2, "exp": "镍镉电池价格朢低廉，但有记忆效应"}, {"id": 1017, "ch": 10, "cat": "多旋翼知识（下）", "q": "在高海拔地区，多轴飞行器出现较难离地时，朢有效的应对措施是", "opts": ["A 更换大容量电", "B 更换大桨", "C 减重"], "ans": 2, "exp": "高海拔空气稀薄→升力不足→减重最直接有效"}, {"id": 1018, "ch": 10, "cat": "多旋翼知识（下）", "q": "六轴飞行器安装有", "opts": ["A 6个顺时针旋转螺旋", "B 3个顺时针旋转螺旋桨，3个时针旋转螺旋桨", "C 4个顺时针旋转螺旋桨，2个时针旋转螺旋桨"], "ans": 1, "exp": "六轴：正反旋翼各3个，平衡反扭矩"}, {"id": 1019, "ch": 10, "cat": "多旋翼知识（下）", "q": "多旋翼飞行器悬停时的平衡不包", "opts": ["A 俯仰平衡", "B 升力平衡", "C 诱导阻力平衡"], "ans": 2, "exp": "悬停时无前飞速度，不霢要平衡诱导阻力"}, {"id": 1020, "ch": 10, "cat": "多旋翼知识（下）", "q": "以下哪个是小型电动无人机常用的动力电池类", "opts": ["A Li-Po", "B Ni-Cd", "C Ni-MH"], "ans": 0, "exp": "锂聚合物电池（Li-Po）是小型电动无人机最常用的动力电池"}, {"id": 1021, "ch": 10, "cat": "多旋翼知识（下）", "q": "多旋翼飞行器使用的锂聚合物动力电池，其单体标称电压为", "opts": ["A 11.1V", "B 1.2V", "C 3.7V"], "ans": 2, "exp": "锂聚合物单体标称电压3.7V"}, {"id": 1022, "ch": 10, "cat": "多旋翼知识（下）", "q": "无人机系统中的GPS模块为飞控提供了哪些信息", "opts": ["A 经纬度高度与空", "B 传感器姿态与加度", "C 位置、高度与地"], "ans": 2, "exp": "GPS提供位置（经纬度）高度和地信息"}, {"id": 1023, "ch": 10, "cat": "多旋翼知识（下）", "q": "当多旋翼飞行器地面站出现飞行器电压过低报警时，第丢时刻采取的措施是", "opts": ["A 丢键返", "B 控制姿，逐渐降低高度，迫降至地面", "C 结合飞行器位置判断是否满足安全返航条"], "ans": 2, "exp": "先判断能否安全返航，再做决策。不能盲目迫降"}, {"id": 1024, "ch": 10, "cat": "多旋翼知识（下）", "q": "多轴航拍飞行器难以完成哪种工", "opts": ["A 测绘", "B 超远距离监控", "C 直播"], "ans": 1, "exp": "多轴飞行器续航短、活动半径有限，不合超远距离监控"}, {"id": 1025, "ch": 10, "cat": "多旋翼知识（下）", "q": "多旋翼飞行器在运输过程中的注意事项是", "opts": ["A 做好减震措施，固定云台并安装云台固定支架，装箱运", "B 可随意拆装运", "C 装箱运输，也可行李箱运输"], "ans": 0, "exp": "运输时应做好减震、固定云台装箱"}, {"id": 1026, "ch": 10, "cat": "多旋翼知识（下）", "q": "多轴航拍中往徢霢要使用相机的位移补偿功能，导致使用此功能的原因是", "opts": ["A 飞行器姿态不", "B 风", "C 飞行器的速度"], "ans": 2, "exp": "位移补偿用于抵消飞行速度带来的画面移动"}, {"id": 1027, "ch": 10, "cat": "多旋翼知识（下）", "q": "聚合物锂电池单体充满电后的电压一般为", "opts": ["A 3.7V", "B 4.2V", "C 3.3V"], "ans": 1, "exp": "锂聚合物单体满电电压4.2V，标?.7V"}, {"id": 1028, "ch": 10, "cat": "多旋翼知识（下）", "q": "某多轴电机标?810字样，意思是", "opts": ["A 该电机转子高度为38毫米", "B 该电机定子直径为38毫米", "C 该电机最大承?8V电压，最小承?0V电压"], "ans": 1, "exp": "3810：定子直?8mm，高?0mm"}, {"id": 1029, "ch": 10, "cat": "多旋翼知识（下）", "q": "以下电池类型中，记忆效应朢强的", "opts": ["A 锂电", "B 镍氢电池", "C 镍镉电池"], "ans": 2, "exp": "镍镉电池记忆效应朢强"}, {"id": 1030, "ch": 10, "cat": "多旋翼知识（下）", "q": "大多数多旋翼飞行器自主飞行过程利用____实现高度感知", "opts": ["A 气压高度", "B GPS", "C 超声波高度计"], "ans": 1, "exp": "多数多旋翼飞行器使用GPS实现高度感知"}, {"id": 1031, "ch": 10, "cat": "多旋翼知识（下）", "q": "以下哪个是小型电动无人机常用的动力电池类", "opts": ["A 铅酸电池", "B 银锌电池", "C 锂电"], "ans": 2, "exp": "锂电池是小型电动无人机最常用动力电池"}, {"id": 1032, "ch": 10, "cat": "多旋翼知识（下）", "q": "使用多轴飞行器，拍摄夜景时，", "opts": ["A 降低飞行高度，保证正常曝", "B 与白天没有明显区", "C 降低飞行速度，保证正常曝"], "ans": 2, "exp": "夜景霢较长曝光时间，降低飞行度可减少画面模糊"}, {"id": 1033, "ch": 10, "cat": "多旋翼知识（下）", "q": "下列哪种方式可以使多轴飞行器搭载的摄影装备拍摄角度实现全仰拍摄且不穿", "opts": ["A 多轴飞行器搭载下沉式云台", "B 多轴飞行器搭载前探式云台", "C 多轴飞行器使用折叠式脚架"], "ans": 1, "exp": "前探式云台可将相机前伸，实现全仰拍摄不穿帮"}, {"id": 1034, "ch": 10, "cat": "多旋翼知识（下）", "q": "以下电池类型中，记忆效应朢强的", "opts": ["A Ni-Cd", "B Ni-MH", "C Li-Po"], "ans": 0, "exp": "镍镉电池（Ni-Cd）记忆效应最强"}, {"id": 1035, "ch": 10, "cat": "多旋翼知识（下）", "q": "下列哪个姿角的变化对多轴航拍影响朢", "opts": ["A 俯仰", "B 横滚", "C 航向"], "ans": 2, "exp": "航向角（偏航）变化直接改变拍摄方向，对构图影响最大"}, {"id": 1036, "ch": 10, "cat": "多旋翼知识（下）", "q": "遥控器菜单中REV是设置什么的", "opts": ["A 通道行程", "B 失控保护", "C 通道反向"], "ans": 2, "exp": "REV=Reverse，设置道输出反向"}, {"id": 1037, "ch": 10, "cat": "多旋翼知识（下）", "q": "多轴飞行器都有哪些用?1应救?2军用侦察;3警用监视;4娱乐;5广电行业", "opts": ["A 1????", "B 1??", "C 2??"], "ans": 0, "exp": "以上五项均为多轴飞行器的用"}, {"id": 1038, "ch": 10, "cat": "多旋翼知识（下）", "q": "对于多旋翼飞行器", "opts": ["A 旋翼只起升力面的作用", "B 旋翼只充当纵横向和航向的操纵", "C 旋翼既是升力面又是纵横向和航向的操纵"], "ans": 2, "exp": "多旋翼飞行器旋翼既是升力面也是操纵面"}, {"id": 1039, "ch": 10, "cat": "多旋翼知识（下）", "q": "多旋翼飞行器在没有发生机械结构改变的前提下，如发生漂移，不能直线飞行时，不需要关注的", "opts": ["A 调整重心位置", "B GPS定位", "C 指南针校"], "ans": 0, "exp": "无机械结构改变时漂移应检查GPS和指南针，不霢调整重心"}, {"id": 1040, "ch": 10, "cat": "多旋翼知识（下）", "q": "多轴飞行器定点半径画圆飞行时，如何能得到朢佳航拍画", "opts": ["A 平移画面", "B 边绕圈边上升", "C 绕圈丢"], "ans": 1, "exp": "边绕圈边上升（螺旋上升）可拍出富有层次感的画靃69"}, {"id": 1041, "ch": 10, "cat": "多旋翼知识（下）", "q": "使用多轴飞行器，航拍过程中，必须紧返航的情况", "opts": ["A 距离过远，高度过高，超出视线范围", "B 监视器显示无人机电池电量过低", "C 图传监视器有干扰不稳"], "ans": 1, "exp": "电池电量过低是必须紧急返航的情况"}, {"id": 1042, "ch": 10, "cat": "多旋翼知识（下）", "q": "八轴飞行器某个电机发生故障时，对应做出类似停止工作的电机应是____电机", "opts": ["A 俯视顺时针方向下丢", "B 俯视顺时针方向下下一", "C 对角"], "ans": 2, "exp": "八轴某电机故障→停止对角电机→保持力矩平衡"}, {"id": 1043, "ch": 10, "cat": "多旋翼知识（下）", "q": "多旋翼飞行器的操纵不包括", "opts": ["A 航向操纵", "B 周期变距", "C 俯仰操纵"], "ans": 1, "exp": "周期变距是直升机的操纵方式，多旋翼过改变旋翼转差实现操纵"}, {"id": 1044, "ch": 10, "cat": "多旋翼知识（下）", "q": "经测试，某多轴飞行器稳定飞行时，动力电池的持续输出电流为10安培，该多轴可以选用", "opts": ["A 15A的电", "B 10A的电", "C 50A的电"], "ans": 2, "exp": "电调霢留足够余量（2-3倍）?0A输出应?0A电调"}, {"id": 1045, "ch": 10, "cat": "多旋翼知识（下）", "q": "对于多轴航拍飞行器云台说法正确的", "opts": ["A 云台是航拍设备的增稳和操纵装", "B 云台的效果与传统舵机丢", "C 云台保证无人机在云层上飞行的安全"], "ans": 0, "exp": "云台是航拍设备的增稳和角度操纵装置"}, {"id": 1046, "ch": 10, "cat": "多旋翼知识（下）", "q": "多旋翼飞行器上的电信号传播顺序一般为", "opts": ["A 机载遥控接收?-飞控--电调--电机", "B 飞控--机载遥控接收?-电机--电调", "C 飞控--电调--机载遥控接收?-电机"], "ans": 0, "exp": "信号流向：接收机→飞控→电调→电机"}, {"id": 1047, "ch": 10, "cat": "多旋翼知识（下）", "q": "多轴飞行器正常作业受自然环境影响的主要因素是", "opts": ["A 风向", "B 地表是否凹凸平坦", "C 温度、风"], "ans": 2, "exp": "温度和风力是影响多轴飞行器作业的主要自然环境因素"}, {"id": 1048, "ch": 10, "cat": "多旋翼知识（下）", "q": "相对于传统直升机，多轴最大的优势", "opts": ["A 载重能力", "B 气动效率", "C 结构与控制简"], "ans": 2, "exp": "多轴朢大优势是机械结构箢单控制简便"}, {"id": 1049, "ch": 10, "cat": "多旋翼知识（下）", "q": "关于部分多旋翼飞行器机臂上反角设计描述错误的", "opts": ["A 提高稳定", "B 提高载荷作业空间", "C 提高机动"], "ans": 2, "exp": "上反角提高稳定，不提高机动"}, {"id": 1050, "ch": 10, "cat": "多旋翼知识（下）", "q": "多轴飞行器上的链路天线应尽量____飞控和GPS天线安装", "opts": ["A 贴合", "B 靠近", "C 远离"], "ans": 2, "exp": "链路天线应远离飞控和GPS天线，避免电磁干扰"}, {"id": 1051, "ch": 10, "cat": "多旋翼知识（下）", "q": "多轴旋翼飞行器过改变____控制飞行轨迹", "opts": ["A 总距", "B 尾桨", "C 转"], "ans": 2, "exp": "多轴飞行器过改变各旋翼转速差控制飞行轨迹"}, {"id": 1052, "ch": 10, "cat": "多旋翼知识（下）", "q": "使用多轴飞行器航拍过程中，温度对摄像机的影响描述正确的是", "opts": ["A 在温度较低的环境拍摄摄像机电池使用时间长", "B 在温度较高的环境拍摄摄像机电池使用时间短", "C 在温差较大的环境中拍摄要注意镜头的结"], "ans": 2, "exp": "温差大时镜头容易结雾，影响拍摄"}, {"id": 1053, "ch": 10, "cat": "多旋翼知识（下）", "q": "在多轴飞行任务中，触发失控返航时，应如何打断飞控当前任务，取回手动控制权", "opts": ["A 云台状切", "B 航向锁定切换", "C GPS手动模式切换"], "ans": 2, "exp": "切换至GPS手动模式可打断失控返航取回控制权"}, {"id": 1054, "ch": 10, "cat": "多旋翼知识（下）", "q": "起飞时，可操纵变螺距螺旋桨的桨叶角到仢么状", "opts": ["A 小桨叶角及高转", "B 小桨叶角及低转", "C 大桨叶角及高转"], "ans": 0, "exp": "起飞时小桨叶角（小螺距）+高转速→拉力朢大"}, {"id": 1055, "ch": 11, "cat": "任务航线规划", "q": "无人机任务规划是实现____的有效径，它在很大程度上决定了无人机执行任务的效", "opts": ["A 航迹规划与自主导", "B 飞行任务与载荷匹", "C 自主导航与飞行控"], "ans": 2, "exp": "任务规划实现自主导航与飞行控制，决定任务执行效率"}, {"id": 1056, "ch": 11, "cat": "任务航线规划", "q": "从实施时间上划分，任务规划可以分", "opts": ["A 航迹规划和数据链路规", "B 预先规划和实时规", "C 航迹规划和任务分配规"], "ans": 1, "exp": "任务规划按实施时间分为预先规划和实时规划"}, {"id": 1057, "ch": 11, "cat": "任务航线规划", "q": "无人机任务规划需要虑的因素有:____，无人机物理限制，实时要", "opts": ["A 飞行任务范围，飞行安全限", "B 飞行安全限制，飞行任务要", "C 飞行环境限制，飞行任务要"], "ans": 2, "exp": "任务规划霢考虑飞行环境限制和飞行任务要求"}, {"id": 1058, "ch": 11, "cat": "任务航线规划", "q": "无人机任务规划需要实现的功能包括", "opts": ["A 自主导航功能，自主起降功能，航迹规划功能", "B 任务分配功能，航迹规划功能，仿真演示功能", "C 自主导航功能，应急处理功能，航迹规划功能"], "ans": 1, "exp": "任务规划功能包括任务分配、航迹规划和仿真演示"}, {"id": 1059, "ch": 11, "cat": "任务航线规划", "q": "____是在无人机执行任务前，由地面控制站制定的，主要是综合任务要求、地理环境和无人机任务载荷等因素进行规划", "opts": ["A 预先规划，全屢朢", "B 实时规划，航程最", "C 航迹规划，航时最"], "ans": 0, "exp": "预先规划在飞行前制定，追求全屢朢优航迹"}, {"id": 1060, "ch": 11, "cat": "任务航线规划", "q": "____包括携带的传感器类型、摄像机类型和专用任务设备类型等，规划设备工作时间及工作模式", "opts": ["A 任务规划", "B 载荷规划", "C 任务分配"], "ans": 1, "exp": "载荷规划负责规划传感器摄像机等任务设备的工作模式"}, {"id": 1061, "ch": 11, "cat": "任务航线规划", "q": "不属于无人机飞控计算机任务范畴的", "opts": ["A 姿稳定与控制", "B 自主飞行控制", "C 数据中继"], "ans": 2, "exp": "数据中继是信设备的功能，不是飞控计算机任务"}, {"id": 1062, "ch": 11, "cat": "任务航线规划", "q": "____的内容包括出发地点经地点、目的地点的位置信息、飞行高度度和需要到达的时间", "opts": ["A 航迹规划", "B 任务规划", "C 航线规划"], "ans": 2, "exp": "航线规划确定出发、经、目的地的位置和高度速度要求"}, {"id": 1063, "ch": 11, "cat": "任务航线规划", "q": "无人机侦察监测区域应预先标注，主要包括任务区域范围侦察监测对象等，属于____", "opts": ["A 任务区域标注", "B 场地标注", "C 警示标注"], "ans": 0, "exp": "任务区域标注包括任务范围、侦察对象等"}, {"id": 1064, "ch": 11, "cat": "任务航线规划", "q": "____包括在执行任务的过程中，霢要根据环境情况的变化制定丢些信任务，调整与任务控制站之间的通信方式", "opts": ["A 目标分配", "B 链路规划", "C 通信规划"], "ans": 2, "exp": "通信规划负责根据环境变化调整通信方式"}, {"id": 1065, "ch": 11, "cat": "任务航线规划", "q": "航迹优化是指航迹规划完成后，系统根据无人机飞行的____对航迹进行优化处", "opts": ["A 朢大转弯半径和朢大俯仰角", "B 朢小转弯半径和朢大俯仰角", "C 朢大转弯半径和朢小俯仰角"], "ans": 1, "exp": "航迹优化考虑朢小转弯半径和朢大俯仰角等飞行能限制"}, {"id": 1066, "ch": 11, "cat": "任务航线规划", "q": "____在无人机任务规划中的作用是显示无人机的飞行位置画出飞行航迹标识规划点以及显示规划航迹", "opts": ["A 电子地图", "B 飞行航迹", "C 地理位置"], "ans": 0, "exp": "电子地图用于显示位置、航迹规划点等"}, {"id": 1067, "ch": 11, "cat": "任务航线规划", "q": "可能霢要执行的应程序不包括", "opts": ["A 动力装置重启操作", "B 备份系统切换操作", "C 导航系统重启操作"], "ans": 2, "exp": "导航系统重启不是常见应程序"}, {"id": 1068, "ch": 11, "cat": "任务航线规划", "q": "由于加载的电子地图与实际操作时的地理位置信息有偏差，霢要在使用前对地图进行____", "opts": ["A 更新", "B 校准", "C 标注"], "ans": 1, "exp": "地图使用前需进行校准以消除偏差"}, {"id": 1069, "ch": 11, "cat": "任务航线规划", "q": "可能霢要处置的紧情况不包括", "opts": ["A 控制站显示系统故", "B 上行通讯链路故障", "C 飞控系统故障"], "ans": 2, "exp": "飞控系统故障属于严重紧情况，控制站和链路故障也需紧处置按原题答案C"}, {"id": 1070, "ch": 11, "cat": "任务航线规划", "q": "____是在无人机飞行过程中，根据实际的飞行情况和环境的变化制定出一条可行航", "opts": ["A 预先规划，最优航迹规划算", "B 航迹规划，最短航迹规划算", "C 实时规划，快速航迹规划算"], "ans": 2, "exp": "实时规划在飞行中根据变化快生成可行航迹"}, {"id": 1071, "ch": 11, "cat": "任务航线规划", "q": "航迹规划霢要充分虑____的取、标绘，航线预先规划以及在线调整时机", "opts": ["A 电子地图", "B 飞行航迹", "C 地理位置"], "ans": 0, "exp": "航迹规划霢充分考虑电子地图的取和标绘"}, {"id": 1072, "ch": 11, "cat": "任务航线规划", "q": "无人机地面站系统可以由不同功能的若干控制站模块组成，其不包括", "opts": ["A 无人机控制站", "B 载荷控制", "C 机载电台"], "ans": 2, "exp": "机载电台属于机载设备，不是地面站组成部分"}, {"id": 1073, "ch": 11, "cat": "任务航线规划", "q": "大多数多旋翼飞行器自主飞行过程利用____实现速度感知", "opts": ["A 空管", "B 惯导", "C GPS"], "ans": 2, "exp": "多数多旋翼飞行器使用GPS实现速度感知"}, {"id": 1074, "ch": 11, "cat": "任务航线规划", "q": "地面站显示系统告警信息主要包", "opts": ["A 视觉告警和触觉告", "B 触觉告警和听觉告", "C 视觉告警和听觉告"], "ans": 2, "exp": "告警信息包括视觉告警（显示）和听觉告警（声音）"}, {"id": 1075, "ch": 11, "cat": "任务航线规划", "q": "校准地图时取的校准点____", "opts": ["A 不能在同丢经度", "B 不能在同丢纬度", "C 不能在同丢直线"], "ans": 2, "exp": "校准点不能在同一直线上，否则无法形成校准靃69"}, {"id": 1076, "ch": 11, "cat": "任务航线规划", "q": "就任务规划系统具备的功能而言，____是任务规划的主体和核", "opts": ["A 数据链路规划", "B 任务分配规划", "C 航迹规划"], "ans": 2, "exp": "航迹规划是任务规划的主体和核心内容"}, {"id": 1077, "ch": 11, "cat": "任务航线规划", "q": "____应具备的功能包括:标准飞行轨道生成功能，常规的飞行航线生成、管理功", "opts": ["A 航线规划", "B 任务规划", "C 航迹规划"], "ans": 0, "exp": "航线规划应具备标准轨道生成和航线管理功能"}, {"id": 1078, "ch": 11, "cat": "任务航线规划", "q": "____主要指执行任务过程中实现动作的时间点、方式和方法，设定航点的时间节点、飞行高度航速飞行姿态等", "opts": ["A 目标分配", "B 载荷规划", "C 任务分配"], "ans": 0, "exp": "目标分配确定各航点的动作时间、高度度、姿态等"}, {"id": 1079, "ch": 11, "cat": "任务航线规划", "q": "无人机____是指根据无人机需要完成的任务、无人机的数量以及携带任务载荷的类型，对无人机制定飞行路线并进行任务分配", "opts": ["A 飞行规划", "B 任务规划", "C 航迹规划"], "ans": 1, "exp": "任务规划是制定飞行路线和任务分配的综合过程"}, {"id": 1080, "ch": 11, "cat": "任务航线规划", "q": "____主要包括起飞场地标注、着陆场地标注应急场地标注，为操作员提供发射与回收以及应急迫降区域参", "opts": // ====== UI ENHANCE: Toast System ======
function showToast(msg, type) {
  type = type || "info";
  var c = document.querySelector(".toast-container");
  if(!c) {
    c = document.createElement("div");
    c.className = "toast-container";
    document.body.appendChild(c);
  }
  var t = document.createElement("div");
  t.className = "toast toast-" + type;
  var icons = {success:"✓",error:"✗",info:"ℹ",warning:"⚠"};
  t.innerHTML = (icons[type] || "ℹ") + " " + msg;
  c.appendChild(t);
  setTimeout(function() {
    t.className += " toast-out";
    setTimeout(function() { if(t.parentNode) t.parentNode.removeChild(t); }, 300);
  }, 2500);
}

// ====== UI ENHANCE: Stats Count Up ======
function animateCount(el, target) {
  if(!el) return;
  var start = 0, duration = 600, step = Math.max(1, Math.floor(target / 30));
  function tick() {
    start += step;
    if(start >= target) { el.textContent = target; return; }
    el.textContent = start;
    requestAnimationFrame(tick);
  }
  tick();
}

// ====== UI ENHANCE: Ripple Effect ======
function addRipple(e) {
  var btn = e.currentTarget;
  var rect = btn.getBoundingClientRect();
  var x = ((e.clientX || e.touches?.[0]?.clientX || rect.left + rect.width/2) - rect.left) / rect.width * 100;
  var y = ((e.clientY || e.touches?.[0]?.clientY || rect.top + rect.height/2) - rect.top) / rect.height * 100;
  btn.style.setProperty("--x", x + "%");
  btn.style.setProperty("--y", y + "%");
}

// Add ripple to all buttons
function initRipple() {
  document.querySelectorAll(".btn").forEach(function(b) {
    b.classList.add("ripple-btn");
    b.addEventListener("mousedown", addRipple);
  });
}

    document.querySelectorAll(".stat-num").forEach(function(el) {
      var t = parseInt(el.textContent);

};

  _origSetNav();
  document.querySelectorAll(".nav-item").forEach(function(n) {
    n.addEventListener("click", function() {
      document.querySelectorAll(".nav-item").forEach(function(x) { x.classList.remove("active"); });
      this.classList.add("active");
    });
  });
};


function esc(s) {
  if(typeof s !== "string") return "";
  var d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}
function getUsers() {
  try {
    var d = localStorage.getItem("drone_users");
    if(!d) return [];
    var p = JSON.parse(d);
    return Array.isArray(p) ? p : [];
  } catch(e) { return []; }
}
function saveUsers(u) {
  localStorage.setItem("drone_users", JSON.stringify(u));
}
function getUserData(n) {
  try { return JSON.parse(localStorage.getItem("drone_data_"+n)) || {progress:{},wrong:{},exams:[]}; } catch(e) { return {progress:{},wrong:{},exams:[]}; }
}
function saveUserData(n, d) {
  localStorage.setItem("drone_data_"+n, JSON.stringify(d));
}
function chName(ch) {
  var c = CHAPTERS.find(function(x) { return x.ch === ch; });
  return c ? c.name : "未知";
}
function chQs(ch) {
  return ALL_QUESTIONS.filter(function(q) { return q.ch === ch; });
}
function shuf(a) {
  var s = a.slice();
  for(var i = s.length-1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i+1)), t = s[i];
    s[i] = s[j]; s[j] = t;
  }
  return s;
}

}

function doLogin() {
  var u = document.getElementById("loginUser").value.trim();
  var p = document.getElementById("loginPass").value.trim();
  if(!u || !p) { showErr("请输入用户名和密码"); return; }
  var us = getUsers();
  var user = null;
  if(loginTab === "coach") {
    user = us.find(function(x) { return x.username === u && x.role === "coach"; });
    if(!user) { showErr("教练账号不存在"); return; }
    if(user.password !== p) { showErr("密码错误"); return; }
  } else {
    user = us.find(function(x) { return x.username === u && x.role === "student"; });
    if(!user) { showErr("学员账号不存在，请先注册"); return; }
    if(user.password !== p) { showErr("密码错误"); return; }
  }
  state.user = user;
  state.page = "home";
  render();
  if(window.location.hash) handleHash();
}

function doReg() {
  var u = document.getElementById("loginUser").value.trim();
  var p = document.getElementById("loginPass").value.trim();
  if(!u || !p) { showErr("请输入用户名和密码"); return; }
  if(u.length < 2) { showErr("用户名至少2个字符"); return; }
  if(p.length < 3) { showErr("密码至少3个字符"); return; }
  var us = getUsers();
  if(us.find(function(x) { return x.username === u })) { showErr("用户名已存在"); return; }
  us.push({ username:u, password:p, role:"student" });
  saveUsers(us);
  state.user = { username:u, password:p, role:"student" };
  state.page = "home";
  render();
}

function logout() {
  state.user = null;
  state.page = "home";
  render();
}

﻿function goHome() {
  if(!state.user) return;
