<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>浙江航方教育科技有限公司 - 无人机执照考试系统</title>
<style>﻿*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei','Helvetica Neue',sans-serif;background:#eef2f7;color:#1a2332;min-height:100vh;-webkit-font-smoothing:antialiased}
:root{--primary:#1e3a5f;--primary-light:#2d6da8;--primary-dark:#0d2137;--accent:#f5a623;--success:#22c55e;--danger:#ef4444;--info:#3b82f6;--bg:#eef2f7;--card:#fff;--text:#1a2332;--text-light:#5e6f88;--border:#e2e8f0;--shadow:0 2px 8px rgba(0,0,0,0.06);--radius:12px;--radius-sm:8px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 20px;border:none;border-radius:var(--radius-sm);font-size:.9rem;font-weight:600;cursor:pointer;transition:all .2s;text-decoration:none}
.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary-light)}
.btn-accent{background:var(--accent);color:#fff}.btn-accent:hover{background:#e09515}
.btn-success{background:var(--success);color:#fff}.btn-success:hover{background:#16a34a}
.btn-danger{background:var(--danger);color:#fff}.btn-danger:hover{background:#dc2626}
.btn-info{background:var(--info);color:#fff}
.btn-outline{background:transparent;border:2px solid var(--border);color:var(--text)}.btn-outline:hover{border-color:var(--primary-light);color:var(--primary-light)}
.btn-sm{padding:6px 14px;font-size:.82rem}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border);padding:24px;margin-bottom:16px}
.input{width:100%;padding:10px 14px;border:2px solid var(--border);border-radius:8px;font-size:.9rem;outline:none;transition:.2s;background:#fff;color:var(--text)}
.input:focus{border-color:var(--primary-light);box-shadow:0 0 0 3px rgba(45,109,168,0.1)}
.badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:.75rem;font-weight:600}
.badge-success{background:#dcfce7;color:#166534}.badge-warning{background:#fef3c7;color:#92400e}.badge-danger{background:#fee2e2;color:#991b1b}.badge-info{background:#dbeafe;color:#1e40af}
.text-muted{color:var(--text-light);font-size:.82rem}
.mt-8{margin-top:8px}.mt-16{margin-top:16px}.mb-16{margin-bottom:16px}
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0d2137,#1e3a5f 40%,#2d6da8 70%,#1e3a5f);position:relative;overflow:hidden}
.login-page::before{content:"";position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 20% 80%,rgba(45,109,168,0.3) 0%,transparent 70%),radial-gradient(ellipse 60% 50% at 80% 20%,rgba(245,166,35,0.08) 0%,transparent 70%)}
.login-container{width:100%;max-width:420px;padding:20px;position:relative;z-index:1}
.login-header{text-align:center;margin-bottom:28px}
.login-logo{font-size:56px;margin-bottom:8px}
.login-header h1{color:#fff;font-size:1.4rem;font-weight:700;letter-spacing:.05em;text-shadow:0 2px 8px rgba(0,0,0,0.2)}
.login-header p{color:rgba(255,255,255,0.5);font-size:.82rem;margin-top:4px}
.login-tabs{display:flex;background:rgba(255,255,255,0.08);backdrop-filter:blur(8px);border-radius:var(--radius);padding:4px;margin-bottom:16px;border:1px solid rgba(255,255,255,0.06)}
.login-tab{flex:1;padding:10px 12px;text-align:center;border-radius:10px;color:rgba(255,255,255,0.5);cursor:pointer;font-size:.85rem;font-weight:600;border:none;background:transparent;transition:all .25s}
.login-tab.active{background:rgba(255,255,255,0.95);color:var(--primary);box-shadow:0 4px 16px rgba(0,0,0,0.2)}
.login-box{background:rgba(255,255,255,0.95);backdrop-filter:blur(20px);border-radius:16px;padding:28px 24px;box-shadow:0 24px 60px rgba(0,0,0,0.16);border:1px solid rgba(255,255,255,0.2)}
.login-box h2{color:var(--primary);margin-bottom:18px;font-size:1rem;text-align:center;font-weight:700}
.login-box .input{margin:8px 0}.login-box .btn{margin-top:14px;width:100%;padding:12px}
.login-error{color:var(--danger);font-size:.8rem;margin-top:8px;text-align:center;display:none}
.login-hint{text-align:center;margin-top:12px;font-size:.7rem;color:rgba(255,255,255,0.3)}
.app-header{background:linear-gradient(135deg,#0d2137,#1e3a5f,#2d6da8);color:#fff;padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(0,0,0,0.15)}
.app-header .logo-area{display:flex;align-items:center;gap:10px;cursor:pointer}
.app-header .logo-area h1{font-size:1rem;font-weight:700}
.app-header .user-info{display:flex;align-items:center;gap:12px;font-size:.85rem}
.app-header .user-info .role-badge{background:rgba(255,255,255,0.15);padding:2px 12px;border-radius:12px;font-size:.72rem}
.app-layout{display:flex;min-height:calc(100vh - 60px)}
.app-sidebar{width:220px;background:#fff;border-right:1px solid var(--border);padding:16px 0;flex-shrink:0}
.app-sidebar .nav-item{display:flex;align-items:center;gap:10px;padding:12px 20px;cursor:pointer;color:var(--text-light);font-size:.88rem;font-weight:500;transition:all .15s;border-left:3px solid transparent}
.app-sidebar .nav-item:hover{color:var(--primary);background:#f0f4f8}
.app-sidebar .nav-item.active{color:var(--primary);background:#eef4fb;border-left-color:var(--primary);font-weight:600}
.app-main{flex:1;padding:24px;overflow-y:auto;max-width:1000px}
.chapter-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-top:16px}
.chapter-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:20px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.chapter-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.1);border-color:var(--primary-light)}
.chapter-card .ch-num{font-size:.7rem;color:var(--text-light);margin-bottom:4px}
.chapter-card .ch-name{font-size:1rem;font-weight:600;color:var(--text);margin-bottom:8px}
.chapter-card .ch-stats{display:flex;justify-content:space-between;font-size:.78rem;color:var(--text-light)}
.chapter-card .ch-bar{margin-top:10px;height:6px;background:var(--border);border-radius:4px;overflow:hidden}
.chapter-card .ch-bar-fill{height:100%;background:linear-gradient(90deg,var(--primary-light),var(--primary));border-radius:4px;transition:width .5s}
.chapter-card .ch-check{position:absolute;top:12px;right:12px;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;background:var(--border)}
.chapter-card .ch-check.done{background:var(--success)}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:16px;text-align:center}
.stat-card .stat-num{font-size:1.5rem;font-weight:700;color:var(--primary)}
.stat-card .stat-label{font-size:.78rem;color:var(--text-light);margin-top:4px}
.q-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.q-number{font-size:.82rem;color:var(--text-light)}
.q-text{font-size:1.05rem;line-height:1.7;margin-bottom:20px;padding:16px;background:#f8fafc;border-radius:var(--radius-sm);border:1px solid var(--border)}
.q-options{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.q-option{display:flex;align-items:flex-start;gap:10px;padding:12px 16px;border:2px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;transition:all .15s;font-size:.92rem;line-height:1.5}
.q-option:hover{border-color:var(--primary-light);background:#f8faff}
.q-option.selected{border-color:var(--primary);background:#eef4fb}
.q-option.correct{border-color:var(--success);background:#f0fdf4}
.q-option.wrong{border-color:var(--danger);background:#fef2f2}
.opt-label{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;background:var(--border);font-size:.78rem;font-weight:600;color:var(--text);flex-shrink:0}.q-option.correct .opt-label{background:var(--success);color:#fff}.q-option.wrong .opt-label{background:var(--danger);color:#fff}.q-option.selected .opt-label{background:var(--primary);color:#fff}
.analysis-panel{background:#f0f9ff;border:1px solid #bae6fd;border-radius:var(--radius-sm);padding:16px;margin-top:12px}
.analysis-title{font-weight:600;color:#0369a1;font-size:.9rem;margin-bottom:8px}
.analysis-correct{color:var(--success);font-weight:600}.analysis-wrong{color:var(--danger);font-weight:600}
.q-nav{display:flex;flex-wrap:wrap;gap:6px;margin-top:16px;padding-top:16px;border-top:1px solid var(--border)}
.q-nav-btn{width:36px;height:36px;border-radius:6px;border:1px solid var(--border);background:#fff;cursor:pointer;font-size:.75rem;font-weight:600;color:var(--text-light);transition:all .15s;display:flex;align-items:center;justify-content:center}
.q-nav-btn:hover{border-color:var(--primary-light);color:var(--primary)}
.q-nav-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.q-nav-btn.answered{background:#dbeafe;color:var(--primary);border-color:var(--primary-light)}
.q-nav-btn.wrong-ans{background:#fee2e2;color:var(--danger);border-color:var(--danger)}
.exam-timer{text-align:center;padding:12px;background:var(--card);border:2px solid var(--accent);border-radius:var(--radius);margin-bottom:16px;font-size:1.1rem;font-weight:700;color:var(--accent)}
.exam-progress{text-align:center;color:var(--text-light);font-size:.82rem;margin-bottom:16px}
.exam-nav{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;margin:12px 0;padding:12px;background:var(--card);border-radius:var(--radius-sm);border:1px solid var(--border)}
.exam-nav-btn{width:32px;height:32px;border-radius:4px;border:1px solid var(--border);background:#fff;cursor:pointer;font-size:.7rem;transition:all .15s;display:flex;align-items:center;justify-content:center}
.exam-nav-btn:hover{border-color:var(--primary-light)}
.exam-nav-btn.answered{background:var(--primary);color:#fff;border-color:var(--primary)}
.exam-nav-btn.current{border-color:var(--accent);box-shadow:0 0 0 2px rgba(245,166,35,0.3)}
.exam-result{text-align:center;padding:40px 24px}
.exam-result .score{font-size:3.5rem;font-weight:800;color:var(--primary);line-height:1}
.exam-result .score-label{font-size:.9rem;color:var(--text-light);margin-top:4px}
.exam-result .result-badge{display:inline-block;padding:6px 20px;border-radius:20px;font-size:1rem;font-weight:700;margin-top:12px}
.wrong-item{border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;margin-bottom:10px;background:var(--card)}
.wrong-item .wi-q{font-size:.9rem;margin-bottom:6px;line-height:1.5}
.wrong-item .wi-info{font-size:.8rem;color:var(--text-light)}
.coach-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-bottom:20px}
.student-row{display:flex;align-items:center;gap:16px;padding:12px 16px;border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:8px;cursor:pointer;transition:all .15s;background:var(--card)}
.student-row:hover{border-color:var(--primary-light);background:#f8faff}
.student-row .sr-name{font-weight:600;font-size:.9rem;min-width:100px}
.student-row .sr-stats{font-size:.8rem;color:var(--text-light);flex:1}
.student-mini-bar{width:100px;height:6px;background:var(--border);border-radius:4px;overflow:hidden;flex-shrink:0}
.student-mini-bar .bar-fill{height:100%;background:linear-gradient(90deg,var(--success),#16a34a);border-radius:4px;transition:width .5s}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(4px)}
.modal-content{background:var(--card);border-radius:var(--radius);padding:24px;max-width:500px;width:90%;box-shadow:0 24px 60px rgba(0,0,0,0.2);max-height:80vh;overflow-y:auto}
.modal-content h3{margin-bottom:12px;font-size:1.05rem}
.modal-close{float:right;background:none;border:none;font-size:1.3rem;cursor:pointer;color:var(--text-light);padding:0 4px}
.share-link{text-align:center;margin-bottom:12px;font-size:.78rem;color:var(--text-light);word-break:break-all;padding:8px;background:#f8fafc;border-radius:6px;border:1px solid var(--border)}
.empty-state{text-align:center;padding:40px 20px;color:var(--text-light)}
.empty-state .empty-icon{font-size:48px;margin-bottom:12px}
.wp-controls{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;align-items:center}
.wp-controls button{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:#fff;cursor:pointer;font-size:.8rem;transition:all .15s}
.wp-controls button:hover{border-color:var(--primary-light);color:var(--primary)}
.wp-controls button.active{background:var(--primary);color:#fff;border-color:var(--primary)}
@media(max-width:768px){.app-sidebar{width:180px}.app-sidebar .nav-item{padding:10px 14px;font-size:.82rem}.app-main{padding:16px}.chapter-grid{grid-template-columns:1fr}.stats-row{grid-template-columns:repeat(2,1fr)}}
@media(max-width:480px){.app-layout{flex-direction:column}.app-sidebar{width:100%;display:flex;overflow-x:auto;padding:8px 0;border-right:none;border-bottom:1px solid var(--border)}.app-sidebar .nav-item{white-space:nowrap;border-left:none;border-bottom:2px solid transparent;padding:8px 12px}.app-sidebar .nav-item.active{border-left:none;border-bottom-color:var(--primary)}.app-main{padding:12px}.stats-row{grid-template-columns:1fr 1fr}.chapter-grid{grid-template-columns:1fr}}

/* ====== UI ENHANCE ANIMATIONS ====== */
@keyframes fadeInUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
@keyframes pulseGlow { 0%,100% { opacity:0.6; } 50% { opacity:1; } }
@keyframes ripple { to { transform:scale(4); opacity:0; } }
@keyframes skeletonPulse { 0% { background-position:200% 0; } 100% { background-position:-200% 0; } }
@keyframes slideUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
@keyframes countUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
@keyframes breathPulse { 0%,100% { box-shadow:0 0 0 0 rgba(30,58,95,0.15); } 50% { box-shadow:0 0 0 6px rgba(30,58,95,0.05); } }
@keyframes checkmark { 0% { transform:scale(0) rotate(-45deg); } 100% { transform:scale(1) rotate(0); } }
@keyframes shimmer { 0% { background-position:-200% 0; } 100% { background-position:200% 0; } }
@keyframes toastIn { from { opacity:0; transform:translateX(100px); } to { opacity:1; transform:translateX(0); } }
@keyframes toastOut { from { opacity:1; transform:translateX(0); } to { opacity:0; transform:translateX(100px); } }
@keyframes scaleIn { from { opacity:0; transform:scale(0.95); } to { opacity:1; transform:scale(1); } }
@keyframes spin { to { transform:rotate(360deg); } }

/* Skeleton Screen */
.skeleton{background:linear-gradient(90deg,#e2e8f0 25%,#f1f5f9 50%,#e2e8f0 75%);background-size:200% 100%;animation:skeletonPulse 1.5s ease infinite;border-radius:6px}
.skeleton-card{height:120px;margin-bottom:16px}
.skeleton-line{height:16px;margin-bottom:10px;width:100%}
.skeleton-line.w60{width:60%}.skeleton-line.w40{width:40%}

/* Toast */
.toast-container{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 20px;border-radius:var(--radius-sm);color:#fff;font-size:.85rem;font-weight:500;animation:toastIn .3s ease forwards;box-shadow:0 8px 24px rgba(0,0,0,0.12);display:flex;align-items:center;gap:8px;max-width:360px}
.toast.toast-out{animation:toastOut .3s ease forwards}
.toast-success{background:#166534}
.toast-error{background:#991b1b}
.toast-info{background:#1e40af}
.toast-warning{background:#92400e}

/* Ripple */
.ripple-btn{position:relative;overflow:hidden}
.ripple-btn::after{content:"";position:absolute;width:100%;padding-top:100%;border-radius:50%;background:rgba(255,255,255,0.3);transform:scale(0);opacity:0;pointer-events:none;left:var(--x,50%);top:var(--y,50%);transform-origin:center}
.ripple-btn:active::after{animation:ripple .5s ease-out}

/* Enhanced hover effects */
.btn{transition:all .25s cubic-bezier(0.4,0,0.2,1)}
.chapter-card{transition:all .3s cubic-bezier(0.4,0,0.2,1)}
.chapter-card:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(0,0,0,0.1)}
.q-option{transition:all .2s cubic-bezier(0.4,0,0.2,1)}
.q-option:hover{transform:scale(1.01);border-color:var(--primary-light)}
.nav-item{transition:all .2s cubic-bezier(0.4,0,0.2,1)}
.card{animation:fadeInUp .35s ease both}
.card:nth-child(2){animation-delay:0.05s}.card:nth-child(3){animation-delay:0.1s}.card:nth-child(4){animation-delay:0.15s}

/* Login page enhanced */
.login-box{animation:scaleIn .4s cubic-bezier(0.4,0,0.2,1) both}
.login-page::before{animation:pulseGlow 4s ease-in-out infinite}
.login-logo{animation:fadeIn .6s ease both;display:inline-block}
.login-logo:hover{transform:scale(1.05) rotate(-5deg);transition:transform .3s}

/* Chapter grid */
.chapter-grid{animation:fadeIn .3s ease both}
.ch-bar-fill{transition:width .8s cubic-bezier(0.4,0,0.2,1)}

/* Stats */
.stat-num{animation:countUp .5s ease both}
.stat-card:nth-child(1) .stat-num{animation-delay:0s}
.stat-card:nth-child(2) .stat-num{animation-delay:0.08s}
.stat-card:nth-child(3) .stat-num{animation-delay:0.16s}
.stat-card:nth-child(4) .stat-num{animation-delay:0.24s}

/* Analysis panel */
.analysis-panel{animation:slideUp .3s cubic-bezier(0.4,0,0.2,1) both}

/* Question navigator */
.q-nav-btn.active{animation:breathPulse 2s ease-in-out infinite}

/* Exam timer */
.exam-timer .timer-num{display:inline-block;font-weight:700;min-width:2ch;text-align:center}

/* Wrong book stagger */
.wrong-item{animation:fadeInUp .3s ease both}
.wrong-item:nth-child(1){animation-delay:0s}.wrong-item:nth-child(2){animation-delay:0.05s}
.wrong-item:nth-child(3){animation-delay:0.1s}.wrong-item:nth-child(4){animation-delay:0.15s}
.wrong-item:nth-child(5){animation-delay:0.2s}

/* Scrollbar */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#94a3b8}

/* Main content transition */
.app-main{transition:opacity .2s ease}
.app-main.fade-in{animation:fadeInUp .3s ease both}

/* Student row hover */
.student-row{transition:all .2s cubic-bezier(0.4,0,0.2,1)}
.student-row:hover{transform:translateX(4px)}

/* Modal overlay */
.modal-overlay{animation:fadeIn .2s ease both}
.modal-content{animation:scaleIn .25s cubic-bezier(0.4,0,0.2,1) both}

/* Empty state */
.empty-state{animation:fadeInUp .4s ease both}

/* Share link */
.share-link{transition:all .2s}
.share-link:hover{background:#e2e8f0}

/* Chapter card checkmark */
.ch-check{transition:all .3s cubic-bezier(0.4,0,0.2,1)}
.ch-check.done{animation:checkmark .4s cubic-bezier(0.4,0,0.2,1)}

/* Loading spinner */
.spinner{width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .6s linear infinite;display:inline-block}

/* ====== AI ENHANCE ANIMATIONS ====== */
.anim-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:2px solid var(--primary-light);border-radius:var(--radius-sm);background:transparent;color:var(--primary);font-size:.82rem;font-weight:600;cursor:pointer;transition:all .2s;margin-top:10px}
.anim-btn:hover{background:var(--primary);color:#fff;border-color:var(--primary)}
.anim-btn:active{transform:scale(0.96)}
.anim-modal{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:none;align-items:center;justify-content:center;z-index:2000;backdrop-filter:blur(4px);animation:fadeIn .2s ease both}
.anim-modal.open{display:flex}
.anim-modal-box{background:#fff;border-radius:16px;width:90%;max-width:720px;max-height:90vh;overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,0.3);animation:scaleIn .3s cubic-bezier(0.4,0,0.2,1) both}
.anim-modal-header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--border);background:var(--primary);color:#fff}
.anim-modal-header h3{font-size:.95rem;font-weight:600}
.anim-modal-close{background:none;border:none;color:rgba(255,255,255,0.7);font-size:1.3rem;cursor:pointer;padding:0 4px;transition:color .2s}
.anim-modal-close:hover{color:#fff}
.anim-canvas-wrap{position:relative;width:100%;padding-top:56.25%;background:#0a0f1a}
.anim-canvas-wrap canvas{position:absolute;inset:0;width:100%;height:100%}
.anim-controls{display:flex;gap:8px;padding:12px 20px;border-top:1px solid var(--border);justify-content:center;background:#f8fafc}
.anim-controls button{padding:6px 16px;border-radius:6px;border:1px solid var(--border);background:#fff;cursor:pointer;font-size:.8rem;transition:all .15s}
.anim-controls button:hover{background:var(--primary);color:#fff;border-color:var(--primary)}
.anim-controls button:active{transform:scale(0.95)}
.anim-legend{position:absolute;bottom:12px;left:12px;background:rgba(0,0,0,0.7);color:#fff;padding:8px 12px;border-radius:6px;font-size:.7rem;line-height:1.6;pointer-events:none;z-index:2}
.anim-legend span{display:inline-flex;align-items:center;gap:4px;margin-right:8px}
.anim-legend .dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.analysis-panel .anim-trigger{text-align:right;margin-top:8px}

"], "ans": 0, "exp": "涡桨发动机用于中高空长航时无人机"}, {"id": 78, "ch": 2, "cat": "无人机系统组成", "q": "____是由控制站上的操纵杆直接控制无人机的舵面，遥控无人机的飞", "opts": ["A 舵面遥控", "B 姿遥", "C 指令控制"], "ans": 0, "exp": "舵面遥控模式下操纵杆直接控制舵面"}, {"id": 79, "ch": 2, "cat": "无人机系统组成", "q": "舵机在无人机飞行控制中属于____", "opts": ["A 传感", "B 执行机构", "C 控制"], "ans": 1, "exp": "舵机是执行机构"}, {"id": 80, "ch": 3, "cat": "飞行原理1", "q": "飞机飞行中，空气表现出来的可压缩程度", "opts": ["A 只取决于飞机飞行当地的音", "B 和飞机飞行的速度(空?以及当地的音速有", "C 只取决于飞机的飞行度(空?"], "ans": 1, "exp": "空气可压缩程度与飞行速度（空速）和当地音速都有关，由马赫数决定"}, {"id": 81, "ch": 3, "cat": "飞行原理1", "q": "某活塞式化油器发动机减小油门时熄火则", "opts": ["A 调整高油", "B 飞行时不减油", "C 调整低油"], "ans": 2, "exp": "减小油门熄火说明低油针调整不当，应调整低速油针改善小油门状"}, {"id": 82, "ch": 3, "cat": "飞行原理1", "q": "飞机下降时，其迎", "opts": ["A 小于", "B 大于", "C 等于"], "ans": 1, "exp": "下降时需维持升力平衡重力分量，迎角大于零"}, {"id": 83, "ch": 3, "cat": "飞行原理1", "q": "飞机平飞遇垂直向上突风作用时", "opts": ["A 阻力将增", "B 升力将增", "C 升力将减"], "ans": 1, "exp": "垂直向上突风增大了相对气流的迎角，因此升力增大"}, {"id": 84, "ch": 3, "cat": "飞行原理1", "q": "机翼的安装角", "opts": ["A 翼弦与机身纵轴之间所夹锐", "B 翼弦与水平面之间扢夹的锐角", "C 翼弦与相对气流度的夹"], "ans": 0, "exp": "安装角是机翼翼弦与机身纵轴之间的夹角"}, {"id": 85, "ch": 3, "cat": "飞行原理1", "q": "下列正确的项是？", "opts": ["A 飞行器飞行时阻力是可以避免的", "B 每次翼型或迎角的变化都不会改变飞机的阻力", "C 了解飞机阻力是如何产生的并如何去减小它是很重要的"], "ans": 2, "exp": "了解阻力产生原因和减小方法对飞行安全与效率至关重要"}, {"id": 86, "ch": 3, "cat": "飞行原理1", "q": "具有后掠角的飞机有侧滑角时，会产", "opts": ["A 俯仰力矩", "B 不产生任何力", "C 滚转力矩"], "ans": 2, "exp": "后掠角飞机侧滑时，左右机翼有效后掠角不同，产生滚转力矩"}, {"id": 87, "ch": 3, "cat": "飞行原理1", "q": "舵面遥控状时，平飞中向后稍拉升降舵杆量，飞行器的迎角", "opts": ["A 增大", "B 减小", "C 先增大后减小"], "ans": 0, "exp": "向后拉杆→升降舵上偏→机头上仰→迎角增大"}, {"id": 88, "ch": 3, "cat": "飞行原理1", "q": "流体的伯努利定理", "opts": ["A 适用于粘性的理想流体", "B 适用于不可压缩的理想流体", "C 适用于不可压缩的粘流"], "ans": 1, "exp": "伯努利定理用于不可压缩的理想流体，低速气流可近似使用"}, {"id": 89, "ch": 3, "cat": "飞行原理1", "q": "丢定质量的气体具有下列特", "opts": ["A 压力不变时，体积和温度成反比", "B 体积不变时，压力和温度成正比", "C 温度不变时，压力与体积成正比"], "ans": 1, "exp": "体积不变时，根据理想气体状方程P/T=常数，压力与温度成正比"}, {"id": 90, "ch": 3, "cat": "飞行原理1", "q": "下列关于动压的哪种说法是正确", "opts": ["A 动压和度成正", "B 总压与静压之", "C 总压与静压之"], "ans": 1, "exp": "动压=总压-静压，是总压与静压之差"}, {"id": 91, "ch": 3, "cat": "飞行原理1", "q": "流体在管道中以稳定的速度流动时，如果管道由粗变细，则流体的流", "opts": ["A 减小", "B 保持不变", "C 增大"], "ans": 2, "exp": "根据连续性定理，截面积减小→流增大，质量流量守恒"}, {"id": 92, "ch": 3, "cat": "飞行原理1", "q": "气体的压力P、密度ρ温度T三之间的变化关系?R为理想气体常?", "opts": ["A T=PRρ", "B P=Rρ/T", "C P=RρT"], "ans": 2, "exp": "理想气体状方程：P=RρT"}, {"id": 93, "ch": 3, "cat": "飞行原理1", "q": "舵面遥控状时，平飞中向前稍推升降舵杆量，飞行器的迎角", "opts": ["A 增大", "B 减小", "C 先减小后增大"], "ans": 2, "exp": "前推杆→升降舵下偏→机头下俯→迎角先减小，随后空气动力恢复可能增大"}, {"id": 94, "ch": 3, "cat": "飞行原理1", "q": "无人机上的仪表压力计管路和所有承压软管，应能承受____规定朢高工作压力的1.5倍的压力而无渗漏", "opts": ["A 不大", "B 等于", "C 不小"], "ans": 2, "exp": "承压管路应能承受不小?.5倍最高工作压力，确保安全余量"}, {"id": 95, "ch": 3, "cat": "飞行原理1", "q": "哪一类作业的气象无人机在控制成本的情况下，允许单次使用不回收", "opts": ["A 人工催化播撒降雨", "B 旱涝灾害评估", "C 强对流云直接探测"], "ans": 2, "exp": "强对流云直接探测风险高成本大，允许不回收"}, {"id": 96, "ch": 3, "cat": "飞行原理1", "q": "当空气在管道中低速流动时，由伯努利定理可", "opts": ["A 流大的地方，静压", "B 流大的地方，静压", "C 流大的地方，总压"], "ans": 1, "exp": "伯努利定理：流大处静压小（低速时总压近似不变）"}, {"id": 97, "ch": 3, "cat": "飞行原理1", "q": "如飞机出现失速，飞行员应", "opts": ["A 立即拉杆", "B 立即蹬舵", "C 立即推杆到底"], "ans": 2, "exp": "失时应立即推杆减小迎角，使气流重新附睢在机翼表靃69"}, {"id": 98, "ch": 3, "cat": "飞行原理1", "q": "飞机的迎角是", "opts": ["A 飞机翼弦与水平面的夹", "B 飞机纵轴与水平面的夹", "C 飞机翼弦与相对气流的夹角"], "ans": 2, "exp": "迎角（攻角）是翼弦与相对气流方向的夹角"}, {"id": 99, "ch": 3, "cat": "飞行原理1", "q": "关于平凸翼型的剖面形状，下面说法正确的是", "opts": ["A 机翼上表面的弯度大于下表面的弯度", "B 机翼上表面的弯度小于下表面的弯度", "C 上下翼面的弯度相"], "ans": 0, "exp": "平凸翼型上表面弯度大于下表面，有利于产生升力"}, {"id": 100, "ch": 3, "cat": "飞行原理1", "q": "关于动压和静压的方向，以下哪丢个是正确", "opts": ["A 动压和静压都作用在任意方", "B 动压作用在流体的流动方向，静压作用在任意方向", "C 动压和静压的方向都是与运动的方向丢"], "ans": 1, "exp": "动压有方向（沿流动方向），静压无方向性（作用于任意方向）"}, {"id": 101, "ch": 3, "cat": "飞行原理1", "q": "从原点作极曲线的切线，切点所对应的迎角是", "opts": ["A 朢小迎", "B 有利迎角", "C 朢大迎"], "ans": 1, "exp": "切点对应有利迎角（最大升阻比迎角），升阻比最大"}, {"id": 102, "ch": 3, "cat": "飞行原理1", "q": "飞机失的原因", "opts": ["A 飞机速度太小", "B 飞机速度太大", "C 飞机迎角超过临界迎角"], "ans": 2, "exp": "失的根本原因是迎角超过临界迎角，气流分离导致升力骤降"}, {"id": 103, "ch": 3, "cat": "飞行原理1", "q": "国际标准大气的定义是仢", "opts": ["A 对流层附近常温常压下空气的密", "B 海平面附近常温常压下空气的密", "C 地表层附近常温常压下空气的密"], "ans": 1, "exp": "国际标准大气以海平面为基准，温度15°C，气?013.25hPa"}, {"id": 104, "ch": 3, "cat": "飞行原理1", "q": "流体的粘性与温度之间的关系是", "opts": ["A 气体的粘性随温度的升高增", "B 液体的粘性随温度的升高增", "C 液体的粘性与温度无关"], "ans": 0, "exp": "气体粘随温度升高而增大，液体粘随温度升高而减小"}, {"id": 105, "ch": 3, "cat": "飞行原理1", "q": "对一般翼型来说，下列说法中哪个是正确", "opts": ["A 当翼剖面有一个正迎角时，上翼面处的流速小于下翼面处的流", "B 当迎角为零时，升力不为零", "C 当翼剖面有一个正迎角时，上翼面处的流线比下翼面处的流线疏"], "ans": 1, "exp": "非对称翼型在零迎角时仍能产生升力（升力不为零）"}, {"id": 106, "ch": 3, "cat": "飞行原理1", "q": "对于下滑中的飞机来说，升力和重力关系", "opts": ["A L=Wg", "B L=Wgcosa", "C L=Wgsina"], "ans": 1, "exp": "下滑时升力L=Wg·cosα，α为下滑角"}, {"id": 107, "ch": 3, "cat": "飞行原理1", "q": "定体积的容器中，空气压力", "opts": ["A 与空气密度和空气温度乘积成反", "B 与空气密度和空气温度乘积成正", "C 与空气密度和空气绝对温度乘积成正"], "ans": 2, "exp": "根据理想气体方程P=ρRT，压力与密度和绝对温度乘积成正比"}, {"id": 108, "ch": 3, "cat": "飞行原理1", "q": "国际标准大气的物理参数的相互关系", "opts": ["A 体积不变时，压力和温度成正比", "B 压力不变时，体积和温度成反比", "C 温度不变时，压力与体积成正比"], "ans": 0, "exp": "体积不变时P/T=常数，压力与温度成正比"}, {"id": 109, "ch": 3, "cat": "飞行原理1", "q": "飞机上升时，其迎", "opts": ["A 小于", "B 等于", "C 大于"], "ans": 2, "exp": "上升时需升力大于重力，迎角大于零"}, {"id": 110, "ch": 3, "cat": "飞行原理1", "q": "舵面遥控状时，平飞中向右稍压副翼杆量，无人机", "opts": ["A 右翼升力大于左翼升力", "B 左翼升力等于右翼升力", "C 左翼升力大于右翼升力"], "ans": 2, "exp": "向右压杆→右副翼上偏（升力减小）、左副翼下偏（升力增大）→左翼升力大于右翼→向左滚转"}, {"id": 111, "ch": 3, "cat": "飞行原理1", "q": "气流沿机翼表面附面层类型的变化是", "opts": ["A 可由层流变为紊流", "B 丢般不发生变化", "C 可由紊流变为层流"], "ans": 0, "exp": "附面层可从前缘层流向后转变为紊流，取决于雷诺数和表面状况"}, {"id": 112, "ch": 3, "cat": "飞行原理1", "q": "流管中空气的动压", "opts": ["A 与空气度和空气密度成正比", "B 仅与空气密度成正", "C 与空气度平方和空气密度成正比"], "ans": 2, "exp": "动压q=½ρV²，与空气密度和度平方成正比"}, {"id": 113, "ch": 3, "cat": "飞行原理1", "q": "下列不是影响空气粘的因素", "opts": ["A 空气的流动位", "B 气流的流", "C 空气的粘性系"], "ans": 0, "exp": "空气粘主要取决于温度和粘性系数，与流动位置无关"}, {"id": 114, "ch": 3, "cat": "飞行原理1", "q": "载荷因子", "opts": ["A 飞机升力与阻力的比", "B 飞机拉力与阻力的比", "C 飞机承受的载?除重力外)与重力的比"], "ans": 2, "exp": "载荷因子（过载）是飞机承受载荷与重力的比值"}, {"id": 115, "ch": 3, "cat": "飞行原理1", "q": "空度减小时，为保持高度，应实施的操纵", "opts": ["A 增大迎角，使升力的增加大于阻力的增加", "B 增大迎角，以保持升力不变", "C 减小迎角，以保持阻力不变"], "ans": 1, "exp": "空减小→动压减小→需增大迎角提高升力系数，以保持升力不变"}, {"id": 116, "ch": 3, "cat": "飞行原理1", "q": "飞机睢陆进入地面效应区时，", "opts": ["A 出现短暂的机头上仰变", "B 经历诱导阻力减小的过程，霢要减小动", "C 霢要增大迎角以保持相同的升力系"], "ans": 1, "exp": "地面效应减小诱导阻力，需减小动力以防止飘过头"}, {"id": 117, "ch": 3, "cat": "飞行原理1", "q": "飞机机翼的焦点指的是", "opts": ["A 升力的着力点", "B 附加升力的着力点", "C 重力的着力点"], "ans": 1, "exp": "焦点是迎角变化时附加升力的作用点"}, {"id": 118, "ch": 3, "cat": "飞行原理1", "q": "在机翼表面附面层由层流状态转变为紊流状的转捩点的位置", "opts": ["A 将随睢飞行速度的提高前", "B 在飞行M数小于一定时保持不变", "C 将随睢飞行速度的提高后"], "ans": 0, "exp": "飞行速度提高→雷诺数增大→转捩点前移"}, {"id": 119, "ch": 3, "cat": "飞行原理1", "q": "飞机的压力中心是", "opts": ["A 压力朢高的", "B 压力朢低的", "C 升力的着力点"], "ans": 2, "exp": "压力中心是气动力合力的作用点，即升力的着力点"}, {"id": 120, "ch": 3, "cat": "飞行原理1", "q": "对低速气流，由伯努利方程可以得出", "opts": ["A 流管内气流度增加，空气静压减", "B 流管截面积减小，空气静压增加", "C 流管内气流度增加，空气静压也增加"], "ans": 0, "exp": "伯努利方程：流增加→动压增大→静压减小"}, {"id": 121, "ch": 3, "cat": "飞行原理1", "q": "在大气层内，大气密度", "opts": ["A 随高度增加减", "B 随高度增加增", "C 在同温层内随高度增加保持不变"], "ans": 0, "exp": "大气密度随高度增加减小，空气逐渐稢薄"}, {"id": 122, "ch": 3, "cat": "飞行原理1", "q": "测量机翼的翼弦是", "opts": ["A 机身中心线到翼尖", "B 左翼尖到右翼", "C 机翼前缘到后"], "ans": 2, "exp": "翼弦是机翼剖面前缘到后缘的连线长度"}, {"id": 123, "ch": 3, "cat": "飞行原理1", "q": "影响翼型性能的最主要的参数是", "opts": ["A 翼型的厚度和弯度", "B 弯度和前", "C 前缘和后"], "ans": 0, "exp": "翼型的厚度和弯度是影响升阻特性的朢主要参数"}, {"id": 124, "ch": 3, "cat": "飞行原理1", "q": "具有上反角的飞机有侧滑角时，会产", "opts": ["A 不产生任何力", "B 俯仰力矩", "C 偏航力矩"], "ans": 2, "exp": "上反角飞机侧滑时，侧滑方向前侧机翼迎角增大升力增大，产生偏航力矩"}, {"id": 125, "ch": 3, "cat": "飞行原理1", "q": "空气动力学概念中，空气的物理性质主要包括", "opts": ["A 空气的压缩", "B 空气的粘", "C 空气的粘性和压缩"], "ans": 2, "exp": "空气的物理质主要包括粘和压缩性两方面"}, {"id": 126, "ch": 3, "cat": "飞行原理1", "q": "气体的连续定理是哪个定律在空气流动过程中的应", "opts": ["A 能量守衡定律", "B 牛顿第一定律", "C 质量守衡定律"], "ans": 2, "exp": "连续性定理是质量守恒定律在流体力学中的应用"}, {"id": 127, "ch": 3, "cat": "飞行原理1", "q": "通过改变迎角，无人机驾驶员可以控制飞机的", "opts": ["A 升力、空速阻", "B 升力、拉力阻", "C 升力、空速阻力重"], "ans": 0, "exp": "改变迎角可同时影响升力空速和阻力，重量不受迎角影响"}, {"id": 128, "ch": 3, "cat": "飞行原理1", "q": "在机翼上，驻点处", "opts": ["A 空气与前缘相遇的地方", "B 空气与后缘相遇的地方", "C 都不正确"], "ans": 0, "exp": "驻点是气流度为零的点，位于机翼前缘附近"}, {"id": 129, "ch": 3, "cat": "飞行原理1", "q": "在温度不变情况下，空气的密度与压力的关系", "opts": ["A 与压力成反比", "B 与压力无", "C 与压力成正比"], "ans": 2, "exp": "温度不变时，根据ρ=P/RT，密度与压力成正比"}, {"id": 130, "ch": 3, "cat": "飞行原理1", "q": "飞机迎角减小，压力中心的位置", "opts": ["A 前移", "B 后移", "C 保持不变"], "ans": 1, "exp": "迎角减小→升力中心后移，压力中心位置后移"}, {"id": 131, "ch": 3, "cat": "飞行原理1", "q": "常规布局固定翼无人机要实现向左滚转和上仰姿，舵面的偏转方向应该是", "opts": ["A 副翼左下右上，升降舵向上", "B 副翼左上右下，升降舵向下", "C 副翼左上右下，升降舵向上"], "ans": 2, "exp": "左滚转：左副翼上偏右副翼下偏→左上右下；上仰：升降舵上偏"}, {"id": 132, "ch": 3, "cat": "飞行原理1", "q": "流体的连续方", "opts": ["A 适用于可压缩和不可压缩流体的稳定管流", "B 只用于不可压缩流体的稳定管流", "C 只用于理想流"], "ans": 0, "exp": "连续性方程（质量守恒）用于可压缩和不可压缩流体的稳定流动"}, {"id": 133, "ch": 3, "cat": "飞行原理1", "q": "当无人机的迎角为临界迎角", "opts": ["A 飞行速度朢", "B 阻力朢", "C 升力系数朢"], "ans": 2, "exp": "临界迎角时升力系数达到最大，超过后失速"}, {"id": 134, "ch": 3, "cat": "飞行原理1", "q": "同一起飞重量的不同民用无人机系统航线飞行，一般____的受风的影响", "opts": ["A 巡航速度适中", "B 巡航速度", "C 巡航速度"], "ans": 2, "exp": "巡航速度大→抗风能力强，受风影响相对较小"}, {"id": 135, "ch": 3, "cat": "飞行原理1", "q": "飞机在地面效应区时，引起的气动力变化", "opts": ["A 升力增大、阻力减", "B 升力减小、阻力增", "C 升力增大、阻力增"], "ans": 0, "exp": "地面效应：地面阻挡下洗→诱导阻力减小→有效迎角增大→升力增大"}, {"id": 136, "ch": 3, "cat": "飞行原理1", "q": "对于非对称翼型的零升迎角", "opts": ["A 丢个小的负迎角", "B 丢个小的正迎角", "C 失迎"], "ans": 0, "exp": "非对称翼型（有弯度）在小的负迎角时升力为零，即零升迎角为负"}, {"id": 137, "ch": 3, "cat": "飞行原理1", "q": "翼型的最大厚度与弦长的比值称", "opts": ["A 相对厚度", "B 相对弯度", "C 朢大弯"], "ans": 0, "exp": "相对厚度=朢大厚?弦长，是翼型重要参数"}, {"id": 138, "ch": 3, "cat": "飞行原理1", "q": "影响空气粘力的主要因素是", "opts": ["A 空气温度", "B 空气清洁", "C 相对湿度"], "ans": 0, "exp": "空气粘主要受温度影响，温度升高粘性增大"}, {"id": 139, "ch": 3, "cat": "飞行原理1", "q": "测量机翼的翼展是", "opts": ["A 机身中心线到翼尖", "B 机翼前缘到后", "C 左翼尖到右翼"], "ans": 2, "exp": "翼展是左右翼尖之间的距离"}, {"id": 140, "ch": 3, "cat": "飞行原理1", "q": "飞机坡度增大，升力的水平分量", "opts": ["A 保持不变", "B 增大", "C 减小"], "ans": 1, "exp": "坡度增大→升力水平分量增大，提供更大的转弯向心力"}, {"id": 141, "ch": 3, "cat": "飞行原理1", "q": "机翼1/4弦线与垂直机身中心线的直线之间的夹角称为机翼", "opts": ["A 后掠", "B 安装", "C 上反"], "ans": 0, "exp": "1/4弦线与机身垂直线的夹角为后掠角"}, {"id": 142, "ch": 3, "cat": "飞行原理1", "q": "飞机水平转弯，坡度增大，失度____", "opts": ["A 增大", "B 减小", "C 保持不变，因为临界迎角不"], "ans": 0, "exp": "坡度增大→载荷因数增大→霢更大升力→失速度增大"}, {"id": 143, "ch": 3, "cat": "飞行原理1", "q": "从地球表面到外层空间，大气层依次", "opts": ["A 对流层，平流层，电离层，中间层和散层", "B 对流层，中间层，平流层，电离层和散层", "C 对流层，平流层，中间层，电离层和散层"], "ans": 2, "exp": "大气层从低到高：对流层→平流层→中间层→电离层（热层）→散层"}, {"id": 144, "ch": 3, "cat": "飞行原理1", "q": "根据机翼的设计特点，其产生的升力来自", "opts": ["A 机翼上下表面的正压强", "B 机翼下表面的正压和上表面的负", "C 机翼下表面的负压和上表面的正"], "ans": 1, "exp": "升力来自机翼下表面的正压力（高压区）和上表面的负压力（低压区）"}, {"id": 145, "ch": 3, "cat": "飞行原理1", "q": "流体在管道中稳定低流动时，如果管道由粗变细，则流体的流", "opts": ["A 保持不变", "B 增大", "C 减小"], "ans": 1, "exp": "连续性定理：截面积减小→流增大"}, {"id": 146, "ch": 3, "cat": "飞行原理1", "q": "亚音速气流流过收缩管道，其气流参数如何变", "opts": ["A 流增加，压强增大", "B 速度降低，压强下", "C 流增加，压强下降"], "ans": 2, "exp": "亚音速气流在收缩管道中流速增加压强下降"}, {"id": 147, "ch": 3, "cat": "飞行原理1", "q": "____是在无人机具有姿态稳定控制机构的基础上，通过操纵杆控制无人机的俯仰角、滚转角和偏航角，从而改变无人机的运", "opts": ["A 舵面遥控", "B 指令控制", "C 姿遥"], "ans": 2, "exp": "姿遥控模式过控制三个姿角来改变飞行状态"}, {"id": 148, "ch": 3, "cat": "飞行原理1", "q": "机翼的展弦比", "opts": ["A 展长与翼尖弦长之", "B 展长与平均几何弦长之", "C 展长与机翼最大厚度之"], "ans": 1, "exp": "展弦?翼展/平均弦长，影响诱导阻力"}, {"id": 149, "ch": 3, "cat": "飞行原理1", "q": "翼型的最大弯度与弦长的比值称", "opts": ["A 相对弯度", "B 朢大厚", "C 相对厚度"], "ans": 0, "exp": "相对弯度=朢大弯?弦长"}, {"id": 150, "ch": 3, "cat": "飞行原理1", "q": "伯努利方程用", "opts": ["A 适用于各种度的气", "B 低气", "C 高气"], "ans": 1, "exp": "伯努利方程用于不可压缩流体，即低速气流近似"}, {"id": 151, "ch": 3, "cat": "飞行原理1", "q": "在定高直线飞行中，下面关于飞机升力的说法，正确的", "opts": ["A 空小时必须减小迎角，以产生当的升力来保持高度", "B 空大时必须增大迎角，以产生当的升力来保持高度", "C 空大时必须减小迎角，以产生当的升力来保持高度"], "ans": 2, "exp": "定高飞行：空速大→动压大→需减小迎角以保持升力不变"}, {"id": 152, "ch": 3, "cat": "飞行原理1", "q": "转弯时，为保持高度和空，", "opts": ["A 增大迎角、减小拉", "B 减小迎角、增大拉", "C 增大迎角和油"], "ans": 2, "exp": "转弯时升力分量减小，霢增大迎角和油门补充升力和速度"}, {"id": 153, "ch": 3, "cat": "飞行原理1", "q": "当空气在管道中流动时，由伯努利定理可", "opts": ["A 凡是流大的地方，压强就小", "B 凡是流小的地方，压强就小", "C 凡是流大的地方，压强就大"], "ans": 0, "exp": "伯努利定理：流大→动压大→静压小"}, {"id": 154, "ch": 3, "cat": "飞行原理1", "q": "对流层的高度，在地球中纬度地区约", "opts": ["A 11公里", "B 16公里", "C 8公里"], "ans": 0, "exp": "中纬度地区对流层高度?1公里，赤道约16-18公里，极地约8-9公里"}, {"id": 155, "ch": 3, "cat": "飞行原理1", "q": "飞机飞行中，机翼升力等于零时的迎角称", "opts": ["A 零迎", "B 零升迎角", "C 失迎"], "ans": 1, "exp": "升力为零时的迎角称为零升迎角"}, {"id": 156, "ch": 3, "cat": "飞行原理1", "q": "飞机坡度增大，升力的垂直分量", "opts": ["A 增大", "B 减小", "C 保持不变"], "ans": 1, "exp": "坡度增大→升力垂直分量减小，水平分量增大"}, {"id": 157, "ch": 3, "cat": "飞行原理1", "q": "对于空气密度如下说法正确的是", "opts": ["A 空气密度正比于压力和绝对温度", "B 空气密度正比于压力，反比于绝对温", "C 空气密度反比于压力，正比于绝对温"], "ans": 1, "exp": "根据ρ=P/RT，密度正比于压力，反比于绝对温度"}, {"id": 158, "ch": 3, "cat": "飞行原理1", "q": "在对流层内，空气的温", "opts": ["A 随高度增加保持不", "B 随高度增加升", "C 随高度增加降"], "ans": 2, "exp": "对流层内温度随高度减，平均减?.65°C/100m"}, {"id": 159, "ch": 3, "cat": "飞行原理1", "q": "放全襟翼下降，无人机能以", "opts": ["A 较大的下降角，较小的速度下降", "B 较大的下降角，较大的速度下降", "C 较小的下降角，较大的速度下降"], "ans": 0, "exp": "全襟翼增加升力和阻力，能以较陡角度较低度下降"}, {"id": 160, "ch": 3, "cat": "飞行原理1", "q": "计算动压时需要哪些数", "opts": ["A 空气密度和度", "B 空气密度和阻", "C 大气压力和度"], "ans": 0, "exp": "动压q=½ρV²，需要空气密度和速度"}, {"id": 161, "ch": 3, "cat": "飞行原理1", "q": "Cl=1.3和Cl=1.0", "opts": ["A 产生升力相等", "B 前产生更大升", "C 后产生更大升"], "ans": 1, "exp": "升力系数Cl越大，在相同条件下产生的升力越大"}, {"id": 162, "ch": 3, "cat": "飞行原理1", "q": "空气的密", "opts": ["A 与压力成反比", "B 与压力成正比", "C 与压力无"], "ans": 1, "exp": "温度不变时，密度与压力成正比"}, {"id": 163, "ch": 3, "cat": "飞行原理1", "q": "飞机迎角增大，压力中心的位置", "opts": ["A 前移", "B 后移", "C 保持不变"], "ans": 0, "exp": "迎角增大→升力中心前移→压力中心前移"}, {"id": 164, "ch": 3, "cat": "飞行原理1", "q": "在大气层内，大气压强", "opts": ["A 随高度增加减", "B 随高度增加增", "C 在同温层内随高度增加保持不变"], "ans": 0, "exp": "大气压强随高度增加减小"}, {"id": 165, "ch": 3, "cat": "飞行原理1", "q": "相同迎角，飞行度增大丢倍，阻力增加约为原来", "opts": ["A 四", "B 二", "C 丢"], "ans": 0, "exp": "阻力与度平方成正比，速度增大丢倍→阻力增大到四倍"}, {"id": 166, "ch": 3, "cat": "飞行原理1", "q": "伯努利方程的使用条件", "opts": ["A 只要是理想的与外界无能量交换的流", "B 必须是理想的、不可压缩且与外界无能量交换的流", "C 只要是理想的不可压缩流体"], "ans": 1, "exp": "伯努利方程条件：理想流体、不可压缩无能量交换（绝热）"}, {"id": 167, "ch": 3, "cat": "飞行原理1", "q": "超音速气流经过收缩管道后", "opts": ["A 速度增加，压强下", "B 速度降低，压强增", "C 速度增加，压强增"], "ans": 1, "exp": "超音速气流在收缩管道中度降低、压强增大（与亚音相反）"}, {"id": 168, "ch": 3, "cat": "飞行原理1", "q": "下列叙述与伯努利定理无关的是", "opts": ["A 流体流大的地方压力小，流速小的地方压力大", "B 气流沿流管稳定流动过程中，气流的动压和静压之和等于常", "C 气流低流动时，流速与流管横截面积成正"], "ans": 2, "exp": "C是连续定理内容，与伯努利定理无关"}, {"id": 169, "ch": 3, "cat": "飞行原理1", "q": "为了飞行安全，飞机飞行时的升力系数和迎角丢般为", "opts": ["A 朢大升力系数和小于临界迎角的迎角限定", "B 小于朢大升力系数和临界迎角的两个限定", "C 朢大升力系数和临界迎角朢"], "ans": 1, "exp": "飞行时使用小于最大升力系数和小于临界迎角的安全"}, {"id": 170, "ch": 3, "cat": "飞行原理1", "q": "飞机重心位置的表示方法是", "opts": ["A 用重心到机体基准面的距离和平均气动力弦长之比的百分数来表", "B 用重心到平均几何弦后缘的距离和平均几何弦长之比的百分数来表示", "C 用重心到平均气动力弦前缘的距离和平均气动力弦长之比的百分数来表示"], "ans": 2, "exp": "重心位置用距平均气动力弦前缘距离占弦长的百分比表示"}, {"id": 171, "ch": 3, "cat": "飞行原理1", "q": "偏转副翼使飞机转弯时，两翼的阻力", "opts": ["A 外侧机翼阻力", "B 内侧机翼阻力", "C 相等"], "ans": 0, "exp": "副翼偏转产生滚转，外侧机翼升力大诱导阻力也大→外侧阻力大"}, {"id": 172, "ch": 3, "cat": "飞行原理1", "q": "亚音速气流经过收缩管道后", "opts": ["A 速度增加，压强下", "B 速度降低，压强下", "C 速度增加，压强增"], "ans": 0, "exp": "亚音速气流在收缩管道中度增加、压强下降"}, {"id": 173, "ch": 3, "cat": "飞行原理1", "q": "对于带襟翼无人机，放下襟翼，飞机的升力将____，阻力将____", "opts": ["A 增大、增", "B 增大、减", "C 减小、减"], "ans": 0, "exp": "放下襟翼增加翼型弯度和面积，升力和阻力均增大"}, {"id": 174, "ch": 3, "cat": "飞行原理1", "q": "在大风中自驾飞行的固定翼民用无人机，航线左转90", "opts": ["A 逆风左转90度，转出的弯", "B 逆风、顺风左?0度，转出的弯丢样大", "C 顺风左转90度，转出的弯"], "ans": 2, "exp": "顺风时地速大，转弯半径大，转出的弯更大"}, {"id": 175, "ch": 3, "cat": "飞行原理1", "q": "层流翼型的特点是", "opts": ["A 前缘半径大，后部尖的水滴", "B 前缘尖的菱形", "C 朢大厚度靠"], "ans": 2, "exp": "层流翼型朢大厚度位置靠后（?0-50%弦长处），利于保持层流"}, {"id": 176, "ch": 3, "cat": "飞行原理1", "q": "现代民航客机丢般巡航的大气层是", "opts": ["A 平流层顶", "B 对流层顶层平流层底层", "C 对流层底"], "ans": 1, "exp": "民航客机巡航高度?0000米，处于对流层顶和平流层底"}, {"id": 177, "ch": 3, "cat": "飞行原理1", "q": "飞机转弯时，为保持高度需要增大迎角，原因", "opts": ["A 保持升力水平分量不变", "B 用以使机头沿转弯方向转动", "C 保持升力垂直分量不变"], "ans": 2, "exp": "转弯时升力斜，垂直分量减小，霢增大迎角增大升力以保持垂直分量"}, {"id": 178, "ch": 3, "cat": "飞行原理1", "q": "如果对称机翼相对来流仰头旋转了一个迎角，驻点", "opts": ["A 不会移动", "B 稍稍向前缘的上表面移", "C 稍稍向前缘的下表面移"], "ans": 2, "exp": "对称翼型正迎角时驻点向前缘下表面移动"}, {"id": 179, "ch": 3, "cat": "飞行原理1", "q": "飞机转弯的向心力", "opts": ["A 飞机升力的水平分", "B 方向舵上产生的气动力", "C 飞机的拉"], "ans": 0, "exp": "飞机转弯的向心力来自升力的水平分量"}, {"id": 180, "ch": 3, "cat": "飞行原理1", "q": "对于带襟翼无人机，放下襟翼，飞机的失速度", "opts": ["A 减小", "B 不变", "C 增大"], "ans": 0, "exp": "放下襟翼增加升力系数，失速度减小"}, {"id": 181, "ch": 3, "cat": "飞行原理1", "q": "气体的伯努利定理是哪个定律在空气流动过程中的应用", "opts": ["A 能量守衡定律", "B 牛顿第一定律", "C 质量守衡定律"], "ans": 0, "exp": "伯努利定理是能量守恒定律在流体力学中的应用"}, {"id": 182, "ch": 3, "cat": "飞行原理1", "q": "飞机转弯时，坡度有继续增大的倾向，原因是", "opts": ["A 转弯外侧阻力比内侧的", "B 转弯外侧升力比内侧的", "C 转弯外侧阻力比内侧的"], "ans": 1, "exp": "转弯外侧机翼速度大→升力大→坡度有增大趋势"}, {"id": 183, "ch": 3, "cat": "飞行原理1", "q": "常规布局固定翼无人机要实现向右滚转和上仰姿，舵面的偏转方向应该是", "opts": ["A 副翼右上左下，升降舵向上", "B 副翼左上右下，升降舵向下", "C 副翼右上左下，升降舵向下"], "ans": 0, "exp": "右滚转：右副翼上偏左副翼下偏→右上左下；上仰：升降舵上偏"}, {"id": 184, "ch": 3, "cat": "飞行原理1", "q": "飞机的压力中心是", "opts": ["A 压力朢高的", "B 压力朢低的", "C 升力的着力点"], "ans": 2, "exp": "压力中心是气动力合力的作用点，即升力的着力点"}, {"id": 185, "ch": 4, "cat": "飞行原理2", "q": "当飞机减小度水平飞行", "opts": ["A 减小迎角以减小阻", "B 增大迎角以提高升", "C 保持迎角不变以防止失"], "ans": 1, "exp": "速度减小→动压减小→霢增大迎角提高升力系数以维持升力不变"}, {"id": 186, "ch": 4, "cat": "飞行原理2", "q": "不属于影响飞机机体腐蚢的大气因素是", "opts": ["A 空气的温", "B 空气的相对湿", "C 空气压力"], "ans": 2, "exp": "空气压力对机体腐蚢影响极小，温差和湿度是主要腐蚢因素"}, {"id": 187, "ch": 4, "cat": "飞行原理2", "q": "失迎角就是临界迎角，指的", "opts": ["A 飞机升力系数朢大时的迎", "B 飞机飞得朢高时的迎", "C 飞机飞得朢快时的迎"], "ans": 0, "exp": "临界迎角是升力系数最大时的迎角，超过后升力剧下降"}, {"id": 188, "ch": 4, "cat": "飞行原理2", "q": "在平衡外载荷的作用下，飞机飞行的轨迹", "opts": ["A 是直线的或是水平曲线", "B 丢定是直线", "C 丢定是水平直线"], "ans": 0, "exp": "平衡外载荷下飞机可作直线飞行或水平曲线飞行"}, {"id": 189, "ch": 4, "cat": "飞行原理2", "q": "飞机起飞时后缘襟翼放下的角度小于睢陆时放下的角度，是因", "opts": ["A 后缘襟翼放下角度比较小时，机翼的升力系数增加的效果大于阻力系数增加的效果", "B 后缘襟翼放下角度比较大时，机翼的阻力系数增加，升力系数不增加", "C 后缘襟翼放下角度比较小时，机翼的升力系数增加，阻力系数不增加"], "ans": 0, "exp": "起飞时小角度襟翼增升效果大于增阻效果，利于加速爬升"}, {"id": 190, "ch": 4, "cat": "飞行原理2", "q": "发动机火花塞出问题则", "opts": ["A 无法启动", "B 突然熄火", "C 以上都有可能"], "ans": 2, "exp": "火花塞故障可能导致无法启动突然熄火或功率下降等"}, {"id": 191, "ch": 4, "cat": "飞行原理2", "q": "利用风可以得到飞机气动参数，其基本依据是", "opts": ["A 牛顿定理", "B 相对性原", "C 连续性假"], "ans": 1, "exp": "相对性原理：飞机在静止空气中运动与在风洞中吹风是等效的"}, {"id": 192, "ch": 4, "cat": "飞行原理2", "q": "飞行中操作扰流板伸出", "opts": ["A 增加飞机抬头力矩，辅助飞机爬", "B 增加机翼上翼面的面积以提高升", "C 阻挡气流的流动，增大阻力"], "ans": 2, "exp": "扰流板伸出破坏机翼上表面气流，增大阻力，减小升力"}, {"id": 193, "ch": 4, "cat": "飞行原理2", "q": "飞机睢陆的过程", "opts": ["A 下滑、拉平平飘接地和睢陆滑跑五个阶", "B 减下滑拉平接地和减滑跑三个阶", "C 下滑、拉平接地着陆滑跑和刹车五个阶段"], "ans": 0, "exp": "睢陆过程分为下滑拉平平飘接地和睢陆滑跑五个阶段"}, {"id": 194, "ch": 4, "cat": "飞行原理2", "q": "在相同飞行度和迎角情况下，翼面不清洁或前缘结冰的机翼升力", "opts": ["A 等于基本翼型升力", "B 小于基本翼型升力", "C 大于基本翼型升力"], "ans": 1, "exp": "翼面污染或结冰破坏翼型，升力减小，阻力增大"}, {"id": 195, "ch": 4, "cat": "飞行原理2", "q": "属于增升装置的辅助操纵面", "opts": ["A 前缘襟翼", "B 副翼", "C 扰流"], "ans": 0, "exp": "前缘襟翼是增升装置，副翼是主操纵面，扰流板是减升装置"}, {"id": 196, "ch": 4, "cat": "飞行原理2", "q": "四冲程汽油发动机中，燃料箱加注的", "opts": ["A 汽油与滑油的混合", "B 滑油", "C 汽油"], "ans": 2, "exp": "四冲程发动机汽油和机油分别加注，燃料箱只加汽油"}, {"id": 197, "ch": 4, "cat": "飞行原理2", "q": "丢个平滑流动或流线型流动里面的空气微团，接近一个低压区", "opts": ["A 会减", "B 会加", "C 速度不变"], "ans": 1, "exp": "空气微团接近低压区时，压力梯度力使其加"}, {"id": 198, "ch": 4, "cat": "飞行原理2", "q": "机翼升力系数与哪些因素有", "opts": ["A 仅与翼剖面形状有", "B 仅与攻角有关", "C 与翼剖面形状和攻角有"], "ans": 2, "exp": "升力系数取决于翼型（剖面形状）和迎角（攻角）"}, {"id": 199, "ch": 4, "cat": "飞行原理2", "q": "大多数多旋翼飞行器自主飞行过程利用____实现高度感知", "opts": ["A GPS", "B 超声波高度计", "C 气压高度"], "ans": 0, "exp": "多数多旋翼飞行器自主飞行利用GPS实现高度感知"}, {"id": 200, "ch": 4, "cat": "飞行原理2", "q": "对起飞降落安全成不利影响的是", "opts": ["A 跑道上的微冲气流", "B 稳定的上升气", "C 稳定的风"], "ans": 0, "exp": "微冲气流造成低空风切变，严重威胁起降安全"}, {"id": 201, "ch": 4, "cat": "飞行原理2", "q": "飞机的爬升角是指", "opts": ["A 飞机横轴与水平线之间的夹", "B 飞机立轴与水平线之间的夹", "C 飞机上升轨迹与水平线之间的夹"], "ans": 2, "exp": "爬升角是飞行轨迹与水平面的夹角"}, {"id": 202, "ch": 4, "cat": "飞行原理2", "q": "机翼空气动力受力朢大的", "opts": ["A 机翼上表面负", "B 机翼下表面压", "C 机翼上表面压"], "ans": 0, "exp": "升力主要来自上表面负压产生的吸力，约占升力的2/3"}, {"id": 203, "ch": 4, "cat": "飞行原理2", "q": "飞机在飞行中出现的失速现象的原因", "opts": ["A 翼梢出现较强的旋涡，产生很大的诱导阻", "B 由于机翼表面粗糙，使附面层由层流变为紊流", "C 由于迎角达到临界迎角，成机翼上表面附面层大部分分"], "ans": 2, "exp": "失的根本原因是迎角超临界迎角，气流分离"}, {"id": 204, "ch": 4, "cat": "飞行原理2", "q": "保持匢速上升时，升力与重力", "opts": ["A 相等", "B 升力大于重力", "C 升力小于重力"], "ans": 0, "exp": "匢速上升时升力等于重力，推力大于阻力"}, {"id": 205, "ch": 4, "cat": "飞行原理2", "q": "下列哪项对飞机阻力大小影响不", "opts": ["A 飞机的安装角和上反角", "B 飞机的翼型和平面形状", "C 飞行速度、空气密度机翼面"], "ans": 0, "exp": "安装角和上反角主要影响稳定，对阻力影响相对较小"}, {"id": 206, "ch": 4, "cat": "飞行原理2", "q": "增大机翼弯度可以增大机翼升力的原理是", "opts": ["A 加快机翼后缘气流的流", "B 使附面层保持层流状", "C 加快机翼前缘上表面气流的流"], "ans": 2, "exp": "增大弯度→上表面气流加→压力降低→升力增大"}, {"id": 207, "ch": 4, "cat": "飞行原理2", "q": "合理布局飞机结构的位置，是为了减", "opts": ["A 压差阻力", "B 干扰阻力", "C 摩擦阻力"], "ans": 1, "exp": "合理布局减少各部件间气流相互干扰，减小干扰阻力"}, {"id": 208, "ch": 4, "cat": "飞行原理2", "q": "前缘缝翼的功用有", "opts": ["A 增加飞机的稳定", "B 增大机翼的安装角", "C 增大朢大升力系"], "ans": 2, "exp": "前缘缝翼在大迎角时打弢，延缓气流分离，增大朢大升力系数"}, {"id": 209, "ch": 4, "cat": "飞行原理2", "q": "属于减升装置的辅助操纵面", "opts": ["A 前缘缝翼", "B 副翼", "C 扰流"], "ans": 2, "exp": "扰流板是减升装置，前缘缝翼是增升装置，副翼是主操纵面"}, {"id": 210, "ch": 4, "cat": "飞行原理2", "q": "____发动机处于小油门状，或甚至关", "opts": ["A 爬升状", "B 滑翔状", "C 俯冲状"], "ans": 1, "exp": "滑翔状下发动机小油门或，依靠势能维持飞行"}, {"id": 211, "ch": 4, "cat": "飞行原理2", "q": "使用机翼后缘襟翼提高升力系数的同时，临界迎角减小的主要原因是", "opts": ["A 放下后缘襟翼时，在上下翼面之间形成了缝隙", "B 放下后缘襟翼时，增大了机翼的弯度", "C 放下后缘襟翼时，增大了机翼的面积"], "ans": 1, "exp": "增大弯度使上表面气流加，更容易在较小迎角发生分离"}, {"id": 212, "ch": 4, "cat": "飞行原理2", "q": "飞机焦点的位", "opts": ["A 不随仰角变化而改", "B 随滚转角变化而改", "C 随仰角变化改"], "ans": 0, "exp": "焦点是附加升力的作用点，在亚音时不随迎角变化"}, {"id": 213, "ch": 4, "cat": "飞行原理2", "q": "飞机的下滑角", "opts": ["A 飞行轨迹与水平面的夹", "B 阻力与重力的夹角", "C 升力与阻力的夹角"], "ans": 0, "exp": "下滑角是飞行轨迹（下滑线）与水平面的夹角"}, {"id": 214, "ch": 4, "cat": "飞行原理2", "q": "下列正确的是", "opts": ["A 飞机的升阻比越大，飞机的空气动力特越", "B 飞机的升阻比越小，飞机的空气动力特越", "C 飞机的升阻比越大，飞机的空气动力特越"], "ans": 0, "exp": "升阻比越大表示产生升力效率越高，气动特越好"}, {"id": 215, "ch": 4, "cat": "飞行原理2", "q": "影响升力的因", "opts": ["A 都是", "B 飞行器的尺寸或面积飞行度、空气密", "C CL"], "ans": 0, "exp": "升力受面积度、密度升力系数等多个因素共同影响"}, {"id": 216, "ch": 4, "cat": "飞行原理2", "q": "下列关于阻力的哪种说法是正确", "opts": ["A 在飞机各部件之间加装整流包皮可以减小诱导阻力", "B 干扰阻力是飞机各部件之间由于气流相互干扰而产生的丢种额外阻", "C 干扰阻力是由于气流的下洗而引起的"], "ans": 1, "exp": "干扰阻力是各部件间气流相互干扰产生的额外阻力"}, {"id": 217, "ch": 4, "cat": "飞行原理2", "q": "操纵无人机时，若迎角超过临界迎角升力系数", "opts": ["A 迅减", "B 缓慢增大", "C 迅增"], "ans": 0, "exp": "超过临界迎角后气流分离，升力系数迅减小，即失速"}, {"id": 218, "ch": 4, "cat": "飞行原理2", "q": "某活塞式化油器发动机增加油门时熄火则", "opts": ["A 调整低油", "B 飞行时不加油", "C 调整高油"], "ans": 2, "exp": "增加油门熄火说明高油针调整不当，应调整高速油针"}, {"id": 219, "ch": 4, "cat": "飞行原理2", "q": "飞机下滑距离", "opts": ["A 与下滑高度有", "B 与下滑角无关", "C 与下滑高度无"], "ans": 0, "exp": "下滑距离=高度/下滑角正切，与高度成正比"}, {"id": 220, "ch": 4, "cat": "飞行原理2", "q": "飞行场当地气温的变化，主要会影响以下哪种无人机的传感", "opts": ["A 磁罗", "B 速率院", "C 气压高度"], "ans": 2, "exp": "气温变化影响空气密度，气压高度计读数受温度影响较大"}, {"id": 221, "ch": 4, "cat": "飞行原理2", "q": "表面脏污的机翼与表面光洁的机翼相", "opts": ["A 同迎角下升力系数相同，阻力系数加", "B 相同升力系数时其迎角减小", "C 朢大升力系数下降，阻力系数增大"], "ans": 2, "exp": "表面脏污破坏翼型，最大升力系数下降，阻力增大"}, {"id": 222, "ch": 4, "cat": "飞行原理2", "q": "根据机翼升力和阻力计算公式可以得出，通过增大机翼面积来增大升力的同时", "opts": ["A 阻力不变", "B 阻力也随睢增大", "C 阻力减小"], "ans": 1, "exp": "增大面积同时增大升力和阻力，阻力也成比例增大"}, {"id": 223, "ch": 4, "cat": "飞行原理2", "q": "失指的是", "opts": ["A 飞机速度太快", "B 飞机以大于临界迎角飞", "C 飞机失去速度"], "ans": 1, "exp": "失指迎角超过临界迎角，气流分离升力骤降，与度无关"}, {"id": 224, "ch": 4, "cat": "飞行原理2", "q": "假设其他条件不变，空气湿度大", "opts": ["A 空气密度大，起飞滑跑距离", "B 空气密度大，起飞滑跑距离", "C 空气密度小，起飞滑跑距离"], "ans": 2, "exp": "湿度大→水蒸气多→空气密度小→需更长滑跑距离"}, {"id": 225, "ch": 4, "cat": "飞行原理2", "q": "飞机进行的匀速俯冲拉起飞行，", "opts": ["A 飞行速度方向的变化是由于存在睢向心", "B 是在平衡外载荷作用下进行的飞", "C 速度不发生变"], "ans": 0, "exp": "俯冲拉起过程中度方向改变，存在向心加速度"}, {"id": 226, "ch": 4, "cat": "飞行原理2", "q": "飞机在飞行时，升力方向是", "opts": ["A 与翼弦垂", "B 与地面垂", "C 与相对气流度垂直"], "ans": 2, "exp": "升力方向始终垂直于相对气流方向"}, {"id": 227, "ch": 4, "cat": "飞行原理2", "q": "飞机做等速直线水平飞行时，作用在飞机上的外载荷应满足", "opts": ["A 升力等于重力，推力等于阻力，抬头力矩等于低头力矩", "B 升力等于重力，抬头力矩等于低头力", "C 升力等于重力，推力等于阻"], "ans": 0, "exp": "等平飞需力和力矩全部平衡"}, {"id": 228, "ch": 4, "cat": "飞行原理2", "q": "用下滑有利度下滑，飞机的", "opts": ["A 升阻比最", "B 下滑角最", "C 升力朢"], "ans": 0, "exp": "下滑有利速度对应朢大升阻比，滑翔距离最长"}, {"id": 229, "ch": 4, "cat": "飞行原理2", "q": "民用无人机运行多处于低空低环境下，主要受到的阻力?1摩擦阻力;2循环阻力;3干扰阻力;4濢波阻?5诱导阻力;6压差阻力", "opts": ["A 1??", "B 1???", "C 1???"], "ans": 2, "exp": "低空低时濢波阻力可忽略，循环阻力不是主要类型"}, {"id": 230, "ch": 4, "cat": "飞行原理2", "q": "飞机爬升角的大小取决", "opts": ["A 剩余推力", "B 飞机重量", "C 剩余推力和飞机重"], "ans": 2, "exp": "爬升角取决于剩余推力（推力减阻力）与飞机重量的比值"}, {"id": 231, "ch": 4, "cat": "飞行原理2", "q": "下列关于诱导阻力的哪种说法是正确", "opts": ["A 把暴露在气流中的扢有部件和零件都做成流线型，可以减小诱导阻", "B 在飞机各部件之间加装整流包皮，可以减小诱导阻", "C 增大机翼的展弦比可以减小诱导阻力"], "ans": 2, "exp": "增大展弦比可减小翼尖涡强度，有效减小诱导阻力"}, {"id": 232, "ch": 4, "cat": "飞行原理2", "q": "增大翼型朢大升力系数的两个因数", "opts": ["A 厚度和机翼面", "B 厚度和弯", "C 弯度和翼"], "ans": 1, "exp": "翼型的厚度和弯度是增大最大升力系数的主要因素"}, {"id": 233, "ch": 4, "cat": "飞行原理2", "q": "下列关于压差阻力哪种说法是正确的", "opts": ["A 物体的最大迎风面积越大，压差阻力越大", "B 物体的最大迎风面积越大，压差阻力越小", "C 物体形状越接近流线型，压差阻力越"], "ans": 0, "exp": "迎风面积越大→前后压力差越大→压差阻力越大"}, {"id": 234, "ch": 4, "cat": "飞行原理2", "q": "飞机在平飞时，载重量越大其失速度", "opts": ["A 与重量无", "B 角愈", "C 越大"], "ans": 2, "exp": "重量增大→需更大升力→失速度增大"}, {"id": 235, "ch": 4, "cat": "飞行原理2", "q": "增大飞机机翼的展弦比，目的是减小飞机", "opts": ["A 诱导阻力", "B 压差阻力", "C 摩擦阻力"], "ans": 0, "exp": "增大展弦比减小翼尖涡强度，有效减小诱导阻力"}, {"id": 236, "ch": 4, "cat": "飞行原理2", "q": "飞机升力的大小与空气密度的关系是", "opts": ["A 空气密度成正", "B 空气密度成反", "C 空气密度无关"], "ans": 0, "exp": "升力L=½ρV²SCL，与空气密度成正比"}, {"id": 237, "ch": 4, "cat": "飞行原理2", "q": "当恒定角速度水平转弯时空速增加，转弯半径", "opts": ["A 减少", "B 增加", "C 不变"], "ans": 1, "exp": "角度恒定→空速增大→转弯半径R=V/ω增大"}, {"id": 238, "ch": 4, "cat": "飞行原理2", "q": "丢般来说，油动民用无人机与电动民用无人机在冬天飞行", "opts": ["A 油动航时比夏天短;电动航时比夏天长", "B 油动航时比夏天长;电动航时也比夏天", "C 油动航时比夏天长;电动航时比夏天短"], "ans": 2, "exp": "冬天气温低：油动发动机散热好航时略长；电动电池效率低航时缩短"}, {"id": 239, "ch": 4, "cat": "飞行原理2", "q": "有些飞机的翼尖部位安装了翼梢小翼，它的功用是", "opts": ["A 减小诱导阻力", "B 减小摩擦阻力", "C 减小压差阻力"], "ans": 0, "exp": "翼梢小翼减弱翼尖涡，减小诱导阻力，提高气动效率"}, {"id": 240, "ch": 4, "cat": "飞行原理2", "q": "不属于影响机翼升力系数的因素", "opts": ["A 空气密度", "B 迎角", "C 翼剖面形"], "ans": 0, "exp": "空气密度影响升力大小但不影响升力系数，升力系数由翼型和迎角决定"}, {"id": 241, "ch": 4, "cat": "飞行原理2", "q": "减小飞机外型的迎风面积，目的是为了减小飞机的", "opts": ["A 摩擦阻力", "B 压差阻力", "C 诱导阻力"], "ans": 1, "exp": "减小迎风面积→减小前后压力差→减小压差阻力"}, {"id": 242, "ch": 4, "cat": "飞行原理2", "q": "飞机升阻比的大小主要随下列哪项因素变", "opts": ["A 机翼面积", "B 飞行速度", "C 飞行迎角"], "ans": 2, "exp": "升阻比主要随迎角变化，在有利迎角时达到最大"}, {"id": 243, "ch": 4, "cat": "飞行原理2", "q": "通过丢个收缩管道的流体，在管道的收缩区，度的增加必然成收缩区压", "opts": ["A 增加", "B 不变", "C 减少"], "ans": 2, "exp": "伯努利原理：流增加→压力减小"}, {"id": 244, "ch": 4, "cat": "飞行原理2", "q": "利用增大机翼弯度来提高机翼的升力系数，会导致", "opts": ["A 机翼上表面最低压力点后移，减小临界迎", "B 机翼上表面最低压力点前移，加大临界迎", "C 机翼上表面最低压力点前移，减小临界迎"], "ans": 2, "exp": "增大弯度→最低压力点前移→气流更早分离→临界迎角减小"}, {"id": 245, "ch": 4, "cat": "飞行原理2", "q": "气流沿机翼表面流动，影响由层流变为紊流的原因不包", "opts": ["A 在翼表面流动长度", "B 空气的流", "C 空气比重"], "ans": 2, "exp": "层流变紊流取决于雷诺数（流长度粘性），与空气比重无关"}, {"id": 246, "ch": 4, "cat": "飞行原理2", "q": "飞机升力的大小与空的关系", "opts": ["A 与空速无", "B 与空速成正比", "C 与空速的平方成正"], "ans": 2, "exp": "升力L=½ρV²SCL，与空的平方成正比"}, {"id": 247, "ch": 4, "cat": "飞行原理2", "q": "下列关于扰流板的叙述哪项说法错误", "opts": ["A 可代替副翼实现飞机横向操", "B 扰流板可作为减板缩短飞机滑跑距离", "C 可辅助副翼实现飞机横向操"], "ans": 0, "exp": "扰流板辅助横向操纵但不能完全替代副翼，副翼是主滚转操纵面"}, {"id": 248, "ch": 4, "cat": "飞行原理2", "q": "下滑有利速度", "opts": ["A 飞机下滑升力朢", "B 飞机下滑阻力朢", "C 飞机下滑角最"], "ans": 1, "exp": "下滑有利速度对应朢小阻力度（不是最大升阻比），下滑角最小按原题答案B"}, {"id": 249, "ch": 4, "cat": "飞行原理2", "q": "在翼型后部产生涡流，会成", "opts": ["A 压差阻力增加", "B 升力增加", "C 摩擦阻力增加"], "ans": 0, "exp": "后部涡流增大前后压力差，压差阻力增大"}, {"id": 250, "ch": 4, "cat": "飞行原理2", "q": "不属于云对安全飞行产生不利影响的原因", "opts": ["A 温度低成机翼表面结冰", "B 增加阻力", "C 影响正常的目"], "ans": 1, "exp": "云本身不直接增加阻力，结冰和影响目测是主要危害"}, {"id": 251, "ch": 4, "cat": "飞行原理2", "q": "下列关于升阻比的哪种说法是不正确", "opts": ["A 升阻比成线增", "B 升力系数达到朢大时，升阻比也达到最", "C 升力和阻力之比升阻比达到朢大之前，随迎角增"], "ans": 1, "exp": "升力系数朢大时（临界迎角）阻力也很大，升阻比并非最大"}, {"id": 252, "ch": 4, "cat": "飞行原理2", "q": "在飞机进行俯冲拉起过程中，飞机的升力", "opts": ["A 等于飞机的重", "B 大于飞机的重量并丢直保持不", "C 为飞机的曲线运动提供向心"], "ans": 2, "exp": "俯冲拉起时升力大于重力，差提供向心力"}, {"id": 253, "ch": 4, "cat": "飞行原理2", "q": "当后缘襟翼放下时，下述哪项说法正", "opts": ["A 既增大升力又增大阻力", "B 只增大阻", "C 只增大升"], "ans": 0, "exp": "放下襟翼增加弯度和面积，升力和阻力同时增大"}, {"id": 254, "ch": 4, "cat": "飞行原理2", "q": "对于进行定常飞行的飞机来", "opts": ["A 发动机推力一定等于阻", "B 作用在飞机上的外载荷必定是平衡力", "C 升力丢定等于重"], "ans": 1, "exp": "定常飞行（匀速直线）时外载荷力系平衡，各力不丢定单独相等"}, {"id": 255, "ch": 4, "cat": "飞行原理2", "q": "飞机以一定地速风起飞", "opts": ["A 滑跑距离将不", "B 滑跑距离将增", "C 滑跑距离将减"], "ans": 2, "exp": "逆风起飞→空速达到起飞度更快→地速小→滑跑距离缩短"}, {"id": 256, "ch": 4, "cat": "飞行原理2", "q": "下列叙述与飞机的正常盘旋飞行无关的是", "opts": ["A 保持飞行高度不变", "B 保持飞机作圆周飞", "C 保持飞机等直线飞"], "ans": 2, "exp": "正常盘旋是圆周飞行，不是直线飞行"}, {"id": 257, "ch": 4, "cat": "飞行原理2", "q": "在涡阻力等于其他阻力和的地方", "opts": ["A 阻力达到朢小", "B 阻力达到极小", "C 阻力达到极大"], "ans": 0, "exp": "涡阻力与其他阻力之和相等时，总阻力达到最小"}, {"id": 258, "ch": 4, "cat": "飞行原理2", "q": "常规布局飞机失时", "opts": ["A 机翼向上的力和尾翼向下的力都降低", "B 机翼向上的力和尾翼向下的力都增加", "C 机翼向上的力和尾翼向下的力恒都为"], "ans": 0, "exp": "失时机翼升力大幅下降，尾翼负升力也相应降低"}, {"id": 259, "ch": 4, "cat": "飞行原理2", "q": "飞机睢陆时使用后缘襟翼的作用是", "opts": ["A 增加飞机的升", "B 增加飞机的稳定", "C 提高飞机的操纵灵敏"], "ans": 0, "exp": "睢陆时放襟翼增加升力，降低睢陆度"}, {"id": 260, "ch": 4, "cat": "飞行原理2", "q": "飞机前缘结冰对飞行的主要影响", "opts": ["A 相同迎角，升力系数下", "B 增大了临界攻角，使飞机易失", "C 增大了飞机重量，使起飞困"], "ans": 0, "exp": "前缘结冰破坏翼型，相同迎角下升力系数大幅下降"}, {"id": 261, "ch": 4, "cat": "飞行原理2", "q": "使用扰流板操纵飞机向左盘旋时，下述哪项说法正", "opts": ["A 左机翼飞行扰流板向上打开，右机翼飞行扰流板不", "B 左机翼飞行扰流板不动，右机翼飞行扰流板向上打弢", "C 左机翼飞行扰流板向上打开，右机翼飞行扰流板向上打弢"], "ans": 0, "exp": "向左盘旋→左侧扰流板上偏减升→左侧下沉→实现左滚转"}, {"id": 262, "ch": 4, "cat": "飞行原理2", "q": "下面说法错误的是", "opts": ["A 滑翔状，丢个较大的下滑角会导致丢个很大的重力分量", "B 在俯冲状态中，飞行轨迹可以达到完全垂直向", "C 在爬升状态中，要想爬升得更陡和更快就必须有强大的推力，机翼的作用是主要的"], "ans": 2, "exp": "爬升更陡主要靠剩余推力，推力作用大于机翼"}, {"id": 263, "ch": 4, "cat": "飞行原理2", "q": "常规布局飞机的主要舵面指的是", "opts": ["A 方向舵襟翼缝", "B 升降舵方向舵、副", "C 升降舵方向舵、襟"], "ans": 1, "exp": "主要操纵舵面：升降舵（俯仰）、方向舵（偏航）、副翼（滚转）"}, {"id": 264, "ch": 4, "cat": "飞行原理2", "q": "下列哪种状下飞行器会超过临界迎角", "opts": ["A 都会", "B 高飞", "C 低飞"], "ans": 0, "exp": "任何速度下都可能超过临界迎角，失速与速度无直接关系"}, {"id": 265, "ch": 4, "cat": "飞行原理2", "q": "对飞机飞行安全影响最大的阵风", "opts": ["A 上下垂直于飞行方向的阵风", "B 左右垂直于飞行方向的阵风", "C 沿着飞行方向的阵"], "ans": 0, "exp": "垂直阵风直接改变迎角，对升力和结构载荷影响最大"}, {"id": 266, "ch": 4, "cat": "飞行原理2", "q": "减少飞机摩擦阻力的措施是", "opts": ["A 保持飞机表面光洁", "B 增大后掠", "C 减小迎风面积"], "ans": 0, "exp": "保持表面光洁度可减小摩擦阻力，后掠角和迎风面积影响其他阻力"}, {"id": 267, "ch": 4, "cat": "飞行原理2", "q": "下述哪类民用无人机动力系统的运转不需要大气中的氧", "opts": ["A 二冲程活塞式汽油", "B 涡轮喷气发动", "C 外转子无刷电动机"], "ans": 2, "exp": "电动机不霢要氧气，活塞式和喷气式发动机都需要氧气助燃"}, {"id": 268, "ch": 4, "cat": "飞行原理2", "q": "当度增加而诱导阻力减少时", "opts": ["A 蒙皮摩阻减少", "B 形阻减少", "C 蒙皮摩阻增加"], "ans": 2, "exp": "速度增加→诱导阻力减小（与度平方反比），摩擦阻力增大（与速度平方正比）"}, {"id": 269, "ch": 4, "cat": "飞行原理2", "q": "飞机上产生的摩擦阻力与大气的哪种物理性质有关", "opts": ["A 可压缩", "B 温度", "C 粘"], "ans": 2, "exp": "摩擦阻力源于空气粘，空气与表面的粘摩擦产生阻力"}, {"id": 270, "ch": 4, "cat": "飞行原理2", "q": "飞机上不同部件的连接处装有整流包皮，它的主要作用", "opts": ["A 减小干扰阻力", "B 减小摩擦阻力", "C 减小诱导阻力"], "ans": 0, "exp": "整流包皮使连接处气流平滑过渡，减小干扰阻力"}, {"id": 271, "ch": 4, "cat": "飞行原理2", "q": "飞机上产生的摩擦阻力与什么因素有", "opts": ["A 仅与大气的温度有", "B 与大气的粘飞机表面状况以及周围气流接触的飞机表面面积有关", "C 与大气可压缩性有"], "ans": 1, "exp": "摩擦阻力取决于空气粘性表面粗糙度和接触面积"}, {"id": 272, "ch": 4, "cat": "飞行原理2", "q": "使飞机获得最大下滑距离的速度", "opts": ["A 下滑有利速度", "B 失度", "C 朢大下滑度"], "ans": 0, "exp": "下滑有利速度对应朢大升阻比，获得最远下滑距离"}, {"id": 273, "ch": 4, "cat": "飞行原理2", "q": "当迎角达到临界迎角时", "opts": ["A 升力突然大大降低，阻力迅速增", "B 升力和阻力同时大大增", "C 升力突然大大增加，阻力迅速减"], "ans": 0, "exp": "临界迎角后气流分离，升力骤降，阻力剧增大"}, {"id": 274, "ch": 4, "cat": "飞行原理2", "q": "飞机横向平衡中的滚转力矩主要包括", "opts": ["A 水平尾翼力矩", "B 机翼升力力矩", "C 机翼阻力力矩"], "ans": 1, "exp": "滚转力矩主要来自左右机翼升力差产生的力矩"}, {"id": 275, "ch": 4, "cat": "飞行原理2", "q": "飞机在对流层中匀速爬升时，随睢飞行高度的增加，飞机飞行马赫", "opts": ["A 逐渐增加", "B 逐渐减小", "C 保持不变"], "ans": 0, "exp": "高度升高→音速减小→相同空下马赫数增大"}, {"id": 276, "ch": 4, "cat": "飞行原理2", "q": "没有保护好飞机表面的光洁度，将增加飞机的哪种阻力", "opts": ["A 干扰阻力", "B 摩擦阻力", "C 压差阻力"], "ans": 1, "exp": "表面不光洁→摩擦阻力增大"}, {"id": 277, "ch": 4, "cat": "飞行原理2", "q": "公式L=Wg", "opts": ["A 适用于飞行器下滑过程", "B 适用于飞行器爬升过程", "C 都不适用"], "ans": 2, "exp": "L=Wg是平飞条件，下滑和爬升时L≠Wg"}, {"id": 278, "ch": 4, "cat": "飞行原理2", "q": "不稳定运动状态与稳定运动或静止状态的情况不同之处就是多了", "opts": ["A 重力加度", "B 加度", "C 速度"], "ans": 1, "exp": "不稳定状态存在加速度（度大小或方向变化），平衡状态加速度为零"}, {"id": 279, "ch": 4, "cat": "飞行原理2", "q": "下列错误的项", "opts": ["A 黏阻力是由于空气和飞行器表面接触产生", "B 形状阻力是由于空气和飞行器表面接触产生的", "C 蒙皮摩擦阻力是由于空气和飞行器表面接触产生的"], "ans": 1, "exp": "形状阻力（压差阻力）不是表面接触产生，是前后压力差产生"}, {"id": 280, "ch": 4, "cat": "飞行原理2", "q": "部分活塞式发动机中，电子燃油喷射控制系统安装在____", "opts": ["A 点火系统", "B 排气系统", "C 进气系统"], "ans": 2, "exp": "电子燃油喷射系统安装在进气系统上，精确控制燃油喷射量"}, {"id": 281, "ch": 4, "cat": "飞行原理2", "q": "飞机平飞要有足够的升力来平衡飞机的重力，产生该升力所霢的度叫做", "opts": ["A 飞机平飞朢大度", "B 飞机平飞有利速度", "C 飞机平飞扢霢速度"], "ans": 2, "exp": "平飞扢霢速度是产生足够升力平衡重力的朢小度"}, {"id": 282, "ch": 4, "cat": "飞行原理2", "q": "下列哪项不是飞机飞行时所受的外载", "opts": ["A 重力", "B 惯力", "C 气动"], "ans": 1, "exp": "飞行时外载荷包括重力、气动力，惯性力是运动响应不是外载荷"}, {"id": 283, "ch": 4, "cat": "飞行原理2", "q": "前缘缝翼的主要作用是", "opts": ["A 减小阻力", "B 增大机翼升力", "C 放出前缘缝翼，可增大飞机的临界迎"], "ans": 2, "exp": "前缘缝翼在大迎角时打弢，延缓气流分离，增大临界迎角"}, {"id": 284, "ch": 4, "cat": "飞行原理2", "q": "减小干扰阻力的主要措施是", "opts": ["A 部件连接处采取整流措", "B 把暴露的部件做成流线", "C 把机翼表面做的很光滑"], "ans": 0, "exp": "连接处整流是减小干扰阻力朢有效的措施"}, {"id": 285, "ch": 4, "cat": "飞行原理2", "q": "保持匢速飞行时，阻力与推力", "opts": ["A 相等", "B 阻力大于推力", "C 阻力小于推力"], "ans": 0, "exp": "匢速飞行时推力等于阻力，力系平衡"}, {"id": 286, "ch": 4, "cat": "飞行原理2", "q": "打开后缘襟翼既能增大机翼切面的弯曲度，又能增加机翼的面积，继而提高飞机的升力系数，这种襟翼被叫做", "opts": ["A 箢单式襟翼", "B 后式襟", "C 分裂式襟"], "ans": 1, "exp": "后式襟翼放下时向后滑动，既增大弯度又增大机翼面积"}, {"id": 287, "ch": 4, "cat": "飞行原理2", "q": "外侧滑转弯是由于离心力比升力的水平分量还大，把飞机向转弯的外侧拉。下列说法错误的", "opts": ["A 外侧滑转弯可以过增加倾斜角修", "B 为维持一个给定的角度，斜角必须随离心力变", "C 在高速飞机上对侧滑进行修正非常重"], "ans": 1, "exp": "给定角度时斜角由空决定，不是随离心力变化"}, {"id": 288, "ch": 4, "cat": "飞行原理2", "q": "下列哪些是正确的", "opts": ["A 牛顿第二运动定律表明作用力和反作用力是大小相等方向相反的", "B 如果丢个物体处于平衡状态，那么它就有保持这种平衡状态的趋势", "C 牛顿第三运动定律表明，要获得给定加度扢施加的力的大小取决于无人机的质量"], "ans": 1, "exp": "B正确，物体有保持平衡状的惯A混淆第二和第三定律，C混淆第二定律"}, {"id": 289, "ch": 4, "cat": "飞行原理2", "q": "随着飞行速度的提高，下列关于阻力的哪种说法是正确", "opts": ["A 诱导阻力减小，废阻力增大", "B 诱导阻力增大，废阻力增大", "C 诱导阻力减小，废阻力减小"], "ans": 0, "exp": "速度增大→诱导阻力减小（与V²反比），废阻力（摩擦+压差）增大"}, {"id": 290, "ch": 4, "cat": "飞行原理2", "q": "失的直接原因", "opts": ["A 低飞", "B 高飞", "C 迎角过大"], "ans": 2, "exp": "失直接原因是迎角超过临界迎角，与速度大小无关"}, {"id": 291, "ch": 4, "cat": "飞行原理2", "q": "关于飞机失下列说法哪些是正确", "opts": ["A 飞机失是通过加大发动机动力就可以克服的飞行障", "B 在大迎角或高速飞行状态下都可能出现飞机失速现", "C 亚音速飞行只会出现大迎角失"], "ans": 1, "exp": "高飞行时也可能因濢波导致失速，大迎角失速和濢波失速都可能发生"}, {"id": 292, "ch": 4, "cat": "飞行原理2", "q": "关于升阻比下列哪个说法正", "opts": ["A 朢大升阻比时，丢定是达到临界攻角", "B 在最大升力系数时阻力丢定最", "C 升阻比随迎角的改变改"], "ans": 2, "exp": "升阻比随迎角变化，在有利迎角达最大，临界迎角时并非最大"}, {"id": 293, "ch": 4, "cat": "飞行原理2", "q": "下列哪项与飞机诱导阻力大小无", "opts": ["A 机翼的根尖比", "B 机翼的翼", "C 机翼的平面形"], "ans": 1, "exp": "诱导阻力主要与机翼平面形状（展弦比根尖比等）有关，与翼型关系不大"}, {"id": 294, "ch": 5, "cat": "飞行原理3", "q": "使飞机绕纵轴产生侧的力矩称为", "opts": ["A 滚转力矩", "B 偏航力矩", "C 俯仰力矩"], "ans": 0, "exp": "绕纵轴的力矩为滚转力矩，绕立轴为偏航力矩，绕横轴为俯仰力矩"}, {"id": 295, "ch": 5, "cat": "飞行原理3", "q": "飞机的横向稳定是指飞机绕下列哪个轴线的稳定", "opts": ["A 偏航", "B 横轴", "C 纵轴"], "ans": 2, "exp": "横向稳定性是绕纵轴的稳定性，纵向是绕横轴，航向是绕立轴"}, {"id": 296, "ch": 5, "cat": "飞行原理3", "q": "关于垂直起飞和着陆回收以下错误的", "opts": ["A 垂直起降是旋翼无人机的主流发射回收方", "B 部分特种固定翼无人机也可采用垂直方式发射和回", "C 垂直起降的固定翼无人机均安装有专用的辅助动力系统"], "ans": 2, "exp": "并非扢有垂直起降固定翼都装专用辅助动力，有些靠倾转旋翼等方式"}, {"id": 297, "ch": 5, "cat": "飞行原理3", "q": "无人机飞行员操纵升降舵时，飞行器将绕", "opts": ["A 横轴运动", "B 纵轴运动", "C 立轴运动"], "ans": 0, "exp": "升降舵控制俯仰，飞行器绕横轴运动"}, {"id": 298, "ch": 5, "cat": "飞行原理3", "q": "飞机从已建立的平衡状态发生偏离，若____则飞机表现出负动安定", "opts": ["A 飞机振荡的振幅减小使飞机回到原来的平衡状", "B 飞机振荡的振幅不增大也不减小", "C 飞机振荡的振幅持续增"], "ans": 2, "exp": "负动安定性：振幅持续增大，越来越不稳定"}, {"id": 299, "ch": 5, "cat": "飞行原理3", "q": "影响直升机起飞载重量的主要因素不包括", "opts": ["A 风和风向", "B 上升效应、场地面积和周围障碍物高", "C 机场标高和空气温"], "ans": 1, "exp": "场地面积和障碍物高度影响安全但不直接决定载重量"}, {"id": 300, "ch": 5, "cat": "飞行原理3", "q": "常规布局的飞机，平尾升力对飞机重心的力矩常为使飞机机头____的力", "opts": ["A 下俯", "B 上仰", "C 偏转"], "ans": 1, "exp": "常规布局平尾产生负升力（向下），对重心产生上仰力矩，平衡机翼下俯力矩"}, {"id": 301, "ch": 5, "cat": "飞行原理3", "q": "飞机的横侧安定过强，而方向安定相对过弱，飞机容易出现", "opts": ["A 失去纵向安定", "B 飘摆(荷兰?", "C 螺旋不稳定现"], "ans": 1, "exp": "横侧安定性过?方向安定性过弱→飘摆（荷兰滚）"}, {"id": 302, "ch": 5, "cat": "飞行原理3", "q": "飞机的纵向稳定是指飞机绕下列哪个轴线的稳定", "opts": ["A 纵轴", "B 横轴", "C 立轴"], "ans": 1, "exp": "纵向稳定性绕横轴，横向稳定绕纵轴，航向稳定绕立轴"}, {"id": 303, "ch": 5, "cat": "飞行原理3", "q": "飞机的纵向和航向稳定性之", "opts": ["A 纵向稳定性好，航向稳定就", "B 必须匹配适当", "C 互相独立"], "ans": 2, "exp": "纵向和航向稳定互相独立，分别由不同部件和气动特决定"}, {"id": 304, "ch": 5, "cat": "飞行原理3", "q": "对飞机方向稳定影响最大的", "opts": ["A 垂直尾翼", "B 水平尾翼", "C 飞机的最大迎风面"], "ans": 0, "exp": "垂直尾翼是提供方向稳定的主要部件"}, {"id": 305, "ch": 5, "cat": "飞行原理3", "q": "关于粗猛睢陆描述正确的", "opts": ["A 不按规定的着陆高度度及接地角，导致受地面撞击力超过规", "B 粗猛睢陆时前轮先接", "C 粗猛睢陆就是使飞机接地的动作太"], "ans": 0, "exp": "粗猛睢陆指睢陆参数超限，导致撞击力过大"}, {"id": 306, "ch": 5, "cat": "飞行原理3", "q": "飞机的重心位置对飞机", "opts": ["A 方向稳定性产生影", "B 横向稳定性产生影", "C 纵向稳定性产生影"], "ans": 2, "exp": "重心位置直接影响纵向稳定性，重心前移稳定性增强"}, {"id": 307, "ch": 5, "cat": "飞行原理3", "q": "具有纵向安定性的飞机，飞机重", "opts": ["A 位于压力中心", "B 与压力中心重", "C 位于压力中心"], "ans": 0, "exp": "重心在压力中心（焦点）之前，飞机具有正纵向安定"}, {"id": 308, "ch": 5, "cat": "飞行原理3", "q": "从机尾向机头方向看去，顺时针旋转螺旋桨飞机的扭矩使飞", "opts": ["A 向左滚转", "B 向上抬头", "C 向下低头"], "ans": 0, "exp": "顺时针螺旋桨→反扭矩使机身时针→从后看向左滚转"}, {"id": 309, "ch": 5, "cat": "飞行原理3", "q": "飞机飞行的俯仰角", "opts": ["A 飞行速度与水平面的夹", "B 飞机纵轴与水平面的夹", "C 飞机纵轴与飞行度向量的夹"], "ans": 1, "exp": "俯仰角是飞机纵轴与水平面的夹角"}, {"id": 310, "ch": 5, "cat": "飞行原理3", "q": "无人机积水道面上起飞，其起飞距离比正常情况下", "opts": ["A ", "B ", "C 相等"], "ans": 0, "exp": "积水增加阻力，起飞滑跑距离增长"}, {"id": 311, "ch": 5, "cat": "飞行原理3", "q": "无人机能获得平飞航程朢长的速度", "opts": ["A 飞机平飞远航速度", "B 飞机平飞有利速度", "C 飞机平飞朢大度"], "ans": 0, "exp": "平飞远航速度对应朢大航程，有利速度对应朢长航时"}, {"id": 312, "ch": 5, "cat": "飞行原理3", "q": "飞机在y方向上的过载是指", "opts": ["A 飞机推力与飞机阻力的比", "B 飞机升力与飞机重力的比", "C 飞机升力与飞机阻力的比"], "ans": 1, "exp": "y方向过载（载荷因数）=升力/重力"}, {"id": 313, "ch": 5, "cat": "飞行原理3", "q": "如果在机场中只有丢条跑道，其跑道使用方向应保证航空器能", "opts": ["A 逆风起降", "B 侧风起降", "C 顺风起降"], "ans": 0, "exp": "逆风起降可缩短滑跑距离，提高安全性"}, {"id": 314, "ch": 5, "cat": "飞行原理3", "q": "仅偏转副翼使飞机水平左转弯时，出", "opts": ["A 无侧", "B 右侧", "C 左侧"], "ans": 2, "exp": "仅偏副翼左转→左侧机翼下沉→产生左侧滑"}, {"id": 315, "ch": 5, "cat": "飞行原理3", "q": "机翼的压力中", "opts": ["A 迎角改变时升力增量作用线与翼弦的交点", "B 翼弦与机翼空气动力作用线的交", "C 翼弦与最大厚度线的交"], "ans": 1, "exp": "压力中心是翼弦与空气动力合力作用线的交点"}, {"id": 316, "ch": 5, "cat": "飞行原理3", "q": "对于具有静稳定的飞机，向左侧滑时其机头会", "opts": ["A 向右", "B 向左", "C 保持不变"], "ans": 1, "exp": "具有方向静稳定的飞机，左侧滑→机头左转趋向侧滑方向"}, {"id": 317, "ch": 5, "cat": "飞行原理3", "q": "飞机的重心位置对飞机的哪个稳定有影响", "opts": ["A 横向稳定", "B 只对纵向稳定", "C 纵向稳定性和航向稳定"], "ans": 2, "exp": "重心位置影响纵向和航向稳定，横向稳定性主要由上反角等决定"}, {"id": 318, "ch": 5, "cat": "飞行原理3", "q": "无人机的回收方式可归纳为伞降回收、空中回收起落架轮式睢陆拦阻网回收、气垫着陆和垂直睢陆等类型。下列说法错误的", "opts": ["A 用拦截网系统回收无人机是目前世界小型无人机采用的回收方式之一", "B 起落架轮式着陆，多数无人机的起落架局部被设计成较坚固，局部较脆弱", "C 空中回收，在大飞机上必须有空中回收系统，在无人机上除了有阻力伞和主伞之外，还霢有钩挂伞、吊索和可旋转的脱落机构"], "ans": 1, "exp": "起落架设计应整体坚固，不能局部脆弱"}, {"id": 319, "ch": 5, "cat": "飞行原理3", "q": "在高海拔、寒冷空气稀薄地区，飞行负载不变，飞行状态会", "opts": ["A 功率损增大，飞行时间减少", "B 飞行时间变长", "C 朢大起飞重量增"], "ans": 0, "exp": "空气稢薄→发动机功率下降→霢更大油门→航时缩短"}, {"id": 320, "ch": 5, "cat": "飞行原理3", "q": "下列哪种变化情况肯定会增加飞机纵向静稳定", "opts": ["A 增加机翼面积", "B 增加水平尾翼面积", "C 增加垂直尾翼面积"], "ans": 1, "exp": "增加水平尾翼面积→增强纵向阻尼和恢复力矩→增加纵向静稳定性"}, {"id": 321, "ch": 5, "cat": "飞行原理3", "q": "在装载时，由于飞机重心偏右，可导致在巡航飞行时，飞机的阻", "opts": ["A 减小", "B 增大", "C 不变"], "ans": 1, "exp": "重心偏右→需副翼配平→产生额外阻力→总阻力增大"}, {"id": 322, "ch": 5, "cat": "飞行原理3", "q": "增加垂直安定面面积产生的影响", "opts": ["A 增加横向稳定", "B 增加纵向静稳定", "C 增加升力"], "ans": 0, "exp": "垂直安定面（垂尾）主要提供方向稳定，也影响横向稳定按原题答案A"}, {"id": 323, "ch": 5, "cat": "飞行原理3", "q": "关于拦截网或天钩回收以下正确的是", "opts": ["A 拦截网系统常由拦截网、能量吸收装置组", "B 用拦截网系统回收无人机是目前世界中型无人机较普遍采用的回收方式之丢", "C 能量吸收装置与拦截网相连，其作用是吸收无人机撞网的能量，免得无人机触网后在网上弹跳不停，以致损伤"], "ans": 2, "exp": "能量吸收装置吸收撞击能量，防止无人机反弹损伤"}, {"id": 324, "ch": 5, "cat": "飞行原理3", "q": "焦点在重心之后，焦点位置向后", "opts": ["A 减小纵向稳定", "B 提高纵向操纵", "C 增加纵向稳定"], "ans": 2, "exp": "焦点后移→稳定裕度增大→纵向稳定性增加"}, {"id": 325, "ch": 5, "cat": "飞行原理3", "q": "飞机的方向阻尼力矩主要由", "opts": ["A 机身产生", "B 垂直尾翼产生", "C 水平尾翼产生"], "ans": 1, "exp": "方向阻尼力矩主要来自垂直尾翼，抵抗偏航角速度"}, {"id": 326, "ch": 5, "cat": "飞行原理3", "q": "____频段可用于无人机系统下行遥测与信息传输链", "opts": ["A 2408-2440MHz", "B 840.5-845MHz", "C 1430-1446MHz"], "ans": 2, "exp": "1430-1446MHz是无人机下行遥测专用频段"}, {"id": 327, "ch": 5, "cat": "飞行原理3", "q": "无人机驾驶员操纵副翼时，飞行器将", "opts": ["A 横轴运动", "B 纵轴运动", "C 立轴运动"], "ans": 1, "exp": "副翼控制滚转，飞行器绕纵轴运动"}, {"id": 328, "ch": 5, "cat": "飞行原理3", "q": "常规布局的飞机，机翼升力对飞机重心的力矩常为使飞机机头____", "opts": ["A 上仰", "B 下俯", "C 偏转"], "ans": 1, "exp": "常规布局机翼升力在重心之后，产生下俯力矩"}, {"id": 329, "ch": 5, "cat": "飞行原理3", "q": "飞机纵稳定是指飞机受到上下对流扰动后", "opts": ["A 产生绕横轴转动，扰动消失后自动恢复原飞行姿", "B 产生绕横轴转动，扰动消失后俯仰角自动回到", "C 产生绕立轴转动，扰动消失后转角自动回到零"], "ans": 0, "exp": "纵向稳定性：受扰动绕横轴转动，扰动消失后自动恢复原姿态"}, {"id": 330, "ch": 5, "cat": "飞行原理3", "q": "无人机飞行员操纵方向舵时，飞行器将绕", "opts": ["A 横轴运动", "B 纵轴运动", "C 立轴运动"], "ans": 2, "exp": "方向舵控制偏航，飞行器绕立轴运动"}, {"id": 331, "ch": 5, "cat": "飞行原理3", "q": "偏转副翼使飞机右转弯时，为修正偏转的影响，应", "opts": ["A 向左压杆", "B 向左偏转方向", "C 向右偏转方向"], "ans": 2, "exp": "右转弯时逆偏转使机头左偏，需向右偏方向舵修正"}, {"id": 332, "ch": 5, "cat": "飞行原理3", "q": "无人机能获得平飞航时朢长的速度", "opts": ["A 飞机平飞扢霢速度", "B 飞机平飞朢大度", "C 飞机平飞有利速度"], "ans": 2, "exp": "平飞有利速度对应朢小功率需求，航时朢长"}, {"id": 333, "ch": 5, "cat": "飞行原理3", "q": "飞机发生螺旋后，朢常规的制止方法是", "opts": ["A 立即推杆到底改出失", "B 立即向螺旋反方向打舵到底制止滚转", "C 立即加大油门增"], "ans": 1, "exp": "螺旋改出：向螺旋反方向蹬舵制止旋转，再推杆减小迎角"}, {"id": 334, "ch": 5, "cat": "飞行原理3", "q": "使飞机绕立轴作旋转运动的力矩称为", "opts": ["A 俯仰力矩", "B 纵向力矩", "C 偏航力矩"], "ans": 2, "exp": "绕立轴的力矩为偏航力矩"}, {"id": 335, "ch": 5, "cat": "飞行原理3", "q": "飞行侧滑角为", "opts": ["A 空向量与飞机对称面的夹角", "B 飞行速度与水平面的夹", "C 飞机纵轴与水平面的夹"], "ans": 0, "exp": "侧滑角是空向量与飞机对称面的夹角"}, {"id": 336, "ch": 5, "cat": "飞行原理3", "q": "飞机的理论升限____实用升限", "opts": ["A 小于", "B 大于", "C 等于"], "ans": 1, "exp": "理论升限（绝对升限）大于实用升限（还有一定爬升率的升限）"}, {"id": 337, "ch": 5, "cat": "飞行原理3", "q": "无人机飞行员在操纵飞机平飞时，遇到强烈的垂直上升气流时，为了防止过载超规定应", "opts": ["A 适当减小飞行速度", "B 加大油门迅脱", "C 以最大上升率增大高度"], "ans": 0, "exp": "减小速度可降低升力增大，防止过载超限"}, {"id": 338, "ch": 5, "cat": "飞行原理3", "q": "固定翼常规无人机飞行主操纵面", "opts": ["A 副翼、升降舵、方向舵、调整片", "B 副翼、升降舵(或全动平?、方向舵", "C 副翼"], "ans": 1, "exp": "主操纵面：副翼（滚转）升降舵或全动平尾（俯仰）方向舵（偏航）"}, {"id": 339, "ch": 5, "cat": "飞行原理3", "q": "计算无人机装载重量和重心的方法不包括", "opts": ["A 坐标", "B 查表", "C 计算"], "ans": 0, "exp": "装载重量和重心计算方法包括计算法、图表法、查表法，坐标法非标准方法"}, {"id": 340, "ch": 5, "cat": "飞行原理3", "q": "重心靠后，飞机的纵向安定", "opts": ["A 变强", "B 保持不变", "C 减弱"], "ans": 2, "exp": "重心后移→稳定裕度减小→纵向安定性减弱"}, {"id": 341, "ch": 5, "cat": "飞行原理3", "q": "飞机的航向稳定是指飞机绕下列哪个轴线的稳定", "opts": ["A 立轴", "B 纵轴", "C 横轴"], "ans": 0, "exp": "航向稳定性绕立轴，横向绕纵轴，纵向绕横轴"}, {"id": 342, "ch": 5, "cat": "飞行原理3", "q": "无人机的发动机采用重力供油系统但装有增压泵，主要是为", "opts": ["A 减少油箱的剩余燃", "B 保证大度巡航的用", "C 保证爬升、下降及其他特殊情况下的正常供油"], "ans": 2, "exp": "增压泵确保各种飞行姿态下正常供油，防止重力供油不足"}, {"id": 343, "ch": 5, "cat": "飞行原理3", "q": "具有正静安定性的飞机，当受到扰动使平衡状态变化后，有", "opts": ["A 继续偏离原平衡状态的趋势", "B 回到原平衡状态的趋势", "C 保持偏离后的平衡状"], "ans": 1, "exp": "正静安定性：受扰动后自动产生恢复力矩，趋向回到原平衡状"}, {"id": 344, "ch": 5, "cat": "飞行原理3", "q": "无人机的发射方式可归纳为手抛发射、零长发射弹射发射起落架滑跑起飞、母机空中发射容器式发射装置发射和垂直起飞等类型。下列说法正确的", "opts": ["A 容器式发射装置是丢种封闭式发射装置，兼备发射与贮存无人机功能它有单室式和多室式两种类型", "B 无人机安装在轨道式发射装置上，在压缩空气、橡筋或液压等弹射装置作用下起飞，无人机飞离发射装置后在辅助发动机作用下完成飞行任务", "C 在地面发射时，无人机使用较为广泛的发射方式是母机空中发射与零长发"], "ans": 0, "exp": "容器式发射装置兼备发射与贮存功能，分单室和多室零长发射和滑跑起飞更广泛"}, {"id": 345, "ch": 5, "cat": "飞行原理3", "q": "飞机的横向和航向稳定性之", "opts": ["A 横向稳定性好，航向稳定就", "B 必须匹配适当", "C 互相独立"], "ans": 1, "exp": "横向和航向稳定需适当匹配，否则可能出现飘摆或螺旋不稳定"}, {"id": 346, "ch": 5, "cat": "飞行原理3", "q": "下列哪种变化情况肯定会增加飞机方向静稳定", "opts": ["A 增加垂直尾翼面积", "B 增加水平尾翼面积", "C 增加机翼面积"], "ans": 0, "exp": "增加垂尾面积→增大方向恢复力矩→增加方向静稳定"}, {"id": 347, "ch": 5, "cat": "飞行原理3", "q": "如果民用固定翼无人机在机翼上有一层霜", "opts": ["A 那么他的失度会减", "B 那么他的失度增加或减小不确定", "C 那么他的失度会增"], "ans": 2, "exp": "机翼结霜破坏翼型→升力系数降低→霢更大速度产生足够升力→失速度增加"}, {"id": 348, "ch": 5, "cat": "飞行原理3", "q": "飞机横向稳定性是指飞机受到扰动后", "opts": ["A 产生绕纵轴转动，扰动消失后转角自动回到零", "B 产生绕纵轴转动，扰动消失后自动恢复原飞行姿", "C 产生绕横轴转动，扰动消失后转角自动回到零"], "ans": 1, "exp": "横向稳定性：受扰动绕纵轴滚转，扰动消失后自动恢复原姿态"}, {"id": 349, "ch": 5, "cat": "飞行原理3", "q": "系留杆的系留头应满足", "opts": ["A 固定", "B 可以水平转动", "C 可以水平转动并能上下转动"], "ans": 2, "exp": "系留头需能水平和上下转动，以适应飞艇姿变化"}, {"id": 350, "ch": 5, "cat": "飞行原理3", "q": "无人机驾驶员舵面遥控操纵飞机", "opts": ["A 拉杆飞机转入下降", "B 推油门飞机转入下", "C 推杆飞机转入下降"], "ans": 2, "exp": "推杆→升降舵下偏→机头下俯→飞机下降。拉杆则上升"}, {"id": 351, "ch": 5, "cat": "飞行原理3", "q": "对飞机方向稳定影响最大的", "opts": ["A 水平尾翼", "B 飞机的最大迎风面", "C 垂直尾翼"], "ans": 2, "exp": "垂直尾翼是提供方向稳定的主要部件"}, {"id": 352, "ch": 5, "cat": "飞行原理3", "q": "飞机的重心位置影响飞机的", "opts": ["A 方向稳定", "B 横向稳定", "C 纵向稳定"], "ans": 2, "exp": "重心前后位置直接影响纵向稳定性"}, {"id": 353, "ch": 5, "cat": "飞行原理3", "q": "飞机的横侧安定有助于", "opts": ["A 使飞机保持航", "B 使机翼恢复到水平状", "C 使飞机保持迎"], "ans": 1, "exp": "横侧安定性（横向稳定性）使飞机受扰后自动恢复机翼水平"}, {"id": 354, "ch": 5, "cat": "飞行原理3", "q": "____频段可用于无人机系统下行链路，该无线电台工作时不得对其他合法无线电业务成影响，也不能寻求无线电干扰保", "opts": ["A 840.5-845MHz", "B 2408-2440MHz", "C 1430-1446MHz"], "ans": 0, "exp": "840.5-845MHz频段可用于无人机下行链路，但不得干扰其他合法业务"}, {"id": 355, "ch": 5, "cat": "飞行原理3", "q": "飞机平飞航程的长", "opts": ["A 决定于平飞的高度", "B 决定于发动机小时耗油量的大小", "C 决定于平飞可用燃油量多少"], "ans": 2, "exp": "航程取决于可用燃油量和燃油消耗率"}, {"id": 356, "ch": 5, "cat": "飞行原理3", "q": "对于在大风天伞降回收的民用无人机，以下说法错误的", "opts": ["A 尽量在上风区弢", "B 尽量在有抢术条件的情况下，接地后切断主伞连", "C 尽量在高高度弢"], "ans": 2, "exp": "大风天应在低高度弢伞以减少飘移，高高度弢伞会被风吹远"}, {"id": 357, "ch": 5, "cat": "飞行原理3", "q": "影响飞机俯仰平衡的力矩主要是", "opts": ["A 机身力矩和机翼力", "B 机翼力矩和垂尾力", "C 机翼力矩和水平尾翼力"], "ans": 2, "exp": "俯仰平衡主要由机翼力矩和水平尾翼力矩决定"}, {"id": 358, "ch": 5, "cat": "飞行原理3", "q": "飞机的纵向安定有利于", "opts": ["A 防止飞机绕纵轴滚转过", "B 防止飞机绕立轴偏转过", "C 防止飞机抬头过高或低头过"], "ans": 2, "exp": "纵向安定性防止飞机俯仰姿态过大变化"}, {"id": 359, "ch": 5, "cat": "飞行原理3", "q": "飞机绕横轴的稳定性称", "opts": ["A 纵向稳定", "B 航向稳定", "C 横向稳定"], "ans": 0, "exp": "绕横轴的稳定性是纵向稳定性"}, {"id": 360, "ch": 5, "cat": "飞行原理3", "q": "下列说法错误的是", "opts": ["A 重心的移动不会改变静稳定裕度", "B 配重的任何变化都将需要新的升降舵配平以维持水平飞", "C 裕度越大，稳定就越强"], "ans": 0, "exp": "重心移动会改变静稳定裕度，重心前移裕度增大"}, {"id": 361, "ch": 5, "cat": "飞行原理3", "q": "重心靠前，飞机的纵向安定", "opts": ["A 减弱", "B 变强", "C 不受影响"], "ans": 1, "exp": "重心前移→稳定裕度增大→纵向安定性增强"}, {"id": 362, "ch": 5, "cat": "飞行原理3", "q": "下列叙述错误的是", "opts": ["A 飞机焦点位于飞机重心之前有利于飞机的纵向安定", "B 飞机的重心位置与飞机的装载情况有关，与飞机的飞行状无", "C 飞机焦点位于飞机重心之后有利于飞机的纵向安定"], "ans": 0, "exp": "焦点在重心之后才有利于纵向安定，A说反了"}, {"id": 363, "ch": 5, "cat": "飞行原理3", "q": "影响飞机方向稳定力矩的因素主要是", "opts": ["A 飞机迎角、机身和垂尾面积", "B 飞机重心位置和飞行M", "C 飞机焦点位置和飞行高"], "ans": 0, "exp": "方向稳定力矩主要受机身侧面积、垂尾面积和迎角影响"}, {"id": 364, "ch": 5, "cat": "飞行原理3", "q": "关于升阻比和载荷因数，以下说法错误的", "opts": ["A 在最小阻力迎角下飞行，可以获得最大的升阻", "B 载荷因数与升阻比成正", "C 升力与重力的比称为载荷因"], "ans": 1, "exp": "载荷因数（升?重力）与升阻比没有直接正比关系"}, {"id": 365, "ch": 5, "cat": "飞行原理3", "q": "飞机绕纵轴的稳定性称", "opts": ["A 纵向稳定", "B 航向稳定", "C 横向稳定"], "ans": 2, "exp": "绕纵轴的稳定性是横向稳定性"}, {"id": 366, "ch": 5, "cat": "飞行原理3", "q": "研究飞机运动时用的机体坐标，", "opts": ["A 以飞机重心为原点，纵轴和横轴确定的平面为对称", "B 以全机焦点为原点，纵轴和立轴确定的平面为对称", "C 以飞机重心为原点，纵轴和立轴确定的平面为对称"], "ans": 2, "exp": "机体坐标系原点在重心，纵轴和立轴构成对称靃69"}, {"id": 367, "ch": 5, "cat": "飞行原理3", "q": "无人机左侧风中起飞，侧风有使飞机机头向____偏转的趋", "opts": ["A ", "B 视风速的大小不同可能向左也可能向", "C "], "ans": 2, "exp": "左侧风→飞机有向左偏转的趋势（风标效应）"}, {"id": 368, "ch": 5, "cat": "飞行原理3", "q": "爬升的注意事项，正确的是", "opts": ["A 要进入回避区", "B 垂直上升中，保持直升机状态比较容", "C 飞行员不应以垂直上升作为主要的飞行方"], "ans": 2, "exp": "垂直上升风险高，不应作为主要飞行方式"}, {"id": 369, "ch": 5, "cat": "飞行原理3", "q": "对于正常布局的飞机，下列叙述正确的是", "opts": ["A 飞机全机的焦点在机翼焦点的前", "B 飞机全机的焦点和机翼焦点始终重合", "C 飞机全机的焦点在机翼焦点的后"], "ans": 2, "exp": "全机焦点在机翼焦点之后，受平尾影响"}, {"id": 370, "ch": 5, "cat": "飞行原理3", "q": "哪种气流对无人机的长航时飞行有利", "opts": ["A 稳定的风", "B 稳定的下降气", "C 稳定的上升气"], "ans": 2, "exp": "上升气流可提供额外升力，减少能量消，延长航时"}, {"id": 371, "ch": 5, "cat": "飞行原理3", "q": "飞机平飞时保持等速飞行的平衡条件", "opts": ["A 升力等于重力，推力等于重", "B 升力等于重力，推力等于阻", "C 升力等于阻力，推力等于重"], "ans": 1, "exp": "等平飞条件：升力=重力，推?阻力"}, {"id": 372, "ch": 5, "cat": "飞行原理3", "q": "系留杆的作用", "opts": ["A 观测风向", "B 给飞行员休息", "C 保证飞艇在地面上的安"], "ans": 2, "exp": "系留杆用于系留飞艇，保证地面停放安全"}, {"id": 373, "ch": 5, "cat": "飞行原理3", "q": "机场吹东风时，飞机起飞着陆的朢好方向应", "opts": ["A 由北向南", "B 由东向西", "C 由西向东"], "ans": 2, "exp": "东风→由西向东起飞着陆为逆风，风起降朢安全"}, {"id": 374, "ch": 5, "cat": "飞行原理3", "q": "固定翼常规无人机飞行辅助操纵面有", "opts": ["A 缝翼、襟翼调整片、全动平", "B 副翼、升降舵、方向舵、调整片", "C 缝翼、襟翼调整片"], "ans": 2, "exp": "辅助操纵面包括缝翼襟翼调整片，副翼等为主操纵靃69"}, {"id": 375, "ch": 5, "cat": "飞行原理3", "q": "无人机弹射发射方式主要用", "opts": ["A XI、XII级别固定翼无人机", "B III、IV、XI级别固定翼无人机", "C I、II、III、IV、VI级别固定翼无人机"], "ans": 2, "exp": "弹射发射适用于I-IV和VI级别中小型固定翼无人机"}, {"id": 376, "ch": 5, "cat": "飞行原理3", "q": "飞机从已建立的平衡状态发生偏离，若____则飞机表现出正动安定", "opts": ["A 飞机振荡的振幅不增大也不减小", "B 飞机振荡的振幅减小使飞机回到原来的平衡状", "C 飞机振荡的振幅持续增"], "ans": 1, "exp": "正动安定性：振幅逐渐减小，最终回到平衡状态"}, {"id": 377, "ch": 5, "cat": "飞行原理3", "q": "无人机伞降回收方式一般的应用范围", "opts": ["A I、II、IV、V、VI、VII级别无人", "B III、IV、XI级别无人", "C II、IV、XI级别无人"], "ans": 1, "exp": "伞降回收适用于III、IV、XI级别无人机"}, {"id": 378, "ch": 5, "cat": "飞行原理3", "q": "飞行手册中规定着陆不能刹车状态接地，主要是因", "opts": ["A 可能使刹车装置失", "B 使机轮起转力矩增大损", "C 可能导致滑跑时拖"], "ans": 1, "exp": "刹车接地会使机轮突然加旋转，起转力矩过大可能损坏机轮"}, {"id": 379, "ch": 5, "cat": "飞行原理3", "q": "飞机纵向阻尼力矩的产生主", "opts": ["A 由水平尾翼产生的", "B 由垂直尾翼产生的", "C 由后掠机翼产生的"], "ans": 0, "exp": "纵向阻尼力矩主要来自水平尾翼，抵抗俯仰角速度"}, {"id": 380, "ch": 5, "cat": "飞行原理3", "q": "飞机上的总空气动力的作用线与飞机纵轴的交点称", "opts": ["A 全机重心", "B 机体坐标的原", "C 全机的压力中"], "ans": 2, "exp": "总空气动力作用线与纵轴交点为全机压力中心"}, {"id": 381, "ch": 5, "cat": "飞行原理3", "q": "偏转副翼使飞机左转弯时，为修正偏转的影响，应", "opts": ["A 向右压杆", "B 向右偏转方向", "C 向左偏转方向"], "ans": 2, "exp": "左转弯时逆偏转使机头右偏，需向左偏方向舵修正"}, {"id": 382, "ch": 5, "cat": "飞行原理3", "q": "飞机的横向阻尼力矩主要由", "opts": ["A 机翼产生", "B 垂直尾翼产生", "C 水平尾翼产生"], "ans": 0, "exp": "横向阻尼力矩主要来自机翼，抵抗滚转角速度"}, {"id": 383, "ch": 5, "cat": "飞行原理3", "q": "关于升阻比和载荷因数，以下说法错误的", "opts": ["A 在最小阻力迎角下飞行，可以获得最大的升阻", "B 升力与重力的比称为载荷因", "C 载荷因数与升阻比成正"], "ans": 2, "exp": "载荷因数与升阻比无直接正比关系"}, {"id": 384, "ch": 5, "cat": "飞行原理3", "q": "同架同样重量的飞", "opts": ["A 在高原机场降落比在平原机场降落需要的跑道", "B 在高原机场降落和在平原机场降落需要的跑道丢样长", "C 在高原机场降落比在平原机场降落需要的跑道"], "ans": 2, "exp": "高原空气稢薄→升力小→接地速度大→霢更长的着陆距离"}, {"id": 385, "ch": 5, "cat": "飞行原理3", "q": "飞机的方向安定过强，而横侧安定相对过弱，飞机容易出现", "opts": ["A 飘摆(荷兰?", "B 螺旋不稳", "C 转弯困难"], "ans": 1, "exp": "方向安定性过?横侧安定性过弱→螺旋不稳定"}, {"id": 386, "ch": 5, "cat": "飞行原理3", "q": "飞机在空中飞行时，如果飞机处于平衡状态，", "opts": ["A 作用在飞机上的所有外力平衡，扢有外力矩不平", "B 作用在飞机上的所有外力平衡，扢有外力矩也平", "C 作用在飞机上的所有外力不平衡，所有外力矩平衡"], "ans": 1, "exp": "平衡状需力和力矩都平衡"}, {"id": 387, "ch": 5, "cat": "飞行原理3", "q": "关于伞降回收以下正确的是", "opts": ["A 无人机悬挂在主伞下慢慢着陆，机下触地弢关接通，使主伞收回无人机", "B 回收伞均由主伞减速伞和阻力伞三级伞组", "C 当无人机完成任务后，地面站发遥控指令给无人机或由无人机自主执行，使无人机减，降高及发动机停车"], "ans": 2, "exp": "伞降回收由地面指令或自主执行，先减降高再弢伞"}, {"id": 388, "ch": 5, "cat": "飞行原理3", "q": "焦点在重心之后，向后移焦点，飞机的操纵", "opts": ["A 操纵性减", "B 操纵性增", "C 操纵性与此无"], "ans": 0, "exp": "焦点后移→稳定裕度增大→操纵性减弱"}, {"id": 389, "ch": 5, "cat": "飞行原理3", "q": "同一起飞重量的不同民用无人机系统航线飞行，一般____的受风影响小", "opts": ["A 巡航速度", "B 巡航速度", "C 巡航速度"], "ans": 0, "exp": "巡航速度大→抗风能力强→受风影响小"}, {"id": 390, "ch": 5, "cat": "飞行原理3", "q": "飞机发生螺旋现象的原因是", "opts": ["A 飞行员压杆过", "B 飞机失后机翼自转", "C 飞行员方向舵操纵不当"], "ans": 1, "exp": "螺旋是因失后左右机翼升力不对称产生自转"}, {"id": 391, "ch": 5, "cat": "飞行原理3", "q": "描述飞机在空间姿态的姿角", "opts": ["A 俯仰角，侧滑角，滚转", "B 滚转角，偏航角，俯仰", "C 迎角，偏航角，滚转角"], "ans": 1, "exp": "三个姿角：滚转角、偏航角（方位角）俯仰角。迎角和侧滑角是气动角"}, {"id": 392, "ch": 5, "cat": "飞行原理3", "q": "飞机绕立轴的稳定性称", "opts": ["A 纵向稳定", "B 横向稳定", "C 航向稳定"], "ans": 2, "exp": "绕立轴为航向稳定性"}, {"id": 393, "ch": 5, "cat": "飞行原理3", "q": "飞行中发现飞机非指令的时而左滚，时右滚，同时伴随机头时左偏，时右偏的现象，此迹象表明", "opts": ["A 飞机进入了螺", "B 飞机进入了失", "C 飞机进入了飘?荷兰?"], "ans": 2, "exp": "非指令左右滚?左右偏航=飘摆（荷兰滚）"}, {"id": 394, "ch": 5, "cat": "飞行原理3", "q": "飞机航向稳定性是指飞机受到侧风扰动后", "opts": ["A 产生绕立轴转动，扰动消失后自动恢复原飞行姿", "B 产生绕横轴转动，扰动消失后转角自动回到零", "C 产生绕立轴转动，扰动消失后转角自动回到零"], "ans": 0, "exp": "航向稳定性：受扰动绕立轴偏航，扰动消失后恢复原飞行姿态"}, {"id": 395, "ch": 5, "cat": "飞行原理3", "q": "____频段可用于无人机系统的上行遥控链", "opts": ["A 1430-1446MHz", "B 840.5-845MHz", "C 2408-2440MHz"], "ans": 1, "exp": "840.5-845MHz可用于上行遥控链路"}, {"id": 396, "ch": 5, "cat": "飞行原理3", "q": "使飞机绕横轴转动的力矩称", "opts": ["A 倾斜力矩", "B 俯仰力矩", "C 滚转力矩"], "ans": 1, "exp": "绕横轴的力矩为俯仰力矩"}, {"id": 397, "ch": 5, "cat": "飞行原理3", "q": "具有负静安定性的飞机，当受到扰动使平衡状态变化后，有", "opts": ["A 保持偏离后的平衡状的趋势", "B 回到原平衡状态的趋势", "C 继续偏离原平衡状态的趋势"], "ans": 2, "exp": "负静安定性：受扰后继续偏离原状"}, {"id": 398, "ch": 5, "cat": "飞行原理3", "q": "飞机离地速度越小，则", "opts": ["A 滑跑距离越长，飞机的起飞性能越好", "B 滑跑距离越短，飞机的起飞性能越差", "C 滑跑距离越短，飞机的起飞性能越好"], "ans": 2, "exp": "离地速度小→滑跑距离短→起飞性能好"}, {"id": 399, "ch": 6, "cat": "法律法规", "q": "农业作业飞行的最低天气标准，平原地区", "opts": ["A 云高不低?00米，能见度不小于5公里", "B 云高不低?50米，能见度不小于5公里", "C 云高不低?00米，能见度不小于3公里"], "ans": 0, "exp": "平原地区农业作业朢低天气标准：云高?00m，能见度?km"}, {"id": 400, "ch": 6, "cat": "法律法规", "q": "下列情况下，无人机系统驾驶员不实施管", "opts": ["A 在融合空域运行的IV级别无人", "B 超视距运行的I类无人机", "C 视距内运行的II类无人机"], "ans": 2, "exp": "II类视距内运行由行业协会管理，屢方不直接实施管理"}, {"id": 401, "ch": 6, "cat": "法律法规", "q": "无人机航证书不可____", "opts": ["A 随无人机系统携带", "B 存放备查", "C 随飞机一起转"], "ans": 1, "exp": "适航证书霢随机携带，不可仅存放备查"}, {"id": 402, "ch": 6, "cat": "法律法规", "q": "飞行教员不需要在飞行教员记录本或单独文件中记录的内容", "opts": ["A 由该教员在飞行经历记录本或在学生驾驶员执照上签字而被授予单飞权利的每个人的姓名，包括每次签字的日期以及所涉及的航空器型号", "B 教学的内容课时日期和航空器型", "C 由该教员签字推荐参加理论考试或实践试的每个人的姓名，包括考试的种类日期和考试结果"], "ans": 1, "exp": "教学内容、课时等不是教员记录本必须记录的内容"}, {"id": 403, "ch": 6, "cat": "法律法规", "q": "在什么条件下飞行教员方可在学生驾驶员飞行经历记录本上签字，批准其单飞", "opts": ["A 亲自对该学生驾驶员提供了本规则授予单飞权利所要求的飞行训练，确认该学生驾驶员能够遵守飞行教员出于安全考虑而在飞行经历记录本上作出的任何限制，已经做好准备能够安全实施单飞", "B 亲自或委托具备飞行教员资格和权限的飞行教员对该学生驾驶员提供了本规则授予单飞权利扢要求的飞行训", "C 亲自或委托具备飞行教员资格和权限的飞行教员对该学生驾驶员提供了训练，同时霢得到棢查教员的认可和批"], "ans": 0, "exp": "飞行教员必须亲自提供训练并确认学员安全才能签字批准单飞"}, {"id": 404, "ch": 6, "cat": "法律法规", "q": "II级别无人机指", "opts": ["A 1.5公斤<空机质量<4kg?.5公斤<起飞全重?kg，超视距运行", "B 1.5公斤<空机质量<7kg?.5公斤<起飞全重?5kg", "C 1.5公斤<空机质量<4kg?.5公斤<起飞全重<7kg，视距内运行"], "ans": 2, "exp": "II级别无人机：1.5kg<空机质量<4kg?.5kg<起飞全重<7kg，视距内运行"}, {"id": 405, "ch": 6, "cat": "法律法规", "q": "由授权教员签字批准单飞后的学员，单飞训练时间在其飞行经历记录本上应体现为", "opts": ["A 副驾驶时", "B 机长时间", "C 单飞时间"], "ans": 2, "exp": "单飞训练时间应记录为单飞时间"}, {"id": 406, "ch": 6, "cat": "法律法规", "q": "飞行人员未按中华人民共和国基本规则规定履行职责的，由有关部门依法给予行政处分或纪律处分，情节严重的，依法给予吊扣执照或合格证____的处罚，或责令停飞____", "opts": ["A 半年，一至三个月", "B 丢至三个月，半", "C 丢至六个月，一至三个月"], "ans": 2, "exp": "情节严重可吊扣执?-6个月，责令停?-3个月"}, {"id": 407, "ch": 6, "cat": "法律法规", "q": "无人机系统无线电资源的使用____屢方无线电管理部门的许可证", "opts": ["A 丢般情况下不需", "B 不需", "C 霢"], "ans": 2, "exp": "无人机无线电资源使用霢要取得相关许可证"}, {"id": 408, "ch": 6, "cat": "法律法规", "q": "民用航空器因故确霢偏离指定的航路或者改变飞行高度飞行时，应当首", "opts": ["A 取得机组的一致同", "B 取得空中交管制单位的许可", "C 得到机长的允"], "ans": 1, "exp": "偏离航路或改变高度需首先取得空管单位许可"}, {"id": 409, "ch": 6, "cat": "法律法规", "q": "从事通用航空飞行活动的单位个人违反本条例规定，下列哪些情形下依法追究刑事责任:1未经批准擅自飞行?2未按批准的飞行计划飞行的;3不及时报告或者漏报飞行动态的;4未经批准飞入空中限制区空中危险区", "opts": ["A 1??", "B 1??", "C 1???"], "ans": 2, "exp": "以上四种情形均可能被追究刑事责任"}, {"id": 410, "ch": 6, "cat": "法律法规", "q": "执行昼间专业任务的航空器，在山区进行作业飞行时，睢陆时间最晚不得晚于日落前", "opts": ["A 15分钟", "B 20分钟", "C 10分钟"], "ans": 0, "exp": "山区作业睢陆最晚不得晚于日落前15分钟"}, {"id": 411, "ch": 6, "cat": "法律法规", "q": "飞行教员合格证申请人必须年满", "opts": ["A 20周岁", "B 21周岁", "C 18周岁"], "ans": 2, "exp": "飞行教员合格证申请人须年?8周岁"}, {"id": 412, "ch": 6, "cat": "法律法规", "q": "视距外运行使用自主模式的无人机，出现无人机失控的情况，机长应该执行相应的预案，包?1无人机应急回收程?2对于接入无人机云的用户，应在系统内上报相关情?3对于未接入无人机云的用户，联系相关空管服务部门的程序", "opts": ["A 2?", "B 1?", "C 1??"], "ans": 2, "exp": "以上三项均是失控时应执行的预案"}, {"id": 413, "ch": 6, "cat": "法律法规", "q": "下列说法正确的是", "opts": ["A 除非具有屢方委任的监察员或考试员资格，否则飞行教员不得为获得CCAR61部要求的执照、等级运行许可实践试或理论试权利而为自己进行任何签字", "B 飞行教员不得为获得CCAR61部要求的执照、等级运行许可实践试或理论试权利而为自己进行任何签字", "C 当存在特殊的情况或条件限制时，在获得特别授权和批准后，飞行教员可以为获得CCAR61部要求的执照、等级运行许可实践试或理论试权利而为自己进行签字"], "ans": 1, "exp": "飞行教员绝对不得为自己进行任何签字"}, {"id": 414, "ch": 6, "cat": "法律法规", "q": "对于涉及酒精或药物的违禁行为处罚的人员，自其违禁行为发生之日起____内，屢方将不接受该人员提出的任何按本规则颁发执照或等级的申", "opts": ["A 半年", "B 丢", "C 两年"], "ans": 1, "exp": "涉酒?药物违禁行为发生后一年内不接受执照申请"}, {"id": 415, "ch": 6, "cat": "法律法规", "q": "参加理论考试或实践试的申请人在参加试", "opts": ["A 应当具有授权教员签注的已完成有关地面理论或飞行训练的证明", "B 以上二缺丢不可", "C 应当具有授权教员推荐其参加试的证"], "ans": 1, "exp": "既需训练证明也需推荐证明，二者缺丢不可"}, {"id": 416, "ch": 6, "cat": "法律法规", "q": "空域是航空器运行的环境，目前正在推进空域管理改革，预计划分三类空域，为____", "opts": ["A 管制空域、监视空域和报告空域", "B 管制空域、非管制空域和特殊空", "C 管制空域、非管制空域和报告空"], "ans": 0, "exp": "三类空域：管制空域监视空域和报告空域"}, {"id": 417, "ch": 6, "cat": "法律法规", "q": "在融合空域运行的大型无人机机长，应至少持", "opts": ["A 航线运输执照", "B 商照和仪表等", "C 商照"], "ans": 0, "exp": "融合空域大型无人机机长需航线运输执照"}, {"id": 418, "ch"
